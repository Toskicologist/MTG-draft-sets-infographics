name: Daily 17Lands Data Refresh

# Runs every day at 06:00 UTC. 17Lands' nightly stats job starts at 00:00 UTC
# and "takes a few hours" per their FAQ (https://www.17lands.com/faq), so 6:00
# UTC gives them a 6-hour buffer. In practice GitHub delays scheduled actions
# under load, so runs often land between 08:00-11:00 UTC — still well after
# 17Lands has finished its nightly update.
#
# Refreshes SOS (under/over-rated + archetypes + quiz) and MSH (quiz only) in a
# single job so both land in ONE commit. They share the quiz file (QUIZ_VERSION +
# changelog), so running them sequentially here avoids the merge/push races two
# separate workflows would hit. Each refresh is continue-on-error so a transient
# failure in one set never blocks the other or the commit.
#
# To pause: disable from the Actions tab.
# To stop completely: delete this file.
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:    # also runnable manually from the Actions tab

permissions:
  contents: write       # needed to commit and push back

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run SOS refresh (fetch + apply + promote)
        continue-on-error: true
        run: |
          python mtg/scripts/refresh_sos_17lands.py --fetch --apply --force --promote

      - name: Run MSH quiz refresh (fetch + apply + promote)
        continue-on-error: true
        run: |
          python mtg/scripts/refresh_msh_quiz.py --fetch --apply --force --promote

      - name: Commit and push if anything changed
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

          git add -A

          if git diff --staged --quiet; then
            echo "No changes - skipping commit."
            exit 0
          fi

          git commit -m "Auto-refresh 17Lands data (SOS + MSH)

          Generated by .github/workflows/update-sos.yml at $(date -u +%Y-%m-%dT%H:%MZ)."

          git push
