# Daily: rebuild the TCG-Mid price snapshot (TCGcsv) + a slim Scryfall card
# index, and publish BOTH to the orphan `price-data` branch as a single
# force-pushed commit (so `main` history never grows), then purge jsDelivr.
# The deckbuilder page fetches them from
#   https://cdn.jsdelivr.net/gh/<owner>/<repo>@price-data/<file>?d=<UTC-date>
# so Mid mode needs ZERO Scryfall calls and there is no CORS problem.
# Source of truth: ClaudeProjects mtg/budget-modern-deckbuilder/deploy/.

name: Refresh price-data

on:
  schedule:
    - cron: "30 20 * * *"   # 20:30 UTC daily, after TCGcsv's ~20:00 refresh
  workflow_dispatch: {}      # manual "Run workflow" button

permissions:
  contents: write

concurrency:
  group: price-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # ~514 MB Scryfall bulk is streamed (bounded RAM); ~2-3 min total.
      - name: Build price snapshot + card index
        run: node mtg/budget-modern-deckbuilder/scripts/build-data.mjs

      - name: Publish to orphan price-data branch (single force-pushed commit)
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          SRC="$PWD/mtg/budget-modern-deckbuilder/data"
          WORK="$(mktemp -d)"
          cp "$SRC/tcg-prices.json" "$SRC/cards-index.json" "$SRC/data-meta.json" "$WORK/"
          cd "$WORK"
          git init -q
          git checkout -q -b price-data
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -q -m "price-data $(date -u +%Y-%m-%dT%H:%MZ)"
          git push -f "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git" price-data

      - name: Purge jsDelivr edge cache
        env:
          REPO: ${{ github.repository }}
        run: |
          for f in tcg-prices.json cards-index.json data-meta.json; do
            curl -sS "https://purge.jsdelivr.net/gh/${REPO}@price-data/${f}" >/dev/null || true
          done
          echo "purge requested"
