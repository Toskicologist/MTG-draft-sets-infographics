<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strixhaven SOS Top Cards by Color</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #1a1a1a;
            color: #e0e0e0;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            text-align: center;
            color: #999;
            margin-bottom: 30px;
            font-size: 0.95em;
        }

        .controls {
            background: #2a2a2a;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .controls label {
            font-weight: 600;
            color: #ccc;
        }

        .controls input {
            padding: 8px 12px;
            background: #333;
            border: 1px solid #444;
            color: #e0e0e0;
            border-radius: 4px;
            font-size: 1em;
            width: 80px;
        }

        .controls input:focus {
            outline: none;
            border-color: #4a90e2;
            background: #3a3a3a;
        }

        .color-section {
            margin-bottom: 50px;
        }

        .color-header {
            display: flex;
            align-items: center;
            margin-bottom: 25px;
            border-bottom: 3px solid;
            padding-bottom: 15px;
        }

        .color-dot {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            margin-right: 15px;
            border: 2px solid #fff;
        }

        .color-dot.white { background: #f5f5dc; border-color: #333; }
        .color-dot.blue { background: #4a90e2; }
        .color-dot.black { background: #2a2a2a; border-color: #999; }
        .color-dot.red { background: #e74c3c; }
        .color-dot.green { background: #27ae60; }
        .color-dot.colorless { background: #999999; }

        .color-header h2 {
            font-size: 1.8em;
            font-weight: 600;
        }

        .color-header.white { border-color: #f5f5dc; }
        .color-header.blue { border-color: #4a90e2; }
        .color-header.black { border-color: #666; }
        .color-header.red { border-color: #e74c3c; }
        .color-header.green { border-color: #27ae60; }
        .color-header.colorless { border-color: #999999; }

        .rarity-group {
            margin-bottom: 30px;
        }

        .rarity-title {
            font-size: 1.1em;
            font-weight: 600;
            color: #bbb;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .card {
            text-align: center;
        }

        .card img {
            width: 100%;
            border-radius: 4px;
            border: 2px solid #444;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            transition: transform 0.2s, border-color 0.2s;
            cursor: pointer;
        }

        .card img:hover {
            transform: scale(1.05);
            border-color: #999;
        }

        .card-name {
            margin-top: 8px;
            font-size: 0.85em;
            color: #ccc;
        }

        .card-name a {
            color: #4a90e2;
            text-decoration: none;
        }

        .card-name a:hover {
            text-decoration: underline;
        }

        .card-score {
            font-size: 0.8em;
            color: #999;
            margin-top: 4px;
        }
    </style>
</head>

        const colorConfig = {
            'W': {'name': 'White', 'class': 'white'},
            'U': {'name': 'Blue', 'class': 'blue'},
            'B': {'name': 'Black', 'class': 'black'},
            'R': {'name': 'Red', 'class': 'red'},
            'G': {'name': 'Green', 'class': 'green'},
            'C': {'name': 'Colorless', 'class': 'colorless'}
        };

        const rarityNames = {
            'C': 'Commons',
            'U': 'Uncommons',
            'RareMythic': 'Rares & Mythics'
        };

        function renderCards(count) {
            const content = document.getElementById('content');
            content.innerHTML = '';

            const colors = ['W', 'U', 'B', 'R', 'G', 'C'];

            for (const colorCode of colors) {
                const config = colorConfig[colorCode];
                const colorSection = document.createElement('div');
                colorSection.className = 'color-section';

                const header = document.createElement('div');
                header.className = `color-header ${config.class}`;
                header.innerHTML = `
                    <div class="color-dot ${config.class}"></div>
                    <h2>${config.name}</h2>
                `;
                colorSection.appendChild(header);

                const rarities = ['C', 'U', 'RareMythic'];

                for (const rarity of rarities) {
                    const cards = cardData[colorCode][rarity] || [];
                    if (cards.length === 0) continue;

                    const sliced = cards.slice(0, count);

                    const rarityGroup = document.createElement('div');
                    rarityGroup.className = 'rarity-group';

                    const title = document.createElement('h3');
                    title.className = 'rarity-title';
                    title.textContent = rarityNames[rarity];
                    rarityGroup.appendChild(title);

                    const grid = document.createElement('div');
                    grid.className = 'cards-grid';

                    for (const card of sliced) {
                        const cardEl = document.createElement('div');
                        cardEl.className = 'card';

                        const img = imagemap[card.name];
                        const scryUrl = `https://scryfall.com/search?q=!${card.name.replace(/ /g, '+')}`;

                        if (img) {
                            cardEl.innerHTML = `
                                <img src="${img}" alt="${card.name}" title="${card.name}">
                                <div class="card-name"><a href="${scryUrl}" target="_blank">${card.name}</a></div>
                                <div class="card-score">avgNorm: ${card.avgNorm.toFixed(3)}</div>
                            `;
                        } else {
                            cardEl.innerHTML = `
                                <div style="background: #333; padding: 20px; border-radius: 4px; min-height: 150px; display: flex; align-items: center; justify-content: center;">
                                    <span style="color: #666;">${card.name}</span>
                                </div>
                                <div class="card-name"><a href="${scryUrl}" target="_blank">${card.name}</a></div>
                                <div class="card-score">avgNorm: ${card.avgNorm.toFixed(3)}</div>
                            `;
                        }

                        grid.appendChild(cardEl);
                    }

                    rarityGroup.appendChild(grid);
                    colorSection.appendChild(rarityGroup);
                }

                content.appendChild(colorSection);
            }
        }

        // Initial render
        renderCards(5);

        // Handle input changes
        document.getElementById('cardCount').addEventListener('input', (e) => {
            const count = Math.max(1, Math.min(20, parseInt(e.target.value) || 5));
            renderCards(count);
        });
    </script>
