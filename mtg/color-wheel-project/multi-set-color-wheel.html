};

const isMobile = () => window.innerWidth <= 768;

const getConfig = (textSizeMultiplier = 1.0) => {
  const mobile = isMobile();
  const baseFontSize = mobile ? 10 : 11;
  return {
    width: 700,
    height: 700,
    cx: 350,
    cy: 330,
    radius: mobile ? 140 : 180,
    nodeRadius: mobile ? 24 : 30,
    edgeWidth: mobile ? 4 : 5,
    boxW: mobile ? 58 : 62,
    boxH: mobile ? 32 : 36,
    primaryBoxW: mobile ? 68 : 72,
    primaryBoxH: mobile ? 40 : 44,
    fontSize: Math.round(baseFontSize * textSizeMultiplier),
    lineSpacing: mobile ? 9 : 10,
    iterMax: 240,
    pushStep: 6,
  };
};

const hexToRgb = (h) => {
  const hex = h.replace('#', '');
  return [parseInt(hex.substring(0,2),16), parseInt(hex.substring(2,4),16), parseInt(hex.substring(4,6),16)];
};

const rgbToHex = (r, g, b) =>
  '#' + [r, g, b].map(x => Math.round(x).toString(16).padStart(2, '0')).join('');

const darken = (h, amt = 0.4) => {
  const [r, g, b] = hexToRgb(h);
  return rgbToHex(r*(1-amt), g*(1-amt), b*(1-amt));
};

const blend = (u, v) => {
  const [r1,g1,b1] = hexToRgb(baseHex[u]);
  const [r2,g2,b2] = hexToRgb(baseHex[v]);
  return rgbToHex((r1+r2)/2, (g1+g2)/2, (b1+b2)/2);
};

const relLum = (h) => {
  const [r,g,b] = hexToRgb(h).map(x => x/255);
  const f = (c) => c <= 0.03928 ? c/12.92 : Math.pow((c+0.055)/1.055, 2.4);
  return 0.2126*f(r) + 0.7152*f(g) + 0.0722*f(b);
};

const contrastRatio = (bg, fg) => {
  const [L1,L2] = [relLum(bg), relLum(fg)].sort((a,b) => b-a);
  return (L1+0.05)/(L2+0.05);
};

const getLabelColors = (u, v) => {
  let bg, fg;
  if (u === 'B' || v === 'B') {
    bg = '#000000';
    const partner = u === 'B' ? v : u;
    fg = partner === 'W' ? '#FFFFFF' : baseHex[partner];
  } else if (u === 'W' || v === 'W') {
    const partner = u === 'W' ? v : u;
    bg = darken(baseHex[partner], 0.4);
    fg = '#FFFFFF';
  } else {
    bg = darken(baseHex[u], 0.4);
    fg = baseHex[v];
    if (contrastRatio(bg, fg) < 4.5) {
      const [r,g,b] = hexToRgb(fg);
      fg = rgbToHex(Math.min(r+140,255), Math.min(g+140,255), Math.min(b+140,255));
    }
  }
  return { bg, fg };
};

const getEdgeList = (labels) => Object.keys(labels).map(pair => ({
  u: pair[0], v: pair[1],
  uIdx: colorOrder.indexOf(pair[0]),
  vIdx: colorOrder.indexOf(pair[1]),
}));

const getNodePos = (index, config) => {
  const angle = (index * 72 - 90) * (Math.PI / 180);
  return { x: config.cx + config.radius * Math.cos(angle), y: config.cy + config.radius * Math.sin(angle) };
};

const getNodePositions = (config) => colorOrder.map((_,i) => getNodePos(i, config));

const getEdgeGeometry = (uIdx, vIdx, config) => {
  const np = getNodePositions(config);
  const p1 = np[uIdx], p2 = np[vIdx];
  const dx = p2.x-p1.x, dy = p2.y-p1.y;
  const L = Math.hypot(dx, dy);
  const ux = dx/L, uy = dy/L;
  const x = (p1.x + ux*config.nodeRadius + p2.x - ux*config.nodeRadius)/2;
  const y = (p1.y + uy*config.nodeRadius + p2.y - uy*config.nodeRadius)/2;
  return { x, y, tx: ux, ty: uy, nx: -uy, ny: ux };
};

const getBbox = (cx, cy, isPrimary, config) => {
  const w = isPrimary ? config.primaryBoxW : config.boxW;
  const h = isPrimary ? config.primaryBoxH : config.boxH;
  return { x1: cx-w/2, x2: cx+w/2, y1: cy-h/2, y2: cy+h/2 };
};

const isOverlap = (b1, b2, margin = 2) =>
  !(b1.x2+margin < b2.x1 || b2.x2+margin < b1.x1 || b1.y2+margin < b2.y1 || b2.y2+margin < b1.y1);

const computeLabelPositions = (config, labels, primaryArchetypes) => {
  const edges = getEdgeList(labels);
  const groups = edges.map(edge => {
    const pairCode = edge.u + edge.v;
    const isPrimary = primaryArchetypes.includes(pairCode);
    const { x, y, tx, ty, nx, ny } = getEdgeGeometry(edge.uIdx, edge.vIdx, config);
    const sgn = (x - config.cx)*nx + (y - config.cy)*ny > 0 ? 1 : -1;
    const off = sgn * (isPrimary ? 20 : 15);
    const tshift = edge.u < edge.v ? 3 : -3;
    const cx = x + nx*off + tx*tshift;
    const cy = y + ny*off + ty*tshift;
    return { ...edge, cx, cy, isPrimary, bbox: getBbox(cx, cy, isPrimary, config) };
  });
  for (let iter = 0; iter < config.iterMax; iter++) {
    let moved = false;
    for (let i = 0; i < groups.length; i++) {
      for (let j = i+1; j < groups.length; j++) {
        if (isOverlap(groups[i].bbox, groups[j].bbox)) {
          const dx = groups[i].cx - groups[j].cx;
          const dy = groups[i].cy - groups[j].cy;
          const L = Math.hypot(dx, dy) + 0.001;
          groups[i].cx += (dx/L)*config.pushStep;
          groups[i].cy += (dy/L)*config.pushStep;
          groups[j].cx -= (dx/L)*config.pushStep;
          groups[j].cy -= (dy/L)*config.pushStep;
          groups[i].bbox = getBbox(groups[i].cx, groups[i].cy, groups[i].isPrimary, config);
          groups[j].bbox = getBbox(groups[j].cx, groups[j].cy, groups[j].isPrimary, config);
          moved = true;
        }
      }
    }
    if (!moved) break;
  }
  return groups;
};

const ManaSymbol = ({ color, size = 24, isSimple = false }) => (
  <i
    className={manaClasses[color]}

      color: isSimple ? '#000000' : (color === 'W' ? '#000000' : '#FFFFFF'),

    }}
  />
);

const ColorNode = ({ color, index, isHighlighted, isDimmed, onHover, onLeave, isSimple, config }) => {
  const pos = getNodePositions(config)[index];
  return (
    <g onMouseEnter={onHover} onMouseLeave={onLeave}
       style={{ cursor: 'pointer', transition: 'opacity 0.2s ease' }}
       opacity={isDimmed ? 0.3 : 1}>
      <circle cx={pos.x} cy={pos.y} r={config.nodeRadius + (isHighlighted ? 12 : 8)}
        fill={isHighlighted ? "#FFD700" : (isSimple ? 'transparent' : baseHex[color])}
        opacity={isHighlighted ? 0.6 : 0.25} style={{ transition: 'all 0.2s ease' }} />
      <circle cx={pos.x} cy={pos.y} r={config.nodeRadius}
        fill={isSimple ? '#FFFFFF' : baseHex[color]}
        stroke={isHighlighted ? "#FFD700" : "#000000"}
        strokeWidth={isHighlighted ? 4 : 3} style={{ transition: 'all 0.2s ease' }} />
      <foreignObject x={pos.x-20} y={pos.y-20} width={40} height={40}>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', width: '40px', height: '40px',
          color: isSimple ? '#000000' : (color === 'W' ? '#000000' : '#FFFFFF') }}>
          <ManaSymbol color={color} size={30} isSimple={isSimple} />
        </div>
      </foreignObject>
    </g>
  );
};

const EdgeLine = ({ edge, isHighlighted, isDimmed, isPrimary, isSimple, config }) => {
  const np = getNodePositions(config);
  const p1 = np[edge.uIdx], p2 = np[edge.vIdx];
  const lineOpacity = isDimmed ? 0.1 : (isPrimary ? 1 : 0.45);
  return (
    <line x1={p1.x} y1={p1.y} x2={p2.x} y2={p2.y}
      stroke={isHighlighted ? "#FFD700" : (isSimple ? '#000000' : blend(edge.u, edge.v))}
      strokeWidth={isHighlighted ? config.edgeWidth+3 : (isPrimary ? config.edgeWidth+2 : config.edgeWidth)}
      opacity={lineOpacity} style={{ transition: 'all 0.2s ease' }} />
  );
};

const LabelBox = ({ group, isHighlighted, isDimmed, onHover, onLeave, onClick, isSimple, config, labels, primaryArchetypes }) => {
  const groupRef = useRef(null);
  const [boxSize, setBoxSize] = useState({ width: 50, height: 35 });
  const code = group.u + group.v;
  const labelData = labels[code] || labels[group.v + group.u];
  if (!labelData) return null;
  const { bg, fg } = getLabelColors(group.u, group.v);
  const subLines = labelData.sub.split('\n');
  const boxBg = isSimple ? '#FFFFFF' : bg;
  const boxStroke = isSimple ? '#000000' : blend(group.u, group.v);
  const textColor = isSimple ? '#000000' : fg;
  const isPrimary = primaryArchetypes.includes(code);

  const lh1 = config.fontSize * 1.1, lh2 = config.fontSize * 1.1, lh3 = config.fontSize * 1.1;
  const totalTextHeight = lh1 + lh2 + lh3 + (subLines.length - 1) * 7;
  const startY = group.cy - totalTextHeight / 2;
  const y1 = startY + lh1 * 0.8, y2 = y1 + lh2, y3 = y2 + lh3 * 0.9;

  useEffect(() => {
    if (groupRef.current) {
      const texts = groupRef.current.querySelectorAll('text');
      let maxWidth = 0;
      texts.forEach(t => { try { maxWidth = Math.max(maxWidth, t.getBBox().width); } catch(e){} });
      setBoxSize({ width: Math.max(maxWidth + 8, 35), height: totalTextHeight + 6 });
    }
  }, [code, labelData.text, labelData.sub, config.fontSize, totalTextHeight]);

  return (
    <g ref={groupRef} onMouseEnter={onHover} onMouseLeave={onLeave} onClick={onClick}
       style={{ cursor: 'pointer', transition: 'all 0.2s ease' }}
       opacity={isDimmed ? 0.15 : (isPrimary ? 1 : 0.5)}
       transform={isHighlighted ? `translate(${group.cx},${group.cy}) scale(1.08) translate(${-group.cx},${-group.cy})` : undefined}>
      <rect x={group.cx-boxSize.width/2} y={group.cy-boxSize.height/2}
        width={boxSize.width} height={boxSize.height} rx={4}
        fill={boxBg} stroke={isHighlighted ? "#FFD700" : boxStroke}
        strokeWidth={isHighlighted ? 3 : (isPrimary ? 2 : 1.5)}
        style={{ transition: 'all 0.2s ease' }} />
      <text x={group.cx} y={y1} textAnchor="middle" fontSize={config.fontSize} fontWeight="bold" fill={textColor}>{code}</text>
      <text x={group.cx} y={y2} textAnchor="middle" fontSize={config.fontSize} fontWeight={isPrimary ? "bold" : "normal"} fill={textColor}>{labelData.text}</text>
      <text x={group.cx} y={y3} textAnchor="middle" fontSize={config.fontSize} fill={textColor} opacity={0.85}>
        {subLines.map((line, i) => <tspan key={i} x={group.cx} dy={i === 0 ? 0 : 7}>{line}</tspan>)}
      </text>
    </g>
  );
};

function MultiSetColorWheel() {

    const hash = window.location.hash.slice(1).toUpperCase();
    return SET_ORDER.includes(hash) ? hash : 'ECL';
  });
  const [hoveredNode, setHoveredNode] = useState(null);
  const [hoveredPair, setHoveredPair] = useState(null);

  const [isSimple, setIsSimple] = useState(false);
  const [textSize, setTextSize] = useState(1.0);
  const [config, setConfig] = useState(() => getConfig(1.0));
  const pairTimeoutRef = useRef(null);
  const colorTimeoutRef = useRef(null);

  const currentSet = SET_DATA[currentSetKey];

  useEffect(() => {
    const handleResize = () => setConfig(getConfig(textSize));
    window.addEventListener('resize', handleResize);
    return () => window.removeEventListener('resize', handleResize);
  }, [textSize]);

  useEffect(() => { setConfig(getConfig(textSize)); }, [textSize]);

  // Sync URL hash with current set
  useEffect(() => {
    window.location.hash = currentSetKey.toLowerCase();
  }, [currentSetKey]);

  // Reset hover state when set changes
  useEffect(() => {
    setHoveredNode(null);
    setHoveredPair(null);
    setHoveredColor(null);

  const labelPositions = computeLabelPositions(config, currentSet.labels, currentSet.primaryArchetypes);
  const edges = getEdgeList(currentSet.labels);

  const handlePairHover = (pairCode) => {
    if (pairTimeoutRef.current) { clearTimeout(pairTimeoutRef.current); pairTimeoutRef.current = null; }
    setHoveredPair(pairCode);
  };

  const handlePairLeave = () => {
    pairTimeoutRef.current = setTimeout(() => setHoveredPair(null), 800);
  };

  const handleColorHover = (color) => {
    if (colorTimeoutRef.current) { clearTimeout(colorTimeoutRef.current); colorTimeoutRef.current = null; }
    setHoveredColor(color);
  };

  const handleColorLeave = () => {
    colorTimeoutRef.current = setTimeout(() => setHoveredColor(null), 800);

    return () => {
      if (pairTimeoutRef.current) clearTimeout(pairTimeoutRef.current);
      if (colorTimeoutRef.current) clearTimeout(colorTimeoutRef.current);

  const activeColors = hoveredPair ? [hoveredPair[0], hoveredPair[1]] : (hoveredNode ? [hoveredNode] : []);

                    <div style={{ fontWeight: 'bold', fontSize: '1.1rem', marginBottom: '4px' }}>{pair}: {data.text}</div>
                    <div style={{ fontSize: '0.85rem', opacity: 0.9, marginBottom: '8px', fontStyle: 'italic' }}>{data.sub.replace('\n', ' / ')}</div>
                    <div style={{ fontSize: '0.8rem', lineHeight: '1.4', opacity: 0.95, marginBottom: '8px' }}>{data.details}</div>
                    {data.sourceText && (
                      <div style={{ fontSize: '0.7rem', opacity: 0.7, fontStyle: 'italic', marginBottom: '10px' }}>
                        Source:{' '}
                        {data.sourceUrl && data.sourceUrl !== '#'
                          ? <a href={data.sourceUrl} target="_blank" rel="noopener noreferrer" style={{ color: fg, textDecoration: 'underline' }}>{data.sourceText}</a>
                          : <span>{data.sourceText}</span>}
                      </div>
                    )}
                    <div style={{ fontSize: '0.65rem', opacity: 0.85, marginBottom: '5px', fontWeight: '600' }}>Scryfall:</div>
                    <div style={{ display: 'flex', gap: '4px', flexWrap: 'wrap' }}>
                      <a href={exactUrl} target="_blank" rel="noopener noreferrer"
                         style={{ display: 'inline-block', padding: '4px 10px', backgroundColor: fg, color: bg,
                           textDecoration: 'none', borderRadius: '3px', fontSize: '0.65rem', fontWeight: '600' }}>
                        {pair[0]}&amp;{pair[1]}
                      </a>
                      <a href={orUrl} target="_blank" rel="noopener noreferrer"
                         style={{ display: 'inline-block', padding: '4px 10px', backgroundColor: fg, color: bg,
                           textDecoration: 'none', borderRadius: '3px', fontSize: '0.65rem', fontWeight: '600' }}>
                        {pair[0]}&#x222A;{pair[1]}
                      </a>
                    </div>
                  </div>
                );
              })}
            </div>
          </>
        ) : (
          <>
            {/* Primary archetypes */}
            <h2 style={{ fontSize: '1.3rem', fontWeight: '700', color: '#111827', marginBottom: '16px',
              paddingBottom: '8px', borderBottom: `2px solid ${currentSet.accentColor}` }}>
              ★ Primary Archetypes
            </h2>
            <div className="archetype-grid" style={{ display: 'grid',
              gridTemplateColumns: 'repeat(auto-fit, minmax(min(100%, 150px), 1fr))', gap: '12px', alignSelf: 'stretch' }}>
              {primaryPairs.map(([pair, data]) => {
                const { bg, fg } = getLabelColors(pair[0], pair[1]);
                const sc = currentSet.scryfallCodes[0];
                const exactUrl = `https://scryfall.com/search?q=set%3A${sc}+id%3D${pair}`;
                const orUrl = `https://scryfall.com/search?q=set%3A${sc}+(id%3D${pair[0]}+or+id%3D${pair[1]}+or+id%3D${pair})`;
                return (
                  <div key={pair} style={{ backgroundColor: bg, color: fg, padding: '16px', borderRadius: '8px',
                    border: `2px solid ${blend(pair[0], pair[1])}` }}>
                    <div style={{ fontWeight: 'bold', fontSize: '1.1rem', marginBottom: '4px' }}>{pair}: {data.text}</div>
                    <div style={{ fontSize: '0.85rem', opacity: 0.9, marginBottom: '8px', fontStyle: 'italic' }}>{data.sub.replace('\n', ' / ')}</div>
                    <div style={{ fontSize: '0.8rem', lineHeight: '1.4', opacity: 0.95, marginBottom: '8px' }}>{data.details}</div>
                    {data.sourceText && (
                      <div style={{ fontSize: '0.7rem', opacity: 0.7, fontStyle: 'italic', marginBottom: '10px' }}>
                        Source:{' '}
                        {data.sourceUrl && data.sourceUrl !== '#'
                          ? <a href={data.sourceUrl} target="_blank" rel="noopener noreferrer" style={{ color: fg, textDecoration: 'underline' }}>{data.sourceText}</a>
                          : <span>{data.sourceText}</span>}
                      </div>
                    )}
                    <div style={{ fontSize: '0.65rem', opacity: 0.85, marginBottom: '5px', fontWeight: '600' }}>Scryfall:</div>
                    <div style={{ display: 'flex', gap: '4px', flexWrap: 'wrap' }}>
                      <a href={exactUrl} target="_blank" rel="noopener noreferrer"
                         style={{ display: 'inline-block', padding: '4px 10px', backgroundColor: fg, color: bg,
                           textDecoration: 'none', borderRadius: '3px', fontSize: '0.65rem', fontWeight: '600' }}>
                        {pair[0]}&amp;{pair[1]}
                      </a>
                      <a href={orUrl} target="_blank" rel="noopener noreferrer"
                         style={{ display: 'inline-block', padding: '4px 10px', backgroundColor: fg, color: bg,
                           textDecoration: 'none', borderRadius: '3px', fontSize: '0.65rem', fontWeight: '600' }}>
                        {pair[0]}&#x222A;{pair[1]}
                      </a>
                    </div>
                  </div>
                );
              })}
            </div>

            {/* Secondary archetypes */}
            {secondaryPairs.length > 0 && (
              <div style={{ marginTop: '24px' }}>
                <h2 style={{ fontSize: '1.3rem', fontWeight: '700', color: '#111827', marginBottom: '8px',
                  paddingBottom: '8px', borderBottom: '2px solid #9CA3AF' }}>
                  Off-Arch / Secondary
                </h2>
                <p style={{ fontSize: '0.85rem', color: '#6B7280', marginBottom: '16px' }}>
                  These pairs have no dedicated archetype. See splash guidance.
                </p>
                <div className="archetype-grid" style={{ display: 'grid',
                  gridTemplateColumns: 'repeat(auto-fit, minmax(min(100%, 150px), 1fr))', gap: '12px', alignSelf: 'stretch' }}>
                  {secondaryPairs.map(([pair, data]) => {
                    const { bg, fg } = getLabelColors(pair[0], pair[1]);
                    const sc = currentSet.scryfallCodes[0];
                    const exactUrl = `https://scryfall.com/search?q=set%3A${sc}+id%3D${pair}`;
                    const orUrl = `https://scryfall.com/search?q=set%3A${sc}+(id%3D${pair[0]}+or+id%3D${pair[1]}+or+id%3D${pair})`;
                    return (
                      <div key={pair} style={{ backgroundColor: bg, color: fg, padding: '16px', borderRadius: '8px',
                        border: `1px dashed ${blend(pair[0], pair[1])}`, opacity: 0.85 }}>
                        <div style={{ fontWeight: 'bold', fontSize: '1.1rem', marginBottom: '4px' }}>{pair}: {data.text}</div>
                        <div style={{ fontSize: '0.85rem', opacity: 0.9, marginBottom: '8px', fontStyle: 'italic' }}>{data.sub.replace('\n', ' / ')}</div>
                        <div style={{ fontSize: '0.8rem', lineHeight: '1.4', opacity: 0.95, marginBottom: '8px' }}>{data.details}</div>
                        {data.sourceText && (
                          <div style={{ fontSize: '0.7rem', opacity: 0.7, fontStyle: 'italic', marginBottom: '10px' }}>
                            Source:{' '}
                            {data.sourceUrl && data.sourceUrl !== '#'
                              ? <a href={data.sourceUrl} target="_blank" rel="noopener noreferrer" style={{ color: fg, textDecoration: 'underline' }}>{data.sourceText}</a>
                              : <span>{data.sourceText}</span>}
                          </div>
                        )}
                        <div style={{ fontSize: '0.65rem', opacity: 0.85, marginBottom: '5px', fontWeight: '600' }}>Scryfall:</div>
                        <div style={{ display: 'flex', gap: '4px', flexWrap: 'wrap' }}>
                          <a href={exactUrl} target="_blank" rel="noopener noreferrer"
                             style={{ display: 'inline-block', padding: '4px 10px', backgroundColor: fg, color: bg,
                               textDecoration: 'none', borderRadius: '3px', fontSize: '0.65rem', fontWeight: '600' }}>
                            {pair[0]}&amp;{pair[1]}
                          </a>
                          <a href={orUrl} target="_blank" rel="noopener noreferrer"
                             style={{ display: 'inline-block', padding: '4px 10px', backgroundColor: fg, color: bg,
                               textDecoration: 'none', borderRadius: '3px', fontSize: '0.65rem', fontWeight: '600' }}>
                            {pair[0]}&#x222A;{pair[1]}
                          </a>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}
          </>
        )}
      </div>

      {/* Hover Info Panel */}
      <InfoPanel
        pair={activePair}
        labels={currentSet.labels}
        scryfallCodes={currentSet.scryfallCodes}
        primaryArchetypes={currentSet.primaryArchetypes}
        onHover={() => { if (pairTimeoutRef.current) { clearTimeout(pairTimeoutRef.current); pairTimeoutRef.current = null; } }}
        onLeave={handlePairLeave}
      />
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<MultiSetColorWheel />);
  </script>
</body>
</html>
