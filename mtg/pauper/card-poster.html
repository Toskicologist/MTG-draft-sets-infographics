<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pauper Card Poster Builder</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1e1e2e;
      color: #fff;
      padding: 20px;
    }
    .controls {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      align-items: end;
      margin-bottom: 20px;
      background: rgba(0,212,255,0.05);
      border: 1px solid rgba(0,212,255,0.2);
      border-radius: 10px;
      padding: 16px;
    }
    .control-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .control-group label {
      font-size: 0.8em;
      color: #00d4ff;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .control-group input, .control-group select {
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(0,212,255,0.4);
      color: #fff;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 0.95em;
      width: 130px;
    }
    .control-group select { cursor: pointer; }
    .preset-btn {
      padding: 8px 14px;
      background: rgba(0,212,255,0.1);
      border: 1px solid rgba(0,212,255,0.3);
      color: #00d4ff;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85em;
      transition: all 0.2s;
    }
    .preset-btn:hover {
      background: rgba(0,212,255,0.25);
      border-color: #00d4ff;
    }
    .preset-btn.active {
      background: rgba(0,212,255,0.3);
      border-color: #00d4ff;
    }
    #export-btn {
      padding: 10px 24px;
      background: #00d4ff;
      border: none;
      color: #1e1e2e;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1em;
      font-weight: 700;
      transition: all 0.2s;
    }
    #export-btn:hover { background: #33ddff; }
    .info {
      font-size: 0.85em;
      color: #b0b0c0;
      margin-bottom: 15px;
    }
    .info span { color: #00d4ff; font-weight: bold; }
    #poster-wrap {
      border: 2px solid rgba(0,212,255,0.3);
      border-radius: 4px;
      display: inline-block;
    }
    #poster {
      position: relative;
      overflow: hidden;
      transform-origin: top left;
    }
    #poster img {
      position: absolute;
      display: block;
    }
    .card-text-box {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,212,255,0.1);
      border: 1px solid rgba(0,212,255,0.4);
      border-radius: 6px;
      color: #00d4ff;
      text-align: center;
      overflow: hidden;
      padding: 2px;
      box-sizing: border-box;
    }
    .card-text-name {
      font-weight: 700;
      line-height: 1.1;
      overflow: hidden;
      text-overflow: ellipsis;
      width: 100%;
    }
    .card-text-count {
      font-weight: 400;
      opacity: 0.7;
      line-height: 1;
    }
    .card-count-label {
      position: absolute;
      color: white;
      font-weight: 900;
      text-shadow: 0 0 3px black, 0 0 3px black, 0 0 6px black, 1px 1px 2px black;
      pointer-events: none;
      line-height: 1;
      text-align: center;
      width: 100%;
    }
    .toggle-row {
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .toggle-row label {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      font-size: 0.9em;
      color: #b0b0c0;
    }
    .toggle-row input { accent-color: #00d4ff; cursor: pointer; }
  </style>
</head>
<body>
  <h2 style="color: #00d4ff; margin-bottom: 15px;">Pauper Card Poster Builder</h2>

  <div class="controls">
    <div class="control-group">
      <label>Presets</label>
      <div style="display: flex; gap: 6px;">
        <button class="preset-btn" data-w="1200" data-h="630">Twitter</button>
        <button class="preset-btn" data-w="1080" data-h="1080">Instagram</button>
        <button class="preset-btn" data-w="1920" data-h="1080">Desktop</button>
        <button class="preset-btn" data-w="1080" data-h="1920">Story</button>
      </div>
    </div>
    <div class="control-group">
      <label>Width (px)</label>
      <input type="number" id="box-w" value="1200" min="200" max="4000" step="10">
    </div>
    <div class="control-group">
      <label>Height (px)</label>
      <input type="number" id="box-h" value="630" min="200" max="4000" step="10">
    </div>
    <div class="control-group">
      <label>Cards</label>
      <input type="number" id="card-count" value="50" min="1" max="858">
    </div>
    <div class="control-group">
      <label>Gap (px)</label>
      <input type="number" id="gap-size" value="4" min="0" max="20">
    </div>
    <div class="control-group">
      <label>Count</label>
      <select id="count-mode">
        <option value="total">Total</option>
        <option value="main">Mainboard</option>
        <option value="side">Sideboard</option>
      </select>
    </div>
    <div class="control-group">
      <label>Background</label>
      <input type="color" id="bg-color" value="#1e1e2e" style="width: 50px; height: 36px; padding: 2px; cursor: pointer;">
    </div>
    <div class="control-group">
      <label>&nbsp;</label>
      <div class="toggle-row" style="flex-wrap:wrap;">
        <label style="color:#00d4ff;font-size:0.8em;">Layout:
          <select id="layout-mode" style="background:rgba(0,0,0,0.3);color:#00d4ff;border:1px solid rgba(0,212,255,0.4);border-radius:6px;padding:4px 6px;cursor:pointer;">
            <option value="grid">Uniform grid</option>
            <option value="shelf">Shelf pack (frequency)</option>
            <option value="treemap" selected>Treemap (frequency)</option>
          </select>
        </label>
        <label style="color:#00d4ff;font-size:0.8em;">Image:
          <select id="image-mode" style="background:rgba(0,0,0,0.3);color:#00d4ff;border:1px solid rgba(0,212,255,0.4);border-radius:6px;padding:4px 6px;cursor:pointer;">
            <option value="card">Full card</option>
            <option value="art">Art only</option>
            <option value="none">No image</option>
          </select>
        </label>
        <label style="color:#00d4ff;font-size:0.8em;">Fit:
          <select id="fit-mode" style="background:rgba(0,0,0,0.3);color:#00d4ff;border:1px solid rgba(0,212,255,0.4);border-radius:6px;padding:4px 6px;cursor:pointer;">
            <option value="fit">Fit (aspect)</option>
            <option value="fill">Fill (crop)</option>
          </select>
        </label>
        <label><input type="checkbox" id="use-log" checked> Log scale</label>
        <label><input type="checkbox" id="show-counts" checked> Counts</label>
        <label style="color:#00d4ff;font-size:0.8em;">Count size:
          <input type="range" id="count-size" min="0" max="500" value="100" style="width:80px;vertical-align:middle;accent-color:#00d4ff;cursor:pointer;">
          <span id="count-size-val" style="color:#b0b0c0;font-size:0.9em;">100%</span>
        </label>
        <label><input type="checkbox" id="show-names"> Names</label>
        <label style="color:#00d4ff;font-size:0.8em;">Name size:
          <input type="range" id="name-size" min="0" max="500" value="100" style="width:80px;vertical-align:middle;accent-color:#00d4ff;cursor:pointer;">
          <span id="name-size-val" style="color:#b0b0c0;font-size:0.9em;">100%</span>
        </label>
        <label><input type="checkbox" id="color-cells"> Color by mana</label>
        <label><input type="checkbox" id="hide-basics"> Hide basics</label>
        <label><input type="checkbox" id="use-hq"> HQ images</label>
      </div>
    </div>
    <div class="control-group">
      <label>&nbsp;</label>
      <button id="export-btn">Export PNG</button>
    </div>
  </div>

  <div class="info">
    Card size: <span id="info-card-size">—</span> &nbsp;|&nbsp;
    Grid: <span id="info-grid">—</span> &nbsp;|&nbsp;
    Cards shown: <span id="info-shown">—</span>
  </div>

  <div id="poster-wrap">
    <div id="poster"></div>
  </div>

    const ASPECT = 7 / 5; // card height / width
    const ART_ASPECT = 626 / 457; // art_crop aspect ratio from Scryfall
    const BASICS = ['Mountain', 'Island', 'Forest', 'Swamp', 'Plains'];

    const MANA_COLORS = {
      W: 'rgba(248,231,185,0.5)',  // white/gold
      U: 'rgba(14,104,171,0.5)',   // blue
      B: 'rgba(21,11,0,0.5)',      // black
      R: 'rgba(211,32,42,0.5)',    // red
      G: 'rgba(0,115,62,0.5)',     // green
      multi: 'rgba(199,170,48,0.5)', // gold/multicolor
      colorless: 'rgba(160,160,170,0.3)' // grey
    };

    function getCardColor(card) {
      const c = card.colors || [];
      if (c.length === 0) return MANA_COLORS.colorless;
      if (c.length > 1) return MANA_COLORS.multi;
      return MANA_COLORS[c[0]] || MANA_COLORS.colorless;
    }

    function getCount(card) {
      const mode = document.getElementById('count-mode').value;
      if (mode === 'main') return card.mainCount;
      if (mode === 'side') return card.sideCount;
      return card.count;
    }

    function getCards() {
      let cards = ALL_CARDS.filter(c => getCount(c) > 0);
      if (document.getElementById('hide-basics').checked) {
        cards = cards.filter(c => !c.isBasicLand);
      }
      cards.sort((a, b) => getCount(b) - getCount(a));
      const n = parseInt(document.getElementById('card-count').value) || 50;
      return cards.slice(0, n);
    }

    // Uniform grid: find largest card width where cols*rows >= n
    function fitCardsUniform(W, H, n, gap) {
      let lo = 10, hi = W, best = lo;
      while (lo <= hi) {
        const mid = Math.floor((lo + hi) / 2);
        const cardH = Math.round(mid * ASPECT);
        const cols = Math.floor((W + gap) / (mid + gap));
        const rows = Math.floor((H + gap) / (cardH + gap));
        if (cols * rows >= n && cols > 0 && rows > 0) {
          best = mid;
          lo = mid + 1;
        } else {
          hi = mid - 1;
        }
      }
      return best;
    }

    // Shelf-pack cards with varying widths, return { shelves, totalH }
    function shelfPack(cards, W, gap) {
      const shelves = [];
      let shelf = [];
      let shelfX = 0;
      let shelfH = 0;
      for (const card of cards) {
        const cw = card._w;
        const ch = card._h;
        if (shelfX > 0 && shelfX + gap + cw > W) {
          shelves.push({ cards: shelf, height: shelfH });
          shelf = [];
          shelfX = 0;
          shelfH = 0;
        }
        shelf.push(card);
        shelfX += (shelfX > 0 ? gap : 0) + cw;
        shelfH = Math.max(shelfH, ch);
      }
      if (shelf.length) shelves.push({ cards: shelf, height: shelfH });
      const totalH = shelves.reduce((s, sh) => s + sh.height, 0) + (shelves.length - 1) * gap;
      return { shelves, totalH };
    }

    // Squarified treemap algorithm
    // items: [{card, value}], sorted descending by value
    // rect: {x, y, w, h}
    // Returns [{card, x, y, w, h}]
    function treemap(items, rect) {
      if (items.length === 0) return [];
      if (items.length === 1) {
        return [{ card: items[0].card, x: rect.x, y: rect.y, w: rect.w, h: rect.h }];
      }

      const total = items.reduce((s, it) => s + it.value, 0);
      if (total <= 0) return [];

      // Lay out along the shorter side
      const vertical = rect.w <= rect.h; // split direction
      const side = vertical ? rect.h : rect.w;
      const other = vertical ? rect.w : rect.h;

      // Find the row that gives the best aspect ratios
      let bestRow = [items[0]];
      let bestWorst = Infinity;

      let rowSum = 0;
      for (let i = 0; i < items.length; i++) {
        rowSum += items[i].value;
        const rowFrac = rowSum / total;
        const rowThickness = rowFrac * other; // how thick this row is

        // Compute worst aspect ratio in this candidate row
        let worstRatio = 0;
        let subSum = 0;
        for (let j = 0; j <= i; j++) {
          subSum += items[j].value;
          const itemFrac = items[j].value / rowSum;
          const itemLen = itemFrac * side;
          const ratio = Math.max(itemLen / rowThickness, rowThickness / itemLen);
          worstRatio = Math.max(worstRatio, ratio);
        }

        if (worstRatio <= bestWorst) {
          bestWorst = worstRatio;
          bestRow = items.slice(0, i + 1);
        } else {
          break; // ratio got worse, stop
        }
      }

      // Lay out bestRow
      const rowTotal = bestRow.reduce((s, it) => s + it.value, 0);
      const rowFrac = rowTotal / total;
      const rowThickness = rowFrac * other;

      const result = [];
      let offset = 0;

      for (const item of bestRow) {
        const itemFrac = item.value / rowTotal;
        const itemLen = itemFrac * side;

        let px, py, pw, ph;
        if (vertical) {
          px = rect.x;
          py = rect.y + offset;
          pw = rowThickness;
          ph = itemLen;
        } else {
          px = rect.x + offset;
          py = rect.y;
          pw = itemLen;
          ph = rowThickness;
        }
        result.push({ card: item.card, x: px, y: py, w: pw, h: ph });
        offset += itemLen;
      }

      // Recurse on remaining items in the leftover rectangle
      const remaining = items.slice(bestRow.length);
      let nextRect;
      if (vertical) {
        nextRect = { x: rect.x + rowThickness, y: rect.y, w: rect.w - rowThickness, h: rect.h };
      } else {
        nextRect = { x: rect.x, y: rect.y + rowThickness, w: rect.w, h: rect.h - rowThickness };
      }

      return result.concat(treemap(remaining, nextRect));
    }

    // Compute positions for all cards. Returns { placements: [{card, x, y, w, h, cellW, cellH}], shown, info }
    function computeLayout(cards, W, H, gap, layoutMode, useLog) {
      if (cards.length === 0) return { placements: [], shown: 0, info: {} };

      if (layoutMode === 'grid') {
        // Uniform grid
        const n = cards.length;
        const cardW = fitCardsUniform(W, H, n, gap);
        const cardH = Math.round(cardW * ASPECT);
        const cols = Math.floor((W + gap) / (cardW + gap));
        const actualRows = Math.floor((H + gap) / (cardH + gap));
        const shown = Math.min(n, cols * actualRows);

        const gridW = cols * cardW + (cols - 1) * gap;
        const gridH = actualRows * cardH + (actualRows - 1) * gap;
        const offX = Math.floor((W - gridW) / 2);
        const offY = Math.floor((H - gridH) / 2);

        const placements = [];
        for (let i = 0; i < shown; i++) {
          const col = i % cols;
          const row = Math.floor(i / cols);
          placements.push({
            card: cards[i],
            x: offX + col * (cardW + gap),
            y: offY + row * (cardH + gap),
            w: cardW, h: cardH
          });
        }
        return { placements, shown, info: { cardW, cardH, cols, rows: actualRows } };
      }

      if (layoutMode === 'treemap') {
        // Treemap: area proportional to count, fills entire box
        const counts = cards.map(c => getCount(c));
        const values = counts.map(cnt => {
          if (useLog) return Math.log(cnt + 1);
          return cnt;
        });
        const items = cards.map((c, i) => ({ card: c, value: values[i] }));
        items.sort((a, b) => b.value - a.value);

        // Apply gap by shrinking the effective area, then offsetting cells
        const cells = treemap(items, { x: 0, y: 0, w: W, h: H });

        // Inset each cell by gap/2 for spacing, compute card image rect inside
        const placements = cells.map(cell => {
          const g = gap / 2;
          const cx = cell.x + g;
          const cy = cell.y + g;
          const cw = Math.max(1, cell.w - gap);
          const ch = Math.max(1, cell.h - gap);

          // Fit card image (5:7 aspect) centered inside the cell
          const cardAspect = 5 / 7;
          let imgW, imgH;
          if (cw / ch > cardAspect) {
            // Cell is wider than card — fit by height
            imgH = ch;
            imgW = ch * cardAspect;
          } else {
            // Cell is taller — fit by width
            imgW = cw;
            imgH = cw / cardAspect;
          }
          const imgX = cx + (cw - imgW) / 2;
          const imgY = cy + (ch - imgH) / 2;

          return {
            card: cell.card,
            x: imgX, y: imgY, w: imgW, h: imgH,
            cellX: cx, cellY: cy, cellW: cw, cellH: ch
          };
        });

        return { placements, shown: placements.length, info: { layout: 'treemap', cells: cells.length } };
      }

      // Shelf packing (frequency-scaled)
      const counts = cards.map(c => getCount(c));
      const maxC = Math.max(...counts);
      const minC = Math.min(...counts);

      const normed = cards.map(card => {
        const cnt = getCount(card);
        if (maxC === minC) return 0.5;
        if (useLog) return (Math.log(cnt) - Math.log(minC)) / (Math.log(maxC) - Math.log(minC));
        return (cnt - minC) / (maxC - minC);
      });

      let lo = 1, hi = W, bestMult = lo;
      while (lo <= hi) {
        const mid = Math.floor((lo + hi) / 2);
        const sized = cards.map((c, i) => {
          const w = Math.round(mid * (0.3 + 0.7 * normed[i]));
          return { ...c, _w: Math.max(4, w), _h: Math.max(4, Math.round(w * ASPECT)) };
        });
        sized.sort((a, b) => b._w - a._w);
        const { totalH } = shelfPack(sized, W, gap);
        if (totalH <= H) {
          bestMult = mid;
          lo = mid + 1;
        } else {
          hi = mid - 1;
        }
      }

      const sized = cards.map((c, i) => {
        const w = Math.max(4, Math.round(bestMult * (0.3 + 0.7 * normed[i])));
        return { ...c, _w: w, _h: Math.round(w * ASPECT) };
      });
      sized.sort((a, b) => b._w - a._w);
      const { shelves, totalH } = shelfPack(sized, W, gap);

      const offY = Math.floor((H - totalH) / 2);
      let curY = offY;
      const placements = [];

      for (const shelf of shelves) {
        const shelfW = shelf.cards.reduce((s, c) => s + c._w, 0) + (shelf.cards.length - 1) * gap;
        let curX = Math.floor((W - shelfW) / 2);
        for (const card of shelf.cards) {
          const yOff = shelf.height - card._h;
          placements.push({
            card, x: curX, y: curY + yOff, w: card._w, h: card._h
          });
          curX += card._w + gap;
        }
        curY += shelf.height + gap;
      }

      const minW = sized[sized.length - 1]._w;
      const maxW = sized[0]._w;
      return { placements, shown: placements.length, info: { minW, maxW, shelves: shelves.length } };
    }

    function render() {
      const W = parseInt(document.getElementById('box-w').value) || 1200;
      const H = parseInt(document.getElementById('box-h').value) || 630;
      const gap = parseInt(document.getElementById('gap-size').value) || 0;
      const showCounts = document.getElementById('show-counts').checked;
      const countSizePct = parseInt(document.getElementById('count-size').value) || 100;
      const showNames = document.getElementById('show-names').checked;
      const nameSizePct = parseInt(document.getElementById('name-size').value) || 100;
      const colorCells = document.getElementById('color-cells').checked;
      const useHQ = document.getElementById('use-hq').checked;
      const bgColor = document.getElementById('bg-color').value;
      const layoutMode = document.getElementById('layout-mode').value;
      const useLog = document.getElementById('use-log').checked;
      const imageMode = document.getElementById('image-mode').value;
      const fitMode = document.getElementById('fit-mode').value;
      const cards = getCards();

      document.getElementById('name-size-val').textContent = nameSizePct + '%';
      document.getElementById('count-size-val').textContent = countSizePct + '%';

      if (cards.length === 0) {
        document.getElementById('poster').innerHTML = '<p style="padding:20px;color:#888;">No cards to show</p>';
        return;
      }

      const { placements, shown, info } = computeLayout(cards, W, H, gap, layoutMode, useLog);

      const poster = document.getElementById('poster');
      const wrap = document.getElementById('poster-wrap');
      poster.style.width = W + 'px';
      poster.style.height = H + 'px';
      poster.style.background = bgColor;
      poster.innerHTML = '';

      // Scale preview to fit viewport
      const maxPreviewW = window.innerWidth - 60;
      const scale = W > maxPreviewW ? maxPreviewW / W : 1;
      poster.style.transform = 'scale(' + scale + ')';
      wrap.style.width = Math.ceil(W * scale) + 'px';
      wrap.style.height = Math.ceil(H * scale) + 'px';

      const isTreemap = layoutMode === 'treemap';

      for (const p of placements) {
        // Determine render area (treemap uses cell dims, others use placement dims)
        const rx = isTreemap && p.cellW ? p.cellX : p.x;
        const ry = isTreemap && p.cellH ? p.cellY : p.y;
        const rw = isTreemap && p.cellW ? p.cellW : p.w;
        const rh = isTreemap && p.cellH ? p.cellH : p.h;

        // Cell background (mana color or treemap default)
        if (colorCells || (isTreemap && p.cellW)) {
          const cellBg = document.createElement('div');
          const bg = colorCells ? getCardColor(p.card) : 'rgba(0,212,255,0.08)';
          const border = colorCells
            ? getCardColor(p.card).replace(/0\.[35]\)/, '0.8)')
            : 'rgba(0,212,255,0.35)';
          cellBg.style.cssText = 'position:absolute;border-radius:3px;';
          cellBg.style.background = bg;
          cellBg.style.border = '2px solid ' + border;
          cellBg.style.left = rx + 'px';
          cellBg.style.top = ry + 'px';
          cellBg.style.width = rw + 'px';
          cellBg.style.height = rh + 'px';
          poster.appendChild(cellBg);
        }

        if (imageMode === 'none') {
          // Text-only mode
          const box = document.createElement('div');
          box.className = 'card-text-box';
          if (colorCells) {
            box.style.background = getCardColor(p.card);
            box.style.borderColor = getCardColor(p.card).replace(/0\.[35]\)/, '0.8)');
          }
          box.style.left = rx + 'px';
          box.style.top = ry + 'px';
          box.style.width = rw + 'px';
          box.style.height = rh + 'px';
          const nameFontSize = Math.max(6, Math.min(rw * 0.14, rh * 0.12));
          const nameEl = document.createElement('div');
          nameEl.className = 'card-text-name';
          nameEl.textContent = p.card.name;
          nameEl.style.fontSize = nameFontSize + 'px';
          box.appendChild(nameEl);
          if (showCounts) {
            const cntEl = document.createElement('div');
            cntEl.className = 'card-text-count';
            cntEl.textContent = getCount(p.card);
            cntEl.style.fontSize = Math.max(4, nameFontSize * 0.75 * countSizePct / 100) + 'px';
            box.appendChild(cntEl);
          }
          poster.appendChild(box);
        } else {
          // Image mode (card or art)
          const isArt = imageMode === 'art';
          const src = isArt
            ? (p.card.artCropUrl || p.card.imageUrl)
            : (useHQ ? (p.card.imageUrlNormal || p.card.imageUrl) : p.card.imageUrl);

          if (src) {
            const img = document.createElement('img');
            img.src = src;
            img.alt = p.card.name;

            if (fitMode === 'fill') {
              // Fill: cover entire render area, crop overflow
              img.style.left = rx + 'px';
              img.style.top = ry + 'px';
              img.style.width = rw + 'px';
              img.style.height = rh + 'px';
              img.style.objectFit = 'cover';
            } else {
              // Fit: maintain aspect ratio within render area
              const imgAspect = isArt ? (626 / 457) : (5 / 7); // w/h ratio
              let iw, ih;
              if (rw / rh > imgAspect) {
                ih = rh;
                iw = rh * imgAspect;
              } else {
                iw = rw;
                ih = rw / imgAspect;
              }
              img.style.left = (rx + (rw - iw) / 2) + 'px';
              img.style.top = (ry + (rh - ih) / 2) + 'px';
              img.style.width = iw + 'px';
              img.style.height = ih + 'px';
            }

            img.style.borderRadius = Math.max(2, Math.min(rw, rh) * 0.04) + 'px';
            poster.appendChild(img);
          }

          // Calculate count size first (needed for name positioning)
          let countFontSize = 0;
          if (showCounts) {
            const cnt = getCount(p.card);
            const digits = String(cnt).length;
            const baseCountSize = Math.max(8, rw * 0.8 / (digits * 0.65));
            countFontSize = Math.max(4, baseCountSize * countSizePct / 100);
          }
          // Count is centered at 40% of cell height; bottom edge:
          const countBottomOffset = showCounts ? rh * 0.4 + countFontSize / 2 + 2 : 0;

          // Overlaid count
          if (showCounts) {
            const label = document.createElement('div');
            label.className = 'card-count-label';
            label.textContent = getCount(p.card);
            label.style.fontSize = countFontSize + 'px';
            label.style.left = rx + 'px';
            label.style.top = (ry + rh * 0.4) + 'px';
            label.style.width = rw + 'px';
            label.style.transform = 'translateY(-50%)';
            poster.appendChild(label);
          }

          // Overlaid card name (multi-line, fits below count, anchored to bottom)
          if (showNames) {
            const nameAreaTop = ry + countBottomOffset;
            const nameAreaH = rh - countBottomOffset;
            if (nameAreaH > 4) {
              const baseFontSize = Math.max(6, Math.min(rw * 0.13, rh * 0.08));
              let nameFontSize = Math.max(4, baseFontSize * nameSizePct / 100);
              const nameWrap = document.createElement('div');
              nameWrap.style.cssText = 'position:absolute;display:flex;align-items:flex-end;justify-content:center;pointer-events:none;overflow:hidden;';
              nameWrap.style.left = rx + 'px';
              nameWrap.style.top = nameAreaTop + 'px';
              nameWrap.style.width = rw + 'px';
              nameWrap.style.height = nameAreaH + 'px';
              const nameLabel = document.createElement('div');
              nameLabel.style.cssText = 'color:white;font-weight:700;text-shadow:0 0 3px black,0 0 3px black,0 0 6px black,1px 1px 2px black;line-height:1.15;text-align:center;word-wrap:break-word;overflow-wrap:break-word;padding:0 2px 2px;max-width:100%;';
              nameLabel.style.fontSize = nameFontSize + 'px';
              nameLabel.textContent = p.card.name;
              nameWrap.appendChild(nameLabel);
              poster.appendChild(nameWrap);
              // Shrink font until text fits within the available space
              while (nameFontSize > 4 && nameLabel.scrollHeight > nameAreaH) {
                nameFontSize *= 0.85;
                nameLabel.style.fontSize = nameFontSize + 'px';
              }
            }
          }
        }
      }

      if (info.cardW) {
        document.getElementById('info-card-size').textContent = info.cardW + ' × ' + info.cardH + ' px';
        document.getElementById('info-grid').textContent = info.cols + ' × ' + info.rows;
      } else if (info.layout === 'treemap') {
        document.getElementById('info-card-size').textContent = 'area ∝ frequency';
        document.getElementById('info-grid').textContent = 'treemap';
      } else {
        document.getElementById('info-card-size').textContent = info.minW + '–' + info.maxW + ' px wide';
        document.getElementById('info-grid').textContent = info.shelves + ' shelves';
      }
      document.getElementById('info-shown').textContent = shown + ' / ' + cards.length;
    }

    // Export to PNG via offscreen canvas
    document.getElementById('export-btn').addEventListener('click', async () => {
      const btn = document.getElementById('export-btn');
      btn.textContent = 'Exporting...';
      btn.disabled = true;

      const W = parseInt(document.getElementById('box-w').value) || 1200;
      const H = parseInt(document.getElementById('box-h').value) || 630;
      const gap = parseInt(document.getElementById('gap-size').value) || 0;
      const showCounts = document.getElementById('show-counts').checked;
      const countSizePct = parseInt(document.getElementById('count-size').value) || 100;
      const showNames = document.getElementById('show-names').checked;
      const nameSizePct = parseInt(document.getElementById('name-size').value) || 100;
      const colorCells = document.getElementById('color-cells').checked;
      const useHQ = document.getElementById('use-hq').checked;
      const bgColor = document.getElementById('bg-color').value;
      const layoutMode = document.getElementById('layout-mode').value;
      const useLog = document.getElementById('use-log').checked;
      const imageMode = document.getElementById('image-mode').value;
      const fitMode = document.getElementById('fit-mode').value;
      const cards = getCards();

      const { placements } = computeLayout(cards, W, H, gap, layoutMode, useLog);

      const canvas = document.createElement('canvas');
      canvas.width = W;
      canvas.height = H;
      const ctx = canvas.getContext('2d');

      ctx.fillStyle = bgColor;
      ctx.fillRect(0, 0, W, H);

      const isTreemapExport = layoutMode === 'treemap';
      const isArt = imageMode === 'art';

      // Load all card images (if needed)
      let images = [];
      if (imageMode !== 'none') {
        images = await Promise.all(placements.map(p => {
          const src = isArt
            ? (p.card.artCropUrl || p.card.imageUrl)
            : (useHQ ? (p.card.imageUrlNormal || p.card.imageUrl) : p.card.imageUrl);
          return new Promise(resolve => {
            if (!src) { resolve(null); return; }
            const img = new Image();
            img.crossOrigin = 'anonymous';
            img.onload = () => resolve(img);
            img.onerror = () => resolve(null);
            img.src = src;
          });
        }));
      }

      placements.forEach((p, i) => {
        const rx = isTreemapExport && p.cellW ? p.cellX : p.x;
        const ry = isTreemapExport && p.cellH ? p.cellY : p.y;
        const rw = isTreemapExport && p.cellW ? p.cellW : p.w;
        const rh = isTreemapExport && p.cellH ? p.cellH : p.h;
        const radius = Math.max(2, Math.min(rw, rh) * 0.04);

        // Cell background (mana color or treemap default)
        if (colorCells || (isTreemapExport && p.cellW)) {
          ctx.save();
          ctx.fillStyle = colorCells ? getCardColor(p.card) : 'rgba(0,212,255,0.08)';
          ctx.strokeStyle = colorCells
            ? getCardColor(p.card).replace(/0\.[35]\)/, '0.8)')
            : 'rgba(0,212,255,0.35)';
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.roundRect(rx, ry, rw, rh, 3);
          ctx.fill();
          ctx.stroke();
          ctx.restore();
        }

        if (imageMode === 'none') {
          // Text-only box
          ctx.save();
          if (!colorCells) {
            ctx.fillStyle = 'rgba(0,212,255,0.1)';
            ctx.strokeStyle = 'rgba(0,212,255,0.4)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.roundRect(rx, ry, rw, rh, radius);
            ctx.fill();
            ctx.stroke();
          }
          const nameFontSize = Math.max(6, Math.min(rw * 0.14, rh * 0.12));
          ctx.fillStyle = '#00d4ff';
          ctx.font = '700 ' + nameFontSize + 'px -apple-system, BlinkMacSystemFont, sans-serif';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          const nameY = showCounts ? ry + rh * 0.45 : ry + rh / 2;
          ctx.fillText(p.card.name, rx + rw / 2, nameY, rw - 4);
          if (showCounts) {
            const cnt = getCount(p.card);
            const cntFontSize = Math.max(4, nameFontSize * 0.75 * countSizePct / 100);
            ctx.font = '400 ' + cntFontSize + 'px -apple-system, BlinkMacSystemFont, sans-serif';
            ctx.globalAlpha = 0.7;
            ctx.fillText(String(cnt), rx + rw / 2, ry + rh * 0.65);
            ctx.globalAlpha = 1;
          }
          ctx.restore();
        } else if (images[i]) {
          // Draw image with fit or fill
          ctx.save();
          if (fitMode === 'fill') {
            // Fill: cover entire render area
            ctx.beginPath();
            ctx.roundRect(rx, ry, rw, rh, radius);
            ctx.clip();
            // Scale image to cover, crop overflow
            const imgW = images[i].naturalWidth;
            const imgH = images[i].naturalHeight;
            const imgRatio = imgW / imgH;
            const cellRatio = rw / rh;
            let sx, sy, sw, sh;
            if (imgRatio > cellRatio) {
              sh = imgH;
              sw = imgH * cellRatio;
              sx = (imgW - sw) / 2;
              sy = 0;
            } else {
              sw = imgW;
              sh = imgW / cellRatio;
              sx = 0;
              sy = (imgH - sh) / 2;
            }
            ctx.drawImage(images[i], sx, sy, sw, sh, rx, ry, rw, rh);
          } else {
            // Fit: maintain aspect ratio
            const imgAspect = isArt ? (626 / 457) : (5 / 7);
            let iw, ih;
            if (rw / rh > imgAspect) {
              ih = rh;
              iw = rh * imgAspect;
            } else {
              iw = rw;
              ih = rw / imgAspect;
            }
            const ix = rx + (rw - iw) / 2;
            const iy = ry + (rh - ih) / 2;
            ctx.beginPath();
            ctx.roundRect(ix, iy, iw, ih, radius);
            ctx.clip();
            ctx.drawImage(images[i], ix, iy, iw, ih);
          }
          ctx.restore();
        }

        // Calculate count size first (needed for name positioning)
        let countFontSizeExport = 0;
        if (showCounts && imageMode !== 'none') {
          const cnt = getCount(p.card);
          const digits = String(cnt).length;
          const baseCountFont = Math.max(8, rw * 0.8 / (digits * 0.65));
          countFontSizeExport = Math.max(4, baseCountFont * countSizePct / 100);
        }
        const countBottomExport = (showCounts && imageMode !== 'none') ? rh * 0.4 + countFontSizeExport / 2 + 2 : 0;

        // Overlaid count on image
        if (showCounts && imageMode !== 'none') {
          const cnt = getCount(p.card);
          ctx.save();
          ctx.font = '900 ' + countFontSizeExport + 'px -apple-system, BlinkMacSystemFont, sans-serif';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.shadowColor = 'black';
          ctx.shadowBlur = 6;
          for (let s = 0; s < 4; s++) {
            ctx.fillStyle = 'black';
            ctx.fillText(String(cnt), rx + rw / 2, ry + rh * 0.4);
          }
          ctx.shadowBlur = 0;
          ctx.fillStyle = 'white';
          ctx.fillText(String(cnt), rx + rw / 2, ry + rh * 0.4);
          ctx.restore();
        }

        // Overlaid name on image (fits below count, anchored to bottom, shrink-to-fit)
        if (showNames && imageMode !== 'none') {
          const nameAreaTop = ry + countBottomExport;
          const nameAreaH = rh - countBottomExport;
          if (nameAreaH > 4) {
            const baseFontSize = Math.max(6, Math.min(rw * 0.13, rh * 0.08));
            let nameFontSize = Math.max(4, baseFontSize * nameSizePct / 100);
            ctx.save();
            ctx.textAlign = 'center';
            ctx.textBaseline = 'bottom';
            const maxW = rw - 4;
            // Word-wrap helper
            function wrapName(fs) {
              ctx.font = '700 ' + fs + 'px -apple-system, BlinkMacSystemFont, sans-serif';
              const words = p.card.name.split(' ');
              const lines = [];
              let cur = '';
              for (const word of words) {
                const test = cur ? cur + ' ' + word : word;
                if (ctx.measureText(test).width > maxW && cur) {
                  lines.push(cur);
                  cur = word;
                } else {
                  cur = test;
                }
              }
              if (cur) lines.push(cur);
              return lines;
            }
            // Shrink until all lines fit within available space below count
            let lines = wrapName(nameFontSize);
            while (nameFontSize > 4 && lines.length * nameFontSize * 1.15 > nameAreaH) {
              nameFontSize *= 0.85;
              lines = wrapName(nameFontSize);
            }
            // Draw lines bottom-up from cell bottom
            ctx.font = '700 ' + nameFontSize + 'px -apple-system, BlinkMacSystemFont, sans-serif';
            const lineH = nameFontSize * 1.15;
            const startY = ry + rh - 2;
            for (let li = lines.length - 1; li >= 0; li--) {
              const ly = startY - (lines.length - 1 - li) * lineH;
              if (ly - lineH < nameAreaTop) break;
              ctx.shadowColor = 'black';
              ctx.shadowBlur = 4;
              for (let s = 0; s < 3; s++) {
                ctx.fillStyle = 'black';
                ctx.fillText(lines[li], rx + rw / 2, ly);
              }
              ctx.shadowBlur = 0;
              ctx.fillStyle = 'white';
              ctx.fillText(lines[li], rx + rw / 2, ly);
            }
            ctx.restore();
          }
        }
      });

      const link = document.createElement('a');
      link.download = 'pauper-poster-' + W + 'x' + H + '.png';
      link.href = canvas.toDataURL('image/png');
      link.click();

      btn.textContent = 'Export PNG';
      btn.disabled = false;
    });

    // Preset buttons
    document.querySelectorAll('.preset-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.getElementById('box-w').value = btn.dataset.w;
        document.getElementById('box-h').value = btn.dataset.h;
        document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
      });
    });

    // When switching to treemap, uncheck log scale (it compresses values too much)
    document.getElementById('layout-mode').addEventListener('change', (e) => {
      if (e.target.value === 'treemap') {
        document.getElementById('use-log').checked = false;
      }
    });

    // Re-render on any control change
    ['box-w', 'box-h', 'card-count', 'gap-size', 'count-mode', 'bg-color',
     'show-counts', 'count-size', 'show-names', 'name-size', 'color-cells', 'hide-basics', 'use-hq',
     'layout-mode', 'use-log', 'image-mode', 'fit-mode'].forEach(id => {
      document.getElementById(id).addEventListener('input', render);
      document.getElementById(id).addEventListener('change', render);
    });

    // Default: uncheck log for treemap
    document.getElementById('use-log').checked = false;
    render();
  </script>
</body>
</html>
