const INSIGHTS_SCOPES = [
  { value: 0, label: 'All time' },
  { value: 100, label: 'Last 100' },
  { value: 50, label: 'Last 50' },
  { value: 20, label: 'Last 20' }
];

const InsightsPanel = ({ insightsScope, setInsightsScope, insightsSet, setInsightsSet, insightsData }) => {
  const gradingFindingLine = (f) => {
    const verb = f.direction === 'overrate' ? 'overrate' : 'underrate';
    const suffix = f.confidence === 'provisional'
      ? <span className="insights-finding-muted"> (provisional — small sample)</span>
      : null;
    return (
      <div className="insights-finding" key={f.label}>
        You tend to {verb} {f.label} by ~{f.magnitude} grades (n={f.n}){suffix}
      </div>
    );
  };

  const biasFindingLine = (f) => {
    const favor = f.biasPct > 0;
    const verb = favor ? 'favor' : 'under-pick';
    return (
      <div className="insights-finding" key={f.label}>
        {favor ? '⚠ ' : ''}You {verb} {f.label} in head-to-heads: picked{favor ? ' it' : ' the alternative instead'} {f.pickRatePct}% of the time, but it was the better card only {f.betterRatePct}% (n={f.n})
      </div>
    );
  };

  const axisMutedLine = (f) => {
    const label = f.label.charAt(0).toUpperCase() + f.label.slice(1);
    return (
      <div className="insights-finding insights-finding-muted" key={f.label}>
        ✓ {label}: picked {f.pickRatePct}% vs {f.betterRatePct}% actually better (n={f.n}) — no significant lean
      </div>
    );
  };

  const DIFF_BAND_LABELS = { '<1': 'Coin flip (<1pp)', '1–2': 'Close (1–2pp)', '2–4': 'Clear (2–4pp)', '>4': 'Obvious (>4pp)' };

  const renderDifficultyBlock = (difficultyCurve) => (
    <div className="insights-diff-block">
      <div className="insights-headline" style={{ fontSize: '13px' }}>
        Accuracy by difficulty <span className="insights-finding-muted">(gap = win-rate difference between the two cards · 50% = coin flip)</span>
      </div>
      {difficultyCurve.map(b => {
        const label = DIFF_BAND_LABELS[b.band];
        if (b.n === 0) {
          return (
            <div className="insights-diff-row" key={b.band}>
              <div className="insights-diff-label">{label}</div>
              <div className="insights-diff-track"><div className="insights-diff-baseline"></div></div>
              <div className="insights-diff-value insights-finding-muted">—</div>
            </div>
          );
        }
        if (b.n < 5) {
          return (
            <div className="insights-diff-row" key={b.band}>
              <div className="insights-diff-label">{label}</div>
              <div className="insights-diff-track"><div className="insights-diff-baseline"></div></div>
              <div className="insights-diff-value insights-finding-muted">n&lt;5</div>
            </div>
          );
        }
        const pct = b.accuracyPct;
        const diff = pct - 50;
        const se = 100 * Math.sqrt(0.25 / b.n);
        const faded = Math.abs(diff) < 2 * se;
        const above = diff >= 0;
        const barStyle = above
          ? { left: '50%', width: `${Math.abs(diff)}%`, background: 'rgba(74,158,255,0.85)', borderRadius: '0 4px 4px 0' }
          : { left: `${pct}%`, width: `${Math.abs(diff)}%`, background: 'rgba(220,60,60,0.8)', borderRadius: '4px 0 0 4px' };
        const title = `Pairs ${b.band}pp apart: ${pct}% correct of ${b.n} — ${above ? 'above' : 'below'} coin-flip by ${Math.abs(diff)}pp`;
        return (
          <div className="insights-diff-row" key={b.band} title={title}>
            <div className="insights-diff-label">{label}</div>
            <div className="insights-diff-track">
              <div className="insights-diff-baseline"></div>
              <div className="insights-diff-bar" style={{ ...barStyle, opacity: faded ? 0.55 : 1 }}></div>
            </div>
            <div className="insights-diff-value">{pct}% · n={b.n}</div>
          </div>
        );
      })}
    </div>
  );

  const calibrationSentence = (calibration) => {
    if (!calibration || !calibration.verdict || calibration.verdict === 'balanced') return null;
    const lowStr = `${calibration.lowMean >= 0 ? '+' : ''}${calibration.lowMean.toFixed(1)}`;
    const highStr = `${calibration.highMean >= 0 ? '+' : ''}${calibration.highMean.toFixed(1)}`;
    if (calibration.verdict === 'compressed') {
      return `📉 Too cautious: bombs graded ${highStr} low (n=${calibration.highN}), duds ${lowStr} high (n=${calibration.lowN}) — trust the extremes more`;
    }
    return `📈 Too extreme: bombs graded ${highStr} further off (n=${calibration.highN}), duds ${lowStr} further off (n=${calibration.lowN}) — pull toward the middle`;
  };

  const grading = insightsData && insightsData.grading;
  const comparison = insightsData && insightsData.comparison;

  // Bias map state: which source feeds the grid, and (grading-only) raw vs quality-adjusted.
  const [biasSource, setBiasSource] = React.useState('combined'); // 'combined' | 'grading' | 'comparison'
  const [biasAdjusted, setBiasAdjusted] = React.useState(true); // true = quality-adjusted, false = raw

  const ROW_ICONS = { W: '⚪', U: '🔵', B: '⚫', R: '🔴', G: '🟢', Multicolor: '🌈', Colorless: '◇', All: 'Σ' };
  const ROW_LABELS = { W: 'W', U: 'U', B: 'B', R: 'R', G: 'G', Multicolor: 'Multi', Colorless: 'Colorless', All: 'All' };
  const COL_LABELS = { All: 'All', Creature: 'Creature', 'Non-creature': 'Non-creat.', C: 'C', U: 'U', R: 'R', M: 'M' };

  const biasCellFormat = (mean) => {
    const scaled = biasSource === 'grading' ? mean : mean * 100;
    const rounded = biasSource === 'grading' ? scaled.toFixed(1) : Math.round(scaled);
    const sign = scaled >= 0 ? '+' : '';
    return biasSource === 'grading' ? `${sign}${rounded}` : `${sign}${rounded}%`;
  };

  const biasCellTitle = (rowKey, colKey, cell) => {
    const rowLabel = ROW_LABELS[rowKey] === 'All' ? 'All colors' : ROW_LABELS[rowKey];
    const colLabel = COL_LABELS[colKey] === 'All' ? '' : ` / ${COL_LABELS[colKey]}`;
    if (cell.n === 0) return `${rowLabel}${colLabel}: no data`;
    if (cell.n < 5) return `${rowLabel}${colLabel}: n=${cell.n} (too few to show)`;
    const desc = biasSource === 'grading'
      ? `${biasCellFormat(cell.mean)} grades ${cell.mean >= 0 ? 'over' : 'under'}, n=${cell.n}`
      : `${cell.mean >= 0 ? 'over-picked' : 'under-picked'} in ${Math.abs(Math.round(cell.mean * 100))}% of appearances, n=${cell.n}`;
    return `${rowLabel}${colLabel}: ${desc}`;
  };

  // Combined-source glyph: strength/direction of the sample-size-weighted blend.
  const combinedGlyph = (s) => {
    if (s >= 0.45) return '▲▲';
    if (s >= 0.15) return '▲';
    if (s > -0.15) return '·';
    if (s > -0.45) return '▼';
    return '▼▼';
  };

  const combinedTooltip = (rowKey, colKey, cell) => {
    const rowLabel = ROW_LABELS[rowKey] === 'All' ? 'All colors' : ROW_LABELS[rowKey];
    const colLabel = COL_LABELS[colKey] === 'All' ? '' : ` / ${COL_LABELS[colKey]}`;
    const prefix = `${rowLabel}${colLabel}`;
    if (cell.n === 0 && !cell.anySmall) return `${prefix}: no data`;
    if (cell.n === 0 && cell.anySmall) return `${prefix}: too few in either source to show (need n≥5 per source)`;
    const parts = [];
    if (cell.g.n >= 5) parts.push(`Grading ${cell.g.mean >= 0 ? '+' : ''}${cell.g.mean.toFixed(1)} grades (n=${cell.g.n})`);
    if (cell.h.n >= 5) parts.push(`Head-to-head ${cell.h.mean >= 0 ? '+' : ''}${Math.round(cell.h.mean * 100)}% (n=${cell.h.n})`);
    let lean;
    if (Math.abs(cell.s) < 0.15) lean = 'balanced';
    else if (cell.s > 0) lean = 'leans overrate';
    else lean = 'leans underrate/under-pick';
    return `${prefix}: ${parts.join(' · ')} — ${lean}`;
  };

  const renderCombinedGrid = (grid) => (
    <div className="insights-grid-scroll">
      <table className="insights-grid">
        <thead>
          <tr>
            <th></th>
            {grid.cols.map(col => <th key={col}>{COL_LABELS[col]}</th>)}
          </tr>
        </thead>
        <tbody>
          {grid.rows.map(row => (
            <tr key={row}>
              <th className="insights-grid-rowlabel">{ROW_ICONS[row]} {ROW_LABELS[row]}</th>
              {grid.cols.map(col => {
                const cell = grid.cells[row][col];
                let content = '—';
                let dim = false;
                let bg = 'transparent';
                if (cell.n === 0 && cell.anySmall) {
                  content = <span className="insights-grid-dim">n&lt;5</span>;
                } else if (cell.n > 0) {
                  dim = !cell.significant;
                  const alpha = Math.abs(cell.s) * 0.55;
                  bg = cell.s > 0 ? `rgba(220,60,60,${alpha})` : (cell.s < 0 ? `rgba(70,120,220,${alpha})` : 'transparent');
                  content = (
                    <React.Fragment>
                      <div>{combinedGlyph(cell.s)}</div>
                      <div className="insights-grid-n">n={cell.n}</div>
                    </React.Fragment>
                  );
                }
                return (
                  <td
                    key={col}
                    className={`insights-grid-cell${dim ? ' insights-grid-dim' : ''}`}
                    style={{ background: bg }}
                    title={combinedTooltip(row, col, cell)}
                  >
                    {content}
                  </td>
                );
              })}
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );

  const renderBiasGrid = (grid) => {
    if (biasSource === 'combined') return renderCombinedGrid(grid);
    const CAP = biasSource === 'grading' ? 1.0 : 0.5;
    return (
      <div className="insights-grid-scroll">
        <table className="insights-grid">
          <thead>
            <tr>
              <th></th>
              {grid.cols.map(col => <th key={col}>{COL_LABELS[col]}</th>)}
            </tr>
          </thead>
          <tbody>
            {grid.rows.map(row => (
              <tr key={row}>
                <th className="insights-grid-rowlabel">{ROW_ICONS[row]} {ROW_LABELS[row]}</th>
                {grid.cols.map(col => {
                  const cell = grid.cells[row][col];
                  let content = '—';
                  let dim = false;
                  let bg = 'transparent';
                  if (cell.n > 0 && cell.n < 5) {
                    content = <span className="insights-grid-dim">n&lt;5</span>;
                  } else if (cell.n >= 5) {
                    const insignificant = Math.abs(cell.mean) < 2 * cell.se;
                    dim = insignificant;
                    const alpha = Math.min(1, Math.abs(cell.mean) / CAP) * 0.55;
                    bg = cell.mean > 0 ? `rgba(220,60,60,${alpha})` : (cell.mean < 0 ? `rgba(70,120,220,${alpha})` : 'transparent');
                    content = (
                      <React.Fragment>
                        <div>{biasCellFormat(cell.mean)}</div>
                        <div className="insights-grid-n">n={cell.n}</div>
                      </React.Fragment>
                    );
                  }
                  return (
                    <td
                      key={col}
                      className={`insights-grid-cell${dim ? ' insights-grid-dim' : ''}`}
                      style={{ background: bg }}
                      title={biasCellTitle(row, col, cell)}
                    >
                      {content}
                    </td>
                  );
                })}
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    );
  };

  const gridGradingRaw = insightsData && insightsData.gridGradingRaw;
  const gridGradingAdj = insightsData && insightsData.gridGradingAdj;
  const gridComparison = insightsData && insightsData.gridComparison;
  const gridCombined = insightsData && insightsData.gridCombined;
  const gradingGridN = grading ? grading.n : 0;
  const comparisonGridN = comparison ? comparison.n : 0;
  const biasMapHasAnyData = gradingGridN >= 5 || comparisonGridN >= 5;
  const activeGrid = biasSource === 'combined' ? gridCombined
    : biasSource === 'grading' ? (biasAdjusted ? gridGradingAdj : gridGradingRaw)
    : gridComparison;
  const activeSourceHasData = biasSource === 'combined' ? biasMapHasAnyData
    : biasSource === 'grading' ? gradingGridN >= 5
    : comparisonGridN >= 5;

  return (
    <div className="insights-panel">
      <div className="insights-controls">
        <div className="insights-pills">
          {INSIGHTS_SCOPES.map(s => (
            <button
              key={s.value}
              className={`insights-pill${insightsScope === s.value ? ' active' : ''}`}
              onClick={() => setInsightsScope(s.value)}
            >
              {s.label}
            </button>
          ))}
        </div>
        <select
          className="insights-set-select"
          value={insightsSet}
          onChange={(e) => setInsightsSet(e.target.value)}
        >
          <option value="ALL">All sets</option>
          {Object.keys(SET_CONFIG).map(code => (
            <option key={code} value={code}>{SET_CONFIG[code].shortName}</option>
          ))}
        </select>
        <div className="insights-caption">Windows apply per mode — e.g. Last 50 = your most recent 50 answers in each mode.</div>
      </div>

      <div className="insights-section">
        <div className="insights-section-title">⚖️ Comparison mode</div>
        {!comparison ? (
          <div className="insights-empty">Not enough data in this scope (need ≥5 answers)</div>
        ) : (
          <React.Fragment>
            <div className="insights-headline">
              {comparison.n} answers · {comparison.accuracyPct}% correct
              {comparison.perMetric && comparison.perMetric.gihWr && comparison.perMetric.alsa && (
                <span> (GIH WR: {comparison.perMetric.gihWr.pct}% of {comparison.perMetric.gihWr.n}, ALSA: {comparison.perMetric.alsa.pct}% of {comparison.perMetric.alsa.n})</span>
              )}
            </div>
            {renderDifficultyBlock(comparison.difficultyCurve)}
            {(() => {
              const evaluableAxes = comparison.axes.filter(a => a.n >= 10);
              if (evaluableAxes.length === 0) {
                return <div className="insights-empty">Not enough cross-category pairs yet for head-to-head bias (need ≥10 per axis).</div>;
              }
              return evaluableAxes.map(a => a.significant ? biasFindingLine(a) : axisMutedLine(a));
            })()}
          </React.Fragment>
        )}
      </div>

      <div className="insights-section">
        <div className="insights-section-title">🎯 Grading mode</div>
        {!grading ? (
          <div className="insights-empty">Not enough data in this scope (need ≥5 answers)</div>
        ) : (
          <React.Fragment>
            <div className="insights-headline">
              {grading.n} answers · {grading.exactPct}% exact · {grading.within1Pct}% within one grade · avg miss {grading.meanAbsErr.toFixed(1)} grades
            </div>
            {calibrationSentence(grading.calibration) && (
              <div className="insights-verdict">{calibrationSentence(grading.calibration)}</div>
            )}
            {grading.bucketFindings.length === 0 ? (
              grading.bucketsEvaluated > 0 ? (
                <div className="insights-empty">✓ No consistent bias across the {grading.bucketsEvaluated} categories with enough data — your grading looks well calibrated.</div>
              ) : (
                <div className="insights-empty">Not enough answers per category yet — category findings unlock as you answer more (roughly 20+).</div>
              )
            ) : (
              grading.bucketFindings.map(gradingFindingLine)
            )}
          </React.Fragment>
        )}
      </div>

      <div className="insights-section">
        <div className="insights-section-title">🗺️ Bias map</div>
        <div className="insights-pills">
          <button
            className={`insights-pill${biasSource === 'combined' ? ' active' : ''}`}
            onClick={() => setBiasSource('combined')}
          >
            Combined
          </button>
          <button
            className={`insights-pill${biasSource === 'grading' ? ' active' : ''}`}
            onClick={() => setBiasSource('grading')}
          >
            Grading
          </button>
          <button
            className={`insights-pill${biasSource === 'comparison' ? ' active' : ''}`}
            onClick={() => setBiasSource('comparison')}
          >
            Head-to-head
          </button>
          {biasSource === 'grading' && (
            <React.Fragment>
              <span className="insights-pill-gap"></span>
              <button
                className={`insights-pill${biasAdjusted ? ' active' : ''}`}
                title="Bias relative to what's expected for cards of that quality"
                onClick={() => setBiasAdjusted(true)}
              >
                Quality-adjusted
              </button>
              <button
                className={`insights-pill${!biasAdjusted ? ' active' : ''}`}
                title="Your grade minus the actual grade, unadjusted"
                onClick={() => setBiasAdjusted(false)}
              >
                Raw
              </button>
            </React.Fragment>
          )}
        </div>
        {!biasMapHasAnyData ? (
          <div className="insights-empty">Not enough data for the bias map in this scope.</div>
        ) : (!activeSourceHasData || !activeGrid) ? (
          <div className="insights-empty">Not enough {biasSource === 'grading' ? 'grading' : biasSource === 'comparison' ? 'head-to-head' : 'combined'} answers in this scope (need ≥5).</div>
        ) : (
          <React.Fragment>
            {renderBiasGrid(activeGrid)}
            <div className="insights-footnote">
              {biasSource === 'combined' ? (
                '▲ overrate / over-pick · ▼ underrate / under-pick · double = strong · Combined = Grading (quality-adjusted) + Head-to-head, weighted by sample size'
              ) : (
                <React.Fragment>
                  Red = you overrate / over-pick · Blue = you underrate / under-pick · Faded = not statistically distinguishable from zero
                  {biasSource === 'comparison' && ' · Each card in a pair counts once: +1 picked-though-worse, −1 passed-though-better.'}
                </React.Fragment>
              )}
            </div>
          </React.Fragment>
        )}
      </div>

      <div className="insights-footnote">
        Bucket findings are adjusted for card quality (an A+ can only be missed downward), so they reflect real bias, not regression to the mean.
      </div>
    </div>
  );
};

const GIHQuiz = () => {
  // Run migration on first load
  React.useEffect(() => {
    migrateStorageToV2();
  }, []);

  // Set selection state: URL hash wins, then saved preference (validated — a stale
  // stored code from a renamed/removed set must not crash the app), then default.
  const [currentSetCode, setCurrentSetCode] = React.useState(() => {
    if (INITIAL_HASH.set) return INITIAL_HASH.set;
    const saved = safeStorage.getItem(STORAGE_KEYS.SET);
    return (saved && SET_CONFIG[saved]) ? saved : 'MSH';
  });
  const currentSetConfig = SET_CONFIG[currentSetCode];
  const activeCardData = currentSetConfig.data;

  // Keep the grade-stat globals in sync during render (not in an effect) so
  // getGrade/getGradeRange are never stale on the first paint after a set change.
  updateGradeStats(currentSetCode);

  // Persist set choice; filters are per-set (type lists differ), so clear them on set change
  React.useEffect(() => {
    safeStorage.setItem(STORAGE_KEYS.SET, currentSetCode);
    const clearIfSet = setter => setter(prev => prev.length ? [] : prev);
    clearIfSet(setColorFilters);
    clearIfSet(setRarityFilters);
    clearIfSet(setTypeFilters);
  }, [currentSetCode]);

  // Quiz mode: URL hash wins over saved preference
  const [quizMode, setQuizMode] = React.useState(() =>
    INITIAL_HASH.mode || safeStorage.getItem(STORAGE_KEYS.MODE) || 'comparison');

  const [colorFilters, setColorFilters] = React.useState([]);
  const [rarityFilters, setRarityFilters] = React.useState([]);
  const [typeFilters, setTypeFilters] = React.useState([]);
  const [openDropdown, setOpenDropdown] = React.useState(null); // 'color' | 'rarity' | 'type' | null
  const [queryText, setQueryText] = React.useState('');
  const lastSource = React.useRef(null);
  const [smartSelectionEnabled, setSmartSelectionEnabled] = React.useState(true);
  const [metric, setMetric] = React.useState(() =>
    INITIAL_HASH.metric || safeStorage.getItem(STORAGE_KEYS.METRIC) || 'gihWr');
  const [expandMetricHelp, setExpandMetricHelp] = React.useState(false);
  const [expandSmartSelectionHelp, setExpandSmartSelectionHelp] = React.useState(false);

  // Comparison mode state
  const [currentPair, setCurrentPair] = React.useState(null);

  // Grading mode state
  const [currentCard, setCurrentCard] = React.useState(null);
  const [selectedGrade, setSelectedGrade] = React.useState(null);

  // Shared state
  const [showResult, setShowResult] = React.useState(false);
  const [selectedCardNum, setSelectedCardNum] = React.useState(null);
  const [isAnswering, setIsAnswering] = React.useState(false);
  const [shareMenuOpen, setShareMenuOpen] = React.useState(false);

  // Load score from localStorage (mode+set-specific)
  const savedScore = loadScore(quizMode, currentSetCode);
  const [points, setPoints] = React.useState(savedScore.points);
  const [questions, setQuestions] = React.useState(savedScore.questions);

  const [filterError, setFilterError] = React.useState('');
  const [history, setHistory] = React.useState(loadAllHistory('comparison'));
  const [showToast, setShowToast] = React.useState(false);
  const [toastMessage, setToastMessage] = React.useState('');
  const [preferSPM, setPreferSPM] = React.useState(false);

  // Insights panel state
  const [showInsights, setShowInsights] = React.useState(false);
  const [insightsScope, setInsightsScope] = React.useState(0); // 0 = all time; else 100/50/20
  const [insightsSet, setInsightsSet] = React.useState('ALL');

  const insightsData = React.useMemo(() => {
    if (!showInsights) return null;
    const idx = buildInsightsCardIndex();
    const g = filterInsightsEntries(loadAllHistory('grading'), insightsSet, insightsScope);
    const c = filterInsightsEntries(loadAllHistory('comparison'), insightsSet, insightsScope);
    const gridGradingAdj = buildGradingGrid(g, idx, true);
    const gridComparison = buildComparisonGrid(c, idx);
    return {
      grading: analyzeGrading(g, idx), comparison: analyzeComparison(c, idx), gN: g.length, cN: c.length,
      gridGradingRaw: buildGradingGrid(g, idx, false),
      gridGradingAdj,
      gridComparison,
      gridCombined: buildCombinedGrid(gridGradingAdj, gridComparison)
    };
  }, [showInsights, insightsScope, insightsSet, history]);

  // Update score when mode or set changes (history is now unified across all sets)
  React.useEffect(() => {
    const score = loadScore(quizMode, currentSetCode);
    setPoints(score.points);
    setQuestions(score.questions);
    // Update history to show entries for current mode
    setHistory(loadAllHistory(quizMode));
    safeStorage.setItem(STORAGE_KEYS.MODE, quizMode);
    setShowResult(false);
    setSelectedGrade(null);
    setSelectedCardNum(null);
    setIsAnswering(false);
    setCurrentPair(null);
    setCurrentCard(null);
    setPreferSPM(false);
    // Smart selection only applies to comparison mode
    if (quizMode !== 'comparison') {
      setSmartSelectionEnabled(false);
    }
  }, [quizMode, currentSetCode]);

  // Load smart selection preference on mount
  React.useEffect(() => {
    const saved = safeStorage.getItem(STORAGE_KEYS.SMART_SELECTION);
    if (saved !== null) {
      setSmartSelectionEnabled(saved === 'true');
    }
  }, []);

  // Save smart selection preference when it changes
  React.useEffect(() => {
    safeStorage.setItem(STORAGE_KEYS.SMART_SELECTION, smartSelectionEnabled.toString());
  }, [smartSelectionEnabled]);

  React.useEffect(() => {
    safeStorage.setItem(STORAGE_KEYS.METRIC, metric);
  }, [metric]);

  // Keep the URL hash canonical (#SET[/grading][/alsa]) and report each change
  // to GoatCounter as a virtual pageview. replaceState avoids polluting browser
  // history and does not fire hashchange (no feedback loop with the listener below).
  // The initial render is skipped: count.js already counts the landing view.
  const hashSyncedOnce = React.useRef(false);
  React.useEffect(() => {
    const canonical = '#' + buildLocationHash(currentSetCode, quizMode, metric);
    if (window.location.hash !== canonical) {
      try { history.replaceState(null, '', canonical); }
      catch (e) { window.location.hash = canonical; }
    }
    if (!hashSyncedOnce.current) { hashSyncedOnce.current = true; return; }
    trackVirtualPageview();
  }, [currentSetCode, quizMode, metric]);

  // Apply user-driven hash changes (manual URL edits, back/forward navigation)
  React.useEffect(() => {
    const onHashChange = () => {
      const parsed = parseLocationHash();
      if (parsed.set) setCurrentSetCode(prev => parsed.set !== prev ? parsed.set : prev);
      if (parsed.mode) setQuizMode(prev => parsed.mode !== prev ? parsed.mode : prev);
      if (parsed.metric) setMetric(prev => parsed.metric !== prev ? parsed.metric : prev);
    };
    window.addEventListener('hashchange', onHashChange);
    return () => window.removeEventListener('hashchange', onHashChange);
  }, []);

  // Close share menu when clicking outside
  React.useEffect(() => {
    if (!shareMenuOpen) return;

    const handleClickOutside = (e) => {
      if (!e.target.closest('.history-actions')) {
        setShareMenuOpen(false);
      }
    };

    document.addEventListener('click', handleClickOutside);
    return () => document.removeEventListener('click', handleClickOutside);
  }, [shareMenuOpen]);

  // Close type dropdown when clicking outside
  React.useEffect(() => {
    if (!openDropdown) return;
    const handler = (e) => {
      if (!e.target.closest('.filter-group')) setOpenDropdown(null);
    };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, [openDropdown]);

  {/* Sync comboboxes -> query text (skip if query just changed comboboxes) */}
  React.useEffect(() => {
    if (lastSource.current === 'query') { lastSource.current = null; return; }
    lastSource.current = 'combobox';
    setQueryText(buildQuery(colorFilters, rarityFilters, typeFilters));
  }, [colorFilters, rarityFilters, typeFilters]);

  // Holds the next question, precomputed + image-preloaded while the result
  // panel for the current question is showing. Invalidated (see effect below)
  // whenever set/mode/metric/filters/smart-selection change so a stale staged
  // question can never leak across those changes.
  const stagedQuestionRef = React.useRef(null);

  // Pure selection logic: decides the next question for the current mode +
  // filters and RETURNS it, without touching React state. Two callers use it:
  // generateQuestion (applies the result immediately) and the answer handlers
  // (stage + preload the result for next time). Selection semantics (smart
  // selection, filters, no-repeat) are unchanged from the original.
  const computeQuestion = React.useCallback(() => {
    // Filter cards by color and rarity
    let filtered = activeCardData;

    if (colorFilters.length > 0) {
      filtered = filtered.filter(c => {
        const color = c.color || '';
        if (colorFilters.includes('colorless') && color === '') return true;
        if (colorFilters.includes('multicolor') && color.length > 1) return true;
        return colorFilters.some(cf => cf.length === 1 && color.includes(cf));
      });
    }

    if (rarityFilters.length > 0) {
      filtered = filtered.filter(c => rarityFilters.includes(c.rarity));
    }

    if (typeFilters.length > 0) {
      filtered = filtered.filter(c => {
        return typeFilters.some(tf =>
          c.type && (c.type.startsWith(tf) ||
          c.type.includes(`— ${tf}`) ||
          c.type.endsWith(` ${tf}`) ||
          c.type.includes(` ${tf} `) ||
          c.type.includes(` ${tf}`))
        );
      });
    }

    const minCards = quizMode === 'grading' ? 1 : 2;
    if (filtered.length < minCards) {
      return { insufficientCards: true, message: `Not enough cards match these filters. Try adjusting your selection.` };
    }

    const filterKey = makeFilterKey(colorFilters, rarityFilters, typeFilters);
    const shownCards = loadShownCards(quizMode, filterKey, currentSetCode);

    if (quizMode === 'grading') {
      // GRADING MODE: Pick single card not shown yet
      if (shownCards.length >= filtered.length) {
        // Reset shown cards for this filter
        saveShownCards(quizMode, filterKey, [], currentSetCode);
        setToastMessage('All cards reviewed! Resetting for this filter.');
        setShowToast(true);
        setTimeout(() => setShowToast(false), 3000);
        shownCards.length = 0;
      }

      // Find a card not in shownCards array
      let card = null;
      let attempts = 0;
      const maxAttempts = 100;

      while (!card && attempts < maxAttempts) {
        const idx = Math.floor(Math.random() * filtered.length);
        const candidate = filtered[idx];
        if (!shownCards.includes(candidate.name)) {
          card = candidate;
        }
        attempts++;
      }

      if (card) {
        return { mode: 'grading', card };
      }
      return { mode: 'grading', error: 'Unable to find a new card. Try adjusting your filters.' };
    } else {
      // COMPARISON MODE: Pick pair not shown yet (existing logic)
      // Calculate total possible pairs for this filter
      const totalPossiblePairs = (filtered.length * (filtered.length - 1)) / 2;

      // If we've shown all pairs, reset the shown cards for this filter
      if (shownCards.length >= totalPossiblePairs) {
        saveShownCards(quizMode, filterKey, [], currentSetCode);
        setToastMessage('All card pairs shown! Resetting for this filter.');
        setShowToast(true);
        setTimeout(() => setShowToast(false), 3000);
        shownCards.length = 0;
      }

      // Try to find a pair with different GIH WR (avoid ties) and not shown yet
      let pair = null;
      let attempts = 0;
      const maxAttempts = 100;

      while (!pair && attempts < maxAttempts) {
        const idx1 = Math.floor(Math.random() * filtered.length);
        let idx2 = Math.floor(Math.random() * filtered.length);
        while (idx2 === idx1) {
          idx2 = Math.floor(Math.random() * filtered.length);
        }

        const card1 = filtered[idx1];
        const card2 = filtered[idx2];

        // Create pair key for checking if shown
        const pairKey = [card1.name, card2.name].sort().join('|');

        // Check pair conditions
        const isDifferentMetric = metric === 'gihWr' ? card1.gihWr !== card2.gihWr : card1.alsa !== card2.alsa;
        const notShown = !shownCards.includes(pairKey);

        // Apply smart selection filter if enabled (only for GIH WR for now)
        let meetsSmartSelection = true;
        if (smartSelectionEnabled && metric === 'gihWr') {
          const grade1 = getGrade(card1.gihWr);
          const grade2 = getGrade(card2.gihWr);
          const sdDistance = Math.abs(card1.gihWr - card2.gihWr) / gradeThresholds.stdDev;

          // Must be different grades AND within 1 SD
          meetsSmartSelection = grade1 !== grade2 && sdDistance <= 1.0;
        } else if (smartSelectionEnabled && metric === 'alsa') {
          // For ALSA, ensure meaningful difference (>1.0) but not too wide (<3.0)
          const alsaDifference = Math.abs(card1.alsa - card2.alsa);
          meetsSmartSelection = alsaDifference >= 1.0 && alsaDifference < 3.0;
        }

        // Only use this pair if all conditions met
        if (isDifferentMetric && notShown && meetsSmartSelection) {
          pair = [card1, card2];
        }

        attempts++;
      }

      if (pair) {
        return { mode: 'comparison', pair };
      }
      return { mode: 'comparison', error: 'Unable to find new cards with different ratings. Try adjusting your filters.' };
    }
  }, [colorFilters, rarityFilters, typeFilters, quizMode, smartSelectionEnabled, metric, currentSetCode, activeCardData]);

  // Applies a computeQuestion() result to the visible question state. Setter
  // identities are stable, so this never needs to change.
  const applyQuestionResult = React.useCallback((result) => {
    if (result.insufficientCards) {
      setFilterError(result.message);
      setCurrentPair(null);
      setCurrentCard(null);
      return;
    }
    if (result.mode === 'grading') {
      if (result.card) {
        setFilterError('');
        setCurrentCard(result.card);
        setSelectedGrade(null);
        setShowResult(false);
      } else {
        setFilterError(result.error);
        setCurrentCard(null);
      }
    } else {
      if (result.pair) {
        setFilterError('');
        setCurrentPair(result.pair);
        setShowResult(false);
        setSelectedCardNum(null);
      } else {
        setFilterError(result.error);
        setCurrentPair(null);
      }
    }
  }, []);

  // Generate new question (computes + immediately applies it)
  const generateQuestion = React.useCallback(() => {
    applyQuestionResult(computeQuestion());
  }, [computeQuestion, applyQuestionResult]);

  // Generate new question when filters, mode, or set change. Any of these
  // changes also invalidates a staged (preloaded) next question — it was
  // computed for the old set/mode/filters and must never leak across.
  React.useEffect(() => {
    stagedQuestionRef.current = null;
    generateQuestion();
  }, [generateQuestion]);

  const handleSelectCard = React.useCallback((cardNum) => {
    if (!currentPair || isAnswering) return;

    setIsAnswering(true);
    setSelectedCardNum(cardNum);
    setShowResult(true);

    // Collapse help boxes
    setExpandMetricHelp(false);
    setExpandSmartSelectionHelp(false);

    const selectedCard = currentPair[cardNum];
    const otherCard = currentPair[1 - cardNum];
    const isCorrect = metric === 'gihWr' ? selectedCard.gihWr > otherCard.gihWr : selectedCard.alsa < otherCard.alsa;
    const pointsEarned = isCorrect ? 1.0 : 0.0;

    const newQuestions = questions + 1;
    const newPoints = points + pointsEarned;

    setQuestions(newQuestions);
    setPoints(newPoints);
    saveScore(quizMode, newPoints, newQuestions, currentSetCode);

    // Analytics: per-set answer volume + engagement-depth milestones
    trackEvent('quiz-answer-' + currentSetCode.toLowerCase(), `Quiz answer (${currentSetCode})`);
    if (QUIZ_MILESTONES.includes(newQuestions)) {
      trackEvent('quiz-milestone-' + newQuestions, `Reached ${newQuestions} answers (${quizMode})`);
    }

    // Mark this pair as shown
    const filterKey = makeFilterKey(colorFilters, rarityFilters, typeFilters);
    addShownCards(quizMode, filterKey, currentSetCode, currentPair[0].name, currentPair[1].name);

    // Add to history
    const historyEntry = {
      timestamp: new Date().toISOString(),
      setCode: currentSetCode,
      card1: currentPair[0].name,
      card1GihWr: currentPair[0].gihWr,
      card1Alsa: currentPair[0].alsa,
      card1Grade: getGrade(currentPair[0].gihWr),
      card2: currentPair[1].name,
      card2GihWr: currentPair[1].gihWr,
      card2Alsa: currentPair[1].alsa,
      card2Grade: getGrade(currentPair[1].gihWr),
      selectedCard: selectedCard.name,
      isCorrect,
      pointsEarned,
      metric: metric,
      filterColor: colorFilters.join(',') || 'all',
      filterRarity: rarityFilters.join(',') || 'all',
      filterType: typeFilters.join(',') || 'all',
      smartSelection: smartSelectionEnabled
    };
    addHistoryEntry(quizMode, historyEntry, currentSetCode);
    setHistory(loadAllHistory(quizMode));

    // Stage + preload the next question while the result panel is showing —
    // shown-cards bookkeeping above is already saved, so this sees up-to-date
    // no-repeat state.
    const staged = computeQuestion();
    stagedQuestionRef.current = staged;
    preloadQuestionImages(staged, preferSPM);

    // Scroll to result
    setTimeout(() => {
      const resultPanel = document.querySelector('.result-panel');
      if (resultPanel) {
        resultPanel.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    }, 50);
  }, [currentPair, isAnswering, metric, questions, points, quizMode, colorFilters, rarityFilters, typeFilters, smartSelectionEnabled, currentSetCode, computeQuestion, preferSPM]);

  const handleGradeSelect = React.useCallback((grade) => {
    if (!currentCard || isAnswering) return;

    setIsAnswering(true);
    setSelectedGrade(grade);
    setShowResult(true);

    const actualGrade = getGrade(currentCard.gihWr);
    const distance = calculateGradeDistance(grade, actualGrade);
    const pointsEarned = getPointsFromDistance(distance);

    const newQuestions = questions + 1;
    const newPoints = points + pointsEarned;

    setQuestions(newQuestions);
    setPoints(newPoints);
    saveScore(quizMode, newPoints, newQuestions, currentSetCode);

    // Analytics: per-set answer volume + engagement-depth milestones
    trackEvent('quiz-answer-' + currentSetCode.toLowerCase(), `Quiz answer (${currentSetCode})`);
    if (QUIZ_MILESTONES.includes(newQuestions)) {
      trackEvent('quiz-milestone-' + newQuestions, `Reached ${newQuestions} answers (${quizMode})`);
    }

    // Mark card as shown
    const filterKey = makeFilterKey(colorFilters, rarityFilters, typeFilters);
    const shownCards = loadShownCards(quizMode, filterKey, currentSetCode);
    shownCards.push(currentCard.name);
    saveShownCards(quizMode, filterKey, shownCards, currentSetCode);

    // Add to history
    const historyEntry = {
      timestamp: new Date().toISOString(),
      setCode: currentSetCode,
      card: currentCard.name,
      cardGihWr: currentCard.gihWr,
      actualGrade,
      userGrade: grade,
      gradeDistance: distance,
      pointsEarned,
      filterColor: colorFilters.join(',') || 'all',
      filterRarity: rarityFilters.join(',') || 'all',
      filterType: typeFilters.join(',') || 'all'
    };
    addHistoryEntry(quizMode, historyEntry, currentSetCode);
    setHistory(loadAllHistory(quizMode));

    // Stage + preload the next question while the result panel is showing —
    // shown-cards bookkeeping above is already saved, so this sees up-to-date
    // no-repeat state.
    const staged = computeQuestion();
    stagedQuestionRef.current = staged;
    preloadQuestionImages(staged, preferSPM);

    // Scroll to result
    setTimeout(() => {
      const resultPanel = document.querySelector('.result-panel');
      if (resultPanel) {
        resultPanel.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    }, 50);
  }, [currentCard, isAnswering, questions, points, quizMode, colorFilters, rarityFilters, typeFilters, currentSetCode, computeQuestion, preferSPM]);

  const handleNextQuestion = React.useCallback(() => {
    setIsAnswering(false);

    // Consume the preloaded next question if one is staged and still valid
    // (invalidated on set/mode/metric/filter/smart-selection change — see the
    // effect above); otherwise fall back to computing fresh, same as before.
    const staged = stagedQuestionRef.current;
    if (staged) {
      stagedQuestionRef.current = null;
      applyQuestionResult(staged);
    } else {
      generateQuestion();
    }

    // Mirror the scroll-to-result behavior on answering: once the result panel
    // (which sat above the cards) unmounts, the viewport is left above the new
    // question, so bring it into view. '.card-area' matches comparison mode;
    // grading mode has no card-area, so the first '.card-panel' is its card.
    setTimeout(() => {
      const questionArea = document.querySelector('.card-area, .card-panel');
      if (questionArea) {
        questionArea.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    }, 50);
  }, [generateQuestion, applyQuestionResult]);

  // Keyboard shortcuts: 1/2 or ArrowLeft/ArrowRight pick a card in comparison

  // while focus is on a form control or button so typing in the filter box or
  // activating a focused button never double-fires.
  React.useEffect(() => {
    const onKey = (e) => {
      if (e.altKey || e.ctrlKey || e.metaKey) return;
      const tag = e.target.tagName;
      if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT' || tag === 'BUTTON') return;
      if (showResult) {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          handleNextQuestion();
        }
      } else if (quizMode === 'comparison' && currentPair) {
        if (e.key === '1' || e.key === 'ArrowLeft') {
          e.preventDefault();
          handleSelectCard(0);
        } else if (e.key === '2' || e.key === 'ArrowRight') {
          e.preventDefault();
          handleSelectCard(1);
        }
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [showResult, quizMode, currentPair, handleSelectCard, handleNextQuestion]);

  // Shared reset when the user changes anything that invalidates the shown answer

  const toggleFilter = (setter, current, value) => {
    setter(current.includes(value) ? current.filter(v => v !== value) : [...current, value]);
    resetAnswerState();
  };

  const clearFilter = (setter) => {
    setter([]);
    resetAnswerState();
  };

  const handleQueryChange = (e) => {
    const text = e.target.value;
    setQueryText(text);
    if (lastSource.current === 'combobox') { lastSource.current = null; return; }

    setColorFilters(parsed.colors);
    setRarityFilters(parsed.rarities);
    setTypeFilters(parsed.types);
    resetAnswerState();

  const handleClearHistory = () => {

    const resultsGrid = recentHistory.map(h => {

        return h.pointsEarned === 1.0 ? '✅' : h.pointsEarned > 0 ? '🟨' : '❌';

        return h.isCorrect ? '✅' : '❌';

${points.toFixed(1)}/${questions} points (${accuracy}%)

Recent 10: ${resultsGrid}

Play at: ${baseUrl}#${currentSetCode}`,

          <div className="filter-section">

                {value: 'multicolor', label: 'Multicolor'},

              selected={colorFilters}

            />
            <MultiSelectFilter

              options={[
                {value: 'M', label: 'Mythic (M)'},

              selected={rarityFilters}

          </div>

          {showResult && quizMode === 'grading' && currentCard && (
            <div style={{marginTop: '16px'}}>
              <div className={`result-panel ${
                selectedGrade === getGrade(currentCard.gihWr) ? 'result-correct' :
                calculateGradeDistance(selectedGrade, getGrade(currentCard.gihWr)) <= 1 ? 'result-partial' :

          {quizMode === 'comparison' && currentPair && (

                      <strong>✨ Smart Selection</strong>:<br />Ensures cards aren't so far apart it's trivial or so close it's random.<br />• GIH WR: different letter grades (0.33 standard deviation of score), but within 1 standard deviation score (up to 2 grades above/below)<br />• ALSA: at least 1, but no more than 2, average pick difference.

                    </div>
                    <div style={{flex: '1', minWidth: '200px', fontSize: '13px', padding: '12px', background: '#1a1a1a', border: '1px solid #333', borderRadius: '4px', color: '#bbb', lineHeight: '1.5'}}>
                      <strong>🎯 ALSA (Average Last Seen At)</strong>: The <a href="https://www.17lands.com/metrics_definitions#alsa" target="_blank" rel="noopener noreferrer" style={{color: '#4a9eff', textDecoration: 'underline'}}>average pick number where this card was last seen in packs</a>. Scale: 1-7 (1 = early/high demand, 7 = late/low demand). Doesn't directly measure card power, but how much demand there is for a card from drafters, so indirectly the consenus on how good it is.<br /><br />Cards that are good in lots of decks get taken sooner and archetype specific cards later, on average, as they'll be seen by players who are locked into different archtypes. So can overrate flexibility over raw power.<br /><br />For more on the pros and cons of different metrics, see these excellent blog posts: <a href="https://www.17lands.com/articles/using_win_rate_data" target="_blank" rel="noopener noreferrer" style={{color: '#4a9eff', textDecoration: 'underline'}}>17Lands "Using Win Rate Data"</a> and <a href="https://www.mtgdatasci.com/estimating-adjusted-win-rate/" target="_blank" rel="noopener noreferrer" style={{color: '#4a9eff', textDecoration: 'underline'}}>MTG Data Science "Estimating Adjusted Win Rate"</a>.
                    </div>
                  </div>
                )}
              </div>

              {showResult && quizMode === 'comparison' && (
                <div style={{marginTop: '16px', marginBottom: '24px'}}>
                  {(() => {
                    const isWinningCard = metric === 'gihWr'
                      ? currentPair[selectedCardNum].gihWr > currentPair[1 - selectedCardNum].gihWr
                      : currentPair[selectedCardNum].alsa < currentPair[1 - selectedCardNum].alsa;
                    return (
                      <div className={`result-panel ${isWinningCard ? 'result-correct' : 'result-incorrect'}`}>
                        <div className="result-title">
                          {isWinningCard ? '✓ CORRECT!' : '✗ INCORRECT'} {metric === 'gihWr' ? '🏆' : '👀'}
                        </div>
                        <div style={{textAlign: 'center', marginTop: '16px'}}>
                          <button className="next-button" onClick={handleNextQuestion}>Next Question</button>
                        </div>
                        <div className="score-display" style={{marginTop: '20px'}}>
                          <div className="score-item">
                            <div className="score-value">{Number.isInteger(points) ? points : points.toFixed(1)}/{questions}</div>
                            <div className="score-label">Points</div>
                          </div>
                          <div className="score-item">
                            <div className="score-value">{accuracy}%</div>
                            <div className="score-label">Accuracy</div>
                          </div>
                        </div>
                      </div>
                    );
                  })()}
                </div>
              )}

              {currentSetCode === 'OM1' && (
                <div className="mode-toggle" style={{marginBottom: '12px'}}>
                  <button
                    className={`mode-option ${!preferSPM ? 'active' : ''}`}
                    onClick={() => setPreferSPM(false)}
                    title="Show Universes Within (OM1) art"
                  >
                    🧙 OM1 Art
                  </button>
                  <button
                    className={`mode-option ${preferSPM ? 'active' : ''}`}
                    onClick={() => setPreferSPM(true)}
                    title="Show Marvel: Spider-Man art"
                  >
                    🕷 SPM Art
                  </button>
                </div>
              )}
              <div className="card-area">
              <CardDisplay
                card={currentPair[0]}
                cardNumber={0}
                onSelect={handleSelectCard}
                disabled={showResult}
                showResult={showResult}
                isCorrect={showResult && (metric === 'gihWr' ? currentPair[0].gihWr > currentPair[1].gihWr : currentPair[0].alsa < currentPair[1].alsa)}
                isWinner={showResult && (metric === 'gihWr' ? currentPair[0].gihWr > currentPair[1].gihWr : currentPair[0].alsa < currentPair[1].alsa)}
                metric={metric}
                setCode={currentSetCode}
                preferSPM={preferSPM}
              />
              <CardDisplay
                card={currentPair[1]}
                cardNumber={1}
                onSelect={handleSelectCard}
                disabled={showResult}
                showResult={showResult}
                isCorrect={showResult && (metric === 'gihWr' ? currentPair[1].gihWr > currentPair[0].gihWr : currentPair[1].alsa < currentPair[0].alsa)}
                isWinner={showResult && (metric === 'gihWr' ? currentPair[1].gihWr > currentPair[0].gihWr : currentPair[1].alsa < currentPair[0].alsa)}
                metric={metric}
                setCode={currentSetCode}
                preferSPM={preferSPM}
              />
            </div>
            </>
          )}

          {quizMode === 'grading' && currentCard && (
            <div style={{display: 'flex', flexDirection: 'column', alignItems: 'center', marginTop: '20px'}}>
              <div className="card-panel" style={{maxWidth: '500px', width: '100%'}}>
                <CardDisplay
                  card={currentCard}
                  cardNumber={0}
                  onSelect={() => {}}
                  disabled={showResult}
                  showResult={showResult}
                  isCorrect={true}
                  isWinner={true}
                  metric={metric}
                  setCode={currentSetCode}
                  preferSPM={preferSPM}
                />
              </div>
              <GradeSelector
                onSelect={handleGradeSelect}
                disabled={showResult}
                selectedGrade={selectedGrade}
              />
            </div>
          )}
        </div>
      )}

      {/* History Section */}
      <div className="history-section">
        <div className="history-header">
          <div className="history-title">📜 Question History</div>
          <div className="history-actions">
            <div style={{position: 'relative'}}>
              <button className="action-button" onClick={() => {
                const scoreData = generateScoreText();
                if (scoreData) {
                  navigator.clipboard.writeText(scoreData.text).then(() => {
                    showToastMessage('✓ Score copied to clipboard!');
                  }).catch(() => {
                    showToastMessage('Share text: ' + scoreData.text);
                  });
                } else {
                  showToastMessage('No history to share yet!');
                }
                setShareMenuOpen(!shareMenuOpen);
              }} title="Copy score to clipboard & open share options">
                🔗 Share
              </button>
              {shareMenuOpen && (
                <div style={{
                  position: 'absolute',
                  top: '100%',
                  right: 0,
                  marginTop: '4px',
                  background: '#222',
                  border: '1px solid #444',
                  borderRadius: '4px',
                  boxShadow: '0 4px 12px rgba(0,0,0,0.3)',
                  zIndex: 1000,
                  minWidth: '160px'
                }}>
                  <button onClick={handleShareTwitter} style={{
                    display: 'block',
                    width: '100%',
                    padding: '10px 12px',
                    textAlign: 'left',
                    background: 'none',
                    border: 'none',
                    color: '#bbb',
                    cursor: 'pointer',
                    fontSize: '13px',
                    borderBottom: '1px solid #333'
                  }} onMouseEnter={(e) => e.target.style.background = '#2a2a2a'} onMouseLeave={(e) => e.target.style.background = 'none'}>
                    𝕏 Twitter/X
                  </button>
                  <button onClick={handleShareBluesky} style={{
                    display: 'block',
                    width: '100%',
                    padding: '10px 12px',
                    textAlign: 'left',
                    background: 'none',
                    border: 'none',
                    color: '#bbb',
                    cursor: 'pointer',
                    fontSize: '13px',
                    borderBottom: '1px solid #333'
                  }} onMouseEnter={(e) => e.target.style.background = '#2a2a2a'} onMouseLeave={(e) => e.target.style.background = 'none'}>
                    🦋 Bluesky
                  </button>
                  <button onClick={handleShareDiscord} style={{
                    display: 'block',
                    width: '100%',
                    padding: '10px 12px',
                    textAlign: 'left',
                    background: 'none',
                    border: 'none',
                    color: '#bbb',
                    cursor: 'pointer',
                    fontSize: '13px',
                    borderBottom: '1px solid #333'
                  }} onMouseEnter={(e) => e.target.style.background = '#2a2a2a'} onMouseLeave={(e) => e.target.style.background = 'none'}>
                    💬 Discord
                  </button>
                  <button onClick={handleExportScore} style={{
                    display: 'block',
                    width: '100%',
                    padding: '10px 12px',
                    textAlign: 'left',
                    background: 'none',
                    border: 'none',
                    color: '#bbb',
                    cursor: 'pointer',
                    fontSize: '13px'
                  }} onMouseEnter={(e) => e.target.style.background = '#2a2a2a'} onMouseLeave={(e) => e.target.style.background = 'none'}>
                    📋 Copy Text
                  </button>
                </div>
              )}
            </div>
            <button className="action-button" onClick={() => {
              const next = !showInsights;
              setShowInsights(next);
              if (next) trackEvent('quiz-insights-open', 'Insights panel opened');
            }} title="Show analysis of your quiz history">
              📊 Insights
            </button>
            <button className="action-button danger" onClick={handleClearHistory} title="Clear all history">
              🗑️ Clear History
            </button>
          </div>
        </div>

        {showInsights && (
          <InsightsPanel
            insightsScope={insightsScope}
            setInsightsScope={setInsightsScope}
            insightsSet={insightsSet}
            setInsightsSet={setInsightsSet}
            insightsData={insightsData}
          />
        )}

        {history.length === 0 ? (
          <div className="history-empty">
            No questions answered yet. Start playing to see your history!
          </div>
        ) : (
          <div className="history-table-container">
            <table className="history-table">
              <thead>
                <tr>
                  <th>#</th>
                  <th>Mode</th>
                  <th>Result</th>
                  {history.some(h => h.mode === 'comparison') && (
                    <>
                      <th>Card 1</th>
                      <th>Metrics</th>
                      <th>Card 2</th>
                      <th>Metrics</th>
                      <th>Your Choice</th>
                    </>
                  )}
                  {history.some(h => h.mode === 'grading') && (
                    <>
                      <th>Card</th>
                      <th>Your Grade</th>
                      <th>Actual Grade</th>
                      <th>GIH WR</th>
                      <th>Points</th>
                    </>
                  )}
                  <th>Filter</th>
                </tr>
              </thead>
              <tbody>
                {history.slice().reverse().map((entry, idx) => {
                  const actualIdx = history.length - idx;
                  const setName = entry.setCode ? SET_CONFIG[entry.setCode]?.shortName || entry.setCode : 'ECL';
                  const fmt = v => !v || v === 'all' ? 'All' : v.toUpperCase();
                  const filterText = `${setName} • ${fmt(entry.filterColor)} / ${fmt(entry.filterRarity)} / ${fmt(entry.filterType)}`;
                  const smartMarker = entry.smartSelection ? ' ✨' : '';
                  const metricMarker = entry.metric === 'alsa' ? ' 🎯' : '';

                  if (entry.mode === 'grading') {
                    const cardUrl = `https://scryfall.com/search?q="${encodeURIComponent(entry.card)}"&unique=cards`;
                    const resultColor = entry.pointsEarned === 1.0 ? '#4caf50' : entry.pointsEarned > 0 ? '#ffc107' : '#ff6b6b';
                    const resultIcon = entry.pointsEarned === 1.0 ? '✓' : entry.pointsEarned > 0 ? '~' : '✗';
                    const resultClass = entry.pointsEarned === 1.0 ? 'history-result-correct' : entry.pointsEarned > 0 ? 'history-result-partial' : 'history-result-incorrect';

                    return (
                      <tr key={idx}>
                        <td>{actualIdx}</td>
                        <td style={{fontSize: '12px', color: '#999'}}>📝</td>
                        <td>
                          <span className={`history-result-icon ${resultClass}`}>
                            {resultIcon}
                          </span>
                        </td>
                        <td>
                          <a href={cardUrl} target="_blank" rel="noopener noreferrer" className="history-card-name">
                            {entry.card}
                          </a>
                        </td>
                        <td>
                          <span className={`grade-badge ${getGradeClass(entry.userGrade)}`}>
                            {entry.userGrade}
                          </span>
                        </td>
                        <td>
                          <span className={`grade-badge ${getGradeClass(entry.actualGrade)}`}>
                            {entry.actualGrade}
                          </span>
                        </td>
                        <td>
                          <div className="gih-with-grade">
                            <span>{entry.cardGihWr.toFixed(1)}%</span>
                          </div>
                        </td>
                        <td style={{fontWeight: 600, color: resultColor}}>
                          {entry.pointsEarned.toFixed(2)}/1
                        </td>
                        <td style={{fontSize: '12px', color: '#999'}}>{filterText}{metricMarker}</td>
                      </tr>
                    );
                  } else {
                    // Comparison mode
                    const card1Url = `https://scryfall.com/search?q="${encodeURIComponent(entry.card1)}"&unique=cards`;
                    const card2Url = `https://scryfall.com/search?q="${encodeURIComponent(entry.card2)}"&unique=cards`;

                    // Use metric-aware display
                    const useAlsa = entry.metric === 'alsa';
                    const card1Value = useAlsa ? (entry.card1Alsa || 0).toFixed(2) : entry.card1GihWr.toFixed(1);
                    const card2Value = useAlsa ? (entry.card2Alsa || 0).toFixed(2) : entry.card2GihWr.toFixed(1);
                    const card1ValueSuffix = useAlsa ? '' : '%';
                    const card2ValueSuffix = useAlsa ? '' : '%';
                    const card1Grade = entry.card1GihWr ? getGrade(entry.card1GihWr) : null;
                    const card2Grade = entry.card2GihWr ? getGrade(entry.card2GihWr) : null;

                    return (
                      <tr key={idx}>
                        <td>{actualIdx}</td>
                        <td style={{fontSize: '12px', color: '#999'}}>⚖️ {useAlsa ? '👀' : '🏆'}</td>
                        <td>
                          <span className={`history-result-icon ${entry.isCorrect ? 'history-result-correct' : 'history-result-incorrect'}`}>
                            {entry.isCorrect ? '✓' : '✗'}
                          </span>
                        </td>
                        <td>
                          <a href={card1Url} target="_blank" rel="noopener noreferrer" className="history-card-name">
                            {entry.card1}
                          </a>
                        </td>
                        <td>
                          <div className="gih-with-grade" style={{display: 'flex', flexDirection: 'column', gap: '4px'}}>
                            <span>🏆 {entry.card1GihWr.toFixed(1)}% <span className={`grade-badge ${getGradeClass(card1Grade)}`}>{card1Grade}</span></span>
                            <span>👀 {(entry.card1Alsa || 0).toFixed(2)}</span>
                          </div>
                        </td>
                        <td>
                          <a href={card2Url} target="_blank" rel="noopener noreferrer" className="history-card-name">
                            {entry.card2}
                          </a>
                        </td>
                        <td>
                          <div className="gih-with-grade" style={{display: 'flex', flexDirection: 'column', gap: '4px'}}>
                            <span>🏆 {entry.card2GihWr.toFixed(1)}% <span className={`grade-badge ${getGradeClass(card2Grade)}`}>{card2Grade}</span></span>
                            <span>👀 {(entry.card2Alsa || 0).toFixed(2)}</span>
                          </div>
                        </td>
                        <td style={{fontWeight: entry.isCorrect ? 600 : 400, color: entry.isCorrect ? '#4caf50' : '#ff6b6b'}}>
                          {entry.selectedCard}
                        </td>
                        <td style={{fontSize: '12px', color: '#999'}}>{filterText}{smartMarker}</td>
                      </tr>
                    );
                  }
                })}
              </tbody>
            </table>
          </div>
        )}
      </div>

      {/* Toast notification */}
      {showToast && (
        <div className="toast">{toastMessage}</div>
      )}

      <p className="info-text">Card data from 17 Lands • Card images from Scryfall • Just open in your browser and play!</p>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<GIHQuiz />);
</script>
</body>
</html>
