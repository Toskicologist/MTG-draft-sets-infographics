  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: #0a0e27;
      color: #fff;
      padding: 5px;
      min-height: 100vh;
    }

    .container {
      margin: 0 auto;
    }

    .banner {
      position: relative;
      background-image: url('../mtg/assets/cropped ChatGPT Image Jan 18, 2026, 10_33_59 PM.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      padding: 0 5px;
      text-align: center;
      overflow: hidden;
      margin: -5px -5px 0 -5px;
      width: calc(100% + 10px);
      margin-left: -5px;
      min-height: auto;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .banner::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(135deg, rgba(102, 126, 234, 0.78) 0%, rgba(118, 75, 162, 0.78) 100%);
      z-index: 1;
    }

    .banner-content {
      position: relative;
      z-index: 2;
    }

    .header {
      text-align: center;
      margin-bottom: 24px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 40px;
      margin-bottom: 8px;
      color: white;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }

    .subtitle {
      color: #aaa;
      font-size: 12px;
      margin-bottom: 0;
    }

    .score-display {
      display: flex;
      gap: 40px;
      justify-content: center;
      margin-top: 12px;
      font-size: 13px;
    }

    .score-item {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .score-value {
      font-size: 24px;
      font-weight: 700;
      color: #4a9eff;
    }

    .score-label {
      color: #aaa;
      font-size: 12px;
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .filter-section {
      display: flex;
      gap: 16px;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .filter-label {
      display: none;
    }

    select {
      padding: 10px 12px;
      background: rgba(74, 158, 255, 0.25);
      border: 1px solid rgba(74, 158, 255, 0.5);
      border-radius: 6px;
      color: #fff;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      min-width: 140px;
    }

    select:hover {
      border-color: #4a9eff;
      background: rgba(74, 158, 255, 0.35);
    }

    select:focus {
      outline: none;
      border-color: #4a9eff;
      box-shadow: 0 0 8px rgba(74, 158, 255, 0.3);
    }

    select option {
      background: #0a0e27;
      color: #fff;
    }

    .quiz-section {
      padding: 30px;
      margin-bottom: 30px;
      display: flex;
      flex-direction: column;
    }

    .quiz-prompt {
      text-align: center;
      font-size: 16px;
      margin-bottom: 30px;
      color: #ddd;
      max-width: 65ch;
      margin-left: auto;
      margin-right: auto;
    }

    .card-area {
      display: flex;
      gap: 30px;
      margin-bottom: 30px;
      flex-wrap: wrap;
      justify-content: center;
      align-items: flex-start;
    }

    .card-panel {
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: center;
      flex: 1 1 45%;
      min-width: 250px;
      max-width: 500px;
    }

    @media (max-width: 1100px) {
      .card-panel {
        flex: 1 1 40%;
      }
    }

    @media (max-width: 900px) {
      .card-panel {
        flex: 1 1 35%;
      }

      .card-image-container {
        height: 350px;
      }

      .card-area {
        gap: 20px;
      }
    }

    @media (max-width: 700px) {
      .quiz-section {
        padding: 0;
        margin-bottom: 20px;
      }

      .card-panel {
        flex: 1 1 100%;
        min-width: auto;
      }

      .card-image-container {
        height: 300px;
      }

      .card-area {
        gap: 0;
        margin-bottom: 20px;
      }
    }

    @media (max-width: 500px) {
      .card-image-container {
        height: 250px;
      }
    }

    .card-image-container {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 400px;
      width: 100%;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 8px;
      overflow: hidden;
      position: relative;
      cursor: pointer;
      transition: all 0.2s;
      border: 2px solid transparent;
    }

    .card-image-container:hover:not(.disabled) {
      background: rgba(0, 0, 0, 0.5);
      border-color: rgba(74, 158, 255, 0.5);
      transform: scale(1.02);
    }

    .card-image-container.disabled {
      cursor: not-allowed;
      opacity: 0.8;
    }

    .card-image {
      max-height: 100%;
      max-width: 100%;
      object-fit: contain;
    }

    .gih-percentage {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.9);
      color: #4a9eff;
      padding: 10px 16px;
      border-radius: 6px;
      font-size: 56px;
      font-weight: 700;
      display: none;
      border: 2px solid #4a9eff;
      width: 90%;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .gih-value {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .gih-percentage.show {
      display: flex;
      animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes popIn {
      from {
        opacity: 0;
        transform: scale(0.7);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .card-image-container.winner {
      border-color: rgba(76, 175, 80, 0.8);
      box-shadow: 0 0 20px rgba(76, 175, 80, 0.4);
    }

    .card-image-container.loser {
      opacity: 0.6;
    }

    .card-loading {
      color: #666;
      font-size: 14px;
    }

    .card-error {
      color: #ff6b6b;
      font-size: 13px;
      text-align: center;
      padding: 20px;
    }

    .card-oracle-fallback {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      box-sizing: border-box;
      background: rgba(0, 0, 0, 0.3);
      overflow: auto;
    }

    .card-fallback-content {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-width: 100%;
      text-align: left;
      font-family: Georgia, serif;
    }

    .card-fallback-name {
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      line-height: 1.2;
    }

    .card-fallback-mana {
      color: #bbb;
      font-size: 12px;
      font-weight: 600;
    }

    .card-fallback-type {
      color: #999;
      font-size: 12px;
      font-style: italic;
      line-height: 1.3;
    }

    .card-fallback-pt {
      color: #999;
      font-size: 14px;
      font-weight: 700;
      text-align: right;
      padding-right: 4px;
    }

    .card-fallback-divider {
      height: 1px;
      background: rgba(255, 255, 255, 0.2);
      margin: 4px 0;
    }

    .card-fallback-text {
      color: #ccc;
      font-size: 12px;
      line-height: 1.5;
      font-family: Courier New, monospace;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .card-name {
      font-size: 16px;
      font-weight: 700;
      color: #4a9eff;
      text-align: center;
      text-decoration: none;
      transition: color 0.2s;
    }

    .card-name:hover {
      color: #6badff;
      text-decoration: underline;
    }


    .result-panel {
      background: rgba(74, 158, 255, 0.1);
      border: 2px solid rgba(74, 158, 255, 0.3);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 30px;
      animation: slideDown 0.3s ease-out;
      order: -1;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .result-correct {
      background: rgba(76, 175, 80, 0.15);
      border-color: rgba(76, 175, 80, 0.5);
    }

    .result-incorrect {
      background: rgba(255, 107, 107, 0.15);
      border-color: rgba(255, 107, 107, 0.5);
    }

    .result-title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 16px;
      text-align: center;
    }

    .result-correct .result-title {
      color: #4caf50;
      animation: pulse 1.5s ease-in-out;
    }

    .result-incorrect .result-title {
      color: #ff6b6b;
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.08);
      }
    }

    .result-content {
      font-size: 15px;
      color: #ddd;
      display: grid;
      gap: 12px;
    }

    .result-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
    }

    .result-card-name {
      font-weight: 600;
      flex: 1;
    }

    .result-value {
      font-size: 18px;
      font-weight: 700;
      color: #4a9eff;
      margin-left: 16px;
    }

    .next-button {
      padding: 12px 24px;
      background: rgba(74, 158, 255, 0.2);
      border: 2px solid rgba(74, 158, 255, 0.4);
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .next-button:hover {
      background: rgba(74, 158, 255, 0.3);
      border-color: #4a9eff;
      transform: translateY(-2px);
    }

    .error-message {
      background: rgba(255, 107, 107, 0.1);
      border: 1px solid rgba(255, 107, 107, 0.3);
      color: #ff9999;
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 13px;
    }

    .info-text {
      text-align: center;
      color: #666;
      font-size: 12px;
      margin-top: 20px;
    }

    .metadata-section {
      text-align: center;
      margin-bottom: 16px;
      font-size: 11px;
      color: #aaa;
    }

    .metadata-section a {
      color: #4a9eff;
      text-decoration: none;
      transition: color 0.2s;
    }

    .metadata-section a:hover {
      color: #7b68ee;
      text-decoration: underline;
    }

    .metadata-line {
      margin: 2px 0;
    }

    .beta-badge {
      position: fixed;
      top: 20px;
      right: 20px;
      background: linear-gradient(135deg, #ff4444 0%, #cc0000 100%);
      color: #fff;
      padding: 12px 20px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 14px;
      box-shadow: 0 4px 12px rgba(255, 68, 68, 0.4);
      z-index: 1000;
      text-transform: uppercase;
      letter-spacing: 1px;
      border: 2px solid #ff6666;
    }

    .beta-badge.local {
      top: 70px;
    }

    @media (max-width: 768px) {
      .beta-badge {
        top: 10px;
        right: 10px;
        padding: 8px 14px;
        font-size: 12px;
      }

      .beta-badge.local {
        top: 55px;
      }

      h1 {
        font-size: 24px;
      }
    }

    /* History section styles */
    .history-section {
      margin-top: 40px;
      padding: 30px;
      background: rgba(74, 158, 255, 0.05);
      border: 1px solid rgba(74, 158, 255, 0.2);
      border-radius: 12px;
    }

    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 16px;
    }

    .history-title {
      font-size: 24px;
      font-weight: 700;
      color: #4a9eff;
    }

    .history-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .action-button {
      padding: 12px 20px;
      min-height: 44px;
      min-width: 44px;
      background: rgba(74, 158, 255, 0.2);
      border: 2px solid rgba(74, 158, 255, 0.4);
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .action-button:hover {
      background: rgba(74, 158, 255, 0.3);
      border-color: #4a9eff;
      transform: translateY(-2px);
    }

    .action-button.danger {
      background: rgba(255, 107, 107, 0.2);
      border-color: rgba(255, 107, 107, 0.4);
    }

    .action-button.danger:hover {
      background: rgba(255, 107, 107, 0.3);
      border-color: #ff6b6b;
    }

    .history-table-container {
      overflow-x: auto;
      margin-top: 20px;
    }

    .history-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    .history-table th {
      background: rgba(74, 158, 255, 0.15);
      padding: 10px 8px;
      text-align: left;
      color: #4a9eff;
      font-weight: 600;
      border-bottom: 2px solid rgba(74, 158, 255, 0.3);
      white-space: nowrap;
    }

    .history-table td {
      padding: 10px 8px;
      border-bottom: 1px solid rgba(74, 158, 255, 0.1);
      color: #ddd;
      white-space: nowrap;
    }

    .history-table tr:hover {
      background: rgba(74, 158, 255, 0.05);
    }

    .history-result-icon {
      font-size: 18px;
      font-weight: 700;
    }

    .history-result-correct {
      color: #4caf50;
    }

    .history-result-incorrect {
      color: #ff6b6b;
    }

    .history-result-partial {
      color: #ffc107;
    }

    .history-card-name {
      color: #4a9eff;
      text-decoration: none;
      transition: color 0.2s;
    }

    .history-card-name:hover {
      color: #6badff;
      text-decoration: underline;
    }

    .history-empty {
      text-align: center;
      padding: 40px;
      color: #666;
      font-size: 14px;
    }

    /* Insights panel styles */
    .insights-panel {
      margin-bottom: 24px;
      padding: 20px;
      background: rgba(74, 158, 255, 0.06);
      border: 1px solid rgba(74, 158, 255, 0.25);
      border-radius: 10px;
    }

    .insights-controls {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }

    .insights-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .insights-pill {
      padding: 6px 14px;
      background: rgba(74, 158, 255, 0.12);
      border: 1px solid rgba(74, 158, 255, 0.35);
      border-radius: 999px;
      color: #bbb;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .insights-pill:hover {
      border-color: #4a9eff;
      color: #fff;
    }

    .insights-pill.active {
      background: rgba(74, 158, 255, 0.35);
      border-color: #4a9eff;
      color: #fff;
    }

    .insights-set-select {
      padding: 6px 10px;
      background: #0a0e27;
      border: 1px solid rgba(74, 158, 255, 0.4);
      border-radius: 6px;
      color: #fff;
      font-size: 13px;
    }

    .insights-caption {
      width: 100%;
      color: #777;
      font-size: 12px;
      margin-top: 2px;
      margin-bottom: 4px;
    }

    .insights-section {
      margin-top: 18px;
      padding-top: 16px;
      border-top: 1px solid rgba(74, 158, 255, 0.15);
    }

    .insights-section-title {
      font-size: 16px;
      font-weight: 700;
      color: #4a9eff;
      margin-bottom: 8px;
    }

    .insights-headline {
      color: #ddd;
      font-size: 14px;
      margin-bottom: 8px;
    }

    .insights-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 10px;
    }

    .insights-chip {
      padding: 4px 10px;
      background: rgba(74, 158, 255, 0.1);
      border: 1px solid rgba(74, 158, 255, 0.25);
      border-radius: 6px;
      color: #ccc;
      font-size: 12px;
    }

    .insights-verdict {
      color: #ffc107;
      font-size: 13px;
      margin-bottom: 10px;
    }

    .insights-finding {
      color: #ddd;
      font-size: 13px;
      line-height: 1.6;
      padding-left: 2px;
    }

    .insights-finding-muted {
      color: #888;
      font-weight: 400;
    }

    .insights-empty {
      color: #666;
      font-size: 13px;
      font-style: italic;
    }

    .insights-footnote {
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid rgba(74, 158, 255, 0.1);
      color: #666;
      font-size: 11px;
      font-style: italic;
      line-height: 1.5;
    }

    .insights-pill-gap {
      display: inline-block;
      width: 14px;
    }

    .insights-grid-scroll {
      overflow-x: auto;
      margin-top: 10px;
    }

    .insights-grid {
      border-collapse: collapse;
      font-size: 12px;
      min-width: 480px;
    }

    .insights-grid th {
      color: #999;
      font-weight: 600;
      padding: 5px 6px;
      text-align: center;
      border-bottom: 1px solid rgba(74, 158, 255, 0.2);
      white-space: nowrap;
    }

    .insights-grid th.insights-grid-rowlabel {
      text-align: left;
      border-bottom: none;
      border-right: 1px solid rgba(74, 158, 255, 0.2);
      padding-right: 10px;
    }

    .insights-grid-cell {
      padding: 5px 8px;
      text-align: center;
      color: #eee;
      font-weight: 600;
      min-width: 52px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .insights-grid-n {
      color: #aaa;
      font-size: 10px;
      font-weight: 400;
    }

    .insights-grid-dim {
      opacity: 0.55;
      font-weight: 400;
      font-size: 11px;
      color: #888;
    }

    .insights-diff-block {
      margin-bottom: 10px;
    }

    .insights-diff-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }

    .insights-diff-label {
      width: 110px;
      flex-shrink: 0;
      text-align: right;
      color: #999;
      font-size: 12px;
    }

    .insights-diff-track {
      flex-grow: 1;
      height: 14px;
      background: rgba(255, 255, 255, 0.04);
      border-radius: 3px;
      position: relative;
    }

    .insights-diff-baseline {
      position: absolute;
      left: 50%;

  segments.forEach((seg, i) => {

// ============================================
// EXACT 17LANDS GRADE ALGORITHM
// Extracted from 17lands JavaScript bundle (Routes.*.bundle.js)
// Formula: index = Math.floor(3 * (zscore + GRADE_OFFSET))
// Each grade band = 1/3 SD, centered at C (zscore=0)
// ============================================
const GRADE_LABELS = ["F","D-","D","D+","C-","C","C+","B-","B","B+","A-","A","A+"];
const GRADE_OFFSET = 2 - 1/6;  // 11/6 ≈ 1.8333

// Compute grade stats for a given card data array
const computeGradeStats = (cardData) => {
  const gihValues = cardData.map(c => c.gihWr);
  const mean = gihValues.reduce((a, b) => a + b, 0) / gihValues.length;
  const sd = Math.sqrt(gihValues.reduce((a, b) => a + (b - mean) ** 2, 0) / gihValues.length);
  const thresholds = {};
  GRADE_LABELS.forEach((label, idx) => {
    const z = idx / 3 - GRADE_OFFSET;
    thresholds[label] = mean + z * sd;
  });
  thresholds.stdDev = sd;
  return { mean, sd, thresholds };
};

// Pre-compute stats for all sets
const SET_GRADE_STATS = {};
Object.keys(SET_CONFIG).forEach(setCode => {
  SET_GRADE_STATS[setCode] = computeGradeStats(SET_CONFIG[setCode].data);
});

// Current set state - defaults to ECL, will be overridden by component state
let currentGradeStats = SET_GRADE_STATS.ECL;

// Legacy aliases for compatibility
let GRADE_MEAN = currentGradeStats.mean;
let GRADE_SD = currentGradeStats.sd;
let gradeThresholds = currentGradeStats.thresholds;

// Update grade stats when set changes
const updateGradeStats = (setCode) => {
  currentGradeStats = SET_GRADE_STATS[setCode];
  GRADE_MEAN = currentGradeStats.mean;
  GRADE_SD = currentGradeStats.sd;
  gradeThresholds = currentGradeStats.thresholds;
};

// Get grade for a specific GIH WR value (exact 17lands algorithm)
const getGrade = (gihWr) => {
  const z = (gihWr - GRADE_MEAN) / GRADE_SD;
  const index = Math.floor(3 * (z + GRADE_OFFSET));
  if (index < 0) return 'F';
  if (index >= GRADE_LABELS.length) return 'A+';
  return GRADE_LABELS[index];
};

// Get CSS class for grade
const getGradeClass = (grade) => {
  // Convert grade to CSS class name (e.g., 'A+' → 'grade-a-plus', 'A-' → 'grade-a-minus', 'C' → 'grade-c')
  let className = grade.toLowerCase();
  if (className.endsWith('+')) {
    className = className.replace('+', '-plus');
  } else if (className.endsWith('-')) {
    className = className.replace('-', '-minus');
  }
  return `grade-${className}`;
};

// Ordered array for distance calculation (A+ to F)
// 17 Lands uses 13 grades with minus grades
const GRADE_ORDER = ['A+', 'A', 'A-', 'B+', 'B', 'B-', 'C+', 'C', 'C-', 'D+', 'D', 'D-', 'F'];

const getGradeIndex = (grade) => GRADE_ORDER.indexOf(grade);

const calculateGradeDistance = (userGrade, actualGrade) =>
  Math.abs(getGradeIndex(userGrade) - getGradeIndex(actualGrade));

const getPointsFromDistance = (distance) => {
  if (distance === 0) return 1.0;   // Perfect
  if (distance === 1) return 0.5;   // Close
  if (distance === 2) return 0.25;  // So-so
  return 0.0;                       // Wrong (3+ grades off)
};

const getGradeRange = (grade) => {
  const idx = GRADE_LABELS.indexOf(grade);
  if (idx === -1) return '';
  const lower = gradeThresholds[grade];
  if (grade === 'A+') return `${lower.toFixed(1)}%+`;
  if (grade === 'F') return `<${gradeThresholds['D-'].toFixed(1)}%`;
  const upperGrade = GRADE_LABELS[idx + 1];
  const upper = gradeThresholds[upperGrade];
  return `${lower.toFixed(1)}-${upper.toFixed(1)}%`;
};

// ============================================
// INSIGHTS ENGINE: retrospective analysis over quiz history
// Pure functions only — no JSX. Consumed by <InsightsPanel>.
// ============================================

// Index into GRADE_LABELS (F..A+); -1 for unknown labels (filter these out).
const gradeIdx = (label) => GRADE_LABELS.indexOf(label);

// Scope a set of history entries down to a set code and a recency window.
// setCode 'ALL' keeps every set; lastN 0 means "all time" (entries are oldest-first).
const filterInsightsEntries = (entries, setCode, lastN) => {
  let scoped = entries;
  if (setCode !== 'ALL') {
    scoped = scoped.filter(e => (e.setCode || 'ECL') === setCode);
  }
  if (lastN > 0) {
    scoped = scoped.slice(-lastN);
  }
  return scoped;
};

// Lazily-built, module-level cache: { [setCode]: { [cardName]: card } }
let _insightsCardIndexCache = null;
const buildInsightsCardIndex = () => {
  if (_insightsCardIndexCache) return _insightsCardIndexCache;
  const idx = {};
  Object.keys(SET_CONFIG).forEach(setCode => {
    const bySetName = {};
    SET_CONFIG[setCode].data.forEach(card => {
      bySetName[card.name] = card;
    });
    idx[setCode] = bySetName;
  });
  _insightsCardIndexCache = idx;
  return idx;
};

// Classifiers used by the residualized bucket analysis
const isCreatureCard = (card) => /\bCreature\b/.test(card.type || '');
const colorClass = (card) => {
  const c = card.color || '';
  if (c === '') return 'Colorless';
  if (c.length === 1) return c;
  return 'Multicolor';
};

// Percentile rank (0..1) of value within values — used for the hype/sleeper axis.
const _percentileRank = (values, value) => {
  let countBelow = 0;
  values.forEach(v => { if (v < value) countBelow++; });
  return values.length > 1 ? countBelow / (values.length - 1) : 0.5;
};

// Mean/SD helpers for residual buckets
const _mean = (arr) => arr.reduce((a, b) => a + b, 0) / arr.length;
const _sd = (arr, m) => Math.sqrt(arr.reduce((a, b) => a + (b - m) ** 2, 0) / arr.length);

// Actual-grade band for calibration & residualization: low <=D+, high >=B+, mid otherwise.
const _actualGradeBand = (actualIdx) => {
  if (actualIdx <= 3) return 'low';
  if (actualIdx >= 9) return 'high';
  return 'mid';
};

// Build a { label, direction, magnitude, n, confidence } finding from a bucket of residuals,
// or null if the bucket doesn't clear the confidence bar.
const _residualFinding = (label, residuals) => {
  const n = residuals.length;
  if (n < 5) return null;
  const m = _mean(residuals);
  const sd = _sd(residuals, m);
  const se = sd / Math.sqrt(n);
  let confidence = null;
  if (n >= 8 && Math.abs(m) >= 2 * se && Math.abs(m) >= 0.25) confidence = 'confident';
  else if (n >= 5 && Math.abs(m) >= 0.4) confidence = 'provisional';
  if (!confidence) return null;
  return {
    label,
    direction: m > 0 ? 'overrate' : 'underrate',
    magnitude: Math.round(Math.abs(m) * 10) / 10,
    n,
    confidence
  };
};

// Shared join/residual logic for grading-mode entries: parses user/actual grades into
// indices + signedErr, computes the per-band expected error, and resolves each entry's
// card in cardIndex (cards can leave the data on refresh, so old history may reference
// names no longer present — those are dropped from `resolvable`, not from `valid`).
// Extracted from analyzeGrading so buildGradingGrid can reuse the identical join.
const _resolveGradingEntries = (entries, cardIndex) => {
  const valid = entries
    .map(e => {
      const userIdx = gradeIdx(e.userGrade);
      const actualIdx = gradeIdx(e.actualGrade);
      if (userIdx === -1 || actualIdx === -1) return null;
      return { ...e, userIdx, actualIdx, signedErr: userIdx - actualIdx };
    })
    .filter(Boolean);

  const lowEntries = valid.filter(e => _actualGradeBand(e.actualIdx) === 'low');
  const highEntries = valid.filter(e => _actualGradeBand(e.actualIdx) === 'high');
  const lowN = lowEntries.length;
  const highN = highEntries.length;
  const lowMean = lowN ? _mean(lowEntries.map(e => e.signedErr)) : null;
  const highMean = highN ? _mean(highEntries.map(e => e.signedErr)) : null;

  // Expected signed error per actual-grade band, computed over ALL valid entries in that band
  // (this is what makes the bucket findings "quality-adjusted": an A+ can only ever be missed
  // downward, so we compare each bucket's error against the baseline error for cards of that caliber).
  const expectedErrByBand = {
    low: lowN ? lowMean : 0,
    mid: (() => {
      const midEntries = valid.filter(e => _actualGradeBand(e.actualIdx) === 'mid');
      return midEntries.length ? _mean(midEntries.map(e => e.signedErr)) : 0;
    })(),
    high: highN ? highMean : 0
  };

  const resolvable = valid
    .map(e => {
      const bySetName = cardIndex[e.setCode || 'ECL'];
      const card = bySetName ? bySetName[e.card] : null;
      if (!card) return null;
      const band = _actualGradeBand(e.actualIdx);
      const residual = e.signedErr - expectedErrByBand[band];
      return { ...e, card, band, residual };
    })
    .filter(Boolean);

  return { valid, lowN, highN, lowMean, highMean, expectedErrByBand, resolvable };
};

// Grading-mode analysis: calibration + quality-adjusted (residualized) bucket findings + hype axis.
// entries: grading-mode history, already scope-filtered by filterInsightsEntries.
const analyzeGrading = (entries, cardIndex) => {
  const { valid, lowN, highN, lowMean, highMean, resolvable } = _resolveGradingEntries(entries, cardIndex);

  if (valid.length < 5) return null;

  const n = valid.length;
  const exactPct = Math.round(100 * valid.filter(e => e.signedErr === 0).length / n);
  const within1Pct = Math.round(100 * valid.filter(e => Math.abs(e.signedErr) <= 1).length / n);
  const meanAbsErr = _mean(valid.map(e => Math.abs(e.signedErr)));
  const meanSignedErr = _mean(valid.map(e => e.signedErr));

  // Calibration: compare signed error at the low vs high end of the actual-grade scale.
  let verdict = null;
  if (lowN >= 5 && highN >= 5) {
    if (lowMean >= 0.35 && highMean <= -0.35) verdict = 'compressed';
    else if (lowMean <= -0.35 && highMean >= 0.35) verdict = 'extreme';
    else verdict = 'balanced';
  }

  const bucketFindings = [];
  let bucketsEvaluated = 0;
  const pushFinding = (label, predicate) => {
    const residuals = resolvable.filter(predicate).map(e => e.residual);
    if (residuals.length >= 8) bucketsEvaluated++;
    const finding = _residualFinding(label, residuals);
    if (finding) bucketFindings.push(finding);
  };

  pushFinding('Creatures', e => isCreatureCard(e.card));
  pushFinding('Non-creatures', e => !isCreatureCard(e.card));
  pushFinding('Commons', e => e.card.rarity === 'C');
  pushFinding('Uncommons', e => e.card.rarity === 'U');
  pushFinding('Rares', e => e.card.rarity === 'R');
  pushFinding('Mythics', e => e.card.rarity === 'M');
  pushFinding('Multicolor cards', e => colorClass(e.card) === 'Multicolor');
  pushFinding('Colorless cards', e => colorClass(e.card) === 'Colorless');

  // Hype axis: per set present in these entries, rank each card by GIH WR percentile
  // (performance) vs by "crowd love" percentile (lower ALSA = picked earlier = more loved).
  // trap = crowd loves it more than it performs; sleeper = it performs better than the crowd rates it.
  const setsPresent = Array.from(new Set(resolvable.map(e => e.setCode || 'ECL')));
  const hypeByEntry = new Map();
  setsPresent.forEach(setCode => {
    const setData = (SET_CONFIG[setCode] || {}).data;
    if (!setData) return;
    const withAlsa = setData.filter(c => c.alsa != null);
    const wrValues = withAlsa.map(c => c.gihWr);
    const crowdValues = withAlsa.map(c => -c.alsa);
    const byName = {};
    withAlsa.forEach(c => {
      const wrPct = _percentileRank(wrValues, c.gihWr);
      const crowdPct = _percentileRank(crowdValues, -c.alsa);
      byName[c.name] = { wrPct, crowdPct };
    });
    hypeByEntry.set(setCode, byName);
  });

  const isTrap = (e) => {
    const bySet = hypeByEntry.get(e.setCode || 'ECL');
    const h = bySet && bySet[e.card.name];
    if (!h) return false;
    return (h.crowdPct - h.wrPct) >= 0.25;
  };
  const isSleeper = (e) => {
    const bySet = hypeByEntry.get(e.setCode || 'ECL');
    const h = bySet && bySet[e.card.name];
    if (!h) return false;
    return (h.wrPct - h.crowdPct) >= 0.25;
  };

  pushFinding('Hype/trap cards', isTrap);
  pushFinding('Sleeper cards', isSleeper);

  return {
    n, exactPct, within1Pct, meanAbsErr, meanSignedErr,
    calibration: { verdict, lowN, lowMean, highN, highMean },
    bucketFindings, bucketsEvaluated
  };
};

// Comparison-mode analysis: overall/per-metric accuracy, difficulty curve, and head-to-head bias axes.
// entries: comparison-mode history, already scope-filtered by filterInsightsEntries.
const analyzeComparison = (entries, cardIndex) => {
  if (entries.length < 5) return null;

  const n = entries.length;
  const accuracyPct = Math.round(100 * entries.filter(e => e.isCorrect).length / n);

  const withMetric = entries.map(e => e.metric || 'gihWr');
  const hasBothMetrics = withMetric.some(m => m === 'gihWr') && withMetric.some(m => m === 'alsa');
  let perMetric = null;
  if (hasBothMetrics) {
    perMetric = {};
    ['gihWr', 'alsa'].forEach(metric => {
      const subset = entries.filter((e, i) => withMetric[i] === metric);
      if (subset.length) {
        perMetric[metric] = {
          n: subset.length,
          pct: Math.round(100 * subset.filter(e => e.isCorrect).length / subset.length)
        };
      }
    });
  }

  // Difficulty curve: gihWr-metric entries only, skip exact ties.
  const gihEntries = entries.filter((e, i) => withMetric[i] === 'gihWr' && e.card1GihWr !== e.card2GihWr);
  const bandFor = (gap) => {
    if (gap < 1) return '<1';
    if (gap < 2) return '1–2';
    if (gap < 4) return '2–4';
    return '>4';
  };
  const bandOrder = ['<1', '1–2', '2–4', '>4'];
  const bandBuckets = {};
  bandOrder.forEach(b => { bandBuckets[b] = []; });
  gihEntries.forEach(e => {
    const gap = Math.abs(e.card1GihWr - e.card2GihWr);
    bandBuckets[bandFor(gap)].push(e);
  });
  const difficultyCurve = bandOrder.map(band => {
    const bucket = bandBuckets[band];
    return {
      band,
      n: bucket.length,
      accuracyPct: bucket.length ? Math.round(100 * bucket.filter(e => e.isCorrect).length / bucket.length) : null
    };
  });

  // Head-to-head bias axes (gihWr-metric entries only; ties on the axis are skipped).
  // Every evaluated axis is reported (n>0); `significant` gates the "confident" wording,
  // requiring n>=10 AND |bias| at least 2 standard errors from zero.
  const axisStats = (label, straddlingPairs, isPositivePicked) => {
    const n = straddlingPairs.length;
    if (n === 0) return null;
    const pickRate = straddlingPairs.filter(isPositivePicked).length / n;
    const betterRate = straddlingPairs.filter(e => e._positiveBetter).length / n;
    const bias = pickRate - betterRate;
    const significant = n >= 10 && Math.abs(bias) >= 2 * Math.sqrt(0.25 / n);
    return {
      label,
      n,
      pickRatePct: Math.round(pickRate * 100),
      betterRatePct: Math.round(betterRate * 100),
      biasPct: Math.round(bias * 100),
      significant
    };
  };

  // Creature axis: exactly one of the two cards is a creature.
  const creaturePairs = [];
  gihEntries.forEach(e => {
    const bySet = cardIndex[e.setCode || 'ECL'] || {};
    const c1 = bySet[e.card1];
    const c2 = bySet[e.card2];
    if (!c1 || !c2) return;
    const c1IsCreature = isCreatureCard(c1);
    const c2IsCreature = isCreatureCard(c2);
    if (c1IsCreature === c2IsCreature) return; // need exactly one creature
    if (e.card1GihWr === e.card2GihWr) return; // skip ties for "better" determination
    const positiveIsCard1 = c1IsCreature;
    const positiveGihWr = positiveIsCard1 ? e.card1GihWr : e.card2GihWr;
    const otherGihWr = positiveIsCard1 ? e.card2GihWr : e.card1GihWr;
    creaturePairs.push({
      _positivePicked: e.selectedCard === (positiveIsCard1 ? e.card1 : e.card2),
      _positiveBetter: positiveGihWr > otherGihWr
    });
  });
  const creatureAxis = axisStats('creatures over non-creatures', creaturePairs, e => e._positivePicked);

  // Rarity axis: C=0,U=1,R=2,M=3; pairs with different ranks; positive = higher rarity.
  const rarityRank = { C: 0, U: 1, R: 2, M: 3 };
  const rarityPairs = [];
  gihEntries.forEach(e => {
    const bySet = cardIndex[e.setCode || 'ECL'] || {};
    const c1 = bySet[e.card1];
    const c2 = bySet[e.card2];
    if (!c1 || !c2) return;
    const r1 = rarityRank[c1.rarity];
    const r2 = rarityRank[c2.rarity];
    if (r1 === undefined || r2 === undefined || r1 === r2) return;
    if (e.card1GihWr === e.card2GihWr) return;
    const positiveIsCard1 = r1 > r2;
    const positiveGihWr = positiveIsCard1 ? e.card1GihWr : e.card2GihWr;
    const otherGihWr = positiveIsCard1 ? e.card2GihWr : e.card1GihWr;
    rarityPairs.push({
      _positivePicked: e.selectedCard === (positiveIsCard1 ? e.card1 : e.card2),
      _positiveBetter: positiveGihWr > otherGihWr
    });
  });
  const rarityAxis = axisStats('higher-rarity cards', rarityPairs, e => e._positivePicked);

  // Crowd axis: both alsa present and differ by >=1.0; positive = lower ALSA (crowd favorite).
  const crowdPairs = [];
  gihEntries.forEach(e => {
    if (e.card1Alsa == null || e.card2Alsa == null) return;
    if (Math.abs(e.card1Alsa - e.card2Alsa) < 1.0) return;
    if (e.card1GihWr === e.card2GihWr) return;
    const positiveIsCard1 = e.card1Alsa < e.card2Alsa;
    const positiveGihWr = positiveIsCard1 ? e.card1GihWr : e.card2GihWr;
    const otherGihWr = positiveIsCard1 ? e.card2GihWr : e.card1GihWr;
    crowdPairs.push({
      _positivePicked: e.selectedCard === (positiveIsCard1 ? e.card1 : e.card2),
      _positiveBetter: positiveGihWr > otherGihWr
    });
  });
  const crowdAxis = axisStats('crowd favorites (earlier average pick)', crowdPairs, e => e._positivePicked);

  const axes = [creatureAxis, rarityAxis, crowdAxis].filter(Boolean);

  return {
    n, accuracyPct, perMetric,
    difficultyCurve,
    axes
  };
};

// ============================================
// BIAS MAP: color x type/rarity heatmap grid, shared by grading and comparison sources.
// ============================================

const BIAS_GRID_ROWS = ['W', 'U', 'B', 'R', 'G', 'Multicolor', 'Colorless', 'All'];
const BIAS_GRID_COLS = ['All', 'Creature', 'Non-creature', 'C', 'U', 'R', 'M'];

// Does `card` belong in grid row `row`? 'All' matches every card.
const _gridRowMatch = (row, card) => row === 'All' || colorClass(card) === row;

// Does `card` belong in grid column `col`? 'All' matches every card; Creature/Non-creature
// use isCreatureCard; the remaining columns are rarity codes matched against card.rarity.
const _gridColMatch = (col, card) => {
  if (col === 'All') return true;
  if (col === 'Creature') return isCreatureCard(card);
  if (col === 'Non-creature') return !isCreatureCard(card);
  return card.rarity === col;
};

// Aggregate a list of {card, value} appearances into the {rows, cols, cells} grid shape
// used by both buildGradingGrid and buildComparisonGrid.
const _buildGrid = (appearances) => {
  const cells = {};
  BIAS_GRID_ROWS.forEach(row => {
    cells[row] = {};
    const inRow = appearances.filter(a => _gridRowMatch(row, a.card));
    BIAS_GRID_COLS.forEach(col => {
      const values = inRow.filter(a => _gridColMatch(col, a.card)).map(a => a.value);
      const n = values.length;
      const mean = n ? _mean(values) : null;
      const se = n ? _sd(values, mean) / Math.sqrt(n) : null;
      cells[row][col] = { n, mean, se };
    });
  });
  return { rows: BIAS_GRID_ROWS, cols: BIAS_GRID_COLS, cells };
};

// Grading-source bias grid: value per resolvable entry is either the quality-adjusted
// residual or the raw signedErr, depending on `adjusted`.
// entries: grading-mode history, already scope-filtered by filterInsightsEntries.
const buildGradingGrid = (entries, cardIndex, adjusted) => {
  const { resolvable } = _resolveGradingEntries(entries, cardIndex);
  const appearances = resolvable.map(e => ({ card: e.card, value: adjusted ? e.residual : e.signedErr }));
  return _buildGrid(appearances);
};

// Comparison-source (head-to-head) bias grid: each entry yields up to two card
// appearances (one per card in the pair), valued +1/-1/0 by pick-vs-quality outcome.
// entries: comparison-mode history, already scope-filtered by filterInsightsEntries.
const buildComparisonGrid = (entries, cardIndex) => {
  const appearances = [];
  entries.forEach(e => {
    if ((e.metric || 'gihWr') !== 'gihWr') return;
    if (e.card1GihWr === e.card2GihWr) return; // skip ties
    const bySet = cardIndex[e.setCode || 'ECL'] || {};
    const better = e.card1GihWr > e.card2GihWr ? e.card1 : e.card2;
    [
      { name: e.card1, gihWr: e.card1GihWr },
      { name: e.card2, gihWr: e.card2GihWr }
    ].forEach(({ name }) => {
      const card = bySet[name];
      if (!card) return; // skip unresolvable appearances individually
      const picked = name === e.selectedCard;
      const isBetter = name === better;
      let value = 0;
      if (picked && !isBetter) value = 1;   // over-picked (chosen though worse)
      else if (!picked && isBetter) value = -1; // under-picked (passed though better)
      appearances.push({ card, value });
    });
  });
  return _buildGrid(appearances);
};

// Combined bias grid: sample-size-weighted blend of the quality-adjusted grading grid and
// the head-to-head grid, on a common -1..1 scale (grading capped at 1.0 grade, head-to-head
// at 0.5 net appearance rate). A source only participates in a cell when its own n >= 5.
const buildCombinedGrid = (gridGradingAdj, gridComparison) => {
  const cells = {};
  BIAS_GRID_ROWS.forEach(row => {
    cells[row] = {};
    BIAS_GRID_COLS.forEach(col => {
      const g = gridGradingAdj.cells[row][col];
      const h = gridComparison.cells[row][col];
      const parts = [];
      if (g.n >= 5) parts.push({ n: g.n, s: Math.max(-1, Math.min(1, g.mean / 1.0)), significant: Math.abs(g.mean) >= 2 * g.se });
      if (h.n >= 5) parts.push({ n: h.n, s: Math.max(-1, Math.min(1, h.mean / 0.5)), significant: Math.abs(h.mean) >= 2 * h.se });
      const n = parts.reduce((a, p) => a + p.n, 0);
      const s = n > 0 ? parts.reduce((a, p) => a + p.n * p.s, 0) / n : null;
      const significant = parts.some(p => p.significant);
      const anySmall = n === 0 && (g.n > 0 || h.n > 0);
      cells[row][col] = { n, s, significant, g, h, anySmall };
    });
  });
  return { rows: BIAS_GRID_ROWS, cols: BIAS_GRID_COLS, cells };
};

// Scryfall set codes to search for each quiz set (priority order)
const SCRYFALL_SET_CODES = {
  MSH: ['msh', 'spg'],
  ECL: ['ecl', 'spg'],
  TMT: ['tmt', 'spg'],
  FDN: ['fdn', 'spg'],
  BLB: ['blb', 'spg'],
  TLA: ['tla', 'tle', 'spg'],
  OM1: ['om1', 'spg'],
  EOE: ['eoe', 'spg'],
  TDM: ['ddt', 'spg'],
  FIN: ['fin', 'fca', 'spg'],
  // Secrets of Strixhaven: try each printing variant in order
  SOS: ['sos', 'soa', 'spg']
  // CUBE excluded: cards span all sets, uses exact-name + oldest-print strategy (see below)
};

// Rate limiting state for Scryfall API
let scryfallRateLimitReset = 0;
let lastScryfallRequestTime = 0;
const MIN_REQUEST_DELAY = 20; // Minimum 20ms between Scryfall requests (reduced for faster loading)
const hitRateLimit = () => { scryfallRateLimitReset = Date.now() + 5000; return null; };
const ORACLE_CACHE_KEY = 'gih_quiz_oracle_cache_v1';

// fetch() has no "timeout" option — abort hung requests explicitly so a stalled
// Scryfall call can't block card loading forever. Falls back to a plain fetch
// in browsers without AbortSignal.timeout.
const FETCH_TIMEOUT_MS = 8000;
const fetchWithTimeout = (url) => fetch(url,
  (typeof AbortSignal !== 'undefined' && AbortSignal.timeout)
    ? { signal: AbortSignal.timeout(FETCH_TIMEOUT_MS) }
    : {});

// Load oracle text cache from localStorage
const getOracleCache = () => {
  try {
    const cached = safeStorage.getItem(ORACLE_CACHE_KEY);
    return cached ? JSON.parse(cached) : {};
  } catch (e) {
    return {};
  }
};

const saveOracleCache = (cache) => {
  try {
    safeStorage.setItem(ORACLE_CACHE_KEY, JSON.stringify(cache));
  } catch (e) {
    console.warn('Could not save oracle cache:', e);
  }
};

// Scryfall CDN image URL for a card carrying an embedded image id — bypasses
// api.scryfall.com entirely (cards.scryfall.io is not rate-limited).
const cdnImageUrl = (card) => {
  if (!card || !card.img) return null;
  const id = card.img;
  return `https://cards.scryfall.io/normal/front/${id[0]}/${id[1]}/${id}.jpg`;
};

// Warm the browser image cache for a staged (not-yet-shown) question's cards.
// Only CDN-eligible cards (has img, SPM art toggle not overriding) are
// preloaded — this never calls api.scryfall.com.
const preloadQuestionImages = (result, spmActive) => {
  if (!result) return;
  const cards = result.mode === 'grading'
    ? (result.card ? [result.card] : [])
    : (result.pair || []);
  cards.forEach(c => {
    if (c && c.img && !spmActive) {
      new Image().src = cdnImageUrl(c);
    }
  });
};

const fetchCardData = async (cardName, setCode, cardSet) => {
  // cardSet is the individual printing code (e.g., 'SOS', 'SPA', 'SPG' for Secrets of Strixhaven variants)
  // If not provided, use setCode (for backwards compatibility with other sets)
  const printingCode = cardSet || setCode;
  const cacheKey = `${printingCode || 'ECL'}:${cardName}`;
  if (scryfallImageCache[cacheKey]) {
    return scryfallImageCache[cacheKey];
  }
  // Also check old cache key format for backwards compat
  if (scryfallImageCache[cardName]) {
    return scryfallImageCache[cardName];
  }

  // Wait if rate limited or if too little time has passed
  const now = Date.now();
  if (scryfallRateLimitReset > now) {
    const waitTime = scryfallRateLimitReset - now;
    await new Promise(resolve => setTimeout(resolve, Math.min(waitTime, 500)));
  } else {
    // Enforce minimum delay between requests
    const timeSinceLastRequest = now - lastScryfallRequestTime;
    if (timeSinceLastRequest < MIN_REQUEST_DELAY) {
      await new Promise(resolve => setTimeout(resolve, MIN_REQUEST_DELAY - timeSinceLastRequest));
    }
  }
  lastScryfallRequestTime = Date.now();

  const getCardData = (data) => {
    if (!data) return null;
    let imageUrl = null;
    // Handle double-faced cards
    if (data.card_faces && data.card_faces[0]?.image_uris?.normal) {
      imageUrl = data.card_faces[0].image_uris.normal;
    } else if (data.image_uris?.normal) {
      imageUrl = data.image_uris.normal;
    }

    const oracleText = data.oracle_text || data.card_faces?.[0]?.oracle_text || '';
    const manaValue = data.mana_value || 0;
    const typeLine = data.type_line || '';
    const power = data.power || null;
    const toughness = data.toughness || null;

    // Return card data even without imageUrl - allows fallback rendering
    return { imageUrl, oracleText, manaValue, typeLine, power, toughness, name: data.name, collectorNumber: data.collector_number || null, oracleId: data.oracle_id || null };
  };

  const scryfallSets = SCRYFALL_SET_CODES[printingCode || 'ECL'];

  try {
    // Try set-specific search only if we have confirmed set codes
    if (scryfallSets) {
      for (const scryfallSet of scryfallSets) {
        try {
          let response = await fetchWithTimeout(`https://api.scryfall.com/cards/search?q=${encodeURIComponent(cardName)} set:${scryfallSet}`);

          // Handle rate limiting
          if (response.status === 429) {
            hitRateLimit();
            continue;
          }

          if (response.ok) {
            const data = await response.json();
            if (data.data && data.data.length > 0) {
              const cardData = getCardData(data.data[0]);
              if (cardData) {
                scryfallImageCache[cacheKey] = cardData;
                return cardData;
              }
            }
          }
        } catch (e) {
          // Set-specific search failed, continue to fuzzy search
          continue;
        }
      }
    }

    // CUBE: exact name first (no set filter), then oldest print fallback
    if (setCode === 'CUBE') {
      try {
        let exactResponse = await fetchWithTimeout(`https://api.scryfall.com/cards/named?exact=${encodeURIComponent(cardName)}`);
        if (exactResponse.status === 429) return hitRateLimit();
        if (exactResponse.ok) {
          const data = await exactResponse.json();
          const cardData = getCardData(data);
          if (cardData) { scryfallImageCache[cacheKey] = cardData; return cardData; }
        }
        const exactQuery = `!"${cardName}"`;
        let oldestResponse = await fetchWithTimeout(`https://api.scryfall.com/cards/search?q=${encodeURIComponent(exactQuery)}&order=released&dir=asc`);
        if (oldestResponse.status === 429) return hitRateLimit();
        if (oldestResponse.ok) {
          const data = await oldestResponse.json();
          if (data.data && data.data.length > 0) {
            const cardData = getCardData(data.data[0]);
            if (cardData) { scryfallImageCache[cacheKey] = cardData; return cardData; }
          }
        }
      } catch (e) { /* fall through */ }
      return null;
    }

    // OM1 fallback: if set-filtered fuzzy search above missed, try exact name match per set code
    if (setCode === 'OM1') {
      const scryfallSetsForExact = SCRYFALL_SET_CODES[setCode];
      try {
        for (const scryfallSet of scryfallSetsForExact) {
          let exactResponse = await fetchWithTimeout(`https://api.scryfall.com/cards/named?exact=${encodeURIComponent(cardName)}&set=${scryfallSet}`);
          if (exactResponse.status === 429) return hitRateLimit();
          if (exactResponse.ok) {
            const data = await exactResponse.json();
            const cardData = getCardData(data);
            if (cardData) { scryfallImageCache[cacheKey] = cardData; return cardData; }
          }
        }
        const exactQuery = `!"${cardName}" (${scryfallSetsForExact.map(s => `set:${s}`).join(' OR ')})`;
        let oldestResponse = await fetchWithTimeout(`https://api.scryfall.com/cards/search?q=${encodeURIComponent(exactQuery)}&order=released&dir=asc`);
        if (oldestResponse.status === 429) return hitRateLimit();
        if (oldestResponse.ok) {
          const data = await oldestResponse.json();
          if (data.data && data.data.length > 0) {
            const cardData = getCardData(data.data[0]);
            if (cardData) { scryfallImageCache[cacheKey] = cardData; return cardData; }
          }
        }
      } catch (e) { /* fall through */ }
      return null;
    }

    // Fallback: fuzzy search (any version) - works for all sets
    let response = await fetchWithTimeout(`https://api.scryfall.com/cards/named?fuzzy=${encodeURIComponent(cardName)}`);

    if (response.status === 429) {
      return hitRateLimit();
    }

    if (response.ok) {
      const data = await response.json();
      const cardData = getCardData(data);
      if (cardData) {
        scryfallImageCache[cacheKey] = cardData;

        // Cache oracle text in localStorage for future use
        const oracleCache = getOracleCache();
        oracleCache[cardName] = {
          oracleText: cardData.oracleText,
          typeLine: cardData.typeLine,
          manaValue: cardData.manaValue,
          power: cardData.power,
          toughness: cardData.toughness,
          name: cardData.name
        };
        saveOracleCache(oracleCache);

        return cardData;
      }
    }

    // Check if we have oracle text cached from previous fetches
    const oracleCache = getOracleCache();
    if (oracleCache[cardName]) {
      const cached = oracleCache[cardName];
      scryfallImageCache[cacheKey] = cached;
      return cached;
    }

    return null;
  } catch (error) {
    console.error(`Error fetching card data for ${cardName}:`, error);

    // Try to return cached oracle text even if fetch failed
    const oracleCache = getOracleCache();
    if (oracleCache[cardName]) {
      return oracleCache[cardName];
    }

    return null;
  }
};

const CardDisplay = ({ card, cardNumber, onSelect, disabled, showResult, isCorrect, isWinner, metric = 'gihWr', setCode = 'ECL', preferSPM = false }) => {
  const [imageUrl, setImageUrl] = React.useState(null);
  const [cardInfo, setCardInfo] = React.useState(null);
  const [imageLoading, setImageLoading] = React.useState(true);
  const [imageError, setImageError] = React.useState(false);

  // Legacy Scryfall API lookup: oracle text + image via api.scryfall.com. Used
  // for cards without an embedded img id, for the OM1/SPM art toggle (needs a
  // live oracle-id search to find the SPM printing), and as the one-time
  // retry when a fast-path CDN image fails to load.
  const loadLegacyCardData = React.useCallback(async () => {
    const cardData = await fetchCardData(card.name, setCode, card.set);
    if (cardData) {
      setCardInfo(cardData);

      // For OM1 with SPM art preference: try fetching SPM version by oracle ID
      if (preferSPM && cardData.oracleId) {
        try {
          const spmRes = await fetchWithTimeout(`https://api.scryfall.com/cards/search?q=set:spm oracleid:${cardData.oracleId}`);
          if (spmRes.ok) {
            const spmSearchData = await spmRes.json();
            if (spmSearchData.data && spmSearchData.data.length > 0) {
              const spmData = spmSearchData.data[0];
              const spmUrl = spmData.card_faces?.[0]?.image_uris?.normal || spmData.image_uris?.normal || null;
              if (spmUrl) {
                setImageUrl(spmUrl);
                setImageError(false);
                setImageLoading(false);
                return;
              }
            }
          }
        } catch (e) { /* fall back to OM1 art */ }
      }

      setImageUrl(cardData.imageUrl);
      setImageError(false);
    } else {
      setImageError(true);
    }
    setImageLoading(false);
  }, [card.name, card.set, setCode, preferSPM]);

  React.useEffect(() => {
    // Clear image immediately on card change (before new image loads)
    setImageUrl(null);
    setCardInfo(null);
    setImageLoading(true);
    setImageError(false);

    // Fast path: render directly from the embedded Scryfall CDN image id —
    // zero api.scryfall.com round-trips. Skipped when the SPM art toggle is
    // active, since that needs a live oracle-id lookup for the SPM printing.
    if (card.img && !preferSPM) {
      setImageUrl(cdnImageUrl(card));
      setImageLoading(false);
      return;
    }

    loadLegacyCardData();
  }, [card.name, card.img, setCode, preferSPM, loadLegacyCardData]);

  // Fast-path CDN image failed to load: retry once through the legacy API
  // path, then fall through to the existing oracle-text fallback display.
  const handleImageError = () => {
    if (cardInfo) {
      // Already came from (or attempted) the legacy path — nothing more to try.
      setImageError(true);
      return;
    }
    setImageUrl(null);
    loadLegacyCardData();
  };

  const containerClass = [
    'card-image-container',
    disabled ? 'disabled' : '',
    showResult && isWinner ? 'winner' : '',
    showResult && !isWinner ? 'loser' : ''
  ].filter(Boolean).join(' ');

  // Link to Scryfall card search (searches by exact name)
  const cardUrl = `https://scryfall.com/search?q="${encodeURIComponent(card.name)}"&unique=cards`;

  return (
    <div className="card-panel">
      <div
        className={containerClass}
        onClick={() => !disabled && onSelect(cardNumber)}
      >
        {/* Show oracle text as placeholder only while image is loading or missing */}
        {cardInfo && (!imageUrl || imageError) && (
          <div className="card-oracle-fallback">
            <div className="card-fallback-content">
              <div className="card-fallback-name">{cardInfo.name}</div>
              <div className="card-fallback-mana">{`(${cardInfo.manaValue})`}</div>
              <div className="card-fallback-type">{cardInfo.typeLine}</div>
              {(cardInfo.power !== null || cardInfo.toughness !== null) && (
                <div className="card-fallback-pt">{cardInfo.power}/{cardInfo.toughness}</div>
              )}
              <div className="card-fallback-divider"></div>
              <div className="card-fallback-text">{cardInfo.oracleText}</div>
            </div>
          </div>
        )}

        {/* Image displays once loaded */}
        {imageUrl && !imageError && (
          <img
            src={imageUrl}
            alt={`${card.name}. Type: ${cardInfo?.typeLine || 'Unknown'}. ${cardInfo?.oracleText || 'No text.'}`}
            className="card-image"
            style={{position: 'absolute', top: 0, left: 0, width: '100%', height: '100%', objectFit: 'contain'}}
            onError={handleImageError}
            title={cardInfo?.oracleText ? `${card.name}\n\n${cardInfo.typeLine}\n\n${cardInfo.oracleText}` : card.name}
          />
        )}

        {/* Show error only if we have no card data AND no image (fast-path CDN
            images render without cardInfo, since that skips the API entirely) */}
        {!cardInfo && !imageUrl && <div className="card-error">Unable to load card data</div>}

        {showResult && (
          <div className="gih-percentage show">
            <div className="gih-value">
              <div>{metric === 'gihWr' ? card.gihWr.toFixed(1) + '%' : (card.alsa || 0).toFixed(2)}</div>
              {metric === 'gihWr' && (
                <div className={`grade-badge ${getGradeClass(getGrade(card.gihWr))}`}>
                  {getGrade(card.gihWr)}
                </div>
              )}
            </div>
          </div>
        )}
      </div>
      <a
        href={cardUrl}
        target="_blank"
        rel="noopener noreferrer"
        className="card-name"
        title={cardInfo?.oracleText ? `${card.name}\n\n${cardInfo.typeLine}\n\n${cardInfo.oracleText}` : card.name}
      >
        {card.name}
      </a>
    </div>
  );
};

function buildQuery(colors, rarities, types) {
  const parts = [];
  if (colors.length) parts.push('c:' + colors.join(','));
  if (rarities.length) parts.push('r:' + rarities.join(','));
  if (types.length) parts.push('t:' + types.map(t => /\s/.test(t) ? `"${t}"` : t).join(','));
  return parts.join(' ');
}

function parseQuery(text) {
  const out = { colors: [], rarities: [], types: [] };
  const re = /(c|color|r|rarity|t|type):((?:"[^"]*"|[^\s,]+)(?:,(?:"[^"]*"|[^\s,]+))*)/gi;
  let m;
  while ((m = re.exec(text)) !== null) {
    const key = m[1][0].toLowerCase();
    const values = m[2].split(',').map(v => v.replace(/^"|"$/g, '').trim()).filter(Boolean);
    if (key === 'c') {
      // Normalize: split joined letters (c:wu -> W, U), uppercase, accept aliases
      for (const v of values) {
        const lower = v.toLowerCase();
        if (lower === 'multicolor' || lower === 'multi') out.colors.push('multicolor');
        else if (lower === 'colorless') out.colors.push('colorless');
        else for (const ch of lower) if ('wubrg'.includes(ch)) out.colors.push(ch.toUpperCase());
      }
    } else if (key === 'r') {
      for (const v of values) {
        const upper = v.toUpperCase();
        if (upper.length === 1 && 'MRUC'.includes(upper)) out.rarities.push(upper);
      }
    } else if (key === 't') {
      // Title-case so it matches data: "creature" or "CREATURE" -> "Creature"
      out.types.push(...values.map(v => v.toLowerCase().replace(/\b\w/g, c => c.toUpperCase())));
    }
  }
  return out;
}

function MultiSelectFilter({ label, plural, options, selected, isOpen, onToggleOpen, onToggleValue, onClear }) {
  const buttonLabel = selected.length === 0
    ? `All ${plural || label + 's'}`
    : selected.length === 1
      ? (options.find(o => o.value === selected[0])?.label || selected[0])
      : `${selected.length} selected`;

  const buttonStyle = {
    padding: '10px 12px',
    background: selected.length > 0 ? 'rgba(74, 158, 255, 0.4)' : 'rgba(74, 158, 255, 0.25)',
    border: '1px solid rgba(74, 158, 255, 0.5)',
    borderRadius: '6px',
    color: '#fff',
    fontSize: '13px',
    cursor: 'pointer',
    minWidth: '140px',
    textAlign: 'left',
    transition: 'all 0.2s'
  };

  return (
    <div className="filter-group" style={{position: 'relative'}}>
      <label className="filter-label">{label}</label>
      <div style={{display: 'flex', gap: '4px', alignItems: 'center'}}>
        <button onClick={onToggleOpen} style={buttonStyle}
          onMouseEnter={e => { e.currentTarget.style.borderColor = '#4a9eff'; }}
          onMouseLeave={e => { e.currentTarget.style.borderColor = 'rgba(74, 158, 255, 0.5)'; }}>
          {buttonLabel} <span style={{float: 'right', opacity: 0.7}}>▾</span>
        </button>
        {selected.length > 0 && (
          <button onClick={onClear}
            style={{background: 'none', border: 'none', color: '#888', cursor: 'pointer', fontSize: '14px', padding: '2px 4px'}}>
            ✕
          </button>
        )}
      </div>
      {isOpen && (
        <div style={{
          position: 'absolute', top: '100%', left: 0, zIndex: 100, marginTop: '4px',
          background: '#0a0e27', border: '1px solid rgba(74, 158, 255, 0.5)', borderRadius: '6px',
          padding: '4px 0', minWidth: '160px', maxHeight: '260px', overflowY: 'auto',
          boxShadow: '0 4px 12px rgba(0,0,0,0.4)'
        }}>
          {options.map(opt => {
            const isSel = selected.includes(opt.value);
            return (
              <label key={opt.value} style={{
                display: 'flex', alignItems: 'center', gap: '8px',
                padding: '6px 12px', cursor: 'pointer', fontSize: '13px',
                background: isSel ? 'rgba(74, 158, 255, 0.25)' : 'transparent'
              }}
                onMouseEnter={e => e.currentTarget.style.background = isSel ? 'rgba(74, 158, 255, 0.35)' : 'rgba(74, 158, 255, 0.1)'}
                onMouseLeave={e => e.currentTarget.style.background = isSel ? 'rgba(74, 158, 255, 0.25)' : 'transparent'}
              >
                <input type="checkbox" checked={isSel} onChange={() => onToggleValue(opt.value)} style={{accentColor: '#4a9eff'}} />
                {opt.label}
              </label>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ============================================
// InsightsPanel: retrospective analysis UI over the Insights engine functions above.
