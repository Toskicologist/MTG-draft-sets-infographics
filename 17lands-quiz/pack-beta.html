      overflow: hidden;
      margin: -5px -5px 16px -5px;

    .banner-content {
      position: relative;
      z-index: 2;
    }

    h1 {

      margin-bottom: 4px;
      color: #fff;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.4);
      background: linear-gradient(135deg, #ffe9a8 0%, #ffffff 60%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .version-badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.04em;
      background: rgba(255, 215, 120, 0.18);
      color: #ffe9a8;
      border: 1px solid rgba(255, 215, 120, 0.4);
      border-radius: 999px;
      padding: 2px 10px;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #cfd6ea;
      font-size: 13px;
      margin-bottom: 10px;
    }

    .controls-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .pill-group {
      display: inline-flex;
      gap: 4px;
      background: rgba(255,255,255,0.06);
      border-radius: 999px;
      padding: 3px;
    }

    .pill {
      border: none;
      cursor: pointer;
      background: transparent;
      color: #cfd6ea;
      font-size: 12px;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 999px;
      transition: background 0.15s, color 0.15s;
    }

    .pill:hover { color: #fff; }

    .pill.active {
      background: #3b82f6;
      color: #fff;
    }

    .nav-link {
      font-size: 12px;
      text-decoration: underline;
      color: #cfd6ea;
    }

    .caveat {
      font-size: 11.5px;
      color: #9aa3bd;
      max-width: 560px;
      margin: 0 auto;
      line-height: 1.4;
    }

    .stats-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      margin-bottom: 14px;
    }

    .stat-chip {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 12px;
      color: #dfe4f5;
    }

    .reveal-banner {
      text-align: center;
      background: rgba(59, 130, 246, 0.12);
      border: 1px solid rgba(59, 130, 246, 0.35);
      border-radius: 10px;
      padding: 12px;
      margin: 0 0 16px 0;
    }

    .percentile-headline {
      font-size: 26px;
      font-weight: 800;
      color: #ffe9a8;
    }

    .left-on-table {
      font-size: 13px;
      color: #dfe4f5;
      margin-top: 4px;
    }

    .run-progress-line {
      font-size: 11.5px;
      color: #9aa3bd;
      margin-top: 6px;
    }

    .pack-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-bottom: 90px;
    }

    @media (min-width: 700px) {
      .pack-grid { grid-template-columns: repeat(4, 1fr); }
    }

    @media (min-width: 1100px) {
      .pack-grid { grid-template-columns: repeat(7, 1fr); }
    }

    .pack-card {
      cursor: pointer;
      text-align: center;
      user-select: none;
      transition: transform 0.12s ease;
    }

    .pack-card.selected .card-image-wrap {
      outline: 3px solid #3b82f6;
      transform: translateY(-4px);
      box-shadow: 0 8px 18px rgba(59, 130, 246, 0.45);
    }

    .pack-card.best .card-image-wrap {
      outline: 3px solid #ffd766;
      box-shadow: 0 0 16px rgba(255, 215, 102, 0.55);
    }

    .pack-card.pick .card-image-wrap {
      outline: 3px solid #3b82f6;
    }

      position: relative;
      aspect-ratio: 5 / 7;
      border-radius: 4.5%;
      overflow: hidden;
      background: #14172c;
      transition: outline 0.12s ease, box-shadow 0.12s ease, transform 0.12s ease;
    }

    .card-image {
      width: 100%;
      height: 100%;
      max-width: 100%;
      object-fit: cover;
      display: block;
      border-radius: 4.5%;
    }

    .card-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 8px;
      background: #1b1f3a;
      text-align: center;
    }

      width: 22px;
      height: 22px;
      border-radius: 50%;
      display: inline-block;
      border: 1px solid rgba(255,255,255,0.4);
    }

    .placeholder-name {
      font-size: 11px;
      color: #dfe4f5;
      line-height: 1.3;
    }

    .card-key-badge {
      position: absolute;
      top: 4px;
      left: 4px;
      z-index: 3;
      background: rgba(10, 14, 39, 0.85);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255,255,255,0.3);
    }

    .card-overlay-chip {
      position: absolute;
      bottom: 4px;
      left: 4px;
      right: 4px;
      z-index: 3;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 4px;
      background: rgba(10, 14, 39, 0.85);
      border-radius: 6px;
      padding: 2px 5px;

      font-weight: 800;
      color: #0a0e27;
      border-radius: 4px;
      padding: 1px 5px;
    }

    .metric-value {
      font-size: 10px;
      color: #fff;
      font-weight: 600;
    }

      position: absolute;
      top: 4px;
      right: -28px;
      z-index: 4;
      transform: rotate(35deg);
      font-size: 8.5px;
      font-weight: 800;
      letter-spacing: 0.03em;
      padding: 2px 30px;
      text-align: center;
      color: #0a0e27;
    }

    .ribbon-best {
      background: #ffd766;
    }

    .ribbon-pick {
      background: #6fb1ff;
      top: 22px;
    }

      font-size: 10.5px;
      color: #cfd6ea;
      line-height: 1.25;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 10;
      display: flex;
      justify-content: center;
      padding: 12px;
      background: linear-gradient(0deg, #0a0e27 60%, rgba(10,14,39,0));

      cursor: pointer;
      font-size: 15px;
      font-weight: 700;
      padding: 12px 28px;
      border-radius: 999px;
      background: #3b82f6;
      color: #fff;
      box-shadow: 0 4px 14px rgba(59, 130, 246, 0.5);

      color: #7c85a8;
      cursor: not-allowed;
      box-shadow: none;
    }

    .next-btn {
      background: #ffd766;
      color: #0a0e27;
      box-shadow: 0 4px 14px rgba(255, 215, 102, 0.4);

      font-size: 11px;
      color: #9aa3bd;
      line-height: 1.6;

      background: rgba(255,255,255,0.05);

      font-weight: 800;

      color: #9aa3bd;
      margin-bottom: 18px;
    }

      font-size: 13.5px;
      color: #dfe4f5;
      margin-bottom: 10px;
      line-height: 1.4;
    }

// ============================================
// GRADE ALGORITHM (copied verbatim from the 17Lands card quiz — do not
// reinvent; the two quizzes must always agree on what an "A-" means)
// ============================================
const GRADE_LABELS = ["F","D-","D","D+","C-","C","C+","B-","B","B+","A-","A","A+"];
const GRADE_OFFSET = 2 - 1/6;  // 11/6
const computeGradeStats = (cardData) => {
  const gihValues = cardData.map(c => c.gihWr);
  const mean = gihValues.reduce((a, b) => a + b, 0) / gihValues.length;
  const sd = Math.sqrt(gihValues.reduce((a, b) => a + (b - mean) ** 2, 0) / gihValues.length);
  return { mean, sd };
};
const getGrade = (gihWr, stats) => {
  const z = (gihWr - stats.mean) / stats.sd;
  const index = Math.floor(3 * (z + GRADE_OFFSET));
  if (index < 0) return 'F';
  if (index >= GRADE_LABELS.length) return 'A+';
  return GRADE_LABELS[index];
};

// Tasteful, distinguishable shades per grade band on the dark background.
const GRADE_COLORS = {
  'A+': '#0f9d58', 'A': '#22b263', 'A-': '#4fc47f',
  'B+': '#1f6fa8', 'B': '#3b82f6', 'B-': '#6fa8dc',
  'C+': '#b59a2e', 'C': '#9a9a6e', 'C-': '#7c7c7c',
  'D+': '#c1793f', 'D': '#c0392b', 'D-': '#96281b',
  'F': '#7a1f1f'
};

// ============================================
// CDN IMAGE HELPER (copied verbatim) — never call Scryfall's rate-limited
// JSON card API; the image CDN below has no such limit.
// ============================================
const cdnImageUrl = (card) => {
  if (!card || !card.img) return null;
  const id = card.img;
  return `https://cards.scryfall.io/normal/front/${id[0]}/${id[1]}/${id}.jpg`;
};

const COLOR_HEX = { W: '#f8f6d8', U: '#0e68ab', B: '#4a4a4a', R: '#d3202a', G: '#00733e' };
const colorChipColor = (color) => {
  if (!color) return '#8a8a8a';
  if (color.length > 1) return 'linear-gradient(135deg, #d4af37, #f5d67d)';
  return COLOR_HEX[color] || '#8a8a8a';
};

// ============================================
// SEEDED RNG (mulberry32, copied verbatim) — packs are reproducible from
// their stored seed.
// ============================================
const mulberry32 = (seed) => () => {
  seed |= 0; seed = (seed + 0x6D2B79F5) | 0;
  let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
  t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
  return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
};

// ============================================
// PACK GENERATOR — 14-card Arena-style Play Booster approximation.
// Constants (mythic 1/7, uExtra 40%, rmExtra 10%, 40 rejection-sample
// attempts) are v1 tuning knobs, not measured Arena probabilities.
// ============================================
const pickRandomExcluding = (pool, usedNames, rng) => {
  const avail = pool.filter(c => !usedNames.has(c.name));
  if (avail.length === 0) return null;
  const idx = Math.floor(rng() * avail.length);
  return avail[idx];
};

const MONO_COLORS = ['W', 'U', 'B', 'R', 'G'];

// Rejection-sample a batch of `count` commons up to 40 attempts until WotC's
// "usually >=4 of 5 colors, no color > 4 times" guarantee is met on the
// mono-colored subset (multicolor/colorless commons don't count either way).
// If the pool is too small/skewed to ever satisfy it, keep the best attempt
// seen (most distinct mono colors) so the pack size is never short.
const drawCommonsBatch = (pool, count, usedNames, rng) => {
  let best = null;
  let bestScore = -1;
  for (let attempt = 0; attempt < 40; attempt++) {
    const localUsed = new Set(usedNames);
    const picks = [];
    for (let i = 0; i < count; i++) {
      const card = pickRandomExcluding(pool, localUsed, rng);
      if (!card) break;
      picks.push(card);
      localUsed.add(card.name);
    }
    const colorCounts = {};
    MONO_COLORS.forEach(c => { colorCounts[c] = 0; });
    picks.forEach(c => { if (c.color && c.color.length === 1 && colorCounts.hasOwnProperty(c.color)) colorCounts[c.color] += 1; });
    const distinctColors = Object.values(colorCounts).filter(n => n > 0).length;
    const maxColorCount = Math.max(0, ...Object.values(colorCounts));
    const satisfiesGuarantee = picks.length === count && distinctColors >= 4 && maxColorCount <= 4;
    if (satisfiesGuarantee) return picks;
    if (picks.length === count && distinctColors > bestScore) {
      bestScore = distinctColors;
      best = picks;
    }
  }
  return best || [];
};

const generatePack = (cardData, seed) => {
  const rng = mulberry32(seed);
  const commons = cardData.filter(c => c.rarity === 'C' && !c.type.includes('Land'));
  const commonLands = cardData.filter(c => c.rarity === 'C' && c.type.includes('Land'));
  const uncommons = cardData.filter(c => c.rarity === 'U');
  const rares = cardData.filter(c => c.rarity === 'R');
  const mythics = cardData.filter(c => c.rarity === 'M');

  const usedNames = new Set();
  const pack = [];
  const addCard = (card) => { if (card) { pack.push(card); usedNames.add(card.name); } };

  // 1. Rare slot: mythic at 1/7, else rare (falls back to the other pool if
  // one is empty so small early-set data doesn't crash the generator).
  const drawRareSlot = () => {
    const wantMythic = rng() < (1 / 7);
    const primary = wantMythic ? mythics : rares;
    const fallback = wantMythic ? rares : mythics;
    addCard(pickRandomExcluding(primary, usedNames, rng) || pickRandomExcluding(fallback, usedNames, rng));
  };
  drawRareSlot();

  // 2. Wildcard approximation: extra uncommon 40% of the time, extra
  // rare/mythic slot 10% of the time.
  const uExtra = rng() < 0.40 ? 1 : 0;
  const rmExtra = rng() < 0.10 ? 1 : 0;
  if (rmExtra) drawRareSlot();

  // 3. 3 + uExtra uncommons.
  for (let i = 0; i < 3 + uExtra; i++) {
    addCard(pickRandomExcluding(uncommons, usedNames, rng));
  }

  // 4. Land slot: one common land, or (if the set has no common lands) one
  // extra nonland common instead.
  let landFallback = 0;
  if (commonLands.length > 0) {
    addCard(pickRandomExcluding(commonLands, usedNames, rng));
  } else {
    landFallback = 1;
  }

  // 5. 9 - uExtra - rmExtra nonland commons (+ the land fallback, if any),
  // subject to the color-balance rejection sampling above.
  const commonsNeeded = (9 - uExtra - rmExtra) + landFallback;
  const commonPicks = drawCommonsBatch(commons, commonsNeeded, usedNames, rng);
  commonPicks.forEach(addCard);

  // 8. Shuffle full display order. Real Arena packs may cluster rares —
  // this is a quiz, not a booster-opening sim, so we shuffle fully.
  for (let i = pack.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [pack[i], pack[j]] = [pack[j], pack[i]];
  }

  return pack;
};

// ============================================
// SCORING
// ============================================
const computePackResult = (pack, pickIndex, metric) => {
  const higherIsBetter = metric !== 'alsa';
  const values = pack.map(c => metric === 'alsa' ? c.alsa : c.gihWr);
  const pickVal = values[pickIndex];
  const bestVal = higherIsBetter ? Math.max(...values) : Math.min(...values);
  const bestIndex = values.findIndex(v => v === bestVal);

  let beaten = 0;
  pack.forEach((c, i) => {
    if (i === pickIndex) return;
    const v = values[i];
    if (pickVal === v) beaten += 0.5;
    else if (higherIsBetter ? pickVal > v : pickVal < v) beaten += 1;
  });

  const percentile = Math.round(100 * beaten / (pack.length - 1));
  const perfect = pickVal === bestVal;

  return {
    pick: pack[pickIndex],
    pickVal,
    bestCard: pack[bestIndex],
    bestVal,
    bestIndex,
    percentile,
    perfect
  };
};

const leftOnTableText = (result, metric, gradeStats) => {
  if (result.perfect) return 'Nothing left behind.';
  if (metric === 'alsa') {
    const diff = (result.pickVal - result.bestVal).toFixed(1);
    return `The crowd takes ${result.bestCard.name} ${diff} picks earlier on average.`;
  }
  const notches = ((result.bestVal - result.pickVal) / (gradeStats.sd / 3)).toFixed(1);
  return `You left ${notches} grade notches on the table.`;
};

// ============================================
// ANALYTICS (helper only — no GoatCounter snippet lives in this file; it is
// auto-injected before the closing head tag at deploy time)
// ============================================
const trackEvent = (name, title) => {
  if (window.goatcounter && window.goatcounter.count) {
    window.goatcounter.count({ path: name, title: title || name, event: true });
  }
};

// ============================================
// STORAGE (safeStorage try/catch wrapper pattern copied from the 17Lands
// card quiz, with an in-memory fallback for file:// / storage-disabled
// contexts). Namespaced pack_quiz_* keys share the origin with the card
// quiz's gih_quiz_* keys without colliding.
// ============================================
const memoryStorage = {};
let useMemoryStorage = false;
try {
  const test = '__pack_quiz_test__';
  localStorage.setItem(test, test);
  localStorage.removeItem(test);
} catch (e) {
  console.warn('localStorage unavailable, using in-memory storage:', e.message);
  useMemoryStorage = true;
}

const safeStorage = {
  getItem: (key) => {
    if (useMemoryStorage) return memoryStorage[key] || null;
    try { return localStorage.getItem(key); }
    catch (e) { console.error('Error getting from localStorage:', e); return null; }
  },
  setItem: (key, value) => {
    if (useMemoryStorage) { memoryStorage[key] = value; return; }
    try { localStorage.setItem(key, value); }
    catch (e) { console.error('Error setting in localStorage:', e); }
  },
  removeItem: (key) => {
    if (useMemoryStorage) { delete memoryStorage[key]; return; }
    try { localStorage.removeItem(key); }
    catch (e) { console.error('Error removing from localStorage:', e); }
  }
};

const HISTORY_CAP = 2000;
const historyKey = (setCode) => `pack_quiz_history_${setCode.toLowerCase()}`;
const statsKey = (setCode, metric) => `pack_quiz_stats_${setCode.toLowerCase()}_${metric.toLowerCase()}`;
const PREFS_KEY = 'pack_quiz_prefs';
const EMPTY_STATS = () => ({ packs: 0, percentileSum: 0, perfects: 0, runs: 0, bestRunAvg: 0 });

const loadHistory = (setCode) => {
  try {
    const raw = safeStorage.getItem(historyKey(setCode));
    return raw ? JSON.parse(raw) : [];
  } catch (e) { return []; }
};

const saveHistoryEntry = (setCode, entry) => {
  const history = loadHistory(setCode);
  history.push(entry);
  if (history.length > HISTORY_CAP) history.splice(0, history.length - HISTORY_CAP);
  safeStorage.setItem(historyKey(setCode), JSON.stringify(history));
};

const loadStats = (setCode, metric) => {
  try {
    const raw = safeStorage.getItem(statsKey(setCode, metric));
    return raw ? Object.assign(EMPTY_STATS(), JSON.parse(raw)) : EMPTY_STATS();
  } catch (e) { return EMPTY_STATS(); }
};

const saveStats = (setCode, metric, stats) => {
  safeStorage.setItem(statsKey(setCode, metric), JSON.stringify(stats));
};

const loadPrefs = () => {
  try {
    const raw = safeStorage.getItem(PREFS_KEY);
    const prefs = raw ? JSON.parse(raw) : {};
    const setCode = SET_CONFIG[prefs.setCode] ? prefs.setCode : 'MSH';
    const metric = prefs.metric === 'alsa' ? 'alsa' : 'gihWr';
    return { setCode, metric };
  } catch (e) { return { setCode: 'MSH', metric: 'gihWr' }; }
};

const savePrefs = (setCode, metric) => {
  safeStorage.setItem(PREFS_KEY, JSON.stringify({ setCode, metric }));
};

const randomSeed = () => (Math.random() * 2 ** 31) | 0;

// ============================================
// UI COMPONENTS
// ============================================
const KEY_LABELS = ['1','2','3','4','5','6','7','8','9','0','Q','W','E','R'];

function CardTile({ card, keyLabel, selected, locked, isPick, isBest, grade, metricLabel, metricValue, onClick, onDoubleClick }) {
  const imgUrl = cdnImageUrl(card);
  const classes = ['pack-card'];
  if (selected) classes.push('selected');
  if (locked && isBest) classes.push('best');
  if (locked && isPick) classes.push('pick');

  return (
    <div className={classes.join(' ')} onClick={onClick} onDoubleClick={onDoubleClick}>
      <div className="card-image-wrap">
        <div className="card-key-badge">{keyLabel}</div>
        {imgUrl ? (
          <img src={imgUrl} alt={card.name} className="card-image" loading="lazy" />
        ) : (
          <div className="card-placeholder">
            <span className="placeholder-color-chip" style={{ background: colorChipColor(card.color) }}></span>
            <span className="placeholder-name">{card.name}</span>
          </div>
        )}
        {locked && isBest && <div className="ribbon ribbon-best">DATA BEST</div>}
        {locked && isPick && <div className="ribbon ribbon-pick">YOUR PICK</div>}
        {locked && (
          <div className="card-overlay-chip">
            <span className="grade-pill" style={{ background: GRADE_COLORS[grade] || '#7c7c7c' }}>{grade}</span>
            <span className="metric-value">{metricValue}</span>
          </div>
        )}
      </div>
      <div className="card-name">{card.name}</div>
    </div>
  );
}

function EndOfRun({ setCode, avg, perfects, rareMythicPacks, rareMythicFound, lifetimeStats, onNewRun }) {
  return (
    <div className="container">
      <div className="banner">
        <div className="banner-content">
          <h1>Run complete</h1>
          <div className="subtitle">10 packs of {SET_CONFIG[setCode].shortName}</div>
        </div>
      </div>
      <div className="end-of-run-panel">
        <div className="end-avg">{Math.round(avg)}%</div>
        <div className="end-label">Average percentile over 10 packs</div>
        <div className="end-stat">{perfects} perfect pick{perfects === 1 ? '' : 's'}</div>
        <div className="end-stat">
          {rareMythicPacks > 0
            ? `Best card was a Rare/Mythic in ${rareMythicPacks} pack${rareMythicPacks === 1 ? '' : 's'} - you found it ${rareMythicFound} time${rareMythicFound === 1 ? '' : 's'}`
            : 'No pack this run had a Rare/Mythic as the best card'}
        </div>
        <div className="end-stat">
          Lifetime: {lifetimeStats.packs} packs, {lifetimeStats.packs ? Math.round(lifetimeStats.percentileSum / lifetimeStats.packs) : 0}% avg, {lifetimeStats.perfects} perfect, {lifetimeStats.runs} runs, best run avg {Math.round(lifetimeStats.bestRunAvg || 0)}%
        </div>
        <button className="new-run-btn" onClick={onNewRun}>New run</button>
      </div>
    </div>
  );
}

function App() {
  const initialPrefs = React.useMemo(loadPrefs, []);
  const [setCode, setSetCode] = React.useState(initialPrefs.setCode);
  const [metric, setMetric] = React.useState(initialPrefs.metric);
  const [seed, setSeed] = React.useState(randomSeed);
  const [selectedIndex, setSelectedIndex] = React.useState(null);
  const [locked, setLocked] = React.useState(false);
  const [result, setResult] = React.useState(null);
  const [packNum, setPackNum] = React.useState(1);
  const [runPercentiles, setRunPercentiles] = React.useState([]);
  const [runPerfects, setRunPerfects] = React.useState(0);
  const [runRareMythicPacks, setRunRareMythicPacks] = React.useState(0);
  const [runRareMythicFound, setRunRareMythicFound] = React.useState(0);
  const [showEndOfRun, setShowEndOfRun] = React.useState(false);
  const [lifetimeStats, setLifetimeStats] = React.useState(() => loadStats(initialPrefs.setCode, initialPrefs.metric));

  const pendingNextRef = React.useRef(null);

  const cardData = SET_CONFIG[setCode].data;
  const gradeStats = React.useMemo(() => computeGradeStats(cardData), [setCode]);
  const pack = React.useMemo(() => generatePack(cardData, seed), [cardData, seed]);

  React.useEffect(() => { savePrefs(setCode, metric); }, [setCode, metric]);

  // Preload the current pack's images.
  React.useEffect(() => {
    pack.forEach(c => {
      const url = cdnImageUrl(c);
      if (url) { const img = new Image(); img.src = url; }
    });
  }, [pack]);

  // While the reveal screen is showing, pre-generate and preload the next
  // pack so advancing feels instant.
  React.useEffect(() => {
    if (!locked || packNum >= 10) return;
    const nextSeed = randomSeed();
    const nextPack = generatePack(cardData, nextSeed);
    nextPack.forEach(c => {
      const url = cdnImageUrl(c);
      if (url) { const img = new Image(); img.src = url; }
    });
    pendingNextRef.current = { seed: nextSeed, setCode };
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [locked]);

  const resetRun = () => {
    setPackNum(1);
    setRunPercentiles([]);
    setRunPerfects(0);
    setRunRareMythicPacks(0);
    setRunRareMythicFound(0);
    setShowEndOfRun(false);
    setSelectedIndex(null);
    setLocked(false);
    setResult(null);
    setSeed(randomSeed());
    pendingNextRef.current = null;
  };

  // Mid-run set/metric switches are confirm-free but reset the current run;
  // lifetime stats are namespaced per set+metric so nothing is corrupted.
  const changeSet = (code) => {
    if (code === setCode) return;
    setSetCode(code);
    setLifetimeStats(loadStats(code, metric));
    resetRun();
  };

  const changeMetric = (m) => {
    if (m === metric) return;
    setMetric(m);
    setLifetimeStats(loadStats(setCode, m));
    resetRun();
  };

  const lockPick = (idx) => {
    if (idx == null || locked) return;
    const res = computePackResult(pack, idx, metric);
    setResult(res);
    setLocked(true);
    setSelectedIndex(idx);

    setRunPercentiles(prev => [...prev, res.percentile]);
    if (res.perfect) setRunPerfects(n => n + 1);
    const bestIsRareOrMythic = res.bestCard.rarity === 'R' || res.bestCard.rarity === 'M';
    if (bestIsRareOrMythic) {
      setRunRareMythicPacks(n => n + 1);
      if (res.pick.name === res.bestCard.name) setRunRareMythicFound(n => n + 1);
    }

    saveHistoryEntry(setCode, {
      timestamp: new Date().toISOString(),
      setCode,
      seed,
      cards: pack.map(c => c.name),
      picked: res.pick.name,
      metric,
      pickVal: res.pickVal,
      bestCard: res.bestCard.name,
      bestVal: res.bestVal,
      percentile: res.percentile,
      perfect: res.perfect,
      mode: 'pack'
    });

    const stats = loadStats(setCode, metric);
    stats.packs += 1;
    stats.percentileSum += res.percentile;
    if (res.perfect) stats.perfects += 1;
    saveStats(setCode, metric, stats);
    setLifetimeStats(stats);

    trackEvent(`pack-answer-${setCode.toLowerCase()}`, `Pack answer (${setCode})`);
  };

  const selectCard = (i) => {
    if (locked) return;
    if (selectedIndex === i) { lockPick(i); return; }
    setSelectedIndex(i);
  };

  const finishRun = (finalPercentiles) => {
    const stats = loadStats(setCode, metric);
    stats.runs += 1;
    const runAvg = finalPercentiles.reduce((a, b) => a + b, 0) / finalPercentiles.length;
    if (runAvg > (stats.bestRunAvg || 0)) stats.bestRunAvg = runAvg;
    saveStats(setCode, metric, stats);
    setLifetimeStats(stats);
    trackEvent(`pack-run-finish-${setCode.toLowerCase()}`, `Pack run finish (${setCode})`);
  };

  const nextPack = () => {
    if (!locked) return;
    if (packNum >= 10) {
      finishRun(runPercentiles);
      setShowEndOfRun(true);
      return;
    }
    const pending = pendingNextRef.current;
    setPackNum(n => n + 1);
    setSelectedIndex(null);
    setLocked(false);
    setResult(null);
    setSeed(pending && pending.setCode === setCode ? pending.seed : randomSeed());
    pendingNextRef.current = null;
  };

  const startNewRun = () => resetRun();

  React.useEffect(() => {
    const KEY_MAP = { '1':0,'2':1,'3':2,'4':3,'5':4,'6':5,'7':6,'8':7,'9':8,'0':9,'q':10,'w':11,'e':12,'r':13 };
    const handler = (e) => {
      if (e.ctrlKey || e.metaKey || e.altKey) return;
      const key = e.key.toLowerCase();

      if (showEndOfRun) {
        if (key === 'enter') { e.preventDefault(); startNewRun(); }
        return;
      }
      if (key === 'escape') {
        if (!locked) setSelectedIndex(null);
        return;
      }
      if (key === 'enter') {
        e.preventDefault();
        if (locked) nextPack();
        else if (selectedIndex != null) lockPick(selectedIndex);
        return;
      }
      if (!locked && KEY_MAP.hasOwnProperty(key)) {
        const idx = KEY_MAP[key];
        if (idx < pack.length) selectCard(idx);
      }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  });

  if (showEndOfRun) {
    const avg = runPercentiles.reduce((a, b) => a + b, 0) / runPercentiles.length;
    return (
      <EndOfRun
        setCode={setCode}
        avg={avg}
        perfects={runPerfects}
        rareMythicPacks={runRareMythicPacks}
        rareMythicFound={runRareMythicFound}
        lifetimeStats={lifetimeStats}
        onNewRun={startNewRun}
      />
    );
  }

  const runAvgSoFar = runPercentiles.length
    ? Math.round(runPercentiles.reduce((a, b) => a + b, 0) / runPercentiles.length)
    : null;
  const lifetimeAvg = lifetimeStats.packs ? Math.round(lifetimeStats.percentileSum / lifetimeStats.packs) : 0;

  return (
    <div className="container">
      <div className="banner">
        <div className="banner-content">
          <h1>P1P1 Pack Quiz</h1>
          <div className="version-badge">v{QUIZ_VERSION} BETA</div>
          <div className="subtitle">17Lands data - pick the best card in a simulated draft pack</div>
          <div className="controls-row">
            <div className="pill-group">
              {Object.keys(SET_CONFIG).map(code => (
                <button key={code} className={`pill ${setCode === code ? 'active' : ''}`} onClick={() => changeSet(code)}>{code}</button>
              ))}
            </div>
            <div className="pill-group">
              <button className={`pill ${metric === 'gihWr' ? 'active' : ''}`} onClick={() => changeMetric('gihWr')}>GIH WR</button>
              <button className={`pill ${metric === 'alsa' ? 'active' : ''}`} onClick={() => changeMetric('alsa')}>ALSA</button>
            </div>
            <a className="nav-link" href="index.html">Card quiz</a>
          </div>
          <div className="caveat">Scores measure how well you know the data - the data-best pick isn't always the humanly-best pick.</div>
        </div>
      </div>

      <div className="stats-row">
        <div className="stat-chip">Pack {packNum}/10</div>
        <div className="stat-chip">Run avg: {runAvgSoFar === null ? '-' : runAvgSoFar + '%'}</div>
        <div className="stat-chip">Lifetime: {lifetimeStats.packs} packs, {lifetimeAvg}% avg, {lifetimeStats.perfects} perfect</div>
      </div>

      {locked && result && (
        <div className="reveal-banner">
          <div className="percentile-headline">{result.percentile}%{result.perfect ? ' - Perfect pick!' : ''}</div>
          <div className="left-on-table">{leftOnTableText(result, metric, gradeStats)}</div>
          <div className="run-progress-line">Pack {packNum}/10 - run avg {runAvgSoFar === null ? '-' : runAvgSoFar + '%'}</div>
        </div>
      )}

      <div className="pack-grid">
        {pack.map((card, i) => (
          <CardTile
            key={card.name + '-' + i}
            card={card}
            keyLabel={KEY_LABELS[i]}
            selected={selectedIndex === i && !locked}
            locked={locked}
            isPick={locked && selectedIndex === i}
            isBest={locked && result && result.bestIndex === i}
            grade={getGrade(card.gihWr, gradeStats)}
            metricValue={metric === 'alsa' ? card.alsa.toFixed(2) : card.gihWr.toFixed(1) + '%'}
            onClick={() => selectCard(i)}
            onDoubleClick={() => lockPick(i)}
          />
        ))}
      </div>

      <div className="action-bar">
        {!locked ? (
          <button className="lock-btn" disabled={selectedIndex == null} onClick={() => lockPick(selectedIndex)}>Lock pick</button>
        ) : (
          <button className="next-btn" onClick={nextPack}>{packNum < 10 ? 'Next pack' : 'See results'}</button>
        )}
      </div>

      <div className="footer">
        Data: 17lands.com (public data) - Images: Scryfall - Unofficial fan project<br/>
        {SET_CONFIG[setCode].name} data as of {SET_CONFIG[setCode].dataDate} - <a href={SET_CONFIG[setCode].ratingsLink} target="_blank" rel="noopener noreferrer">View ratings on 17Lands</a>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
