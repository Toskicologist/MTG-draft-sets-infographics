            {"name": "Vicious Rivalry", "setCode": "SOS", "rarity": "rare", "colors": ["B", "G"], "type": "Sorcery", "manaCost": "{2}{B}{G}", "ratings": {"cgb": {"raw": 3, "norm": -0.611}, "ds": {"raw": 9, "norm": 1.694}, "cs": {"raw": 6, "norm": 0.857}, "llu_a": {"raw": 5, "norm": 0.382}, "llu_m": {"raw": 5, "norm": 0.502}, "cfb": {"raw": 3.5, "norm": 0.514}}, "avgRaw": 5.25, "avgNorm": 0.5563, "controversy": 0.681, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Vicious_Rivalry", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-multicolor-colorless-and-lands"}, "cfbCommentary": "As long as you have enough life, this is a great sweeper (and does X or less). It also works well if you have the most expensive creature in play, so think of it like a newer version of Toxic Deluge , which is a great card."},
            {"name": "Wildgrowth Archaic", "setCode": "SOS", "rarity": "rare", "colors": ["G"], "type": "Creature", "manaCost": "{2/G}{2/G}", "ratings": {"cgb": {"raw": 5, "norm": 0.192}, "ds": {"raw": 9, "norm": 1.694}, "cs": {"raw": 6, "norm": 0.857}, "llu_a": {"raw": 5.5, "norm": 0.667}, "llu_m": {"raw": 6, "norm": 1.038}, "cfb": {"raw": 4.5, "norm": 1.423}}, "avgRaw": 6, "avgNorm": 0.9785, "controversy": 0.4905, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Wildgrowth_Archaic", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-green"}, "cfbCommentary": "The Archaics are a lot to process because they're weird and confusing, starting right from their mana cost. For example, Wildgrowth Archaic can be cast for GG as a 1/1, or you can spend up to four mana (and up to four different colors) to make it enter bigger. Note that you can choose to spend four mana even if one of the colors is green. And while a big trample, reach creature is nice, the truly great thing about Wildgrowth Archaic is its ability to pump up all of your future creatures. Even in"},
            {"name": "Colorstorm Stallion", "setCode": "SOS", "rarity": "rare", "colors": ["R", "U"], "type": "Creature", "manaCost": "{1}{U}{R}", "ratings": {"cgb": {"raw": 9, "norm": 1.798}, "ds": {"raw": 8, "norm": 1.299}, "cs": {"raw": 6.5, "norm": 1.185}, "llu_a": {"raw": 6, "norm": 0.952}, "llu_m": {"raw": 6, "norm": 1.038}, "cfb": {"raw": 3.5, "norm": 0.514}}, "avgRaw": 6.5, "avgNorm": 1.131, "controversy": 0.3867, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Colorstorm_Stallion", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-multicolor-colorless-and-lands"}, "cfbCommentary": "The Stallion is a massive threat, as one copy leads to two copies the next time, then four, and so forth (well, getting four into play is already enough in most games). The downside is that you usually need to untap with this, so it won't always work out. It's still a great card, and one I'm happy starting with."},
            {"name": "Vastlands Scavenger // Bind to Life", "setCode": "SOS", "rarity": "rare", "colors": ["G"], "type": "Creature", "manaCost": "{1}{G}{G} // {4}{G}", "ratings": {"cgb": {"raw": 9, "norm": 1.798}, "ds": {"raw": 8, "norm": 1.299}, "cs": {"raw": 6.5, "norm": 1.185}, "llu_a": {"raw": 7.5, "norm": 1.809}, "llu_m": {"raw": 8, "norm": 2.112}, "cfb": {"raw": 4.5, "norm": 1.423}}, "avgRaw": 7.25, "avgNorm": 1.6043, "controversy": 0.3264, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Vastlands_Scavenger", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-green"}, "cfbCommentary": "Vastlands Scavenger is yet another incredible prepared creature. Three mana for a 4/4 deathtouch is huge, and \"Bind to Life\" effectively gives you a whole other threat without investing a second card. The random mill means you can't exactly guarantee what you'll hit, but you should have a great chance to hit a four-drop or larger at instant-speed."},
            {"name": "Withering Curse", "setCode": "SOS", "rarity": "mythic", "colors": ["B"], "type": "Sorcery", "manaCost": "{1}{B}{B}", "ratings": {"cgb": {"raw": 7, "norm": 0.995}, "ds": {"raw": 8, "norm": 1.299}, "cs": {"raw": 6.5, "norm": 1.185}, "llu_a": {"raw": 4.5, "norm": 0.096}, "llu_m": {"raw": 4.5, "norm": 0.233}, "cfb": {"raw": 5, "norm": 1.8775}}, "avgRaw": 5.9167, "avgNorm": 0.9476, "controversy": 0.6168, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Withering_Curse", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-black"}, "cfbCommentary": ".0 I normally rate symmetrical board sweepers at 4.0 or 4.5, but Withering Curse is such an exceptionally strong version of a board sweeper that I'm going to give it a perfect score. For starters, three mana is just so cheap, and gaining life in Secrets of Strixhaven doesn't look difficult at all. But another selling point is that you can craft a game plan around either the unconditional wrath, or the -2/-2 effect. If your opponent overextends, you set it up to reset the board. If you have the b"},
            {"name": "Mind into Matter", "setCode": "SOS", "rarity": "rare", "colors": ["G", "U"], "type": "Sorcery", "manaCost": "{X}{G}{U}", "ratings": {"cgb": {"raw": 8, "norm": 1.396}, "ds": {"raw": 7, "norm": 0.903}, "cs": {"raw": 7, "norm": 1.512}, "llu_a": {"raw": 6.5, "norm": 1.238}, "llu_m": {"raw": 6, "norm": 1.038}, "cfb": {"raw": 4, "norm": 0.9685}}, "avgRaw": 6.4167, "avgNorm": 1.1759, "controversy": 0.2243, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Mind_into_Matter", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-multicolor-colorless-and-lands"}, "cfbCommentary": ".0 Mind into Matter may be slow, but it's undeniably powerful. Putting a permanent into play goes a long way towards making sure you are developing your board, though it being tapped can be an issue when you're too low on life. I've liked this card so far, and wouldn't mind starting on this when drafting Quandrix (or splashing it in Witherbloom or Prismari)."},
            {"name": "Blech, Loafing Pest", "setCode": "SOS", "rarity": "rare", "colors": ["B", "G"], "type": "Legendary Creature", "manaCost": "{1}{B}{G}", "ratings": {"cgb": {"raw": 8, "norm": 1.396}, "ds": {"raw": 7, "norm": 0.903}, "cs": {"raw": 6.5, "norm": 1.185}, "llu_a": {"raw": 5.5, "norm": 0.667}, "llu_m": {"raw": 5.5, "norm": 0.77}, "cfb": {"raw": 4.5, "norm": 1.423}}, "avgRaw": 6.1667, "avgNorm": 1.0573, "controversy": 0.2954, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Blech_Loafing_Pest", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-multicolor-colorless-and-lands"}, "cfbCommentary": "Blech destroyed me in the Early Access event, as it combines incredibly well with all the Pests in the set. This card will do its thing effectively in pretty much every Witherbloom deck, so I wouldn't call it a build-around as much as just a great card."},
            {"name": "Witherbloom, the Balancer", "setCode": "SOS", "rarity": "mythic", "colors": ["B", "G"], "type": "Legendary Creature", "manaCost": "{6}{B}{G}", "ratings": {"cgb": {"raw": 5, "norm": 0.192}, "ds": {"raw": 7, "norm": 0.903}, "cs": {"raw": 6.5, "norm": 1.185}, "llu_a": {"raw": 6, "norm": 0.952}, "llu_m": {"raw": 5.5, "norm": 0.77}, "cfb": {"raw": 4, "norm": 0.9685}}, "avgRaw": 5.6667, "avgNorm": 0.8284, "controversy": 0.3099, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Witherbloom_the_Balancer", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-multicolor-colorless-and-lands"}, "cfbCommentary": ".0 Casting this for five mana isn't too hard, and that's a great deal. Sometimes it'll even be cheaper, and when it is, you might be able to sneak a spell in on the same turn. Not bad, not bad at all, though it will be at its worst when you are losing with an empty board, so keep that in mind."},
            {"name": "Cauldron of Essence", "setCode": "SOS", "rarity": "rare", "colors": ["B", "G"], "type": "Artifact", "manaCost": "{1}{B}{G}", "ratings": {"cgb": {"raw": 8, "norm": 1.396}, "ds": {"raw": 9, "norm": 1.694}, "cs": {"raw": 5.5, "norm": 0.53}, "llu_a": {"raw": 5.5, "norm": 0.667}, "llu_m": {"raw": 6, "norm": 1.038}, "cfb": {"raw": 4, "norm": 0.9685}}, "avgRaw": 6.3333, "avgNorm": 1.0489, "controversy": 0.3996, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Cauldron_of_Essence", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-multicolor-colorless-and-lands"}, "cfbCommentary": ".0 The static on this is already great, and getting to recycle your creatures with enter-the-battlefield abilities (or just bring back high-quality creatures) makes me very interested. Take the Cauldron, fill your deck full of creatures, and profit."},
            {"name": "Ambitious Augmenter", "setCode": "SOS", "rarity": "rare", "colors": ["G"], "type": "Creature", "manaCost": "{G}", "ratings": {"cgb": {"raw": 8, "norm": 1.396}, "ds": {"raw": 8, "norm": 1.299}, "cs": {"raw": 6, "norm": 0.857}, "llu_a": {"raw": 6.5, "norm": 1.238}, "llu_m": {"raw": 6.5, "norm": 1.307}, "cfb": {"raw": 4, "norm": 0.9685}}, "avgRaw": 6.5, "avgNorm": 1.1776, "controversy": 0.1955, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Ambitious_Augmenter", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-green"}, "cfbCommentary": ".0 Ambitious Augmenter is really strong. If you cast it on turn 1, it'll start small. But as we know, the tortoise always wins the race eventually. The card will likely be a 3/3 or a 4/4 in no time at all. Your opponent won't be prepared to deal with a creature that large at that point in the game, and even if they can, it'll leave behind a fractal token. Of course, there's some risk of topdecking the Augmenter later in the game, in which case it's a bit weaker, but this is still one of the best"},
            {"name": "Emeritus of Woe // Demonic Tutor", "setCode": "SOS", "rarity": "mythic", "colors": ["B"], "type": "Creature", "manaCost": "{3}{B} // {1}{B}", "ratings": {"cgb": {"raw": 10, "norm": 2.199}, "ds": {"raw": 8, "norm": 1.299}, "cs": {"raw": 6, "norm": 0.857}, "llu_a": {"raw": 6.5, "norm": 1.238}, "llu_m": {"raw": 7, "norm": 1.575}, "cfb": {"raw": 5, "norm": 1.8775}}, "avgRaw": 7.0833, "avgNorm": 1.5076, "controversy": 0.4395, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Emeritus_of_Woe", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-black"}, "cfbCommentary": ".0 Wow! Whoa! Woe! Emeritus of Woe is a total bomb that earns a perfect 5.0 score. A huge body attached to a Demonic Tutor is great value any way you look at it. But now start to imagine that you can find a way to recur the Emeritus, or perhaps a second bomb rare, should you be so lucky. In case that wasn't enough, it's not even hard to make it prepared all over again by trading creatures in combat, or pointing a couple of removal spells at opposing creatures!"},
            {"name": "Erode", "setCode": "SOS", "rarity": "rare", "colors": ["W"], "type": "Instant", "manaCost": "{W}", "ratings": {"cgb": {"raw": 6, "norm": 0.593}, "ds": {"raw": 8, "norm": 1.299}, "cs": {"raw": 6, "norm": 0.857}, "llu_a": {"raw": 5, "norm": 0.382}, "llu_m": {"raw": 1, "norm": -1.645}, "cfb": {"raw": 3.75, "norm": 0.7412}}, "avgRaw": 4.9583, "avgNorm": 0.3712, "controversy": 0.9441, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Erode", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-white"}, "cfbCommentary": "One mana to destroy any creature at instant speed is incredible efficiency; you just don't want to use Erode too early to give them too much of a mana advantage."},
            {"name": "Stress Dream", "setCode": "SOS", "rarity": "uncommon", "colors": ["R", "U"], "type": "Instant", "manaCost": "{3}{U}{R}", "ratings": {"cgb": {"raw": 8, "norm": 1.396}, "ds": {"raw": 8, "norm": 1.299}, "cs": {"raw": 6, "norm": 0.857}, "llu_a": {"raw": 6, "norm": 0.952}, "llu_m": {"raw": 6.5, "norm": 1.307}, "cfb": {"raw": 3.5, "norm": 0.514}}, "avgRaw": 6.3333, "avgNorm": 1.0542, "controversy": 0.3114, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Stress_Dream", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-multicolor-colorless-and-lands"}, "cfbCommentary": "Prophetic Bolt is back, though it swapped Impulse for Sleight of Hand . I'm happy either way, as this is the kind of card I have happy dreams about."},
            {"name": "The Dawning Archaic", "setCode": "SOS", "rarity": "mythic", "colors": [], "type": "Legendary Creature", "manaCost": "{10}", "ratings": {"cgb": {"raw": 5, "norm": 0.192}, "ds": {"raw": 8, "norm": 1.299}, "cs": {"raw": 6, "norm": 0.857}, "llu_a": {"raw": 6, "norm": 0.952}, "llu_m": {"raw": 6, "norm": 1.038}, "cfb": {"raw": 1, "norm": -1.7585}}, "avgRaw": 5.3333, "avgNorm": 0.4299, "controversy": 1.0349, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#The_Dawning_Archaic", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-multicolor-colorless-and-lands"}, "cfbCommentary": ".0 // 4.0 I'm slamming this in any spell deck — it can end up being completely free! Even at four or five mana, it's still amazing and one attack from this is game over."},
            {"name": "Additive Evolution", "setCode": "SOS", "rarity": "uncommon", "colors": ["G"], "type": "Enchantment", "manaCost": "{3}{G}{G}", "ratings": {"cgb": {"raw": 6, "norm": 0.593}, "ds": {"raw": 7, "norm": 0.903}, "cs": {"raw": 6.5, "norm": 1.185}, "llu_a": {"raw": 6, "norm": 0.952}, "llu_m": {"raw": 6, "norm": 1.038}, "cfb": {"raw": 3.25, "norm": 0.2867}}, "avgRaw": 5.7917, "avgNorm": 0.8263, "controversy": 0.3002, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Additive_Evolution", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-green"}, "cfbCommentary": "Additive Evolution effectively gives you a 4/4 vigilance on the turn you cast it. That means it only takes a few turns before the amount of power and toughness it's distributed outpaces the five mana initial investment. I'm not sure this is quite a bomb, but I did lose badly to it during the MTG Arena Early Access Event. Let's just say you want it on your side of the battlefield and not your opponent's."},
            {"name": "Grave Researcher // Reanimate", "setCode": "SOS", "rarity": "rare", "colors": ["B"], "type": "Creature", "manaCost": "{2}{B} // {B}", "ratings": {"cgb": {"raw": 7, "norm": 0.995}, "ds": {"raw": 7, "norm": 0.903}, "cs": {"raw": 6.5, "norm": 1.185}, "llu_a": {"raw": 5, "norm": 0.382}, "llu_m": {"raw": 4.5, "norm": 0.233}, "cfb": {"raw": 4.5, "norm": 1.423}}, "avgRaw": 5.75, "avgNorm": 0.8535, "controversy": 0.4211, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Grave_Researcher", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-black"}, "cfbCommentary": "I like Grave Researcher just fine, simply due to its ability to surveil every turn. If it sticks around, it's not difficult to set up three creatures in the graveyard and make it prepared. Best of all, you can start preparing it over and over again, turn after turn. For the modest price of three mana, your opponent will have to be very scared of this."},
            {"name": "Practiced Offense", "setCode": "SOS", "rarity": "rare", "colors": ["W"], "type": "Sorcery", "manaCost": "{2}{W}", "ratings": {"cgb": {"raw": 4, "norm": -0.21}, "ds": {"raw": 7, "norm": 0.903}, "cs": {"raw": 6.5, "norm": 1.185}, "llu_a": {"raw": 7, "norm": 1.523}, "llu_m": {"raw": 7, "norm": 1.575}, "cfb": {"raw": 4.5, "norm": 1.423}}, "avgRaw": 6, "avgNorm": 1.0665, "controversy": 0.6143, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Practiced_Offense", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-white"}, "cfbCommentary": "Practiced Offense is basically Dig Site Inventory on steroids. It's a lot more expensive and slower, but it will have an impact later in the game and can likely win you the game."},
            {"name": "Practiced Scrollsmith", "setCode": "SOS", "rarity": "uncommon", "colors": ["R", "W"], "type": "Creature", "manaCost": "{R}{R/W}{W}", "ratings": {"cgb": {"raw": 8, "norm": 1.396}, "ds": {"raw": 7, "norm": 0.903}, "cs": {"raw": 6.5, "norm": 1.185}, "llu_a": {"raw": 6, "norm": 0.952}, "llu_m": {"raw": 6, "norm": 1.038}, "cfb": {"raw": 3.5, "norm": 0.514}}, "avgRaw": 6.1667, "avgNorm": 0.998, "controversy": 0.2709, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Practiced_Scrollsmith", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-multicolor-colorless-and-lands"}, "cfbCommentary": "The Scrollsmith sometimes does enough simply by exiling a card and triggering all that type of effect, but it's a Snapcaster Mage to boot (and even gives you an extra turn to play the card). I like it, and am happy to take it early."},
            {"name": "Tragedy Feaster", "setCode": "SOS", "rarity": "rare", "colors": ["B"], "type": "Creature", "manaCost": "{2}{B}{B}", "ratings": {"cgb": {"raw": 1, "norm": -1.414}, "ds": {"raw": 7, "norm": 0.903}, "cs": {"raw": 6.5, "norm": 1.185}, "llu_a": {"raw": 6, "norm": 0.952}, "llu_m": {"raw": 4, "norm": -0.035}, "cfb": {"raw": 4, "norm": 0.9685}}, "avgRaw": 4.75, "avgNorm": 0.4266, "controversy": 0.9104, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Tragedy_Feaster", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-black"}, "cfbCommentary": ".0 You should play Tragedy Feaster in your black decks, regardless of how much lifegain you have. Even if you have to sacrifice a token or a land, your opponent will just die to the 7/6 trample before the resource disadvantage accumulates too much. The real tragedy is the scenario where you cast Tragedy Feaster , sacrifice something, and then it's answered right away. But as a six-toughness ward creature, that's not necessarily the easiest thing to do."},
            {"name": "Echocasting Symposium", "setCode": "SOS", "rarity": "mythic", "colors": ["U"], "type": "Sorcery", "manaCost": "{4}{U}{U}", "ratings": {"cgb": {"raw": 9, "norm": 1.798}, "ds": {"raw": 6, "norm": 0.507}, "cs": {"raw": 7, "norm": 1.512}, "llu_a": {"raw": 5.5, "norm": 0.667}, "llu_m": {"raw": 4, "norm": -0.035}, "cfb": {"raw": 4.5, "norm": 1.423}}, "avgRaw": 6, "avgNorm": 0.9787, "controversy": 0.6455, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Echocasting_Symposium", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-blue"}, "cfbCommentary": "Paradigm spells each look awesome, and Echocasting Symposium is no exception. Sure, six mana for a Clone (and one that can only copy your creatures) is a bit pricey, but this gets you one every turn. Any game where you survive after casting this will cascade quickly in your favor, and I'd windmill slam this pick one and build around it without hesitation. Some good creatures, lots of removal, and this as a finisher — easy."},
            {"name": "Skycoach Conductor // All Aboard", "setCode": "SOS", "rarity": "rare", "colors": ["U"], "type": "Creature", "manaCost": "{2}{U} // {U}", "ratings": {"cgb": {"raw": 8, "norm": 1.396}, "ds": {"raw": 8, "norm": 1.299}, "cs": {"raw": 5.5, "norm": 0.53}, "llu_a": {"raw": 6, "norm": 0.952}, "llu_m": {"raw": 5.5, "norm": 0.77}, "cfb": {"raw": 4, "norm": 0.9685}}, "avgRaw": 6.1667, "avgNorm": 0.9859, "controversy": 0.295, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Skycoach_Conductor", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-blue"}, "cfbCommentary": ".0 Three keywords on a three-mana 2/3 flier is enough for me, and Skycoach Conductor even comes with a nice little Momentary Blink ."},
            {"name": "Awaken the Woods", "setCode": "SOA", "rarity": "mythic", "colors": ["G"], "type": "Sorcery", "manaCost": "{X}{G}{G}", "ratings": {"cgb": {"raw": 8, "norm": 1.396}, "ds": {"raw": 7, "norm": 0.903}, "cs": {"raw": null, "norm": null}, "llu_a": {"raw": 7, "norm": 1.523}, "llu_m": {"raw": 6.5, "norm": 1.307}, "cfb": null}, "avgRaw": 7.125, "avgNorm": 1.2822, "controversy": 0.232, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Awaken_the_Woods"}, "cfbCommentary": null},
            {"name": "Aziza, Mage Tower Captain", "setCode": "SOS", "rarity": "rare", "colors": ["R", "W"], "type": "Legendary Creature", "manaCost": "{R}{W}", "ratings": {"cgb": {"raw": 4, "norm": -0.21}, "ds": {"raw": 7, "norm": 0.903}, "cs": {"raw": null, "norm": null}, "llu_a": {"raw": 4.5, "norm": 0.096}, "llu_m": {"raw": 4, "norm": -0.035}, "cfb": {"raw": 3.5, "norm": 0.514}}, "avgRaw": 4.6, "avgNorm": 0.2536, "controversy": 0.4031, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Aziza_Mage_Tower_Captain", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-multicolor-colorless-and-lands"}, "cfbCommentary": "Aziza is a threatening creature, as she can copy spells for no mana as long as you have a decent board. As such, your opponent will certainly try to answer it, which will usually leave you ahead on mana. You can also try and wait on this until the mid-game, where you play it and a spell in quick succession, ensuring at least one bonus spell."},
            {"name": "Bitter Triumph", "setCode": "SOA", "rarity": "uncommon", "colors": ["B"], "type": "Instant", "manaCost": "{1}{B}", "ratings": {"cgb": {"raw": 6, "norm": 0.593}, "ds": {"raw": 7, "norm": 0.903}, "cs": {"raw": null, "norm": null}, "llu_a": {"raw": 5.5, "norm": 0.667}, "llu_m": {"raw": 5, "norm": 0.502}, "cfb": null}, "avgRaw": 5.875, "avgNorm": 0.6663, "controversy": 0.1487, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Bitter_Triumph"}, "cfbCommentary": null},
            {"name": "Expressive Iteration", "setCode": "SOA", "rarity": "uncommon", "colors": ["R", "U"], "type": "Sorcery", "manaCost": "{U}{R}", "ratings": {"cgb": {"raw": 5, "norm": 0.192}, "ds": {"raw": 7, "norm": 0.903}, "cs": {"raw": null, "norm": null}, "llu_a": {"raw": 5, "norm": 0.382}, "llu_m": {"raw": 6, "norm": 1.038}, "cfb": null}, "avgRaw": 5.75, "avgNorm": 0.6287, "controversy": 0.3515, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Expressive_Iteration"}, "cfbCommentary": null},
            {"name": "Grim Haruspex", "setCode": "SPG", "rarity": "rare", "colors": ["B"], "type": "Creature", "manaCost": "{2}{B}", "ratings": {"cgb": {"raw": 5, "norm": 0.192}, "ds": {"raw": 7, "norm": 0.903}, "cs": {"raw": null, "norm": null}, "llu_a": {"raw": 5, "norm": 0.382}, "llu_m": {"raw": 4.5, "norm": 0.233}, "cfb": {"raw": 4, "norm": 0.9685}}, "avgRaw": 5.1, "avgNorm": 0.5357, "controversy": 0.3333, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Grim_Haruspex", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-black"}, "cfbCommentary": ".0 Grim Haruspex is black's Special Guests card. It's fragile, but potentially quite powerful as it'll make your opponent unwilling to kill or trade with your other creatures. This is the only creature with Morph in the Limited format. So (at least in theory), you won't be surprising anybody, and you can feel free to simply cast Haruspex face up. I suppose it could come up that you're manascrewed and need to morph it while you wait to find your black mana."},
            {"name": "Lluwen, Exchange Student // Pest Friend", "setCode": "SOS", "rarity": "uncommon", "colors": ["B", "G"], "type": "Legendary Creature", "manaCost": "{2}{B}{G} // {B/G}", "ratings": {"cgb": {"raw": 8, "norm": 1.396}, "ds": {"raw": 7, "norm": 0.903}, "cs": {"raw": null, "norm": null}, "llu_a": {"raw": 5, "norm": 0.382}, "llu_m": {"raw": 4, "norm": -0.035}, "cfb": {"raw": 3.5, "norm": 0.514}}, "avgRaw": 5.5, "avgNorm": 0.632, "controversy": 0.4855, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Lluwen_Exchange_Student", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-multicolor-colorless-and-lands"}, "cfbCommentary": "Lluwen, Exchange Student is a veritable Pest factory, which isn't a description most people would relish. Still, this can make a ton of Pests in the average Witherbloom deck, and even waiting until turn six to cast two Pests is a totally reasonable way to play this."},
            {"name": "Orysa, Tide Choreographer", "setCode": "SOS", "rarity": "uncommon", "colors": ["U"], "type": "Legendary Creature", "manaCost": "{4}{U}", "ratings": {"cgb": {"raw": 7, "norm": 0.995}, "ds": {"raw": 7, "norm": 0.903}, "cs": {"raw": null, "norm": null}, "llu_a": {"raw": 5, "norm": 0.382}, "llu_m": {"raw": 4.5, "norm": 0.233}, "cfb": {"raw": 3.5, "norm": 0.514}}, "avgRaw": 5.4, "avgNorm": 0.6054, "controversy": 0.2957, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Orysa_Tide_Choreographer", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-blue"}, "cfbCommentary": "If you are casting Orysa, Tide Choreographer for two mana, you are really doing it, but I'm happy enough to pay full retail. A non-flying Mulldrifter is still a decent deal, and some amount of the time this comes down on the cheap."},
            {"name": "Poisoner's Apprentice", "setCode": "SOS", "rarity": "uncommon", "colors": ["B"], "type": "Creature", "manaCost": "{2}{B}", "ratings": {"cgb": {"raw": 7, "norm": 0.995}, "ds": {"raw": 7, "norm": 0.903}, "cs": {"raw": null, "norm": null}, "llu_a": {"raw": 4.5, "norm": 0.096}, "llu_m": {"raw": 4, "norm": -0.035}, "cfb": {"raw": 3.75, "norm": 0.7412}}, "avgRaw": 5.25, "avgNorm": 0.54, "controversy": 0.4259, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Poisoners_Apprentice", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-black"}, "cfbCommentary": "Poisoner's Apprentice isn't quite a three-mana Ravenous Chupacabra because the Infusion ability won't automatically be online every turn if you don't make the effort. That said, this is exactly the type of payoff you want for building around lifegain, so I see this as a premium uncommon. I especially love getting a creature like Poisoner's Apprentice with some ways to recur it from the graveyard."},
            {"name": "Reprieve", "setCode": "SOA", "rarity": "uncommon", "colors": ["W"], "type": "Instant", "manaCost": "{1}{W}", "ratings": {"cgb": {"raw": 8, "norm": 1.396}, "ds": {"raw": 7, "norm": 0.903}, "cs": {"raw": null, "norm": null}, "llu_a": {"raw": 5, "norm": 0.382}, "llu_m": {"raw": 5.5, "norm": 0.77}, "cfb": null}, "avgRaw": 6.375, "avgNorm": 0.8628, "controversy": 0.3625, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Reprieve"}, "cfbCommentary": null},
            {"name": "Stock Up", "setCode": "SOA", "rarity": "uncommon", "colors": ["U"], "type": "Sorcery", "manaCost": "{2}{U}", "ratings": {"cgb": {"raw": 7, "norm": 0.995}, "ds": {"raw": 7, "norm": 0.903}, "cs": {"raw": null, "norm": null}, "llu_a": {"raw": 6.5, "norm": 1.238}, "llu_m": {"raw": 6, "norm": 1.038}, "cfb": null}, "avgRaw": 6.625, "avgNorm": 1.0435, "controversy": 0.1224, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Stock_Up"}, "cfbCommentary": null},
            {"name": "Tam, Observant Sequencer // Deep Sight", "setCode": "SOS", "rarity": "uncommon", "colors": ["G", "U"], "type": "Legendary Creature", "manaCost": "{2}{G}{U} // {G}{U}", "ratings": {"cgb": {"raw": 5, "norm": 0.192}, "ds": {"raw": 7, "norm": 0.903}, "cs": {"raw": null, "norm": null}, "llu_a": {"raw": 3, "norm": -0.76}, "llu_m": {"raw": 3, "norm": -0.572}, "cfb": {"raw": 3.5, "norm": 0.514}}, "avgRaw": 4.3, "avgNorm": 0.0554, "controversy": 0.6334, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Tam_Observant_Sequencer", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-multicolor-colorless-and-lands"}, "cfbCommentary": "Tam provides a steady stream of cards and life if it survives, while also being a good play on turn six in order to get instant value. Surely, one of these creatures will live for a turn, and you will then profit wildly."},
            {"name": "Veil of Summer", "setCode": "SOA", "rarity": "uncommon", "colors": ["G"], "type": "Instant", "manaCost": "{G}", "ratings": {"cgb": {"raw": 1, "norm": -1.414}, "ds": {"raw": 7, "norm": 0.903}, "cs": {"raw": null, "norm": null}, "llu_a": {"raw": null, "norm": null}, "llu_m": {"raw": null, "norm": null}, "cfb": null}, "avgRaw": 4, "avgNorm": -0.2555, "controversy": 1.1585, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Veil_of_Summer"}, "cfbCommentary": null},
            {"name": "Ark of Hunger", "setCode": "SOS", "rarity": "rare", "colors": ["R", "W"], "type": "Artifact", "manaCost": "{2}{R}{W}", "ratings": {"cgb": {"raw": 5, "norm": 0.192}, "ds": {"raw": 7, "norm": 0.903}, "cs": {"raw": 6, "norm": 0.857}, "llu_a": {"raw": 6.5, "norm": 1.238}, "llu_m": {"raw": 6.5, "norm": 1.307}, "cfb": {"raw": 4.5, "norm": 1.423}}, "avgRaw": 5.9167, "avgNorm": 0.9867, "controversy": 0.4106, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Ark_of_Hunger", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-multicolor-colorless-and-lands"}, "cfbCommentary": "I'm hungry for a Big Ark myself, it's a fantastic Product. This card plays into what Lorehold is already doing, while just being an amazing card on its own. It basically draws you an extra card each turn while draining them for one, which is incredible, and sometimes it does even more than that."},
            {"name": "Colossus of the Blood Age", "setCode": "SOS", "rarity": "uncommon", "colors": ["R", "W"], "type": "Artifact Creature", "manaCost": "{4}{R}{W}", "ratings": {"cgb": {"raw": 8, "norm": 1.396}, "ds": {"raw": 7, "norm": 0.903}, "cs": {"raw": 6, "norm": 0.857}, "llu_a": {"raw": 6, "norm": 0.952}, "llu_m": {"raw": 6, "norm": 1.038}, "cfb": {"raw": 4, "norm": 0.9685}}, "avgRaw": 6.1667, "avgNorm": 1.0191, "controversy": 0.1776, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Colossus_of_the_Blood_Age", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-multicolor-colorless-and-lands"}, "cfbCommentary": ".0 The Colossus is a beating of an uncommon, giving you immediate damage, some amount of lifegain, and a sick trigger when it dies. It always puts you up one card and even lets you cash in useless cards for more action. I've lost to this multiple times, and it always feels impossible to beat."},
            {"name": "Environmental Scientist", "setCode": "SOS", "rarity": "uncommon", "colors": ["G"], "type": "Creature", "manaCost": "{1}{G}", "ratings": {"cgb": {"raw": 7, "norm": 0.995}, "ds": {"raw": 7, "norm": 0.903}, "cs": {"raw": 6, "norm": 0.857}, "llu_a": {"raw": 7, "norm": 1.523}, "llu_m": {"raw": 7, "norm": 1.575}, "cfb": {"raw": 3.5, "norm": 0.514}}, "avgRaw": 6.25, "avgNorm": 1.0612, "controversy": 0.3759, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Environmental_Scientist", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-green"}, "cfbCommentary": "In past formats, creatures identical to Environmental Scientist have cost three mana and they've still been very good. Environmental Scientist is a remarkable way to start off a game and guarantee that things are going to go smoothly. This is a subtle but excellent card, and you should be willing to spend a high pick to get it. I appreciate the callback to Environmental Sciences , which was a defining card in original Strixhaven Limited."},
            {"name": "Exhibition Tidecaller", "setCode": "SOS", "rarity": "rare", "colors": ["U"], "type": "Creature", "manaCost": "{U}", "ratings": {"cgb": {"raw": 3, "norm": -0.611}, "ds": {"raw": 7, "norm": 0.903}, "cs": {"raw": 6, "norm": 0.857}, "llu_a": {"raw": 5, "norm": 0.382}, "llu_m": {"raw": 4.5, "norm": 0.233}, "cfb": {"raw": 1, "norm": -1.7585}}, "avgRaw": 4.4167, "avgNorm": 0.0009, "controversy": 0.9324, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Exhibition_Tidecaller", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-blue"}, "cfbCommentary": ".0 // 3.0 Exhibition Tidecaller being a rare card is a good thing for the format overall, but it does make it less likely this works if you do happen to see it. You aren't getting multiples, and a mill plan based on one card isn't the most robust. If you do have a super spell-heavy deck with enough five-cost cards, this can act as a one-shot threat, as milling 10-20 can legitimately close out the game. I'd be interested in this as a finisher in some specific decks, but mostly would avoid it."},
            {"name": "Molten-Core Maestro", "setCode": "SOS", "rarity": "rare", "colors": ["R"], "type": "Creature", "manaCost": "{1}{R}", "ratings": {"cgb": {"raw": 9, "norm": 1.798}, "ds": {"raw": 7, "norm": 0.903}, "cs": {"raw": 6, "norm": 0.857}, "llu_a": {"raw": 7, "norm": 1.523}, "llu_m": {"raw": 7, "norm": 1.575}, "cfb": {"raw": 4.75, "norm": 1.6502}}, "avgRaw": 6.7917, "avgNorm": 1.3844, "controversy": 0.3668, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Molten-Core_Maestro", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-red"}, "cfbCommentary": "Molten-Core Maestro is basically Expressive Firedancer , but you get to keep the counters, add mana, and it also has menace. It doesn't get much better for a two-mana creature."},
            {"name": "Scheming Silvertongue // Sign in Blood", "setCode": "SOS", "rarity": "rare", "colors": ["B"], "type": "Creature", "manaCost": "{1}{B} // {B}{B}", "ratings": {"cgb": {"raw": 9, "norm": 1.798}, "ds": {"raw": 7, "norm": 0.903}, "cs": {"raw": 6, "norm": 0.857}, "llu_a": {"raw": 7, "norm": 1.523}, "llu_m": {"raw": 6.5, "norm": 1.307}, "cfb": {"raw": 4, "norm": 0.9685}}, "avgRaw": 6.5833, "avgNorm": 1.2261, "controversy": 0.3485, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Scheming_Silvertongue", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-black"}, "cfbCommentary": ".0 Two mana for a 1/3 flying, lifelink is already solid, and getting to draw two or four cards off of it makes it a total bomb. Scheming Silvertongue does need a little help to become prepared, but pumping it up or finding just a single point of supplemental lifegain will do the trick."},
            {"name": "Stirring Honormancer", "setCode": "SOS", "rarity": "uncommon", "colors": ["B", "W"], "type": "Creature", "manaCost": "{2}{W}{W/B}{B}", "ratings": {"cgb": {"raw": 8, "norm": 1.396}, "ds": {"raw": 7, "norm": 0.903}, "cs": {"raw": 6, "norm": 0.857}, "llu_a": {"raw": 6, "norm": 0.952}, "llu_m": {"raw": 5.5, "norm": 0.77}, "cfb": {"raw": 3.5, "norm": 0.514}}, "avgRaw": 6, "avgNorm": 0.8987, "controversy": 0.2635, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Stirring_Honormancer", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-multicolor-colorless-and-lands"}, "cfbCommentary": "I don't really know what an Honormancer is, but I'll take an extra card (with some nice selection)."},
            {"name": "Abigale, Poet Laureate // Heroic Stanza", "setCode": "SOS", "rarity": "uncommon", "colors": ["B", "W"], "type": "Legendary Creature", "manaCost": "{1}{W}{B} // {1}{W/B}", "ratings": {"cgb": {"raw": 5, "norm": 0.192}, "ds": {"raw": 6, "norm": 0.507}, "cs": {"raw": 6, "norm": 0.857}, "llu_a": {"raw": 5, "norm": 0.382}, "llu_m": {"raw": 4, "norm": -0.035}, "cfb": {"raw": 3.5, "norm": 0.514}}, "avgRaw": 4.9167, "avgNorm": 0.4028, "controversy": 0.2787, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Abigale_Poet_Laureate"}, "cfbCommentary": null},
            {"name": "Flashback", "setCode": "SOS", "rarity": "rare", "colors": ["R"], "type": "Instant", "manaCost": "{R}", "ratings": {"cgb": {"raw": 3, "norm": -0.611}, "ds": {"raw": 4, "norm": -0.284}, "cs": {"raw": 6, "norm": 0.857}, "llu_a": {"raw": 3, "norm": -0.76}, "llu_m": {"raw": 3, "norm": -0.572}, "cfb": {"raw": 2, "norm": -0.8495}}, "avgRaw": 3.5, "avgNorm": -0.3699, "controversy": 0.5765, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Flashback", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-red"}, "cfbCommentary": ".0 If you have a lot of cheap, powerful spells, Flashback might be a reasonable inclusion. Still, it is another card that requires something else and the right timing to actually do something, so don't be too excited about it."},
            {"name": "Moseo, Vein's New Dean", "setCode": "SOS", "rarity": "rare", "colors": ["B"], "type": "Legendary Creature", "manaCost": "{2}{B}", "ratings": {"cgb": {"raw": 8, "norm": 1.396}, "ds": {"raw": 6, "norm": 0.507}, "cs": {"raw": 6, "norm": 0.857}, "llu_a": {"raw": 6.5, "norm": 1.238}, "llu_m": {"raw": 6.5, "norm": 1.307}, "cfb": {"raw": 4, "norm": 0.9685}}, "avgRaw": 6.1667, "avgNorm": 1.0456, "controversy": 0.3054, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Moseo_Veins_New_Dean", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-black"}, "cfbCommentary": ".0 Moseo's Infusion ability isn't the easiest to set up. Still, it's scary enough that opponents will feel a lot of pressure to point a removal spell at the Dean, in which case you've left behind a useful token and gotten a great exchange. Any way you slice it, three mana for two bodies and lots of useful abilities is a great deal, so you should be excited to get Moseo."},
            {"name": "Prismari, the Inspiration", "setCode": "SOS", "rarity": "mythic", "colors": ["R", "U"], "type": "Legendary Creature", "manaCost": "{5}{U}{R}", "ratings": {"cgb": {"raw": 8, "norm": 1.396}, "ds": {"raw": 4, "norm": -0.284}, "cs": {"raw": 6, "norm": 0.857}, "llu_a": {"raw": 5, "norm": 0.382}, "llu_m": {"raw": 4, "norm": -0.035}, "cfb": {"raw": 2, "norm": -0.8495}}, "avgRaw": 4.8333, "avgNorm": 0.2444, "controversy": 0.7387, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Prismari_the_Inspiration", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-multicolor-colorless-and-lands"}, "cfbCommentary": ".0 As much as this does inspire me, I have played it, and it's not on the level of other Limited bombs in the set. It costs a ton of mana and doesn't do anything right away, with the Ward often unlikely enough to protect it. If you untap and have some spells, it can go crazy, but that isn't going to happen often enough to make a seven-drop amazing. I'd still play this in Prismari Control, but it's not a windmill slam."},
            {"name": "Hardened Academic", "setCode": "SOS", "rarity": "rare", "colors": ["R", "W"], "type": "Creature", "manaCost": "{R}{W}", "ratings": {"cgb": {"raw": 9, "norm": 1.798}, "ds": {"raw": 6, "norm": 0.507}, "cs": {"raw": 6.5, "norm": 1.185}, "llu_a": {"raw": 7, "norm": 1.523}, "llu_m": {"raw": 7, "norm": 1.575}, "cfb": {"raw": 4, "norm": 0.9685}}, "avgRaw": 6.5833, "avgNorm": 1.2594, "controversy": 0.4312, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Hardened_Academic", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-multicolor-colorless-and-lands"}, "cfbCommentary": ".0 I'm already in for a 2/1 flying haste, as Lorehold definitely can be the beatdown deck in Secrets of Strixhaven Limited. This also gets lifelink when needed, and can distribute some nice counters, making it a strong rare."},
            {"name": "Harmonized Trio // Brainstorm", "setCode": "SOS", "rarity": "rare", "colors": ["U"], "type": "Creature", "manaCost": "{U} // {U}", "ratings": {"cgb": {"raw": 5, "norm": 0.192}, "ds": {"raw": 6, "norm": 0.507}, "cs": {"raw": 6.5, "norm": 1.185}, "llu_a": {"raw": 6, "norm": 0.952}, "llu_m": {"raw": 6.5, "norm": 1.307}, "cfb": {"raw": 4, "norm": 0.9685}}, "avgRaw": 5.6667, "avgNorm": 0.8519, "controversy": 0.3865, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Harmonized_Trio", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-blue"}, "cfbCommentary": ".0 I'm most definitely in for Brainstorm , and all it takes is a couple of friends to get going. Harmonized Trio doesn't start prepared, but asks very little of you, and a turn or two of this will make the game turn in your favor dramatically. Just make sure you have enough creatures to get this going, at which point it's a one-mana must-kill creature."},
            {"name": "Essenceknit Scholar", "setCode": "SOS", "rarity": "uncommon", "colors": ["B", "G"], "type": "Creature", "manaCost": "{B}{B/G}{G}", "ratings": {"cgb": {"raw": 7, "norm": 0.995}, "ds": {"raw": 7, "norm": 0.903}, "cs": {"raw": 5.5, "norm": 0.53}, "llu_a": {"raw": 5.5, "norm": 0.667}, "llu_m": {"raw": 5.5, "norm": 0.77}, "cfb": {"raw": 4, "norm": 0.9685}}, "avgRaw": 5.75, "avgNorm": 0.8056, "controversy": 0.1675, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Essenceknit_Scholar", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-multicolor-colorless-and-lands"}, "cfbCommentary": ".0 Essenceknit Scholar is the perfect Witherbloom card, as it creates a Pest, draws you cards, and is fantastic to get back from the graveyard. There's really no going wrong with this, and you can even play it post-attacks to get a card if a creature died."},
            {"name": "Forum Necroscribe", "setCode": "SOS", "rarity": "uncommon", "colors": ["B"], "type": "Creature", "manaCost": "{5}{B}", "ratings": {"cgb": {"raw": 5, "norm": 0.192}, "ds": {"raw": 7, "norm": 0.903}, "cs": {"raw": 5.5, "norm": 0.53}, "llu_a": {"raw": 3, "norm": -0.76}, "llu_m": {"raw": 4, "norm": -0.035}, "cfb": {"raw": 2.5, "norm": -0.395}}, "avgRaw": 4.5, "avgNorm": 0.0725, "controversy": 0.5532, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Forum_Necroscribe", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-black"}, "cfbCommentary": "Forum Necroscribe can be potentially very powerful. However, for six mana, I generally hope for slightly more ability to stabilize the battlefield. Plus, once in a while, you'll manage to stick your powerful six-drop uncommon, and you simply won't have any more gas in your hand to use it. Necroscribe is a solid top-end creature, but perhaps not something you need to cash in with an early pick."},
            {"name": "Matterbending Mage", "setCode": "SOS", "rarity": "uncommon", "colors": ["U"], "type": "Creature", "manaCost": "{2}{U}", "ratings": {"cgb": {"raw": 8, "norm": 1.396}, "ds": {"raw": 7, "norm": 0.903}, "cs": {"raw": 5.5, "norm": 0.53}, "llu_a": {"raw": 6.5, "norm": 1.238}, "llu_m": {"raw": 6.5, "norm": 1.307}, "cfb": {"raw": 3.5, "norm": 0.514}}, "avgRaw": 6.1667, "avgNorm": 0.9813, "controversy": 0.3587, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Matterbending_Mage", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-blue"}, "cfbCommentary": "I'm in without the unblockable ability, and giving Matterbending Mage a little more to do in the mid-to-late game seems fine to me."},
            {"name": "Vibrant Outburst", "setCode": "SOS", "rarity": "uncommon", "colors": ["R", "U"], "type": "Instant", "manaCost": "{U}{R}", "ratings": {"cgb": {"raw": 7, "norm": 0.995}, "ds": {"raw": 7, "norm": 0.903}, "cs": {"raw": 5.5, "norm": 0.53}, "llu_a": {"raw": 6, "norm": 0.952}, "llu_m": {"raw": 6, "norm": 1.038}, "cfb": {"raw": 3.5, "norm": 0.514}}, "avgRaw": 5.8333, "avgNorm": 0.822, "controversy": 0.2161, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Vibrant_Outburst", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-multicolor-colorless-and-lands"}, "cfbCommentary": "This is another burn spell that can hit face, and the tap ability works very well on both offense and defense. I'm sold."},
            {"name": "Foolish Fate", "setCode": "SOS", "rarity": "uncommon", "colors": ["B"], "type": "Instant", "manaCost": "{2}{B}", "ratings": {"cgb": {"raw": 7, "norm": 0.995}, "ds": {"raw": 6, "norm": 0.507}, "cs": {"raw": 6, "norm": 0.857}, "llu_a": {"raw": 6, "norm": 0.952}, "llu_m": {"raw": 6, "norm": 1.038}, "cfb": {"raw": 3.5, "norm": 0.514}}, "avgRaw": 5.75, "avgNorm": 0.8105, "controversy": 0.2191, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Foolish_Fate", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-black"}, "cfbCommentary": "I usually give Murder a high grade whenever it appears in a Limited format. So, show me a version that's easier to cast and can frequently hit your opponent for an extra three life, and I'm extremely impressed. I'm all in on Foolish Fate ."},
            {"name": "Impractical Joke", "setCode": "SOS", "rarity": "uncommon", "colors": ["R"], "type": "Sorcery", "manaCost": "{R}", "ratings": {"cgb": {"raw": 7, "norm": 0.995}, "ds": {"raw": 6, "norm": 0.507}, "cs": {"raw": 6, "norm": 0.857}, "llu_a": {"raw": 5, "norm": 0.382}, "llu_m": {"raw": 5, "norm": 0.502}, "cfb": {"raw": 4, "norm": 0.9685}}, "avgRaw": 5.5, "avgNorm": 0.7019, "controversy": 0.2454, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Impractical_Joke", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-red"}, "cfbCommentary": ".0 The closest we are going to get to a Lightning Bolt in Limited. Super efficient removal."},
            {"name": "Mana Sculpt", "setCode": "SOS", "rarity": "rare", "colors": ["U"], "type": "Instant", "manaCost": "{1}{U}{U}", "ratings": {"cgb": {"raw": 3, "norm": -0.611}, "ds": {"raw": 6, "norm": 0.507}, "cs": {"raw": 6, "norm": 0.857}, "llu_a": {"raw": 5, "norm": 0.382}, "llu_m": {"raw": 4.5, "norm": 0.233}, "cfb": {"raw": 2.5, "norm": -0.395}}, "avgRaw": 4.5, "avgNorm": 0.1622, "controversy": 0.5104, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Mana_Sculpt", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-blue"}, "cfbCommentary": "This is mostly going to be Cancel , which is mediocre, but every now and then it will get to be Mana Drain (which is not). If you have at least three Wizards and want countermagic, this is a good option. However, it's not a Limited bomb."},
            {"name": "Pensive Professor", "setCode": "SOS", "rarity": "rare", "colors": ["U"], "type": "Creature", "manaCost": "{1}{U}{U}", "ratings": {"cgb": {"raw": 7, "norm": 0.995}, "ds": {"raw": 6, "norm": 0.507}, "cs": {"raw": 6, "norm": 0.857}, "llu_a": {"raw": 6, "norm": 0.952}, "llu_m": {"raw": 5.5, "norm": 0.77}, "cfb": {"raw": 4, "norm": 0.9685}}, "avgRaw": 5.75, "avgNorm": 0.8416, "controversy": 0.1679, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Pensive_Professor", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-blue"}, "cfbCommentary": ".0 If you untap with Pensive Professor , you know you are getting paid, and it's not hard to wait until turn four or five to run this out and get value right away. I didn't have to think much about this one — I'm all over it."},
            {"name": "Witherbloom Charm", "setCode": "SOS", "rarity": "uncommon", "colors": ["B", "G"], "type": "Instant", "manaCost": "{B}{G}", "ratings": {"cgb": {"raw": 5, "norm": 0.192}, "ds": {"raw": 6, "norm": 0.507}, "cs": {"raw": 6, "norm": 0.857}, "llu_a": {"raw": 5, "norm": 0.382}, "llu_m": {"raw": 5, "norm": 0.502}, "cfb": {"raw": 3, "norm": 0.0595}}, "avgRaw": 5, "avgNorm": 0.4166, "controversy": 0.2545, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Witherbloom_Charm", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-multicolor-colorless-and-lands"}, "cfbCommentary": ".0 The draw mode is great in the late game, and the removal mode is good early, with the lifegain being the most situational. That all adds up nicely, and this is the second-best charm after Silverquill."},
            {"name": "Fractal Tender", "setCode": "SOS", "rarity": "uncommon", "colors": ["G", "U"], "type": "Creature", "manaCost": "{3}{G}{U}", "ratings": {"cgb": {"raw": 3, "norm": -0.611}, "ds": {"raw": 7, "norm": 0.903}, "cs": {"raw": 5, "norm": 0.203}, "llu_a": {"raw": 4, "norm": -0.189}, "llu_m": {"raw": 4.5, "norm": 0.233}, "cfb": {"raw": 3.5, "norm": 0.514}}, "avgRaw": 4.5, "avgNorm": 0.1755, "controversy": 0.4829, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Fractal_Tender", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-multicolor-colorless-and-lands"}, "cfbCommentary": "Ward 2 helps a lot here, as your main goal is to just untap with this in play. At that point, you will probably be getting a free 3/3, and the game will go swimmingly from there."},
            {"name": "Garrison Excavator", "setCode": "SOS", "rarity": "uncommon", "colors": ["R"], "type": "Creature", "manaCost": "{3}{R}", "ratings": {"cgb": {"raw": 5, "norm": 0.192}, "ds": {"raw": 7, "norm": 0.903}, "cs": {"raw": 5, "norm": 0.203}, "llu_a": {"raw": 4, "norm": -0.189}, "llu_m": {"raw": 3, "norm": -0.572}, "cfb": {"raw": 1.5, "norm": -1.304}}, "avgRaw": 4.25, "avgNorm": -0.1278, "controversy": 0.6903, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Garrison_Excavator", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-red"}, "cfbCommentary": "- 4.0 A good payoff for the Lorehold decks, but still requires you to fill your graveyard and find something that consistently exiles the card without having to invest additional resources for it every turn. Garrison Excavator is certainly going to be an excellent card in the right Lorehold deck, but I remain pessimistic about how you will be able to pull things off in time consistently, given how powerful everything else looks in this format."},
            {"name": "Silverquill Charm", "setCode": "SOS", "rarity": "uncommon", "colors": ["B", "W"], "type": "Instant", "manaCost": "{W}{B}", "ratings": {"cgb": {"raw": 6, "norm": 0.593}, "ds": {"raw": 7, "norm": 0.903}, "cs": {"raw": 5, "norm": 0.203}, "llu_a": {"raw": 5, "norm": 0.382}, "llu_m": {"raw": 5, "norm": 0.502}, "cfb": {"raw": 3.5, "norm": 0.514}}, "avgRaw": 5.25, "avgNorm": 0.5162, "controversy": 0.2128, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Silverquill_Charm", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-multicolor-colorless-and-lands"}, "cfbCommentary": "This one is much more charming than the rest, offering good removal, a good combat trick, and a bit of damage to close out the game."},
            {"name": "Topiary Lecturer", "setCode": "SOS", "rarity": "uncommon", "colors": ["G"], "type": "Creature", "manaCost": "{2}{G}", "ratings": {"cgb": {"raw": 4, "norm": -0.21}, "ds": {"raw": 7, "norm": 0.903}, "cs": {"raw": 5, "norm": 0.203}, "llu_a": {"raw": 4, "norm": -0.189}, "llu_m": {"raw": 3, "norm": -0.572}, "cfb": {"raw": 3.25, "norm": 0.2867}}, "avgRaw": 4.375, "avgNorm": 0.0703, "controversy": 0.4684, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Topiary_Lecturer", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-green"}, "cfbCommentary": "Topiary Lecturer has felt impressive as a way to generate tons of extra mana over the course of a game. Imagine using this to power out a five-drop on turn four — now your opponent feels a lot of pressure to kill the five-drop, but that leaves behind the Incremented Lecturer to do even more the next turn! If you do manage to play out everything in your hand, then you might find your Lecturer ready to brawl as a 4/5 when all's said and done."},
            {"name": "Emil, Vastlands Roamer", "setCode": "SOS", "rarity": "uncommon", "colors": ["G"], "type": "Legendary Creature", "manaCost": "{2}{G}", "ratings": {"cgb": {"raw": 6, "norm": 0.593}, "ds": {"raw": 4, "norm": -0.284}, "cs": {"raw": 5.5, "norm": 0.53}, "llu_a": {"raw": 5, "norm": 0.382}, "llu_m": {"raw": 5, "norm": 0.502}, "cfb": {"raw": 3, "norm": 0.0595}}, "avgRaw": 4.75, "avgNorm": 0.2971, "controversy": 0.3123, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Emil_Vastlands_Roamer", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-green"}, "cfbCommentary": ".0 I got to play with Emil in the Magic Arena Early Access Event, and he did some good work in my Quandrix deck, giving trample to fractals and Increment creatures. If you only have, say Forests and Islands, then spending five mana for a 2/2 typically won't be your best use of mana. But you'll often have a dual land, or a splash color. Plus, it's always nice to have mana sink options. Don't be tempted to play an off-color basic land for a single copy of Emil."},
            {"name": "Killian's Confidence", "setCode": "SOS", "rarity": "uncommon", "colors": ["B", "W"], "type": "Sorcery", "manaCost": "{W}{B}", "ratings": {"cgb": {"raw": 6, "norm": 0.593}, "ds": {"raw": 6, "norm": 0.507}, "cs": {"raw": 5.5, "norm": 0.53}, "llu_a": {"raw": 5, "norm": 0.382}, "llu_m": {"raw": 5, "norm": 0.502}, "cfb": {"raw": 3.5, "norm": 0.514}}, "avgRaw": 5.1667, "avgNorm": 0.5047, "controversy": 0.0627, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Killians_Confidence", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-multicolor-colorless-and-lands"}, "cfbCommentary": "I've been impressed by this so far — perhaps this confidence is earned. This triggers Repartee, which is a solid card-drawing machine, and even nets you value from discard or self-mill when it comes up."},
            {"name": "Kirol, History Buff // Pack a Punch", "setCode": "SOS", "rarity": "uncommon", "colors": ["R", "W"], "type": "Legendary Creature", "manaCost": "{R}{W} // {1}{R}{W}", "ratings": {"cgb": {"raw": 7, "norm": 0.995}, "ds": {"raw": 6, "norm": 0.507}, "cs": {"raw": 5.5, "norm": 0.53}, "llu_a": {"raw": 5, "norm": 0.382}, "llu_m": {"raw": 5, "norm": 0.502}, "cfb": {"raw": 3, "norm": 0.0595}}, "avgRaw": 5.25, "avgNorm": 0.4959, "controversy": 0.275, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Kirol_History_Buff", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-multicolor-colorless-and-lands"}, "cfbCommentary": ".0 I mostly like this as a 2/3 for two, but the ability is a real one if the game goes long."},
            {"name": "Emeritus of Conflict // Lightning Bolt", "setCode": "SOS", "rarity": "mythic", "colors": ["R"], "type": "Creature", "manaCost": "{1}{R} // {R}", "ratings": {"cgb": {"raw": 5, "norm": 0.192}, "ds": {"raw": 6, "norm": 0.507}, "cs": {"raw": 5.5, "norm": 0.53}, "llu_a": {"raw": 5.5, "norm": 0.667}, "llu_m": {"raw": 4, "norm": -0.035}, "cfb": {"raw": 4.5, "norm": 1.423}}, "avgRaw": 5.0833, "avgNorm": 0.5473, "controversy": 0.4561, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Emeritus_of_Conflict", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-red"}, "cfbCommentary": "Casting three spells in one turn in a game of Limited is no easy task, but if anyone can do it, it's the Prismari decks in this format, especially thanks to Goblin Glasswright . You also get a 2/2 first strike creature for two mana, which is already a good deal."},
            {"name": "Grapple with Death", "setCode": "SOS", "rarity": "common", "colors": ["B", "G"], "type": "Sorcery", "manaCost": "{1}{B}{G}", "ratings": {"cgb": {"raw": 7, "norm": 0.995}, "ds": {"raw": 6, "norm": 0.507}, "cs": {"raw": 5.5, "norm": 0.53}, "llu_a": {"raw": 5, "norm": 0.382}, "llu_m": {"raw": 4.5, "norm": 0.233}, "cfb": {"raw": 3.5, "norm": 0.514}}, "avgRaw": 5.25, "avgNorm": 0.5268, "controversy": 0.2335, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Grapple_with_Death", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-multicolor-colorless-and-lands"}, "cfbCommentary": "A solid removal spell that triggers all your Witherbloom cards? Count me in."},
            {"name": "Last Gasp", "setCode": "SOS", "rarity": "common", "colors": ["B"], "type": "Instant", "manaCost": "{1}{B}", "ratings": {"cgb": {"raw": 6, "norm": 0.593}, "ds": {"raw": 6, "norm": 0.507}, "cs": {"raw": 5.5, "norm": 0.53}, "llu_a": {"raw": 5, "norm": 0.382}, "llu_m": {"raw": 5, "norm": 0.502}, "cfb": {"raw": 3, "norm": 0.0595}}, "avgRaw": 5.0833, "avgNorm": 0.4289, "controversy": 0.1767, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Last_Gasp", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-black"}, "cfbCommentary": ".0 Last Gasp has been a top common in previous Limited formats, and I expect no different here. It's efficient and reliable, what's not to like?"},
            {"name": "Lecturing Scornmage", "setCode": "SOS", "rarity": "uncommon", "colors": ["B"], "type": "Creature", "manaCost": "{B}", "ratings": {"cgb": {"raw": 3, "norm": -0.611}, "ds": {"raw": 6, "norm": 0.507}, "cs": {"raw": 5.5, "norm": 0.53}, "llu_a": {"raw": 5, "norm": 0.382}, "llu_m": {"raw": 4.5, "norm": 0.233}, "cfb": {"raw": 2.5, "norm": -0.395}}, "avgRaw": 4.4167, "avgNorm": 0.1077, "controversy": 0.4468, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Lecturing_Scornmage", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-black"}, "cfbCommentary": "I'll be honest that I'm having a tough time evaluating Lecturing Scornmage . For a snowbally one-drop like this, I could see myself being far off in either direction. In the dream scenario, you cast it on turn one and follow up with some combat tricks and removal spells until your opponent finds themselves behind against a 4/4 way before they're prepared to deal with it. On the other hand, you can draw it late when you're gassed out and have a low-impact 1/1. And the big question is: with the ga"},
            {"name": "Paradox Surveyor", "setCode": "SOS", "rarity": "uncommon", "colors": ["G", "U"], "type": "Creature", "manaCost": "{G}{G/U}{U}", "ratings": {"cgb": {"raw": 7, "norm": 0.995}, "ds": {"raw": 6, "norm": 0.507}, "cs": {"raw": 5.5, "norm": 0.53}, "llu_a": {"raw": 5.5, "norm": 0.667}, "llu_m": {"raw": 6, "norm": 1.038}, "cfb": {"raw": 3.5, "norm": 0.514}}, "avgRaw": 5.5833, "avgNorm": 0.7085, "controversy": 0.2246, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Paradox_Surveyor", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-multicolor-colorless-and-lands"}, "cfbCommentary": "Even if this almost always gets a land, it's still great, and Quandrix does actually have a decent amount of X-spells in the set."},
            {"name": "Snooping Page", "setCode": "SOS", "rarity": "uncommon", "colors": ["B", "W"], "type": "Creature", "manaCost": "{1}{W}{B}", "ratings": {"cgb": {"raw": 5, "norm": 0.192}, "ds": {"raw": 6, "norm": 0.507}, "cs": {"raw": 5.5, "norm": 0.53}, "llu_a": {"raw": 4.5, "norm": 0.096}, "llu_m": {"raw": 4, "norm": -0.035}, "cfb": {"raw": 3, "norm": 0.0595}}, "avgRaw": 4.6667, "avgNorm": 0.2249, "controversy": 0.218, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Snooping_Page", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-multicolor-colorless-and-lands"}, "cfbCommentary": ".0 This reads a bit better than it looks, having played with it and against it. It's still quite threatening, but it can be a little slow to get going."},
            {"name": "Studious First-Year // Rampant Growth", "setCode": "SOS", "rarity": "common", "colors": ["G"], "type": "Creature", "manaCost": "{G} // {1}{G}", "ratings": {"cgb": {"raw": 7, "norm": 0.995}, "ds": {"raw": 6, "norm": 0.507}, "cs": {"raw": 5.5, "norm": 0.53}, "llu_a": {"raw": 4.5, "norm": 0.096}, "llu_m": {"raw": 4.5, "norm": 0.233}, "cfb": {"raw": 3, "norm": 0.0595}}, "avgRaw": 5.0833, "avgNorm": 0.4034, "controversy": 0.3211, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Studious_First-Year", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-green"}, "cfbCommentary": ".0 Studious First-Year is a great way to start a game of Limited. This is especially true if you're playing a bigger Quandrix or multicolor deck that wants to accelerate into big plays. I've heard some content creators speculate about First-Year being the best green common. While I like a Rampant Growth as much as the next person, I'm slightly cooler on the bear wizard than that. I think I prefer to have Noxious Newt , and I definitely prefer to have the uncommon Environmental Scientist . Here's"},
            {"name": "Suspend Aggression", "setCode": "SOS", "rarity": "rare", "colors": ["R", "W"], "type": "Instant", "manaCost": "{1}{R}{W}", "ratings": {"cgb": {"raw": 8, "norm": 1.396}, "ds": {"raw": 6, "norm": 0.507}, "cs": {"raw": 5.5, "norm": 0.53}, "llu_a": {"raw": 6, "norm": 0.952}, "llu_m": {"raw": 6.5, "norm": 1.307}, "cfb": {"raw": 3.5, "norm": 0.514}}, "avgRaw": 5.9167, "avgNorm": 0.8677, "controversy": 0.376, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Suspend_Aggression", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-multicolor-colorless-and-lands"}, "cfbCommentary": "This is a weird card to parse, but I think it plays very similarly to Repulse (which is a great card). They have to replay their card within the one-turn window, which is better than just returning it to hand. Though you also have the same window with your card draw. I like this and will be satisfied with taking it early."},
            {"name": "Thornfist Striker", "setCode": "SOS", "rarity": "uncommon", "colors": ["G"], "type": "Creature", "manaCost": "{2}{G}", "ratings": {"cgb": {"raw": 6, "norm": 0.593}, "ds": {"raw": 6, "norm": 0.507}, "cs": {"raw": 5.5, "norm": 0.53}, "llu_a": {"raw": 5.5, "norm": 0.667}, "llu_m": {"raw": 5.5, "norm": 0.77}, "cfb": {"raw": 3.25, "norm": 0.2867}}, "avgRaw": 5.2917, "avgNorm": 0.559, "controversy": 0.15, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Thornfist_Striker", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-green"}, "cfbCommentary": "Thornfist Striker doesn't ask much of you, and it can be a somewhat nasty payoff for all of the little pest tokens you might have running around. I like this as a way to translate gaining life into actually getting the game over with."},

            {"name": "Proctor's Gaze", "setCode": "SOS", "rarity": "uncommon", "colors": ["G", "U"], "type": "Instant", "manaCost": "{2}{G}{U}", "ratings": {"cgb": {"raw": 6, "norm": 0.593}, "ds": {"raw": 6, "norm": 0.507}, "cs": {"raw": null, "norm": null}, "llu_a": {"raw": 5, "norm": 0.382}, "llu_m": {"raw": 5.5, "norm": 0.77}, "cfb": {"raw": 3, "norm": 0.0595}}, "avgRaw": 5.1, "avgNorm": 0.4623, "controversy": 0.2377, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Proctors_Gaze", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-multicolor-colorless-and-lands"}, "cfbCommentary": ".0 Board control plus Rampant Growth is a nice little combination, and this does exactly what the Converge deck wants to do. If you are ramping or playing three colors, this is great, and it's solid even in a normal two-color deck."},
            {"name": "Sanar, Unfinished Genius // Wild Idea", "setCode": "SOS", "rarity": "uncommon", "colors": ["R", "U"], "type": "Legendary Creature", "manaCost": "{U}{R} // {3}{U}{R}", "ratings": {"cgb": {"raw": 5, "norm": 0.192}, "ds": {"raw": 6, "norm": 0.507}, "cs": {"raw": null, "norm": null}, "llu_a": {"raw": 5, "norm": 0.382}, "llu_m": {"raw": 4.5, "norm": 0.233}, "cfb": {"raw": 3, "norm": 0.0595}}, "avgRaw": 4.7, "avgNorm": 0.2747, "controversy": 0.1552, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Sanar_Unfinished_Genius", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-multicolor-colorless-and-lands"}, "cfbCommentary": ".0 Most Prismari decks are going to be happy to run Sanar, as you only need to get a couple of Treasure tokens to be happy with him (and the prepared spell is just a bonus)."},

            {"name": "Teacher's Pest", "setCode": "SOS", "rarity": "uncommon", "colors": ["B", "G"], "type": "Creature", "manaCost": "{B}{G}", "ratings": {"cgb": {"raw": 6, "norm": 0.593}, "ds": {"raw": 6, "norm": 0.507}, "cs": {"raw": null, "norm": null}, "llu_a": {"raw": 4.5, "norm": 0.096}, "llu_m": {"raw": 4.5, "norm": 0.233}, "cfb": {"raw": 4, "norm": 0.9685}}, "avgRaw": 5, "avgNorm": 0.4795, "controversy": 0.3035, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Teachers_Pest", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-multicolor-colorless-and-lands"}, "cfbCommentary": ".0 This rating may look high, but Teacher's Pest is basically the perfect Witherbloom card. It makes sure your synergies always work, requires extreme measures to kill, and menace means it gets plenty of free attacks. Don't sleep on this, it's very strong."},
            {"name": "Charging Strifeknight", "setCode": "SOS", "rarity": "uncommon", "colors": ["R"], "type": "Creature", "manaCost": "{2}{R}", "ratings": {"cgb": {"raw": 6, "norm": 0.593}, "ds": {"raw": 7, "norm": 0.903}, "cs": {"raw": 4.5, "norm": -0.125}, "llu_a": {"raw": 5.5, "norm": 0.667}, "llu_m": {"raw": 5.5, "norm": 0.77}, "cfb": {"raw": 3.5, "norm": 0.514}}, "avgRaw": 5.3333, "avgNorm": 0.5537, "controversy": 0.328, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Charging_Strifeknight", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-red"}, "cfbCommentary": "Charging Strifeknight seems like a card made mostly as a great enabler for the Lorehold synergies, but the efficiency and utility are so good that it should be a premium card in any red deck."},
            {"name": "Artistic Process", "setCode": "SOS", "rarity": "uncommon", "colors": ["R"], "type": "Sorcery", "manaCost": "{3}{R}{R}", "ratings": {"cgb": {"raw": 5, "norm": 0.192}, "ds": {"raw": 6, "norm": 0.507}, "cs": {"raw": 5, "norm": 0.203}, "llu_a": {"raw": 5.5, "norm": 0.667}, "llu_m": {"raw": 5, "norm": 0.502}, "cfb": {"raw": 3, "norm": 0.0595}}, "avgRaw": 4.9167, "avgNorm": 0.3551, "controversy": 0.2157, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Artistic_Process", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-red"}, "cfbCommentary": ".0 Artistic Process is a better version of Archaic's Agony , and you only need to have one color of mana to cast it. Again, you can only afford to play so many expensive cards, but I really like the flexibility here."},
            {"name": "Muse Seeker", "setCode": "SOS", "rarity": "uncommon", "colors": ["U"], "type": "Creature", "manaCost": "{1}{U}", "ratings": {"cgb": {"raw": 3, "norm": -0.611}, "ds": {"raw": 6, "norm": 0.507}, "cs": {"raw": 5, "norm": 0.203}, "llu_a": {"raw": 4, "norm": -0.189}, "llu_m": {"raw": 4.5, "norm": 0.233}, "cfb": {"raw": 3.5, "norm": 0.514}}, "avgRaw": 4.3333, "avgNorm": 0.1095, "controversy": 0.3987, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Muse_Seeker", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-blue"}, "cfbCommentary": "Even as just a draw and discard option, Muse Seeker fuels spell decks nicely. Once you start on the Opus track, this just looks great. As long as you have more than ten spells, this is more than worth it."},
            {"name": "Pestbrood Sloth", "setCode": "SOS", "rarity": "uncommon", "colors": ["G"], "type": "Creature", "manaCost": "{3}{G}", "ratings": {"cgb": {"raw": 7, "norm": 0.995}, "ds": {"raw": 6, "norm": 0.507}, "cs": {"raw": 5, "norm": 0.203}, "llu_a": {"raw": 5, "norm": 0.382}, "llu_m": {"raw": 5, "norm": 0.502}, "cfb": {"raw": 3, "norm": 0.0595}}, "avgRaw": 5.1667, "avgNorm": 0.4414, "controversy": 0.2946, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Pestbrood_Sloth", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-green"}, "cfbCommentary": ".0 Pestbrood Sloth is a great way to stabilize the battlefield. As a 4/4 reach, it blocks incredibly well in the mid-game. So if your opponent wants to keep connecting in combat, they may need to remove or trade with the Sloth, at which point you get two more bodies for your troubles."},
            {"name": "Group Project", "setCode": "SOS", "rarity": "uncommon", "colors": ["W"], "type": "Sorcery", "manaCost": "{1}{W}", "ratings": {"cgb": {"raw": 6, "norm": 0.593}, "ds": {"raw": 5, "norm": 0.111}, "cs": {"raw": 5.5, "norm": 0.53}, "llu_a": {"raw": 5, "norm": 0.382}, "llu_m": {"raw": 5.5, "norm": 0.77}, "cfb": {"raw": 3, "norm": 0.0595}}, "avgRaw": 5, "avgNorm": 0.4076, "controversy": 0.2551, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Group_Project", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-white"}, "cfbCommentary": ".0 Decent value two-drop that you will mostly appreciate in Lorehold decks, where the easy flashback cost enables your \"leaves your graveyard\" synergies without having to invest additional mana."},
            {"name": "Leech Collector // Bloodletting", "setCode": "SOS", "rarity": "uncommon", "colors": ["B"], "type": "Creature", "manaCost": "{1}{B} // {B}", "ratings": {"cgb": {"raw": 4, "norm": -0.21}, "ds": {"raw": 5, "norm": 0.111}, "cs": {"raw": 5.5, "norm": 0.53}, "llu_a": {"raw": 4, "norm": -0.189}, "llu_m": {"raw": 2, "norm": -1.108}, "cfb": {"raw": 2.5, "norm": -0.395}}, "avgRaw": 3.8333, "avgNorm": -0.2102, "controversy": 0.4986, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Leech_Collector", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-black"}, "cfbCommentary": "Leech Collector offers a way to translate repeated lifegain into a non-combat win condition that might be very scary for opponents. However, it doesn't enter prepared, and doesn't self-enable. In other words, I think this will find some nice homes, but I don't see it as a high-pick, premium card."},
            {"name": "Postmortem Professor", "setCode": "SOS", "rarity": "rare", "colors": ["B"], "type": "Creature", "manaCost": "{1}{B}", "ratings": {"cgb": {"raw": 5, "norm": 0.192}, "ds": {"raw": 5, "norm": 0.111}, "cs": {"raw": 5.5, "norm": 0.53}, "llu_a": {"raw": 5, "norm": 0.382}, "llu_m": {"raw": 4.5, "norm": 0.233}, "cfb": {"raw": 3.75, "norm": 0.7412}}, "avgRaw": 4.7917, "avgNorm": 0.3649, "controversy": 0.2164, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Postmortem_Professor", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-black"}, "cfbCommentary": "Postmortem Professor's stats are modest enough that it won't dominate the game like a true bomb creature can. Still, by threatening a four-point lifeswing each attack, this thing is a real threat, and recurring it multiple times in a game isn't difficult."},
            {"name": "Scolding Administrator", "setCode": "SOS", "rarity": "uncommon", "colors": ["B", "W"], "type": "Creature", "manaCost": "{W}{B}", "ratings": {"cgb": {"raw": 7, "norm": 0.995}, "ds": {"raw": 5, "norm": 0.111}, "cs": {"raw": 5.5, "norm": 0.53}, "llu_a": {"raw": 5.5, "norm": 0.667}, "llu_m": {"raw": 6, "norm": 1.038}, "cfb": {"raw": 3.5, "norm": 0.514}}, "avgRaw": 5.4167, "avgNorm": 0.6425, "controversy": 0.3144, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Scolding_Administrator", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-multicolor-colorless-and-lands"}, "cfbCommentary": "Silverquill likes its administrators, apparently, and this looks like a solid reason to be in that school. It grows quickly and gives you a rebate when it dies, making it a great two-drop."},
            {"name": "Startled Relic Sloth", "setCode": "SOS", "rarity": "uncommon", "colors": ["R", "W"], "type": "Creature", "manaCost": "{2}{R}{W}", "ratings": {"cgb": {"raw": 6, "norm": 0.593}, "ds": {"raw": 5, "norm": 0.111}, "cs": {"raw": 5.5, "norm": 0.53}, "llu_a": {"raw": 4, "norm": -0.189}, "llu_m": {"raw": 4, "norm": -0.035}, "cfb": {"raw": 3.5, "norm": 0.514}}, "avgRaw": 4.6667, "avgNorm": 0.254, "controversy": 0.3052, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Startled_Relic_Sloth", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-multicolor-colorless-and-lands"}, "cfbCommentary": "This gives you a great combatant and triggers all your graveyard stuff — better move fast on the Sloth before it disappears from the pack."},
            {"name": "Steal the Show", "setCode": "SOS", "rarity": "rare", "colors": ["R"], "type": "Sorcery", "manaCost": "{2}{R}", "ratings": {"cgb": {"raw": 4, "norm": -0.21}, "ds": {"raw": 5, "norm": 0.111}, "cs": {"raw": 5.5, "norm": 0.53}, "llu_a": {"raw": 3, "norm": -0.76}, "llu_m": {"raw": 3, "norm": -0.572}, "cfb": {"raw": 1.5, "norm": -1.304}}, "avgRaw": 3.6667, "avgNorm": -0.3675, "controversy": 0.5961, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Steal_the_Show", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-red"}, "cfbCommentary": "This seems like a lot of work to achieve what Unsubtle Mockery does without any hassle. Steal the Show has some extra utility in the late game, but it is awful early. If it could target the opponent, I would be more excited about it, as it could serve as a finisher for the Prismari decks, going as hard on spells as possible. As is, I am not a big fan."},
            {"name": "Thunderdrum Soloist", "setCode": "SOS", "rarity": "uncommon", "colors": ["R"], "type": "Creature", "manaCost": "{1}{R}", "ratings": {"cgb": {"raw": 3, "norm": -0.611}, "ds": {"raw": 5, "norm": 0.111}, "cs": {"raw": 5.5, "norm": 0.53}, "llu_a": {"raw": 5, "norm": 0.382}, "llu_m": {"raw": 5, "norm": 0.502}, "cfb": {"raw": 1.25, "norm": -1.5312}}, "avgRaw": 4.125, "avgNorm": -0.1029, "controversy": 0.7467, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Thunderdrum_Soloist", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-red"}, "cfbCommentary": "Between Goblin Glasswright, Hydro-Channeler , Landscape Painter (and also Essence Scatter and Tome Blast ), which are all significantly better, I am not expecting Prismari to be interested in more two-mana creatures."},
            {"name": "Together as One", "setCode": "SOS", "rarity": "rare", "colors": [], "type": "Sorcery", "manaCost": "{6}", "ratings": {"cgb": {"raw": 7, "norm": 0.995}, "ds": {"raw": 9, "norm": 1.694}, "cs": {"raw": 3, "norm": -1.106}, "llu_a": {"raw": 7, "norm": 1.523}, "llu_m": {"raw": 7, "norm": 1.575}, "cfb": {"raw": 4.5, "norm": 1.423}}, "avgRaw": 6.25, "avgNorm": 1.0173, "controversy": 0.9745, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Together_as_One", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-multicolor-colorless-and-lands"}, "cfbCommentary": "This is the reason to draft Converge, and a card I'm happy taking first. It is basically Cruel Ultimatum , and ends games in a similar fashion."},
