            {"name": "Tablet of Discovery", "setCode": "SOS", "rarity": "uncommon", "colors": ["R"], "type": "Artifact", "manaCost": "{2}{R}", "ratings": {"cgb": {"raw": 3, "norm": -0.611}, "ds": {"raw": 6, "norm": 0.507}, "cs": {"raw": 3, "norm": -1.106}, "llu_a": {"raw": 5, "norm": 0.382}, "llu_m": {"raw": 4.5, "norm": 0.233}, "cfb": {"raw": 3.75, "norm": 0.7412}}, "avgRaw": 4.2083, "avgNorm": 0.0244, "controversy": 0.6582, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Tablet_of_Discovery", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-red"}, "cfbCommentary": "Red truly has no shortage of creating extra mana in this format. Tablet of Discovery is yet another card that allows you to play the busted X-spells and cards like Stress Dream , Visionary's Dance , or a splashed Embrace the Paradox or Mind into Matter ahead of the curve. In addition to that, if you draw it in the late game, which is usually when mana rocks are at their worst, you can even get a free card from it. I like this card a lot."},
            {"name": "Rapturous Moment", "setCode": "SOS", "rarity": "uncommon", "colors": ["R", "U"], "type": "Sorcery", "manaCost": "{4}{U}{R}", "ratings": {"cgb": {"raw": 5, "norm": 0.192}, "ds": {"raw": 4, "norm": -0.284}, "cs": {"raw": 4, "norm": -0.452}, "llu_a": {"raw": 3, "norm": -0.76}, "llu_m": {"raw": 1, "norm": -1.645}, "cfb": {"raw": 3, "norm": 0.0595}}, "avgRaw": 3.3333, "avgNorm": -0.4816, "controversy": 0.6079, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Rapturous_Moment", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-multicolor-colorless-and-lands"}, "cfbCommentary": ".0 I've been impressed with Rapturous Moment , having had it in three decks during early access. It triggers your Opus cards, lets you multi-spell easily, and provides a lot of card filtering for just one mana net. It also goes crazy with the Lute, as you tap three lands and are left with five mana that can cast creatures."},
            {"name": "Strife Scholar // Awaken the Ages", "setCode": "SOS", "rarity": "common", "colors": ["R"], "type": "Creature", "manaCost": "{2}{R} // {5}{R}", "ratings": {"cgb": {"raw": 4, "norm": -0.21}, "ds": {"raw": 4, "norm": -0.284}, "cs": {"raw": 4, "norm": -0.452}, "llu_a": {"raw": 3, "norm": -0.76}, "llu_m": {"raw": 2, "norm": -1.108}, "cfb": {"raw": 1.25, "norm": -1.5312}}, "avgRaw": 3.0417, "avgNorm": -0.7242, "controversy": 0.4712, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Strife_Scholar", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-red"}, "cfbCommentary": "This card looks like good value at first sight, but the body is quite mediocre as it will always trade down for a two-drop, and paying six mana for Awaken the Ages is quite a lot. I expect this card to be a lot worse than it looks."},
            {"name": "Zealous Lorecaster", "setCode": "SOS", "rarity": "common", "colors": ["R"], "type": "Creature", "manaCost": "{5}{R}", "ratings": {"cgb": {"raw": 5, "norm": 0.192}, "ds": {"raw": 4, "norm": -0.284}, "cs": {"raw": 4, "norm": -0.452}, "llu_a": {"raw": 4.5, "norm": 0.096}, "llu_m": {"raw": 4, "norm": -0.035}, "cfb": {"raw": 1.75, "norm": -1.0767}}, "avgRaw": 3.875, "avgNorm": -0.26, "controversy": 0.4255, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Zealous_Lorecaster", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-red"}, "cfbCommentary": "Zealous Lorecaster is a bit too expensive with too small a body for the mana invested. It looks like a decent card, and lower-power formats it probably would be, but this set seems like it just simply has too many good cards for something like this to be good enough. Red seems really strong to me for many reasons. There are a lot of good value cards, ways to get ahead on cards and other resources, and even multiple cards that rummage to smooth out your draws. The multicolored cards are incredibl"},
            {"name": "Adventurous Eater // Have a Bite", "setCode": "SOS", "rarity": "common", "colors": ["B"], "type": "Creature", "manaCost": "{2}{B} // {B}", "ratings": {"cgb": {"raw": 4, "norm": -0.21}, "ds": {"raw": 3, "norm": -0.68}, "cs": {"raw": 4.5, "norm": -0.125}, "llu_a": {"raw": 4, "norm": -0.189}, "llu_m": {"raw": 3, "norm": -0.572}, "cfb": {"raw": 3, "norm": 0.0595}}, "avgRaw": 3.5833, "avgNorm": -0.2861, "controversy": 0.2574, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Adventurous_Eater"}, "cfbCommentary": null},
            {"name": "Expressive Firedancer", "setCode": "SOS", "rarity": "common", "colors": ["R"], "type": "Creature", "manaCost": "{1}{R}", "ratings": {"cgb": {"raw": 4, "norm": -0.21}, "ds": {"raw": 3, "norm": -0.68}, "cs": {"raw": 4.5, "norm": -0.125}, "llu_a": {"raw": 4, "norm": -0.189}, "llu_m": {"raw": 4, "norm": -0.035}, "cfb": {"raw": 2, "norm": -0.8495}}, "avgRaw": 3.5833, "avgNorm": -0.3481, "controversy": 0.3038, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Expressive_Firedancer", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-red"}, "cfbCommentary": ".0 Fine filler for the Prismari decks, though I suspect you will usually rather go for Goblin Glasswright , Hydro-Channeler , or Essence Scatter to fill the two-mana slot."},
            {"name": "Infirmary Healer // Stream of Life", "setCode": "SOS", "rarity": "uncommon", "colors": ["G"], "type": "Creature", "manaCost": "{1}{G} // {X}{G}", "ratings": {"cgb": {"raw": 6, "norm": 0.593}, "ds": {"raw": 3, "norm": -0.68}, "cs": {"raw": 4.5, "norm": -0.125}, "llu_a": {"raw": 5, "norm": 0.382}, "llu_m": {"raw": 4.5, "norm": 0.233}, "cfb": {"raw": 2.75, "norm": -0.1678}}, "avgRaw": 4.2917, "avgNorm": 0.0392, "controversy": 0.4181, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Infirmary_Healer", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-green"}, "cfbCommentary": "Stream of Life is rarely going to be an exciting way to spend your mana. But since it comes attached to a perfectly reasonable body, Infirmity Healer offers a low-cost way to enable Infusion, Opus, and the various Quandrix cards that reference \"X spells\"."},
            {"name": "Inkling Mascot", "setCode": "SOS", "rarity": "common", "colors": ["B", "W"], "type": "Creature", "manaCost": "{W}{B}", "ratings": {"cgb": {"raw": 5, "norm": 0.192}, "ds": {"raw": 3, "norm": -0.68}, "cs": {"raw": 4.5, "norm": -0.125}, "llu_a": {"raw": 4.5, "norm": 0.096}, "llu_m": {"raw": 4, "norm": -0.035}, "cfb": {"raw": 2, "norm": -0.8495}}, "avgRaw": 3.8333, "avgNorm": -0.2336, "controversy": 0.3915, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Inkling_Mascot", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-multicolor-colorless-and-lands"}, "cfbCommentary": ".0 In the dedicated Repartee deck, I'd play this, but I'm not jumping for joy about it."},
            {"name": "Joined Researchers // Secret Rendezvous", "setCode": "SOS", "rarity": "rare", "colors": ["W"], "type": "Creature", "manaCost": "{1}{W} // {1}{W}{W}", "ratings": {"cgb": {"raw": 4, "norm": -0.21}, "ds": {"raw": 3, "norm": -0.68}, "cs": {"raw": 4.5, "norm": -0.125}, "llu_a": {"raw": 5, "norm": 0.382}, "llu_m": {"raw": 4.5, "norm": 0.233}, "cfb": {"raw": 3.5, "norm": 0.514}}, "avgRaw": 4.0833, "avgNorm": 0.019, "controversy": 0.405, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Joined_Researchers"}, "cfbCommentary": null},
            {"name": "Landscape Painter // Vibrant Idea", "setCode": "SOS", "rarity": "common", "colors": ["U"], "type": "Creature", "manaCost": "{1}{U} // {4}{U}", "ratings": {"cgb": {"raw": 4, "norm": -0.21}, "ds": {"raw": 3, "norm": -0.68}, "cs": {"raw": 4.5, "norm": -0.125}, "llu_a": {"raw": 3, "norm": -0.76}, "llu_m": {"raw": 4, "norm": -0.035}, "cfb": {"raw": 3, "norm": 0.0595}}, "avgRaw": 3.5833, "avgNorm": -0.2918, "controversy": 0.3146, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Landscape_Painter", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-blue"}, "cfbCommentary": ".0 A 2/1 that lets you cash in a draw two later? I'm sold, even if the draw part is on the expensive side. My main advice here is not to get overly attached to drawing two, and if you can trade off Landscape Painter early, I would consider it a happy little accident."},
            {"name": "Melancholic Poet", "setCode": "SOS", "rarity": "common", "colors": ["B"], "type": "Creature", "manaCost": "{1}{B}", "ratings": {"cgb": {"raw": 3, "norm": -0.611}, "ds": {"raw": 3, "norm": -0.68}, "cs": {"raw": 4.5, "norm": -0.125}, "llu_a": {"raw": 4.5, "norm": 0.096}, "llu_m": {"raw": 4, "norm": -0.035}, "cfb": {"raw": 2.5, "norm": -0.395}}, "avgRaw": 3.5833, "avgNorm": -0.2917, "controversy": 0.2908, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Melancholic_Poet", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-black"}, "cfbCommentary": "Melancholic Poet is a decent two-drop that gives you a little extra, and synergizes well with the themes of both Silverquill and Witherbloom. That's about the definition of a solid filler card."},
            {"name": "Mindful Biomancer", "setCode": "SOS", "rarity": "common", "colors": ["G"], "type": "Creature", "manaCost": "{1}{G}", "ratings": {"cgb": {"raw": 3, "norm": -0.611}, "ds": {"raw": 3, "norm": -0.68}, "cs": {"raw": 4.5, "norm": -0.125}, "llu_a": {"raw": 4.5, "norm": 0.096}, "llu_m": {"raw": 4, "norm": -0.035}, "cfb": {"raw": 2.75, "norm": -0.1678}}, "avgRaw": 3.625, "avgNorm": -0.2538, "controversy": 0.2897, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Mindful_Biomancer", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-green"}, "cfbCommentary": "Mindful Biomancer is a really nice two-drop. If you trade it off, then the point of lifegain is a nice bonus. And due to the threat of its activated ability, this is actually quite annoying to block."},
            {"name": "Quick Study", "setCode": "SOS", "rarity": "common", "colors": ["U"], "type": "Instant", "manaCost": "{2}{U}", "ratings": {"cgb": {"raw": 4, "norm": -0.21}, "ds": {"raw": 3, "norm": -0.68}, "cs": {"raw": 4.5, "norm": -0.125}, "llu_a": {"raw": 4, "norm": -0.189}, "llu_m": {"raw": 4, "norm": -0.035}, "cfb": {"raw": 3, "norm": 0.0595}}, "avgRaw": 3.75, "avgNorm": -0.1966, "controversy": 0.2348, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Quick_Study", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-blue"}, "cfbCommentary": ".0 Divination has been powercrept out for a while now, so I'm just happy to get an instant-speed version of it in Quick Study ."},
            {"name": "Rehearsed Debater", "setCode": "SOS", "rarity": "common", "colors": ["W"], "type": "Creature", "manaCost": "{2}{W}", "ratings": {"cgb": {"raw": 4, "norm": -0.21}, "ds": {"raw": 3, "norm": -0.68}, "cs": {"raw": 4.5, "norm": -0.125}, "llu_a": {"raw": 4, "norm": -0.189}, "llu_m": {"raw": 4.5, "norm": 0.233}, "cfb": {"raw": 2.75, "norm": -0.1678}}, "avgRaw": 3.7917, "avgNorm": -0.1898, "controversy": 0.2659, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Rehearsed_Debater", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-white"}, "cfbCommentary": "Another good filler with solid stats and a useful ability."},
            {"name": "Shattered Acolyte", "setCode": "SOS", "rarity": "common", "colors": ["W"], "type": "Creature", "manaCost": "{1}{W}", "ratings": {"cgb": {"raw": 5, "norm": 0.192}, "ds": {"raw": 3, "norm": -0.68}, "cs": {"raw": 4.5, "norm": -0.125}, "llu_a": {"raw": 4.5, "norm": 0.096}, "llu_m": {"raw": 4.5, "norm": 0.233}, "cfb": {"raw": 2.25, "norm": -0.6222}}, "avgRaw": 3.9583, "avgNorm": -0.151, "controversy": 0.3716, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Shattered_Acolyte", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-white"}, "cfbCommentary": "There are 16 cards with the artifact or enchantment type in this set, but most of them immediately create some value, and only about a handful of them seem worth destroying. That makes Shattered Acolyte a fine filler card that goes up in value the more ways you have to buff your creatures, like with Dig Site Inventory ."},
            {"name": "Stone Docent", "setCode": "SOS", "rarity": "common", "colors": ["W"], "type": "Creature", "manaCost": "{1}{W}", "ratings": {"cgb": {"raw": 4, "norm": -0.21}, "ds": {"raw": 3, "norm": -0.68}, "cs": {"raw": 4.5, "norm": -0.125}, "llu_a": {"raw": 4.5, "norm": 0.096}, "llu_m": {"raw": 4.5, "norm": 0.233}, "cfb": {"raw": 2.75, "norm": -0.1678}}, "avgRaw": 3.875, "avgNorm": -0.1423, "controversy": 0.2864, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Stone_Docent", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-white"}, "cfbCommentary": "Fine two-drop that looks like an important piece of the puzzle for the Lorehold decks, where you want to fill your graveyard naturally as the game goes, with cards you can exile or flashback instead of having to spend too much time on doing that with cards that do not affect the board."},
            {"name": "Tackle Artist", "setCode": "SOS", "rarity": "common", "colors": ["R"], "type": "Creature", "manaCost": "{3}{R}", "ratings": {"cgb": {"raw": 2, "norm": -1.013}, "ds": {"raw": 3, "norm": -0.68}, "cs": {"raw": 4.5, "norm": -0.125}, "llu_a": {"raw": 3, "norm": -0.76}, "llu_m": {"raw": 3, "norm": -0.572}, "cfb": {"raw": 1.75, "norm": -1.0767}}, "avgRaw": 2.875, "avgNorm": -0.7045, "controversy": 0.3138, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Tackle_Artist", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-red"}, "cfbCommentary": "Another fine filler that will mostly fit in Prismari."},
            {"name": "Snarl Song", "setCode": "SOS", "rarity": "uncommon", "colors": ["G"], "type": "Sorcery", "manaCost": "{5}{G}", "ratings": {"cgb": {"raw": 6, "norm": 0.593}, "ds": {"raw": 7, "norm": 0.903}, "cs": {"raw": 2, "norm": -1.761}, "llu_a": {"raw": 6, "norm": 0.952}, "llu_m": {"raw": 5.5, "norm": 0.77}, "cfb": {"raw": 1.5, "norm": -1.304}}, "avgRaw": 4.6667, "avgNorm": 0.0255, "controversy": 1.1153, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Snarl_Song", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-green"}, "cfbCommentary": "- 4.0 Snarl Song is weak for a normal two-color deck. But it scales up to be incredibly strong if you can spend four or five different colors of mana on it. This makes it an ideal payoff for a multicolor converge deck, but many green drafters at the table won't want it."},
            {"name": "Lumaret's Favor", "setCode": "SOS", "rarity": "uncommon", "colors": ["G"], "type": "Instant", "manaCost": "{1}{G}", "ratings": {"cgb": {"raw": 4, "norm": -0.21}, "ds": {"raw": 3, "norm": -0.68}, "cs": {"raw": 4, "norm": -0.452}, "llu_a": {"raw": 4, "norm": -0.189}, "llu_m": {"raw": 3, "norm": -0.572}, "cfb": {"raw": 2.5, "norm": -0.395}}, "avgRaw": 3.4167, "avgNorm": -0.4163, "controversy": 0.1778, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Lumarets_Favor", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-green"}, "cfbCommentary": "Lumaret's Favor is a very strong version of a category of cards (combat tricks) your green decks won't particularly need. It's possible to use this to win two combat exchanges at the same time, but the setup required for that is pretty elaborate. This is another case where you can put Lumaret's Favor in your Witherbloom decks when you have it, but likely shouldn't be picking it terribly highly."},
            {"name": "Shopkeeper's Bane", "setCode": "SOS", "rarity": "common", "colors": ["G"], "type": "Creature", "manaCost": "{2}{G}", "ratings": {"cgb": {"raw": 3, "norm": -0.611}, "ds": {"raw": 2, "norm": -1.076}, "cs": {"raw": 4, "norm": -0.452}, "llu_a": {"raw": 4, "norm": -0.189}, "llu_m": {"raw": 4, "norm": -0.035}, "cfb": {"raw": 2.5, "norm": -0.395}}, "avgRaw": 3.25, "avgNorm": -0.4597, "controversy": 0.3318, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Shopkeepers_Bane", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-green"}, "cfbCommentary": "I typically dislike 4/2s for three mana, since they're very likely to trade down against two-drop creatures. Shopkeeper's Bane makes up for that with trample and an attack trigger, meaning that even when it trades down on mana, you likely get a reasonable life-total swing along with it. This looks like a middle-of-the-road filler creature."},
            {"name": "Spellbook Seeker // Careful Study", "setCode": "SOS", "rarity": "common", "colors": ["U"], "type": "Creature", "manaCost": "{3}{U} // {U}", "ratings": {"cgb": {"raw": 4, "norm": -0.21}, "ds": {"raw": 2, "norm": -1.076}, "cs": {"raw": 5, "norm": 0.203}, "llu_a": {"raw": 4, "norm": -0.189}, "llu_m": {"raw": 2, "norm": -1.108}, "cfb": {"raw": 3, "norm": 0.0595}}, "avgRaw": 3.3333, "avgNorm": -0.3867, "controversy": 0.5184, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Spellbook_Seeker", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-blue"}, "cfbCommentary": ".0 I'd say a Careful Study is more than enough to get me to play a 3/3 flier for four, and I anticipate Spellbook Seeker being a staple common in the format."},
            {"name": "Cheerful Osteomancer // Raise Dead", "setCode": "SOS", "rarity": "common", "colors": ["B"], "type": "Creature", "manaCost": "{3}{B} // {B}", "ratings": {"cgb": {"raw": 5, "norm": 0.192}, "ds": {"raw": 5, "norm": 0.111}, "cs": {"raw": 3, "norm": -1.106}, "llu_a": {"raw": 3, "norm": -0.76}, "llu_m": {"raw": 3, "norm": -0.572}, "cfb": {"raw": 3, "norm": 0.0595}}, "avgRaw": 3.6667, "avgNorm": -0.3459, "controversy": 0.4938, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Cheerful_Osteomancer", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-black"}, "cfbCommentary": ".0 Whenever possible, you'll want to cast Cheerful Osteomancer's Raise Dead spell right away, before giving the opponent a chance to remove the fragile body. In other words, this feels a lot like five mana for a 4/2 Gravedigger , which is a late-game play I'm definitely in for."},
            {"name": "Daydream", "setCode": "SOS", "rarity": "uncommon", "colors": ["W"], "type": "Sorcery", "manaCost": "{W}", "ratings": {"cgb": {"raw": 1, "norm": -1.414}, "ds": {"raw": 5, "norm": 0.111}, "cs": {"raw": 3, "norm": -1.106}, "llu_a": {"raw": 3, "norm": -0.76}, "llu_m": {"raw": 2, "norm": -1.108}, "cfb": {"raw": 1, "norm": -1.7585}}, "avgRaw": 2.5, "avgNorm": -1.0059, "controversy": 0.5861, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Daydream", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-white"}, "cfbCommentary": ".0 - 2.5 An interesting utility card that needs the right home with a lot of creatures with good \"enter the battlefield\" effects like Poisoner's Apprentice , Matterbending Mage , or Orysa, Tide Choreographer . The most obvious use of Daydream should be in combination with creatures that enter Prepared, which means you can basically \"reset\" them that way and use them again. Flicker -type cards are also good in a format with many cards like Pacifism or Sleep , but I don't see those cards in this s"},
            {"name": "Essence Scatter", "setCode": "SOS", "rarity": "common", "colors": ["U"], "type": "Instant", "manaCost": "{1}{U}", "ratings": {"cgb": {"raw": 5, "norm": 0.192}, "ds": {"raw": 5, "norm": 0.111}, "cs": {"raw": 3, "norm": -1.106}, "llu_a": {"raw": 5.5, "norm": 0.667}, "llu_m": {"raw": 5, "norm": 0.502}, "cfb": {"raw": 3, "norm": 0.0595}}, "avgRaw": 4.4167, "avgNorm": 0.0709, "controversy": 0.569, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Essence_Scatter", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-blue"}, "cfbCommentary": ".0 This style of spells always plays well in Limited, and I see no reason why Secrets of Strixhaven would be different. At just two mana, Essence Scatter is affordable, effective, and a good stand-in for a two-drop (especially on the draw, where you get to nab their three-mana play)."},
            {"name": "Primary Research", "setCode": "SOS", "rarity": "uncommon", "colors": ["W"], "type": "Enchantment", "manaCost": "{4}{W}", "ratings": {"cgb": {"raw": 3, "norm": -0.611}, "ds": {"raw": 5, "norm": 0.111}, "cs": {"raw": 3, "norm": -1.106}, "llu_a": {"raw": 5.5, "norm": 0.667}, "llu_m": {"raw": 6, "norm": 1.038}, "cfb": {"raw": 1, "norm": -1.7585}}, "avgRaw": 3.9167, "avgNorm": -0.2766, "controversy": 0.9802, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Primary_Research", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-white"}, "cfbCommentary": ".0 - 4.0 Five mana is generally too much to bring back something that costs three or less, unless it is a bomb like Stirring Hopesinger . The more exciting part is using this as a value engine by drawing extra cards, but to consistently have something leave your graveyard every turn does not seem trivial. It pairs incredibly well with Rubble Rouser , which even enables you to get it into play on turn four. Ascendant Dustspeaker is another card that allows you to exile a card every turn, but gett"},
            {"name": "Sundering Archaic", "setCode": "SOS", "rarity": "uncommon", "colors": [], "type": "Creature", "manaCost": "{6}", "ratings": {"cgb": {"raw": 4, "norm": -0.21}, "ds": {"raw": 5, "norm": 0.111}, "cs": {"raw": 3, "norm": -1.106}, "llu_a": {"raw": 4.5, "norm": 0.096}, "llu_m": {"raw": 5, "norm": 0.502}, "cfb": {"raw": 4, "norm": 0.9685}}, "avgRaw": 4.25, "avgNorm": 0.0603, "controversy": 0.6399, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Sundering_Archaic", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-multicolor-colorless-and-lands"}, "cfbCommentary": ".0 I love this as a removal option in Converge, and the activated ability comes up a lot. It can mess with their graveyard stuff or prevent you from being decked, both of which are relevant."},
            {"name": "Brush Off", "setCode": "SOS", "rarity": "uncommon", "colors": ["U"], "type": "Instant", "manaCost": "{2}{U}{U}", "ratings": {"cgb": {"raw": 2, "norm": -1.013}, "ds": {"raw": 3, "norm": -0.68}, "cs": {"raw": 4, "norm": -0.452}, "llu_a": {"raw": 5, "norm": 0.382}, "llu_m": {"raw": 5, "norm": 0.502}, "cfb": {"raw": 1.5, "norm": -1.304}}, "avgRaw": 3.4167, "avgNorm": -0.4275, "controversy": 0.6702, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Brush_Off", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-blue"}, "cfbCommentary": "I'd be happy to mainboard Brush Off in Sealed, and would consider it in Draft if you have a lot of other instant-speed options. When you leave four mana up, and they don't play anything, you want to be able to spend that mana on something."},
            {"name": "Growth Curve", "setCode": "SOS", "rarity": "uncommon", "colors": ["G", "U"], "type": "Sorcery", "manaCost": "{G}{U}", "ratings": {"cgb": {"raw": 2, "norm": -1.013}, "ds": {"raw": 3, "norm": -0.68}, "cs": {"raw": 4, "norm": -0.452}, "llu_a": {"raw": 2, "norm": -1.331}, "llu_m": {"raw": 1, "norm": -1.645}, "cfb": {"raw": 1, "norm": -1.7585}}, "avgRaw": 2.1667, "avgNorm": -1.1466, "controversy": 0.4787, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Growth_Curve", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-multicolor-colorless-and-lands"}, "cfbCommentary": ".0 // 3.0 I would avoid playing a sorcery speed pump spell most of the time, but if you are playing the dedicated Fractal deck, then this likely is worth it. Once it's giving you around five counters, it's a real card, and combine this with some trample for some nice game-ending potential."},
            {"name": "Heated Argument", "setCode": "SOS", "rarity": "common", "colors": ["R"], "type": "Instant", "manaCost": "{4}{R}", "ratings": {"cgb": {"raw": 4, "norm": -0.21}, "ds": {"raw": 3, "norm": -0.68}, "cs": {"raw": 4, "norm": -0.452}, "llu_a": {"raw": 3, "norm": -0.76}, "llu_m": {"raw": 3, "norm": -0.572}, "cfb": {"raw": 2, "norm": -0.8495}}, "avgRaw": 3.1667, "avgNorm": -0.5873, "controversy": 0.2114, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Heated_Argument", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-red"}, "cfbCommentary": ".0 That's the third red five-mana burn spell, which means these will be very easy to come by. At least Heated Argument is an instant, which makes it playable, though still not too exciting."},
            {"name": "Interjection", "setCode": "SOS", "rarity": "common", "colors": ["W"], "type": "Instant", "manaCost": "{W}", "ratings": {"cgb": {"raw": 3, "norm": -0.611}, "ds": {"raw": 3, "norm": -0.68}, "cs": {"raw": 4, "norm": -0.452}, "llu_a": {"raw": 4, "norm": -0.189}, "llu_m": {"raw": 3, "norm": -0.572}, "cfb": {"raw": 2, "norm": -0.8495}}, "avgRaw": 3.1667, "avgNorm": -0.5589, "controversy": 0.2042, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Interjection", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-white"}, "cfbCommentary": ".0 If I am low on combat tricks, I don't mind a copy of Interjection in my deck. Not a card I am usually looking to play, but a perfectly serviceable trick that gets a little bit more value in Repartee decks."},

            {"name": "Skycoach Waypoint", "setCode": "SOS", "rarity": "uncommon", "colors": [], "type": "Land", "manaCost": "", "ratings": {"cgb": {"raw": 1, "norm": -1.414}, "ds": {"raw": 3, "norm": -0.68}, "cs": {"raw": 4, "norm": -0.452}, "llu_a": {"raw": 4, "norm": -0.189}, "llu_m": {"raw": 2, "norm": -1.108}, "cfb": {"raw": 0, "norm": -2.6675}}, "avgRaw": 2.3333, "avgNorm": -1.0851, "controversy": 0.8145, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Skycoach_Waypoint", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-multicolor-colorless-and-lands"}, "cfbCommentary": null},
            {"name": "Sneering Shadewriter", "setCode": "SOS", "rarity": "common", "colors": ["B"], "type": "Creature", "manaCost": "{4}{B}", "ratings": {"cgb": {"raw": 4, "norm": -0.21}, "ds": {"raw": 3, "norm": -0.68}, "cs": {"raw": 4, "norm": -0.452}, "llu_a": {"raw": 4.5, "norm": 0.096}, "llu_m": {"raw": 4, "norm": -0.035}, "cfb": {"raw": 2.75, "norm": -0.1678}}, "avgRaw": 3.7083, "avgNorm": -0.2415, "controversy": 0.2581, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Sneering_Shadewriter", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-black"}, "cfbCommentary": "In Lorwyn Eclipsed earlier this year, Dawnhand Eulogist showed up as a surprisingly high-performer (actually, the best-performing common by many stats). These creatures that drain life and have decent bodies do a lot of work because often your opponent has to remove or trade with them, at which point they've left behind a lot of value and improved your position in the game. Sneering Shadewriter could end up being similar."},
            {"name": "Ascendant Dustspeaker", "setCode": "SOS", "rarity": "common", "colors": ["W"], "type": "Creature", "manaCost": "{4}{W}", "ratings": {"cgb": {"raw": 2, "norm": -1.013}, "ds": {"raw": 2, "norm": -1.076}, "cs": {"raw": 4.5, "norm": -0.125}, "llu_a": {"raw": 4, "norm": -0.189}, "llu_m": {"raw": 3, "norm": -0.572}, "cfb": {"raw": 1.75, "norm": -1.0767}}, "avgRaw": 2.875, "avgNorm": -0.6753, "controversy": 0.4053, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Ascendant_Dustspeaker", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-white"}, "cfbCommentary": "A classic filler that you include if you need a curve-topper, but nothing to write home about. The card goes up in value if you are in Lorehold and need something that repeatedly exiles cards from your graveyard to enable your synergies."},

            {"name": "Imperious Inkmage", "setCode": "SOS", "rarity": "common", "colors": ["B", "W"], "type": "Creature", "manaCost": "{1}{W}{B}", "ratings": {"cgb": {"raw": 4, "norm": -0.21}, "ds": {"raw": 2, "norm": -1.076}, "cs": {"raw": 4.5, "norm": -0.125}, "llu_a": {"raw": 4.5, "norm": 0.096}, "llu_m": {"raw": 5, "norm": 0.502}, "cfb": {"raw": 2.5, "norm": -0.395}}, "avgRaw": 3.75, "avgNorm": -0.2013, "controversy": 0.4816, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Imperious_Inkmage", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-multicolor-colorless-and-lands"}, "cfbCommentary": "The Inkmage isn't quite strong enough to really justify being imperious, but who really does have a good sense of their own self-importance? This is a fine playable, but nothing worth taking too early."},

            {"name": "Planar Engineering", "setCode": "SOS", "rarity": "rare", "colors": ["G"], "type": "Sorcery", "manaCost": "{3}{G}", "ratings": {"cgb": {"raw": 2, "norm": -1.013}, "ds": {"raw": 6, "norm": 0.507}, "cs": {"raw": 2, "norm": -1.761}, "llu_a": {"raw": 2, "norm": -1.331}, "llu_m": {"raw": 2, "norm": -1.108}, "cfb": {"raw": 1.5, "norm": -1.304}}, "avgRaw": 2.5833, "avgNorm": -1.0017, "controversy": 0.7146, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Planar_Engineering", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-green"}, "cfbCommentary": "- 3.0 Some of your big Quandrix or multicolor decks will be interested in going up two lands for the price of four mana. There's also a non-negligible effect of deck thinning if you play a long game after removing four lands from your library. (Emphasizing that you should consider this for long games — deck thinning over the course of a couple of draw steps is not particularly useful). Don't play Planar Engineering in any old deck. On turn four, most decks want to be adding to the battlefield ra"},
            {"name": "Fractalize", "setCode": "SOS", "rarity": "uncommon", "colors": ["U"], "type": "Instant", "manaCost": "{X}{U}", "ratings": {"cgb": {"raw": 3, "norm": -0.611}, "ds": {"raw": 1, "norm": -1.472}, "cs": {"raw": 5, "norm": 0.203}, "llu_a": {"raw": 4, "norm": -0.189}, "llu_m": {"raw": 3, "norm": -0.572}, "cfb": {"raw": 2.5, "norm": -0.395}}, "avgRaw": 3.0833, "avgNorm": -0.506, "controversy": 0.5106, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Fractalize", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-blue"}, "cfbCommentary": "I'm intrigued by Fractalize — it's a combination pump spell and shrink spell all in one. By casting it with X=0, you can make their creature into a 1/1, and by casting it for at least three mana, you can grow your own creature. That's an interesting bit of flexibility, and while neither side is amazing, the combination seems worth trying."},
            {"name": "Rabid Attack", "setCode": "SOS", "rarity": "uncommon", "colors": ["B"], "type": "Instant", "manaCost": "{1}{B}", "ratings": {"cgb": {"raw": 2, "norm": -1.013}, "ds": {"raw": 1, "norm": -1.472}, "cs": {"raw": 5, "norm": 0.203}, "llu_a": {"raw": 4.5, "norm": 0.096}, "llu_m": {"raw": 4.5, "norm": 0.233}, "cfb": {"raw": 1.75, "norm": -1.0767}}, "avgRaw": 3.125, "avgNorm": -0.505, "controversy": 0.6985, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Rabid_Attack", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-black"}, "cfbCommentary": "You can dream about setting up ridiculous turns with Rabid Attack , but I think the median effect of casting this really won't be that impressive. In a lot of cases, its effect will be roughly as good as Masterful Flourish at twice the mana and a higher rarity, so I'm not exactly foaming at the mouth over this one."},
            {"name": "Tenured Concocter", "setCode": "SOS", "rarity": "common", "colors": ["G"], "type": "Creature", "manaCost": "{4}{G}", "ratings": {"cgb": {"raw": 4, "norm": -0.21}, "ds": {"raw": 1, "norm": -1.472}, "cs": {"raw": 5, "norm": 0.203}, "llu_a": {"raw": 3, "norm": -0.76}, "llu_m": {"raw": 3, "norm": -0.572}, "cfb": {"raw": 2.5, "norm": -0.395}}, "avgRaw": 3.0833, "avgNorm": -0.5343, "controversy": 0.5164, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Tenured_Concocter", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-green"}, "cfbCommentary": "I can't say that I care much about the Infusion ability of Tenured Concocter . However, the ward ability to draw a card when the opponent points a removal spell at this makes it a very solid defensive five-drop for stabilizing the battlefield. As always, common five-drop creatures aren't your top priority, but this is a totally solid one that can make the cut in a lot of your green decks."},

            {"name": "Follow the Lumarets", "setCode": "SOS", "rarity": "common", "colors": ["G"], "type": "Sorcery", "manaCost": "{1}{G}", "ratings": {"cgb": {"raw": 3, "norm": -0.611}, "ds": {"raw": 4, "norm": -0.284}, "cs": {"raw": 3, "norm": -1.106}, "llu_a": {"raw": 4.5, "norm": 0.096}, "llu_m": {"raw": 4.5, "norm": 0.233}, "cfb": {"raw": 2.75, "norm": -0.1678}}, "avgRaw": 3.625, "avgNorm": -0.3066, "controversy": 0.4481, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Follow_the_Lumarets", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-green"}, "cfbCommentary": "Since most Limited decks are primarily composed of creatures and lands, you'll almost always be able to pluck two cards off of an infused Follow the Lumarets . Two cards for two mana is great, and even getting one card (while tempo negative) isn't a disaster. You'll be happy to include a copy or two of Follow the Lumarets in decks that are good at gaining life."},
            {"name": "Giant Growth", "setCode": "SOA", "rarity": "common", "colors": ["G"], "type": "Instant", "manaCost": "{G}", "ratings": {"cgb": {"raw": 4, "norm": -0.21}, "ds": {"raw": 3, "norm": -0.68}, "cs": {"raw": null, "norm": null}, "llu_a": {"raw": 2, "norm": -1.331}, "llu_m": {"raw": 2, "norm": -1.108}, "cfb": null}, "avgRaw": 2.75, "avgNorm": -0.8323, "controversy": 0.4287, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Giant_Growth"}, "cfbCommentary": null},
            {"name": "Graduation Day", "setCode": "SOS", "rarity": "uncommon", "colors": ["W"], "type": "Enchantment", "manaCost": "{W}", "ratings": {"cgb": {"raw": 3, "norm": -0.611}, "ds": {"raw": 4, "norm": -0.284}, "cs": {"raw": 3, "norm": -1.106}, "llu_a": {"raw": 4.5, "norm": 0.096}, "llu_m": {"raw": 4, "norm": -0.035}, "cfb": {"raw": 1, "norm": -1.7585}}, "avgRaw": 3.25, "avgNorm": -0.6164, "controversy": 0.6455, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Graduation_Day", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-white"}, "cfbCommentary": ".0 - 3.5 Graduation Day is a nice, cheap payoff for a dedicated Repartee deck. Between Elite Interceptor , Dig Site Inventory , and some powerful rares like Informed Inkwright , I can definitely imagine some low-to-the-ground white decks taking full advantage of this mechanic."},
            {"name": "Magus of the Library", "setCode": "SPG", "rarity": "rare", "colors": ["G"], "type": "Creature", "manaCost": "{G}{G}", "ratings": {"cgb": {"raw": 2, "norm": -1.013}, "ds": {"raw": 3, "norm": -0.68}, "cs": {"raw": null, "norm": null}, "llu_a": {"raw": 0, "norm": -2.472}, "llu_m": {"raw": 0, "norm": -2.181}, "cfb": {"raw": 3, "norm": 0.0595}}, "avgRaw": 1.6, "avgNorm": -1.2573, "controversy": 0.944, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Magus_of_the_Library", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-green"}, "cfbCommentary": ".0 Magus of the Library is the first of green's two Special Guest cards. I like it, since a two-drop mana dork is serviceable, and every once in a while, you can start dominating games with the card-drawing ability. Note that the double-green manacost is not trivial. My 3.0 rating assumes ten lands that tap for green mana in your deck. So if you have nine or eight, you should bump down the rating a little. Below eight and you shouldn't play it."},
            {"name": "Monstrous Rage", "setCode": "SOA", "rarity": "uncommon", "colors": ["R"], "type": "Instant", "manaCost": "{R}", "ratings": {"cgb": {"raw": 5, "norm": 0.192}, "ds": {"raw": 3, "norm": -0.68}, "cs": {"raw": null, "norm": null}, "llu_a": {"raw": 5, "norm": 0.382}, "llu_m": {"raw": 5, "norm": 0.502}, "cfb": null}, "avgRaw": 4.5, "avgNorm": 0.099, "controversy": 0.4631, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Monstrous_Rage"}, "cfbCommentary": null},
            {"name": "Rapier Wit", "setCode": "SOS", "rarity": "common", "colors": ["W"], "type": "Instant", "manaCost": "{1}{W}", "ratings": {"cgb": {"raw": 3, "norm": -0.611}, "ds": {"raw": 4, "norm": -0.284}, "cs": {"raw": 3, "norm": -1.106}, "llu_a": {"raw": 3, "norm": -0.76}, "llu_m": {"raw": 2, "norm": -1.108}, "cfb": {"raw": 2.25, "norm": -0.6222}}, "avgRaw": 2.875, "avgNorm": -0.7485, "controversy": 0.2909, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Rapier_Wit", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-white"}, "cfbCommentary": "Good filler that replaces itself, triggers your Repartee synergies, and can sometimes play a good role as a removal spell would in very fast decks if you can close out the game quickly enough afterwards. I like this card."},
            {"name": "Zombify", "setCode": "SOA", "rarity": "uncommon", "colors": ["B"], "type": "Sorcery", "manaCost": "{3}{B}", "ratings": {"cgb": {"raw": 3, "norm": -0.611}, "ds": {"raw": 3, "norm": -0.68}, "cs": {"raw": null, "norm": null}, "llu_a": {"raw": 3, "norm": -0.76}, "llu_m": {"raw": 2, "norm": -1.108}, "cfb": null}, "avgRaw": 2.75, "avgNorm": -0.7898, "controversy": 0.1912, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Zombify"}, "cfbCommentary": null},
            {"name": "Efflorescence", "setCode": "SOS", "rarity": "common", "colors": ["G"], "type": "Instant", "manaCost": "{2}{G}", "ratings": {"cgb": {"raw": 3, "norm": -0.611}, "ds": {"raw": 2, "norm": -1.076}, "cs": {"raw": 4, "norm": -0.452}, "llu_a": {"raw": 2, "norm": -1.331}, "llu_m": {"raw": 2, "norm": -1.108}, "cfb": {"raw": 1.5, "norm": -1.304}}, "avgRaw": 2.4167, "avgNorm": -0.9803, "controversy": 0.3338, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Efflorescence", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-green"}, "cfbCommentary": "In a high-power format like Secrets of Strixhaven , you often just don't find room for combat tricks like Efflorescence . If it winds up in your deck, it's not a disaster, and it will do some good work once in a while, but I really don't envision myself picking this over solid creatures, removal, card advantage, or mana ramp."},
            {"name": "Render Speechless", "setCode": "SOS", "rarity": "common", "colors": ["B", "W"], "type": "Sorcery", "manaCost": "{2}{W}{B}", "ratings": {"cgb": {"raw": 3, "norm": -0.611}, "ds": {"raw": 2, "norm": -1.076}, "cs": {"raw": 4, "norm": -0.452}, "llu_a": {"raw": 5.5, "norm": 0.667}, "llu_m": {"raw": 5, "norm": 0.502}, "cfb": {"raw": 1.5, "norm": -1.304}}, "avgRaw": 3.5, "avgNorm": -0.379, "controversy": 0.7383, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Render_Speechless", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-multicolor-colorless-and-lands"}, "cfbCommentary": "More like Render Sideboard, as that's usually where this is going to live. Even with Repartee, this is too expensive to be a mainstay."},
            {"name": "Honorbound Page // Forum's Favor", "setCode": "SOS", "rarity": "common", "colors": ["W"], "type": "Creature", "manaCost": "{3}{W} // {W}", "ratings": {"cgb": {"raw": 2, "norm": -1.013}, "ds": {"raw": 1, "norm": -1.472}, "cs": {"raw": 4.5, "norm": -0.125}, "llu_a": {"raw": 3, "norm": -0.76}, "llu_m": {"raw": 2, "norm": -1.108}, "cfb": {"raw": 2, "norm": -0.8495}}, "avgRaw": 2.4167, "avgNorm": -0.8879, "controversy": 0.4093, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Honorbound_Page"}, "cfbCommentary": null},
            {"name": "Mage Tower Referee", "setCode": "SOS", "rarity": "common", "colors": [], "type": "Artifact Creature", "manaCost": "{2}", "ratings": {"cgb": {"raw": 1, "norm": -1.414}, "ds": {"raw": 1, "norm": -1.472}, "cs": {"raw": 4.5, "norm": -0.125}, "llu_a": {"raw": 3, "norm": -0.76}, "llu_m": {"raw": 3, "norm": -0.572}, "cfb": {"raw": 1.5, "norm": -1.304}}, "avgRaw": 2.3333, "avgNorm": -0.9412, "controversy": 0.4954, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Mage_Tower_Referee", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-multicolor-colorless-and-lands"}, "cfbCommentary": "If you need a two-drop, you need a two-drop."},
            {"name": "Root Manipulation", "setCode": "SOS", "rarity": "uncommon", "colors": ["B", "G"], "type": "Sorcery", "manaCost": "{3}{B}{G}", "ratings": {"cgb": {"raw": 3, "norm": -0.611}, "ds": {"raw": 1, "norm": -1.472}, "cs": {"raw": 4.5, "norm": -0.125}, "llu_a": {"raw": 4.5, "norm": 0.096}, "llu_m": {"raw": 4, "norm": -0.035}, "cfb": {"raw": 2.5, "norm": -0.395}}, "avgRaw": 3.25, "avgNorm": -0.4237, "controversy": 0.5236, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Root_Manipulation", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-multicolor-colorless-and-lands"}, "cfbCommentary": "If you have at least three creatures out, Root Manipulation will likely be strong, but therein lies the rub. It's not always going to work out that way, and some of the times cards like this are just dead draws. I'd play it as a finisher, but not every deck needs that."},
            {"name": "Scathing Shadelock // Venomous Words", "setCode": "SOS", "rarity": "uncommon", "colors": ["B"], "type": "Creature", "manaCost": "{4}{B} // {B}", "ratings": {"cgb": {"raw": 2, "norm": -1.013}, "ds": {"raw": 1, "norm": -1.472}, "cs": {"raw": 4.5, "norm": -0.125}, "llu_a": {"raw": 2, "norm": -1.331}, "llu_m": {"raw": 2, "norm": -1.108}, "cfb": {"raw": 2.75, "norm": -0.1678}}, "avgRaw": 2.375, "avgNorm": -0.8695, "controversy": 0.5323, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Scathing_Shadelock", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-black"}, "cfbCommentary": "Scathing Shadelock offers good stats, plus a repeatable way to unload damage and trigger Repartee. That sounds like a good version of a five-drop creature, though it's good to remember that five-drop creatures generally aren't the very top priority in booster draft."},
            {"name": "Transcendent Archaic", "setCode": "SOS", "rarity": "uncommon", "colors": [], "type": "Creature", "manaCost": "{7}", "ratings": {"cgb": {"raw": 3, "norm": -0.611}, "ds": {"raw": 5, "norm": 0.111}, "cs": {"raw": 2, "norm": -1.761}, "llu_a": {"raw": 4.5, "norm": 0.096}, "llu_m": {"raw": 4, "norm": -0.035}, "cfb": {"raw": 4, "norm": 0.9685}}, "avgRaw": 3.75, "avgNorm": -0.2053, "controversy": 0.8349, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Transcendent_Archaic", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-multicolor-colorless-and-lands"}, "cfbCommentary": ".0 Like Sundering Archaic , this does great work when you enable it. It gives you a giant monster and a grip of cards, so you will win most games where you survive the turn."},
            {"name": "Choreographed Sparks", "setCode": "SOS", "rarity": "rare", "colors": ["R"], "type": "Instant", "manaCost": "{R}{R}", "ratings": {"cgb": {"raw": 0, "norm": -1.816}, "ds": {"raw": 0, "norm": -1.867}, "cs": {"raw": 5, "norm": 0.203}, "llu_a": {"raw": 2, "norm": -1.331}, "llu_m": {"raw": 1, "norm": -1.645}, "cfb": {"raw": 1, "norm": -1.7585}}, "avgRaw": 1.5, "avgNorm": -1.3691, "controversy": 0.7244, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Choreographed_Sparks", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-red"}, "cfbCommentary": ".0 - 2.0 Normally, I am not a huge fan of cards that copy something on the stack because you need another good card to make them relevant, not to mention the right timing to cast them. That said, there are so many good spells in this format that it should be fairly trivial to find something like Seize the Spoils (keep in mind that you don't have to discard another card) or Unsubtle Mockery to copy with it. Still, it's usually better to have a decent card that works on its own instead of going th"},
            {"name": "Cost of Brilliance", "setCode": "SOS", "rarity": "common", "colors": ["B"], "type": "Sorcery", "manaCost": "{2}{B}", "ratings": {"cgb": {"raw": 3, "norm": -0.611}, "ds": {"raw": 3, "norm": -0.68}, "cs": {"raw": 3, "norm": -1.106}, "llu_a": {"raw": 5.5, "norm": 0.667}, "llu_m": {"raw": 5, "norm": 0.502}, "cfb": {"raw": 1.5, "norm": -1.304}}, "avgRaw": 3.5, "avgNorm": -0.422, "controversy": 0.7514, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Cost_of_Brilliance", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-black"}, "cfbCommentary": "// 2.5 Three mana and two life for two cards just isn't a great deal these days. So you'll want to keep Cost of Brilliance just to your Silverquill decks where you're trying to trigger Repartee."},
            {"name": "Pull from the Grave", "setCode": "SOS", "rarity": "common", "colors": ["B"], "type": "Sorcery", "manaCost": "{2}{B}", "ratings": {"cgb": {"raw": 2, "norm": -1.013}, "ds": {"raw": 3, "norm": -0.68}, "cs": {"raw": 3, "norm": -1.106}, "llu_a": {"raw": 4, "norm": -0.189}, "llu_m": {"raw": 3, "norm": -0.572}, "cfb": {"raw": 2.75, "norm": -0.1678}}, "avgRaw": 2.9583, "avgNorm": -0.6213, "controversy": 0.3621, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Pull_from_the_Grave", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-black"}, "cfbCommentary": "I'm a big fan of graveyard recursion, and Pull from the Grave is clearly a strong version of this style of card. That said, one of the first things I look at in a new Limited format is how easy it is to recur creatures from the graveyard, and Secrets of Strixhaven has no shortage of options. That leaves Pull from the Grave as a good effect, but one that you might not necessarily need to prioritize early in a draft."},
            {"name": "Rearing Embermare", "setCode": "SOS", "rarity": "common", "colors": ["R"], "type": "Creature", "manaCost": "{4}{R}", "ratings": {"cgb": {"raw": 3, "norm": -0.611}, "ds": {"raw": 3, "norm": -0.68}, "cs": {"raw": 3, "norm": -1.106}, "llu_a": {"raw": 4, "norm": -0.189}, "llu_m": {"raw": 3, "norm": -0.572}, "cfb": {"raw": 1.75, "norm": -1.0767}}, "avgRaw": 2.9583, "avgNorm": -0.7058, "controversy": 0.3142, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Rearing_Embermare", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-red"}, "cfbCommentary": "Classic average filler if you need a curve-topper."},
            {"name": "Seize the Spoils", "setCode": "SOS", "rarity": "common", "colors": ["R"], "type": "Sorcery", "manaCost": "{2}{R}", "ratings": {"cgb": {"raw": 2, "norm": -1.013}, "ds": {"raw": 3, "norm": -0.68}, "cs": {"raw": 3, "norm": -1.106}, "llu_a": {"raw": 4.5, "norm": 0.096}, "llu_m": {"raw": 2, "norm": -1.108}, "cfb": {"raw": 2.5, "norm": -0.395}}, "avgRaw": 2.8333, "avgNorm": -0.701, "controversy": 0.439, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Seize_the_Spoils", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-red"}, "cfbCommentary": "Great filler that you never pick up too early, but never mind having it in your deck as it always helps smooth out your draws, while also ramping and fixing your mana for a potentially splashed third color. Given how good Prismari looks, I have a feeling this might be the most common card you will be seeing in Luis-Scott Vargas' Limited videos."},
            {"name": "Spirit Mascot", "setCode": "SOS", "rarity": "common", "colors": ["R", "W"], "type": "Creature", "manaCost": "{R}{W}", "ratings": {"cgb": {"raw": 4, "norm": -0.21}, "ds": {"raw": 3, "norm": -0.68}, "cs": {"raw": 3, "norm": -1.106}, "llu_a": {"raw": 4.5, "norm": 0.096}, "llu_m": {"raw": 4.5, "norm": 0.233}, "cfb": {"raw": 3, "norm": 0.0595}}, "avgRaw": 3.6667, "avgNorm": -0.2679, "controversy": 0.4772, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Spirit_Mascot", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-multicolor-colorless-and-lands"}, "cfbCommentary": ".0 One counter already makes this good, and multiple counters really get the school spirit going. Lorehold decks will basically always want this, though they don't need to take it early."},
            {"name": "Masterful Flourish", "setCode": "SOS", "rarity": "common", "colors": ["B"], "type": "Instant", "manaCost": "{B}", "ratings": {"cgb": {"raw": 3, "norm": -0.611}, "ds": {"raw": 1, "norm": -1.472}, "cs": {"raw": 4, "norm": -0.452}, "llu_a": {"raw": 3, "norm": -0.76}, "llu_m": {"raw": 3, "norm": -0.572}, "cfb": {"raw": 2.25, "norm": -0.6222}}, "avgRaw": 2.7083, "avgNorm": -0.7482, "controversy": 0.336, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Masterful_Flourish", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-black"}, "cfbCommentary": "Masterful Flourish is good for triggering Repartee, and matches up nicely against certain \"destroy\" or damage-based removal spells. Outside of that, it's a little underwhelming, so seek to only play it in the right deck."},
            {"name": "Ulna Alley Shopkeep", "setCode": "SOS", "rarity": "common", "colors": ["B"], "type": "Creature", "manaCost": "{2}{B}", "ratings": {"cgb": {"raw": 3, "norm": -0.611}, "ds": {"raw": 1, "norm": -1.472}, "cs": {"raw": 4, "norm": -0.452}, "llu_a": {"raw": 2, "norm": -1.331}, "llu_m": {"raw": 1, "norm": -1.645}, "cfb": {"raw": 2, "norm": -0.8495}}, "avgRaw": 2.1667, "avgNorm": -1.0601, "controversy": 0.4474, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Ulna_Alley_Shopkeep", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-black"}, "cfbCommentary": ".0 Ulna Alley Shopkeep can hit hard, but it doesn't do anything outside of combat, and isn't even particularly great as a blocker. A clear example of a filler card."},
            {"name": "Mathemagics", "setCode": "SOS", "rarity": "mythic", "colors": ["U"], "type": "Sorcery", "manaCost": "{X}{X}{U}{U}", "ratings": {"cgb": {"raw": 4, "norm": -0.21}, "ds": {"raw": 4, "norm": -0.284}, "cs": {"raw": 2, "norm": -1.761}, "llu_a": {"raw": 5, "norm": 0.382}, "llu_m": {"raw": 4.5, "norm": 0.233}, "cfb": {"raw": 2, "norm": -0.8495}}, "avgRaw": 3.5833, "avgNorm": -0.4149, "controversy": 0.7205, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Mathemagics", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-blue"}, "cfbCommentary": "^1 As funny as this card is, I think we can probably put some actual numbers on it and see how Mathemagics does. For two mana, it draws one, and for four mana, it draws two — both of those options are quite weak. For six mana, it draws four cards (which is now worth thinking about), and at eight to even ten mana, you start to consider pointing the spell at your opponent. The way I see this, Mathemagics is a mediocre card draw spell that can also be an expensive win condition, which is something "},
            {"name": "Muse's Encouragement", "setCode": "SOS", "rarity": "common", "colors": ["U"], "type": "Instant", "manaCost": "{4}{U}", "ratings": {"cgb": {"raw": 3, "norm": -0.611}, "ds": {"raw": 2, "norm": -1.076}, "cs": {"raw": 3, "norm": -1.106}, "llu_a": {"raw": 3, "norm": -0.76}, "llu_m": {"raw": 3, "norm": -0.572}, "cfb": {"raw": 3, "norm": 0.0595}}, "avgRaw": 2.8333, "avgNorm": -0.6776, "controversy": 0.389, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Muses_Encouragement", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-blue"}, "cfbCommentary": ".0 I like what you get with Muse's Encouragement , even if it is pricey. Five mana for an instant-speed 3/3 and surveil 2 is perfect for the spell-based decks, and there are plenty of nice little synergies in this set."},
            {"name": "Nita, Forum Conciliator", "setCode": "SOS", "rarity": "rare", "colors": ["B", "W"], "type": "Legendary Creature", "manaCost": "{1}{W}{B}", "ratings": {"cgb": {"raw": 5, "norm": 0.192}, "ds": {"raw": 1, "norm": -1.472}, "cs": {"raw": 3, "norm": -1.106}, "llu_a": {"raw": 5, "norm": 0.382}, "llu_m": {"raw": 4, "norm": -0.035}, "cfb": {"raw": 3.5, "norm": 0.514}}, "avgRaw": 3.5833, "avgNorm": -0.2542, "controversy": 0.7584, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Nita_Forum_Conciliator", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-multicolor-colorless-and-lands"}, "cfbCommentary": "Nita usually will require an untap to work, but work she does. You get to trade a creature for a spell and a bunch of +1/+1 counters, which is a fantastic deal. If they can't kill this, you often will win the game as long as you have a couple of creatures in play."},
            {"name": "Owlin Historian", "setCode": "SOS", "rarity": "common", "colors": ["W"], "type": "Creature", "manaCost": "{2}{W}", "ratings": {"cgb": {"raw": 5, "norm": 0.192}, "ds": {"raw": 2, "norm": -1.076}, "cs": {"raw": 3, "norm": -1.106}, "llu_a": {"raw": 4.5, "norm": 0.096}, "llu_m": {"raw": 4.5, "norm": 0.233}, "cfb": {"raw": 2.5, "norm": -0.395}}, "avgRaw": 3.5833, "avgNorm": -0.3427, "controversy": 0.5676, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Owlin_Historian", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-white"}, "cfbCommentary": "Fine filler that enables your Lorehold synergies while also benefiting from them."},

            {"name": "Chase Inspiration", "setCode": "SOS", "rarity": "common", "colors": ["U"], "type": "Instant", "manaCost": "{U}", "ratings": {"cgb": {"raw": 3, "norm": -0.611}, "ds": {"raw": 1, "norm": -1.472}, "cs": {"raw": 3, "norm": -1.106}, "llu_a": {"raw": 3, "norm": -0.76}, "llu_m": {"raw": 3, "norm": -0.572}, "cfb": {"raw": 2.5, "norm": -0.395}}, "avgRaw": 2.5833, "avgNorm": -0.8193, "controversy": 0.3643, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Chase_Inspiration", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-blue"}, "cfbCommentary": "This type of trick always plays better than it looks, and saving your creature from pretty much any fate is certainly worth one mana. The better the creatures in your deck, the better Chase Inspiration becomes, and it's not hard to set up a turn where you can protect one of your important cards."},

        const IMAGE_COLUMN_SCALE = 1.5;
        const RARITY_ORDER = { common: 1, uncommon: 2, rare: 3, mythic: 4 };

        // ============================================================
        const sortKeyMap = {
            name: 'name',
            set_code: 'setCode',
            rarity: 'rarityRank',
            color_identity: 'colorIdentity',
            type: 'type',
            mana_cost: 'manaCost',
            avg_norm: 'avgNorm',
            avg_raw: 'avgRaw',
            controversy: 'controversy'
        };
        for (const rater of SET_CONFIG.raters) {
            sortKeyMap[rater.id + '_raw'] = rater.id + 'Raw';
            sortKeyMap[rater.id + '_norm'] = rater.id + 'Norm';
        }

        // ============================================================

        // ============================================================
        function getRarityRank(rarity) {
            if (!rarity) return null;
            const key = String(rarity).toLowerCase();
            return RARITY_ORDER[key] ?? null;
        }

        function formatRarity(rarity) {
            if (!rarity) return '-';
            const key = String(rarity).toLowerCase();
            return RARITY_LABELS[key] ?? rarity;
        }

        function getTypeCode(fullType) {
            if (!fullType) return '-';
            const t = String(fullType).toLowerCase();
            if (t.includes('creature')) return 'C';
            if (t.includes('instant')) return 'I';
            if (t.includes('sorcery')) return 'S';
            if (t.includes('artifact')) return 'A';
            if (t.includes('enchantment')) return 'E';
            if (t.includes('land')) return 'L';
            if (t.includes('planeswalker')) return 'P';
            return '?';
        }

        function getScoreClass(value) {
            if (!Number.isFinite(value)) return '';
            if (value >= 1.5) return 'score-excellent';
            if (value >= 0.5) return 'score-good';
            if (value > -0.5) return 'score-neutral';
            if (value >= -1.5) return 'score-poor';
            return 'score-very-poor';
        }

        function getControversyClass(value) {
            if (!Number.isFinite(value)) return '';
            if (value < 0.5) return 'controversy-low';
            if (value < 1.0) return 'controversy-medium';
            return 'controversy-high';

        function buildRaterLink(rater, cardName, card) {
            // Per-card override takes priority (e.g. land cycles reviewed as a group)
            if (card && card.raterLinks && card.raterLinks[rater.id]) {
                return card.raterLinks[rater.id];
            }
            if (!rater.linkPattern) return null;
            if (typeof rater.linkPattern === 'function') {
                return rater.linkPattern(cardName);
            }
            return rater.linkPattern;
        }

        // ============================================================
        // Scryfall image fetching
        // ============================================================
        function fetchCardImageUrl(cardName, setCode) {
            // For bonus/special printings, pin to the specific set so we get the right art.
            // Fall back to name-only if the set-specific request fails.
            const SET_CODES_PINNED = new Set(['soa', 'spg']);
            const setLower = (setCode || '').toLowerCase();
            const cacheKey = setLower && SET_CODES_PINNED.has(setLower)
                ? cardName + '::' + setLower
                : cardName;

            if (cardImageCache.has(cacheKey)) {
                return Promise.resolve(cardImageCache.get(cacheKey));
            }

            const buildUrl = (name, set) =>
                'https://api.scryfall.com/cards/named?fuzzy=' + encodeURIComponent(name) +
                (set ? '&set=' + encodeURIComponent(set) : '');

            const primaryUrl = buildUrl(cardName, SET_CODES_PINNED.has(setLower) ? setLower : null);

            return fetch(primaryUrl)
                .then(r => r.json())
                .then(card => {
                    if (card.object === 'error' && SET_CODES_PINNED.has(setLower)) {
                        // Set-pinned request failed; fall back to name-only
                        return fetch(buildUrl(cardName, null)).then(r => r.json());
                    }
                    return card;
                })
                .then(card => {
                    const url = (card.image_uris && card.image_uris.normal)
                        || (card.card_faces && card.card_faces[0].image_uris && card.card_faces[0].image_uris.normal)
                        || null;
                    cardImageCache.set(cacheKey, url);
                    return url;
                })
                .catch(() => { cardImageCache.set(cacheKey, null); return null; });
        }
