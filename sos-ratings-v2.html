<!--
  ratings-template.html — Reusable template for MTG limited set ratings pages.
  Generated pages embed SET_CONFIG + CARD_DATA via build_page.py.

  CHANGELOG:
  v2.1.0-beta.4 (2026-04-16) — Mobile UX improvements for SOS beta (continued).
    UI: Fix header abbreviations (R/C/T/M) display using ::before pseudo-elements.
    UI: Fix card name text wrapping to properly show 2 lines on mobile.
    UI: Make column width adjustments actually resize name column and image.

  v2.1.0-beta.3 (2026-04-16) — Mobile UX improvements for SOS beta.
    UI: Reduce card name column width to 50% on phones, enable 2-line text wrapping.
    UI: Add mobile column resize dialog with range sliders (shows only on tablets/phones).
    UI: Abbreviated table headers (R/C/T/M) visible on tablets (768px) and phones.
    UI: Force email address wrapping in subtitle on mobile.

  v2.1.0 (2026-04-16) — Promoted combobox filters to default (filterStyle: "combobox" in config).
    Security: added rel="noopener noreferrer" to all target="_blank" links in sources panel.
    Security: escape card name/type values in HTML attribute context.
    Data: SPG special guest set codes corrected in SOS card data.

  v2.0.0 (2026-01-18) — Initial template-based system.
    Replaced 7000-line hardcoded ECL page with data-driven template.
    Config-driven raters, raterGroups (grouped column headers), filterStyle feature flag.
    Sources panel with rater descriptions and Patreon links.
    Standard header with background image, gradient overlay, version/project/contact meta.
    Set code badge pills (SOS, SOA, ECL, SPG).
    SOA/SPG set-pinned card image fetching via Scryfall API.
    Color filter bug fix (was using wrong cell index after Set column addition).
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title><!-- SET_TITLE --></title>
    <meta property="og:title" content="SOS - Normalized Ratings Comparison">
    <meta property="og:description" content="What makes a card a 7 or 7.5? C or C+? Different reviewers use scores differently. Some would say that we should accept that value is inherently subjective, but they're cowards, we can use the magic of mathematics!">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://toskicologist.github.io/MTG-draft-sets-infographics/sos-ratings-v2.html">
    <meta property="og:image" content="https://toskicologist.github.io/MTG-draft-sets-infographics/mtg/assets/cropped%20ChatGPT%20Image%20Jan%2018%2C%202026%2C%2010_33_59%20PM.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://toskicologist.github.io/MTG-draft-sets-infographics/mtg/assets/cropped%20ChatGPT%20Image%20Jan%2018%2C%202026%2C%2010_33_59%20PM.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #333;
            padding: 0;
            min-height: 100vh;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            /* overflow: hidden removed — it breaks position:sticky on td:first-child */
        }

        header {
            position: relative;
            color: white;
            padding: 0;
            text-align: center;
            overflow: hidden;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        header::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 1;
        }

        .header-content {
            position: relative;
            z-index: 2;
            padding: 36px 30px 28px;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 8px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        header p#pageSubtitle {
            font-size: 1.1em;
            opacity: 0.95;
            margin-bottom: 0;
            word-break: break-word;
            overflow-wrap: break-word;
        }

        .header-meta {
            margin-top: 18px;
            background: rgba(0, 0, 0, 0.25);
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 0.85em;
            line-height: 1.7;
            text-align: left;
            display: inline-block;
            min-width: 50%;
            word-break: break-word;
            overflow-wrap: break-word;
        }

        .header-meta a { color: rgba(255,255,255,0.9); text-decoration: underline; text-underline-offset: 2px; word-break: break-all; }
        .header-meta a:hover { color: #fff; }
        .header-meta .meta-row { display: block; }
        .header-meta .meta-label { font-weight: 600; opacity: 0.8; margin-right: 4px; }

        .info-banner {
            background: #f0f4ff;
            padding: 15px 30px;
            border-bottom: 2px solid #667eea;
            font-size: 0.95em;
            color: #555;
            line-height: 1.6;
        }

        .sources-panel {
            background: #fafbff;
            border-bottom: 1px solid #dde3f5;
            padding: 14px 30px;
            font-size: 0.88em;
            color: #444;
            line-height: 1.7;
        }
        .sources-panel > .sources-heading {
            font-weight: 700;
            color: #333;
            margin-bottom: 6px;
            display: block;
        }
        .sources-panel ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }
        .sources-panel li { padding-left: 12px; }
        .sources-panel a { color: #4a6cf7; text-decoration: none; }
        .sources-panel a:hover { text-decoration: underline; }
        .sources-panel .source-patreon {
            color: #e85d26;
            font-size: 0.87em;
            margin-left: 8px;
            font-weight: 600;
        }
        .sources-panel .source-sub {
            display: block;
            margin-left: 16px;
            font-size: 0.9em;
            color: #666;
        }

        .controls {
            padding: 20px 30px;
            background: #f8f9fa;
            border-bottom: 1px solid #ddd;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .image-toggle, .rarity-filter, .color-filter {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .mobile-resize-btn {
            padding: 6px 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 500;
        }
        .mobile-resize-btn:hover {
            background: #5568d3;
        }

        .rarity-filter label, .color-filter label {
            display: inline-flex;
            gap: 4px;
            align-items: center;
            font-weight: 600;
            color: #333;
        }

        .rarity-filter input[type="checkbox"],
        .color-filter input[type="checkbox"] {
            margin: 0;
        }

        .rarity-filter-action, .color-filter-action {
            padding: 4px 8px;
            border: 1px solid #bbb;
            border-radius: 4px;
            background: #fff;
            font-size: 0.85em;
            cursor: pointer;
        }

        .rarity-filter-action:hover, .color-filter-action:hover {
            border-color: #667eea;
        }

        .separator {
            width: 1px;
            height: 24px;
            background: #ccc;
            margin: 0 8px;
        }

        /* ── Combobox filters ─────────────────────────────────── */
        .combobox-filters {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }
        .combobox-group {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .combobox-group > span {
            font-size: 0.88em;
            font-weight: 600;
            color: #555;
            white-space: nowrap;
        }
        .combobox-wrap { position: relative; }
        .combobox-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 9px;
            border: 1px solid #bbb;
            border-radius: 5px;
            background: #fff;
            font-size: 0.85em;
            cursor: pointer;
            min-width: 80px;
            justify-content: space-between;
            white-space: nowrap;
        }
        .combobox-btn:hover { border-color: #667eea; }
        .combobox-btn.open { border-color: #667eea; box-shadow: 0 0 0 2px rgba(102,126,234,0.15); }
        .cb-arrow { font-size: 0.65em; opacity: 0.5; }
        .combobox-dropdown {
            display: none;
            position: absolute;
            top: calc(100% + 4px);
            left: 0;
            background: #fff;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.12);
            z-index: 300;
            min-width: 150px;
            max-height: 240px;
            overflow-y: auto;
            padding: 4px 0;
        }
        .combobox-dropdown.open { display: block; }
        .combobox-item {
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 5px 12px;
            font-size: 0.85em;
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
        }
        .combobox-item:hover { background: #f0f4ff; }
        .combobox-item input { margin: 0; cursor: pointer; }
        .combobox-select-all {
            display: block;
            width: 100%;
            padding: 4px 12px;
            font-size: 0.8em;
            color: #667eea;
            border: none;
            border-top: 1px solid #eee;
            background: none;
            text-align: left;
            cursor: pointer;
        }
        .combobox-select-all:hover { background: #f0f4ff; }

        .type-display-toggle {
            display: inline-flex;
            gap: 4px;
            align-items: center;
            font-weight: 600;
            color: #333;
        }

        .type-display-toggle input[type="checkbox"] {
            margin: 0;
        }

        .col-type, td.col-type {
            width: 5.5ch;
            max-width: 200px;
            white-space: normal;
            word-break: break-word;
            overflow: hidden;
        }

        .col-type.compact, td.col-type.compact {
            max-width: 2ch;
        }

        col.col-set { width: 4.5ch; min-width: 4.5ch; }

        .col-set, td.col-set {
            width: 4.5ch;
            max-width: 5.5ch;
            text-align: center;
            white-space: nowrap;
        }

        .set-badge {
            display: inline-block;
            font-size: 0.72em;
            font-weight: 700;
            letter-spacing: 0.02em;
            padding: 1px 5px;
            border-radius: 4px;
            background: #dde3f0;
            color: #555;
        }
        .set-badge.set-sos  { background: #f0f0f0; color: #444; border: 1px solid #ccc; }
        .set-badge.set-soa  { background: #d4eaf7; color: #1a5a8e; }
        .set-badge.set-ecl  { background: #f0f0f0; color: #444; border: 1px solid #ccc; }
        .set-badge.set-spg  { background: #fdf0cc; color: #7a5a00; }

        .col-rarity, td.col-rarity {
            width: 3ch;
            max-width: 3ch;
            white-space: normal;
            word-break: break-word;
            overflow: hidden;
        }

        .col-colors, td.col-colors {
            width: 5.5ch;
            max-width: 5.5ch;
            white-space: normal;
            word-break: break-word;
            overflow: hidden;
        }

        .col-mana-cost, td.col-mana-cost {
            width: 5.5ch;
            max-width: 5.5ch;
            white-space: normal;
            word-break: break-word;
            overflow: hidden;
        }

        td.col-mana-cost {
            font-size: 0.85em;
        }

        .sort-group {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .sort-group label {
            font-weight: 600;
            color: #333;
        }

        select, input {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 0.95em;
            background: white;
            cursor: pointer;
        }

        select:hover, input:hover {
            border-color: #667eea;
        }

        .table-wrapper {
            overflow-x: auto;
            padding: 20px 30px;
            position: relative;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9em;
        }

        col.col-name {
            width: 220px;
            min-width: 100px;
        }

        col.col-score {
            width: 5.5ch;
            min-width: 5.5ch;
        }

        col.col-rarity { width: 5.5ch; min-width: 5.5ch; }
        col.col-colors { width: 5.5ch; min-width: 5.5ch; }
        col.col-type { width: 5.5ch; min-width: 5.5ch; }
        col.col-mana-cost { width: 5.5ch; min-width: 5.5ch; }

        th.col-rarity, td.col-rarity {
            text-align: center;
        }

        th {
            background: #667eea;
            color: white;
            padding: 4px 5px;
            padding-right: 10px;
            text-align: left;
            font-weight: 600;
            position: sticky;
            top: 0;
            white-space: normal;
            line-height: 1.1;
            cursor: default;
            user-select: none;
            word-break: break-word;
            overflow-wrap: break-word;
        }

        th.col-rarity, th.col-colors, th.col-type, th.col-mana-cost {
            max-width: 100%;
        }

        th:hover { background: #764ba2; }

        th a {
            color: #fff;
            text-decoration: underline;
            font-weight: 700;
            display: inline-block;
        }

        th a:hover { text-decoration-thickness: 2px; }
        th.source-header { text-align: center; }

        th[data-col-index="0"] {
            left: 0;
            z-index: 4;
            background: #667eea;
            white-space: nowrap;
        }

        th.group-start, td.group-start {
            border-left: 2px solid rgba(102, 126, 234, 0.6);
        }

        th.group-end, td.group-end {
            border-right: 2px solid rgba(102, 126, 234, 0.6);
        }

        th.sortable { cursor: pointer; }

        th.sortable .sort-indicator {
            margin-left: 6px;
            font-size: 0.75em;
            opacity: 0.35;
        }

        th.sorted .sort-indicator { opacity: 1; }

        th .col-resizer {
            position: absolute;
            right: 0; top: 0;
            width: 6px;
            height: 100%;
            cursor: col-resize;
            user-select: none;
            border-right: 2px solid transparent;
            transition: border-color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        th .col-resizer::before {
            content: '';
            width: 2px;
            height: 60%;
            background: rgba(255,255,255,0.3);
            border-radius: 1px;
        }

        th:hover .col-resizer { border-right-color: rgba(255,255,255,0.5); }
        th:hover .col-resizer::before { background: rgba(255,255,255,0.7); }
        th.resizing .col-resizer { border-right-color: rgba(255,255,255,0.9); background: rgba(255,255,255,0.15); }
        th.resizing .col-resizer::before { background: white; height: 80%; }

        td {
            padding: 4px 6px;
            border-bottom: 1px solid #eee;
            text-align: center;
            line-height: 1.1;
        }

        tr:hover { background: #f8f9fa; }
        tr:nth-child(even) { background: #fafbfc; }
        tr:nth-child(even):hover { background: #f0f2f5; }

        td:first-child {
            font-weight: 600;
            color: #667eea;
            position: sticky;
            left: 0;
            background: inherit;
            min-width: 160px;
            max-width: 220px;
            text-align: left;
            z-index: 2;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        td:first-child a {
            color: #667eea;
            text-decoration: none;
            border-bottom: 2px solid transparent;
            transition: border-color 0.2s;
            display: inline-block;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        td:first-child a:hover { border-bottom-color: #667eea; }

        .score-link { color: #3b82f6; text-decoration: underline; }
        .score-link:hover { color: #1d4ed8; }

        body.rarity-color tr[data-rarity="common"] { background-color: rgba(86, 180, 233, 0.28) !important; }
        body.rarity-color tr[data-rarity="uncommon"] { background-color: rgba(0, 158, 115, 0.22) !important; }
        body.rarity-color tr[data-rarity="rare"] { background-color: rgba(230, 159, 0, 0.25) !important; }
        body.rarity-color tr[data-rarity="mythic"] { background-color: rgba(213, 94, 0, 0.25) !important; }

        .card-image { display: none; margin-top: 6px; }
        .card-image img {
            width: 100%;
            height: auto;
            border-radius: 6px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.15);
            display: block;
        }
        body.show-images .card-image { display: block; }

        th.col-avg-norm, th.col-controversy { white-space: normal; line-height: 1.1; }
        th.col-controversy { word-break: break-all; }
        th.col-avg-norm, th.col-controversy, td.col-avg-norm, td.col-controversy { font-weight: 700; }

        .score-excellent { background-color: #d4edda; color: #155724; font-weight: 600; }
        .score-good { background-color: #d1ecf1; color: #0c5460; }
        .score-neutral { background-color: #fff3cd; color: #856404; }
        .score-poor { background-color: #f8d7da; color: #721c24; }
        .score-very-poor { background-color: #e74c3c; color: white; font-weight: 600; }
        .controversy-low { background-color: #e8f5e9; }
        .controversy-medium { background-color: #fff9c4; }
        .controversy-high { background-color: #ffccbc; }

        .card-tooltip {
            position: fixed;
            display: none;
            background: white;
            border: 2px solid #667eea;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            z-index: 10000;
            padding: 8px;
            max-width: 300px;
            pointer-events: none;
        }

        .card-tooltip img {
            max-width: 100%;
            height: auto;
            border-radius: 5px;
            max-height: 400px;
        }

        /* ============================================================
           Mobile column resize dialog
           ============================================================ */
        .resize-dialog { position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 9999; }
        .resize-dialog-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); }
        .resize-dialog-content {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            width: 90%; max-width: 400px; z-index: 10000;
            display: flex; flex-direction: column;
        }
        .resize-dialog-header { padding: 16px; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; }
        .resize-dialog-header h3 { margin: 0; font-size: 1.1em; }
        .resize-dialog-close {
            background: none; border: none; font-size: 1.8em; cursor: pointer; color: #666;
            padding: 0; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
        }
        .resize-dialog-close:hover { color: #000; }
        .resize-dialog-body { padding: 16px; overflow-y: auto; max-height: 60vh; }
        .resize-dialog-footer { padding: 12px 16px; border-top: 1px solid #ddd; display: flex; justify-content: flex-end; }
        .resize-dialog-reset { padding: 8px 12px; background: #f0f0f0; border: 1px solid #ddd; border-radius: 4px; cursor: pointer; font-size: 0.9em; }
        .resize-dialog-reset:hover { background: #e0e0e0; }

        .resize-col-control { margin-bottom: 14px; }
        .resize-col-control label { display: block; margin-bottom: 4px; font-weight: 600; color: #333; font-size: 0.9em; }
        .resize-col-control input[type="range"] { width: 100%; }
        .resize-col-control .resize-col-value { display: inline-block; margin-left: 8px; color: #666; font-size: 0.85em; min-width: 40px; text-align: right; }

        footer {
            padding: 20px 30px;
            background: #f8f9fa;
            border-top: 1px solid #ddd;
            text-align: center;
            color: #666;
            font-size: 0.9em;
            line-height: 1.6;
        }

        /* ============================================================
           MOBILE RESPONSIVE OVERRIDES — Tablet/Mobile (max-width: 768px)
           All rules are additive; desktop layout unchanged.
           ============================================================ */

        @media (max-width: 768px) {

            .container { border-radius: 0; box-shadow: none; }
            .header-content { padding: 20px 16px 16px; }
            header h1 { font-size: 1.6em; }
            header p#pageSubtitle { font-size: 0.95em; }

            /* Fix header-meta overflow: remove min-width: 50%, switch to full-width block */
            .header-meta { display: block; min-width: 0; max-width: 100%; box-sizing: border-box; width: 100%; }

            /* Reduce 30px side padding everywhere to reclaim horizontal space */
            .info-banner    { padding-left: 12px; padding-right: 12px; }
            .sources-panel  { padding-left: 12px; padding-right: 12px; }
            .controls       { padding-left: 12px; padding-right: 12px; gap: 10px; }
            .table-wrapper  { padding-left: 8px; padding-right: 8px; }
            footer          { padding-left: 12px; padding-right: 12px; }

            table           { font-size: 0.82em; }
            col.col-name    { width: 160px; min-width: 80px; }
            col.col-score   { width: 4.5ch; min-width: 4.5ch; }

            /* Sticky column fix: replace background:inherit with explicit colors.
               'inherit' fails on mobile WebKit — the sticky cell composites on its own GPU
               layer and the inherited TR background doesn't reliably paint over scrolled columns. */
            td:first-child                           { min-width: 130px; max-width: 160px; background: #ffffff; }
            tr:nth-child(even) td:first-child        { background: #fafbfc; }
            tr:hover td:first-child                  { background: #f8f9fa; }
            tr:nth-child(even):hover td:first-child  { background: #f0f2f5; }

            /* Rarity-color mode — match rgba values from lines 540–543 */
            body.rarity-color tr[data-rarity="common"]   td:first-child { background-color: rgba(86, 180, 233, 0.28) !important; }
            body.rarity-color tr[data-rarity="uncommon"] td:first-child { background-color: rgba(0, 158, 115, 0.22) !important; }
            body.rarity-color tr[data-rarity="rare"]     td:first-child { background-color: rgba(230, 159, 0, 0.25) !important; }
            body.rarity-color tr[data-rarity="mythic"]   td:first-child { background-color: rgba(213, 94, 0, 0.25) !important; }

            th .col-resizer { display: none; }
            .combobox-filters { gap: 8px; }
            .sort-group select { max-width: 160px; font-size: 0.88em; }
        }

        /* ============================================================
           MOBILE RESPONSIVE OVERRIDES — Phone (max-width: 480px)
           Further compression for smallest viewports.
           ============================================================ */

        @media (max-width: 768px) {
            /* Abbreviated headers: R, C, T, M for Rarity, Colors, Type, Mana (save space on tablets+) */
            /* col element width takes precedence over th width, so must override both */
            col.col-rarity, col.col-colors, col.col-type, col.col-mana-cost { width: 2ch; min-width: 2ch; }
            th.col-rarity { font-size: 0; }
            th.col-rarity::before { content: 'R'; font-size: 1rem; display: inline-block; }

            th.col-colors { font-size: 0; }
            th.col-colors::before { content: 'C'; font-size: 1rem; display: inline-block; }

            th.col-type { font-size: 0; }
            th.col-type::before { content: 'T'; font-size: 1rem; display: inline-block; }

            th.col-mana-cost { font-size: 0; }
            th.col-mana-cost::before { content: 'M'; font-size: 1rem; display: inline-block; }
        }

        @media (max-width: 480px) {
            /* Phone: further space savings */

            .info-banner   { padding-left: 8px; padding-right: 8px; font-size: 0.88em; }
            .sources-panel { padding-left: 8px; padding-right: 8px; }
            .controls      { padding-left: 8px; padding-right: 8px; gap: 8px; }

            /* Keep td as table-cell (not -webkit-box) so position:sticky works in Firefox mobile */

            col.col-score   { width: 4ch; min-width: 4ch; }

            /* Reduce mana cost text size to prevent row overflow */
            td.col-mana-cost { font-size: 0.7em; line-height: 1; }

            header h1       { font-size: 1.35em; }
            .header-content { padding: 14px 10px 12px; }

            /* Stack each sort control full-width */
            .sort-group { flex-basis: 100%; }

            .combobox-btn { min-width: 60px; padding: 3px 7px; font-size: 0.82em; }

            /* Suppress hover tooltip on phone (mouse-only feature) */
            .card-tooltip { display: none !important; }
        }

            {"name": "Emeritus of Abundance // Regrowth", "setCode": "SOS", "rarity": "mythic", "colors": ["G"], "type": "Creature", "manaCost": "{2}{G} // {1}{G}", "ratings": {"cgb": {"raw": 9, "norm": 1.798}, "ds": {"raw": 10, "norm": 2.09}, "cs": {"raw": 6.5, "norm": 1.185}, "llu_a": {"raw": 6.5, "norm": 1.238}, "llu_m": {"raw": 7, "norm": 1.575}, "cfb": {"raw": 4.5, "norm": 1.423}}, "avgRaw": 7.25, "avgNorm": 1.5515, "controversy": 0.3163, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Emeritus_of_Abundance", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-green"}, "cfbCommentary": "Emeritus of Abundance is incredible! At three mana for a 3/4 vigilance, you get to add a high-rate creature to the battlefield nice and early and avoid falling behind. For the low price of two mana (or five if you do it all in one turn), you get a supercharged Eternal Witness . Plus, getting to eight lands to make the Emeritus prepared a second time seems perfectly realistic for green decks in Secrets of Strixhaven Limited. The catch is that, since Regrowth is a sorcery, the Emeritus has to surv"},

            {"name": "Stirring Hopesinger", "setCode": "SOS", "rarity": "rare", "colors": ["W"], "type": "Creature", "manaCost": "{2}{W}", "ratings": {"cgb": {"raw": 9, "norm": 1.798}, "ds": {"raw": 8, "norm": 1.299}, "cs": {"raw": 7.5, "norm": 1.839}, "llu_a": {"raw": 6.5, "norm": 1.238}, "llu_m": {"raw": 6.5, "norm": 1.307}, "cfb": {"raw": 5, "norm": 1.8775}}, "avgRaw": 7.0833, "avgNorm": 1.5597, "controversy": 0.2802, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Stirring_Hopesinger", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-white"}, "cfbCommentary": ".0 This card is ridiculous. There are many ways to enable Repartee, and this should be one of the bigger Limited bombs in the set. Imagine a normal game where you cast a two-drop, three-drop, and then follow it up with Stirring Hopesinger and Dig Site Inventory on turn four. That's basically the game right there."},

            {"name": "Antiquities on the Loose", "setCode": "SOS", "rarity": "rare", "colors": ["W"], "type": "Sorcery", "manaCost": "{1}{W}{W}", "ratings": {"cgb": {"raw": 10, "norm": 2.199}, "ds": {"raw": 9, "norm": 1.694}, "cs": {"raw": 6.5, "norm": 1.185}, "llu_a": {"raw": 7.5, "norm": 1.809}, "llu_m": {"raw": 7.5, "norm": 1.843}, "cfb": {"raw": 4.5, "norm": 1.423}}, "avgRaw": 7.5, "avgNorm": 1.6922, "controversy": 0.3222, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Antiquities_on_the_Loose", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-white"}, "cfbCommentary": "Three mana nets you four power and toughness worth of stats, which is already a good deal. Flashback puts this card over the top. Efficient early, game-winning late."},
            {"name": "Applied Geometry", "setCode": "SOS", "rarity": "rare", "colors": ["G", "U"], "type": "Sorcery", "manaCost": "{2}{G}{U}", "ratings": {"cgb": {"raw": 8, "norm": 1.396}, "ds": {"raw": 9, "norm": 1.694}, "cs": {"raw": 6.5, "norm": 1.185}, "llu_a": {"raw": 7.5, "norm": 1.809}, "llu_m": {"raw": 7.5, "norm": 1.843}, "cfb": {"raw": 4, "norm": 0.9685}}, "avgRaw": 7.0833, "avgNorm": 1.4826, "controversy": 0.327, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Applied_Geometry", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-multicolor-colorless-and-lands"}, "cfbCommentary": ".0 You get a 6/6 with this at worst, since you can target a land if you want to. That's a very high floor, and copying something with a good enter-the-battlefield ability or textbook can be awesome."},
