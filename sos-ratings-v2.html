            {"name": "Aberrant Manawurm", "setCode": "SOS", "rarity": "uncommon", "colors": ["G"], "type": "Creature", "manaCost": "{3}{G}", "ratings": {"cgb": {"raw": 2, "norm": -1.013}, "ds": {"raw": 6, "norm": 0.507}, "cs": {"raw": 4.5, "norm": -0.125}, "llu_a": {"raw": 4.5, "norm": 0.096}, "llu_m": {"raw": 4, "norm": -0.035}, "cfb": {"raw": 2.75, "norm": -0.1678}}, "avgRaw": 3.9583, "avgNorm": -0.123, "controversy": 0.4558, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Aberrant_Manawurm"}, "cfbCommentary": null},
            {"name": "Cuboid Colony", "setCode": "SOS", "rarity": "uncommon", "colors": ["G", "U"], "type": "Creature", "manaCost": "{G}{U}", "ratings": {"cgb": {"raw": 5, "norm": 0.192}, "ds": {"raw": 6, "norm": 0.507}, "cs": {"raw": 4.5, "norm": -0.125}, "llu_a": {"raw": 6, "norm": 0.952}, "llu_m": {"raw": 5.5, "norm": 0.77}, "cfb": {"raw": 3.5, "norm": 0.514}}, "avgRaw": 5.0833, "avgNorm": 0.4683, "controversy": 0.3552, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Cuboid_Colony", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-multicolor-colorless-and-lands"}, "cfbCommentary": "Cuboid Colony gets out of control quickly, and even at 2/2 or 3/3 it's a great deal. It'll usually grow even more than that unless you draw it late, and almost always demands a fast answer."},
            {"name": "Eternal Student", "setCode": "SOS", "rarity": "uncommon", "colors": ["B"], "type": "Creature", "manaCost": "{3}{B}", "ratings": {"cgb": {"raw": 6, "norm": 0.593}, "ds": {"raw": 6, "norm": 0.507}, "cs": {"raw": 4.5, "norm": -0.125}, "llu_a": {"raw": 5, "norm": 0.382}, "llu_m": {"raw": 4, "norm": -0.035}, "cfb": {"raw": 3.5, "norm": 0.514}}, "avgRaw": 4.8333, "avgNorm": 0.306, "controversy": 0.281, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Eternal_Student", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-black"}, "cfbCommentary": "There are two ways to play Eternal Student . First, you can cast it, trade off the 4/2, and make the tokens for full value. Second, you can try to mill or discard it to create tokens on the cheap. Both options are awesome, making this a really desirable card."},
            {"name": "Quandrix Charm", "setCode": "SOS", "rarity": "uncommon", "colors": ["G", "U"], "type": "Instant", "manaCost": "{G}{U}", "ratings": {"cgb": {"raw": 6, "norm": 0.593}, "ds": {"raw": 6, "norm": 0.507}, "cs": {"raw": 4.5, "norm": -0.125}, "llu_a": {"raw": 4.5, "norm": 0.096}, "llu_m": {"raw": 4.5, "norm": 0.233}, "cfb": {"raw": 3, "norm": 0.0595}}, "avgRaw": 4.75, "avgNorm": 0.2273, "controversy": 0.2522, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Quandrix_Charm", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-multicolor-colorless-and-lands"}, "cfbCommentary": ".0 They really went conservative on the Charm cycle, though all of them are fine playables. This is mostly Quench with upside, which I don't mind."},
            {"name": "Soaring Stoneglider", "setCode": "SOS", "rarity": "uncommon", "colors": ["W"], "type": "Creature", "manaCost": "{2}{W}", "ratings": {"cgb": {"raw": 3, "norm": -0.611}, "ds": {"raw": 6, "norm": 0.507}, "cs": {"raw": 4.5, "norm": -0.125}, "llu_a": {"raw": 4, "norm": -0.189}, "llu_m": {"raw": 3, "norm": -0.572}, "cfb": {"raw": 3.25, "norm": 0.2867}}, "avgRaw": 3.9583, "avgNorm": -0.1172, "controversy": 0.41, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Soaring_Stoneglider", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-white"}, "cfbCommentary": "A great card if you have enough ways to fill your graveyard and make this a three mana 4/3 flyer, which are stats way above rate. With so much surveil and rummaging, this should be relatively trivial to do in this set. At worst, you will have to pay the full five, which is still acceptable for a vigilance flyer of this size."},
            {"name": "Social Snub", "setCode": "SOS", "rarity": "uncommon", "colors": ["B", "W"], "type": "Sorcery", "manaCost": "{1}{W}{B}", "ratings": {"cgb": {"raw": 4, "norm": -0.21}, "ds": {"raw": 6, "norm": 0.507}, "cs": {"raw": 4.5, "norm": -0.125}, "llu_a": {"raw": 3, "norm": -0.76}, "llu_m": {"raw": 2, "norm": -1.108}, "cfb": {"raw": 1, "norm": -1.7585}}, "avgRaw": 3.4167, "avgNorm": -0.5758, "controversy": 0.7332, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Social_Snub", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-multicolor-colorless-and-lands"}, "cfbCommentary": ".0 This card is interesting but weak, and making both players sacrifice means it's really hard to get much of an advantage from it."},
            {"name": "Burrog Barrage", "setCode": "SOS", "rarity": "common", "colors": ["G"], "type": "Instant", "manaCost": "{1}{G}", "ratings": {"cgb": {"raw": 6, "norm": 0.593}, "ds": {"raw": 5, "norm": 0.111}, "cs": {"raw": 5, "norm": 0.203}, "llu_a": {"raw": 5, "norm": 0.382}, "llu_m": {"raw": 4.5, "norm": 0.233}, "cfb": {"raw": 3, "norm": 0.0595}}, "avgRaw": 4.75, "avgNorm": 0.2636, "controversy": 0.1789, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Burrog_Barrage", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-green"}, "cfbCommentary": ".0 The +1/+0 addition is cute, but in reality, you can evaluate Burrog Barrage similarly to Rocky Rebuke and all of the other variants that have come before it. In all cases, it's quite good and is exactly what green wants in a removal spell."},
            {"name": "Dissection Practice", "setCode": "SOS", "rarity": "uncommon", "colors": ["B"], "type": "Instant", "manaCost": "{B}", "ratings": {"cgb": {"raw": 4, "norm": -0.21}, "ds": {"raw": 5, "norm": 0.111}, "cs": {"raw": 5, "norm": 0.203}, "llu_a": {"raw": 4, "norm": -0.189}, "llu_m": {"raw": 3, "norm": -0.572}, "cfb": {"raw": 3.5, "norm": 0.514}}, "avgRaw": 4.0833, "avgNorm": -0.0238, "controversy": 0.3467, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Dissection_Practice", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-black"}, "cfbCommentary": "Dissection Practice is an example of taking a good card ( Skulduggery ) and giving it a small bonus, creating something truly exceptional. Dissection Practice can be a really removal spell with upside, a really nice combat trick, and/or a way to trigger your lifegain synergies cheaply at instant speed. This might go around the draft table on Prerelease weekend, but my prediction is that people will come to value and respect it very highly, very quickly."},
            {"name": "Encouraging Aviator // Jump", "setCode": "SOS", "rarity": "uncommon", "colors": ["U"], "type": "Creature", "manaCost": "{2}{U} // {U}", "ratings": {"cgb": {"raw": 5, "norm": 0.192}, "ds": {"raw": 5, "norm": 0.111}, "cs": {"raw": 5, "norm": 0.203}, "llu_a": {"raw": 4.5, "norm": 0.096}, "llu_m": {"raw": 4, "norm": -0.035}, "cfb": {"raw": 3.5, "norm": 0.514}}, "avgRaw": 4.5, "avgNorm": 0.1802, "controversy": 0.1685, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Encouraging_Aviator", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-blue"}, "cfbCommentary": "The bird is the word, which in this case is \"Jump\". The Aviator gives you solid stats and the ability to Jump a teammate every turn, which is a nice start to an offense. It's also a good Repartee enabler if you find some cross-color synergies."},
            {"name": "Molten Note", "setCode": "SOS", "rarity": "uncommon", "colors": ["R", "W"], "type": "Sorcery", "manaCost": "{X}{R}{W}", "ratings": {"cgb": {"raw": 5, "norm": 0.192}, "ds": {"raw": 5, "norm": 0.111}, "cs": {"raw": 5, "norm": 0.203}, "llu_a": {"raw": 5, "norm": 0.382}, "llu_m": {"raw": 4.5, "norm": 0.233}, "cfb": {"raw": 3.5, "norm": 0.514}}, "avgRaw": 4.6667, "avgNorm": 0.2725, "controversy": 0.1349, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Molten_Note", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-multicolor-colorless-and-lands"}, "cfbCommentary": "The most important part to understand about Molten Note is that it counts the red and white mana you spend towards the damage dealt, so it's pretty efficient. For three or four mana, you can kill most things, and spending a little more isn't that bad either. The flashback cost is pricey but basically free, as this would be playable without it."},
            {"name": "Old-Growth Educator", "setCode": "SOS", "rarity": "uncommon", "colors": ["B", "G"], "type": "Creature", "manaCost": "{2}{B}{G}", "ratings": {"cgb": {"raw": 4, "norm": -0.21}, "ds": {"raw": 5, "norm": 0.111}, "cs": {"raw": 5, "norm": 0.203}, "llu_a": {"raw": 3, "norm": -0.76}, "llu_m": {"raw": 3, "norm": -0.572}, "cfb": {"raw": 3, "norm": 0.0595}}, "avgRaw": 3.8333, "avgNorm": -0.1947, "controversy": 0.3602, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Old-Growth_Educator", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-multicolor-colorless-and-lands"}, "cfbCommentary": ".0 Perfectly playable, not particularly exciting — Witherbloom at its finest."},
            {"name": "Prismari Charm", "setCode": "SOS", "rarity": "uncommon", "colors": ["R", "U"], "type": "Instant", "manaCost": "{U}{R}", "ratings": {"cgb": {"raw": 6, "norm": 0.593}, "ds": {"raw": 5, "norm": 0.111}, "cs": {"raw": 5, "norm": 0.203}, "llu_a": {"raw": 5.5, "norm": 0.667}, "llu_m": {"raw": 5.5, "norm": 0.77}, "cfb": {"raw": 3, "norm": 0.0595}}, "avgRaw": 5, "avgNorm": 0.4006, "controversy": 0.2839, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Prismari_Charm", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-multicolor-colorless-and-lands"}, "cfbCommentary": ".0 Another medium charm, the Prismari one, mostly shines when you are using the damage mode against multiple small creatures."},
            {"name": "Spectacular Skywhale", "setCode": "SOS", "rarity": "uncommon", "colors": ["R", "U"], "type": "Creature", "manaCost": "{2}{U}{R}", "ratings": {"cgb": {"raw": 4, "norm": -0.21}, "ds": {"raw": 5, "norm": 0.111}, "cs": {"raw": 5, "norm": 0.203}, "llu_a": {"raw": 4, "norm": -0.189}, "llu_m": {"raw": 4, "norm": -0.035}, "cfb": {"raw": 3, "norm": 0.0595}}, "avgRaw": 4.1667, "avgNorm": -0.0101, "controversy": 0.1514, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Spectacular_Skywhale", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-multicolor-colorless-and-lands"}, "cfbCommentary": ".0 Yet another huge threat if it survives, the Skywhale is a decent way to apply pressure. It does start out small, so I'm not over the moon about it, but I'd play it in Prismari most of the time."},
            {"name": "Stand Up for Yourself", "setCode": "SOS", "rarity": "uncommon", "colors": ["W"], "type": "Instant", "manaCost": "{2}{W}", "ratings": {"cgb": {"raw": 6, "norm": 0.593}, "ds": {"raw": 5, "norm": 0.111}, "cs": {"raw": 5, "norm": 0.203}, "llu_a": {"raw": 4.5, "norm": 0.096}, "llu_m": {"raw": 5, "norm": 0.502}, "cfb": {"raw": 2.5, "norm": -0.395}}, "avgRaw": 4.6667, "avgNorm": 0.185, "controversy": 0.3207, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Stand_Up_for_Yourself", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-white"}, "cfbCommentary": "Conditional removal spell that can get really awkward if you are staring down something like Informed Inkwright or Sanar, Unfinished Genius . Worth noting is that you can use the plentiful pump spells in this format to increase the power of your opponent's creature and make it big enough for Stand Up for Yourself to deal with it. I don't think this card is actually that much better than Ajani's Response ."},
            {"name": "Unsubtle Mockery", "setCode": "SOS", "rarity": "common", "colors": ["R"], "type": "Instant", "manaCost": "{2}{R}", "ratings": {"cgb": {"raw": 6, "norm": 0.593}, "ds": {"raw": 5, "norm": 0.111}, "cs": {"raw": 5, "norm": 0.203}, "llu_a": {"raw": 5, "norm": 0.382}, "llu_m": {"raw": 5, "norm": 0.502}, "cfb": {"raw": 3.5, "norm": 0.514}}, "avgRaw": 4.9167, "avgNorm": 0.3842, "controversy": 0.1741, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Unsubtle_Mockery", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-red"}, "cfbCommentary": "Four damage at instant speed is a good deal; the surveil is a nice bonus that you will appreciate mostly in Lorehold, where it can help fuel your graveyard synergies."},
            {"name": "Wander Off", "setCode": "SOS", "rarity": "common", "colors": ["B"], "type": "Instant", "manaCost": "{3}{B}", "ratings": {"cgb": {"raw": 6, "norm": 0.593}, "ds": {"raw": 5, "norm": 0.111}, "cs": {"raw": 5, "norm": 0.203}, "llu_a": {"raw": 4.5, "norm": 0.096}, "llu_m": {"raw": 4, "norm": -0.035}, "cfb": {"raw": 3, "norm": 0.0595}}, "avgRaw": 4.5833, "avgNorm": 0.1713, "controversy": 0.2013, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Wander_Off", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-black"}, "cfbCommentary": ".0 Clean, reliable, instant-speed, and easy to cast. Four mana isn't cheap, but I'm willing to pay for the quality that Wander Off has to offer."},
            {"name": "Campus Composer // Aqueous Aria", "setCode": "SOS", "rarity": "uncommon", "colors": ["U"], "type": "Creature", "manaCost": "{3}{U} // {4}{U}", "ratings": {"cgb": {"raw": 4, "norm": -0.21}, "ds": {"raw": 4, "norm": -0.284}, "cs": {"raw": 5.5, "norm": 0.53}, "llu_a": {"raw": 5.5, "norm": 0.667}, "llu_m": {"raw": 6, "norm": 1.038}, "cfb": {"raw": 3.5, "norm": 0.514}}, "avgRaw": 4.75, "avgNorm": 0.3758, "controversy": 0.4734, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Campus_Composer", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-blue"}, "cfbCommentary": "You get a lot of stats when Campus Composer gets to play its song — a 3/4 with ward 2 and a 3/3 flier is quite the squad. Ward means this likely lives until you can cast Aqueous Aria, and even if this dies, they probably spent more mana than you did to answer it."},
            {"name": "Elite Interceptor // Rejoinder", "setCode": "SOS", "rarity": "common", "colors": ["W"], "type": "Creature", "manaCost": "{W} // {1}{W}", "ratings": {"cgb": {"raw": 6, "norm": 0.593}, "ds": {"raw": 4, "norm": -0.284}, "cs": {"raw": 5.5, "norm": 0.53}, "llu_a": {"raw": 6, "norm": 0.952}, "llu_m": {"raw": 6, "norm": 1.038}, "cfb": {"raw": 3, "norm": 0.0595}}, "avgRaw": 5.0833, "avgNorm": 0.4814, "controversy": 0.4672, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Elite_Interceptor", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-white"}, "cfbCommentary": ".0 Elite Interceptor is basically a Thraben Inspector with some extra utility. Replaces itself, taps a blocker, triggers your Repartee synergies. I quite like this card."},
            {"name": "Flow State", "setCode": "SOS", "rarity": "uncommon", "colors": ["U"], "type": "Sorcery", "manaCost": "{1}{U}", "ratings": {"cgb": {"raw": 4, "norm": -0.21}, "ds": {"raw": 4, "norm": -0.284}, "cs": {"raw": 5.5, "norm": 0.53}, "llu_a": {"raw": 5.5, "norm": 0.667}, "llu_m": {"raw": 5.5, "norm": 0.77}, "cfb": {"raw": 3.5, "norm": 0.514}}, "avgRaw": 4.6667, "avgNorm": 0.3312, "controversy": 0.4183, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Flow_State", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-blue"}, "cfbCommentary": "Flow State builds on what you are already doing in most Prismari and Quandrix decks nicely, which is to say, filling them full of sweet spells. Casting this as Anticipate is a fine failure case, and when it works, it's a really nice bit of value. A quick note to say Flow State says instant and sorcery, not either card type. Do be careful when playing this one in Limited, as it might catch you out."},
            {"name": "Pigment Wrangler // Striking Palette", "setCode": "SOS", "rarity": "uncommon", "colors": ["R"], "type": "Creature", "manaCost": "{4}{R} // {R}", "ratings": {"cgb": {"raw": 6, "norm": 0.593}, "ds": {"raw": 4, "norm": -0.284}, "cs": {"raw": 5.5, "norm": 0.53}, "llu_a": {"raw": 5, "norm": 0.382}, "llu_m": {"raw": 4.5, "norm": 0.233}, "cfb": {"raw": 4.25, "norm": 1.1957}}, "avgRaw": 4.875, "avgNorm": 0.4416, "controversy": 0.4421, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Pigment_Wrangler", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-red"}, "cfbCommentary": "Another amazing value card that enters prepared right away. One mana to copy a spell is a small price to pay, and you also get a 4/4 flyer, which is a huge threat on its own."},
            {"name": "Quill-Blade Laureate // Twofold Intent", "setCode": "SOS", "rarity": "uncommon", "colors": ["W"], "type": "Creature", "manaCost": "{1}{W} // {1}{W}", "ratings": {"cgb": {"raw": 4, "norm": -0.21}, "ds": {"raw": 4, "norm": -0.284}, "cs": {"raw": 5.5, "norm": 0.53}, "llu_a": {"raw": 5.5, "norm": 0.667}, "llu_m": {"raw": 6, "norm": 1.038}, "cfb": {"raw": 3.75, "norm": 0.7412}}, "avgRaw": 4.7917, "avgNorm": 0.4137, "controversy": 0.4917, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Quill-Blade_Laureate", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-white"}, "cfbCommentary": "Premium two-drop for the Repartee decks that works incredibly well with Graduation Day and Dig Site Inventory . Perfectly fine on its own in any white deck, though."},

            {"name": "Arnyn, Deathbloom Botanist", "setCode": "SOS", "rarity": "uncommon", "colors": ["B"], "type": "Legendary Creature", "manaCost": "{2}{B}", "ratings": {"cgb": {"raw": 5, "norm": 0.192}, "ds": {"raw": 5, "norm": 0.111}, "cs": {"raw": null, "norm": null}, "llu_a": {"raw": 4.5, "norm": 0.096}, "llu_m": {"raw": 4, "norm": -0.035}, "cfb": {"raw": 3, "norm": 0.0595}}, "avgRaw": 4.3, "avgNorm": 0.0847, "controversy": 0.0739, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Arnyn_Deathbloom_Botanist", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-black"}, "cfbCommentary": ".0 Start with a deathtouch body that can trade with anything. Then give it a passive ability that can be really annoying for the opponent when it sticks around on the battlefield. Now you've got Arnyn, Deathbloom Botanist , who appears to be a very solid uncommon for Limited."},

            {"name": "Abstract Paintmage", "setCode": "SOS", "rarity": "uncommon", "colors": ["R", "U"], "type": "Creature", "manaCost": "{U}{U/R}{R}", "ratings": {"cgb": {"raw": 4, "norm": -0.21}, "ds": {"raw": 6, "norm": 0.507}, "cs": {"raw": 4, "norm": -0.452}, "llu_a": {"raw": 4, "norm": -0.189}, "llu_m": {"raw": 3, "norm": -0.572}, "cfb": {"raw": 3, "norm": 0.0595}}, "avgRaw": 4, "avgNorm": -0.1427, "controversy": 0.3535, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Abstract_Paintmage", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-multicolor-colorless-and-lands"}, "cfbCommentary": ".0 If this survives, you are usually going to be quite happy. That's a big if, but I'd still run this in my Prismari decks. Your opponent doesn't know how good it's going to be, so they likely will prioritize killing it even when it's not great for you."},
            {"name": "Mind Roots", "setCode": "SOS", "rarity": "uncommon", "colors": ["B", "G"], "type": "Sorcery", "manaCost": "{1}{B}{G}", "ratings": {"cgb": {"raw": 3, "norm": -0.611}, "ds": {"raw": 6, "norm": 0.507}, "cs": {"raw": 4, "norm": -0.452}, "llu_a": {"raw": 4.5, "norm": 0.096}, "llu_m": {"raw": 5, "norm": 0.502}, "cfb": {"raw": 3, "norm": 0.0595}}, "avgRaw": 4.25, "avgNorm": 0.0169, "controversy": 0.4277, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Mind_Roots", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-multicolor-colorless-and-lands"}, "cfbCommentary": ".0 This is a really clever way to do Mind Rot , as it really punishes them for discard lands. Mind Roots is sweet, and a card I'm rarely cutting."},
            {"name": "Strixhaven Skycoach", "setCode": "SOS", "rarity": "uncommon", "colors": [], "type": "Artifact", "manaCost": "{3}", "ratings": {"cgb": {"raw": 3, "norm": -0.611}, "ds": {"raw": 6, "norm": 0.507}, "cs": {"raw": 4, "norm": -0.452}, "llu_a": {"raw": 5, "norm": 0.382}, "llu_m": {"raw": 4.5, "norm": 0.233}, "cfb": {"raw": 2, "norm": -0.8495}}, "avgRaw": 4.0833, "avgNorm": -0.1318, "controversy": 0.5248, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Strixhaven_Skycoach", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-multicolor-colorless-and-lands"}, "cfbCommentary": ".0 This is fixing, but it doesn't put that much on the board. If you don't want a 3/2 flier, this isn't all that impressive, so I'd steer clear in Control decks."},
            {"name": "Blazing Firesinger // Seething Song", "setCode": "SOS", "rarity": "uncommon", "colors": ["R"], "type": "Creature", "manaCost": "{2}{R} // {2}{R}", "ratings": {"cgb": {"raw": 5, "norm": 0.192}, "ds": {"raw": 5, "norm": 0.111}, "cs": {"raw": 4.5, "norm": -0.125}, "llu_a": {"raw": 4.5, "norm": 0.096}, "llu_m": {"raw": 4, "norm": -0.035}, "cfb": {"raw": 4, "norm": 0.9685}}, "avgRaw": 4.5, "avgNorm": 0.2013, "controversy": 0.3583, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Blazing_Firesinger", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-red"}, "cfbCommentary": ".0 The vast majority of the cheap creatures that enter prepared seem very strong. Blazing Firesinger works particularly well in Prismari with cards like Visionary's Dance or an X-spell like Traumatic Critique . If you manage to pull off casting Improvisation Capstone with it on turn four, I would honestly feel bad for the opponent."},
            {"name": "Chelonian Tackle", "setCode": "SOS", "rarity": "uncommon", "colors": ["G"], "type": "Sorcery", "manaCost": "{2}{G}", "ratings": {"cgb": {"raw": 5, "norm": 0.192}, "ds": {"raw": 5, "norm": 0.111}, "cs": {"raw": 4.5, "norm": -0.125}, "llu_a": {"raw": 4, "norm": -0.189}, "llu_m": {"raw": 2, "norm": -1.108}, "cfb": {"raw": 2.75, "norm": -0.1678}}, "avgRaw": 3.875, "avgNorm": -0.2145, "controversy": 0.4243, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Chelonian_Tackle", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-green"}, "cfbCommentary": "I suspect Chelonian Tackle will play out a little worse than Burrog Barrage , since it's more expensive and sorcery speed. Still, it'll usually get the job done to kill an opposing creature, and you should be happy to play it."},
            {"name": "Embrace the Paradox", "setCode": "SOS", "rarity": "common", "colors": ["G", "U"], "type": "Instant", "manaCost": "{3}{G}{U}", "ratings": {"cgb": {"raw": 4, "norm": -0.21}, "ds": {"raw": 5, "norm": 0.111}, "cs": {"raw": 4.5, "norm": -0.125}, "llu_a": {"raw": 5, "norm": 0.382}, "llu_m": {"raw": 4.5, "norm": 0.233}, "cfb": {"raw": 2, "norm": -0.8495}}, "avgRaw": 4.1667, "avgNorm": -0.0764, "controversy": 0.3998, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Embrace_the_Paradox", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-multicolor-colorless-and-lands"}, "cfbCommentary": ".0 I want to give this a higher grade, but there are so many powerful cards once you get into the five mana range. I'm playing this most of the time in Quandrix, but it's not a high priority."},
            {"name": "Noxious Newt", "setCode": "SOS", "rarity": "common", "colors": ["G"], "type": "Creature", "manaCost": "{1}{G}", "ratings": {"cgb": {"raw": 5, "norm": 0.192}, "ds": {"raw": 5, "norm": 0.111}, "cs": {"raw": 4.5, "norm": -0.125}, "llu_a": {"raw": 5, "norm": 0.382}, "llu_m": {"raw": 5, "norm": 0.502}, "cfb": {"raw": 3, "norm": 0.0595}}, "avgRaw": 4.5833, "avgNorm": 0.1869, "controversy": 0.2068, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Noxious_Newt", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-green"}, "cfbCommentary": ".0 Noxious Newt , on the other hand, is the two-drop that your green decks really want. There are a lot of powerful things to do with extra mana in Secrets of Strixhaven . The deathtouch body allows the Newt to trade with anything, or to power up your \"bite\" and \"fight\" spells like Burrog Barrage ."},
            {"name": "Slumbering Trudge", "setCode": "SOS", "rarity": "rare", "colors": ["G"], "type": "Creature", "manaCost": "{X}{G}", "ratings": {"cgb": {"raw": 9, "norm": 1.798}, "ds": {"raw": 5, "norm": 0.111}, "cs": {"raw": 4.5, "norm": -0.125}, "llu_a": {"raw": 6.5, "norm": 1.238}, "llu_m": {"raw": 6, "norm": 1.038}, "cfb": {"raw": 4, "norm": 0.9685}}, "avgRaw": 5.8333, "avgNorm": 0.8381, "controversy": 0.6576, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Slumbering_Trudge", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-green"}, "cfbCommentary": ".0 Slumbering Trudge looks great. You can spend four mana and get a normal, oversized 6/6 creature. Alternatively, you can invest one or two mana whenever you have it to spare, and then when the plant beast is good and ready, it will wake up and help you dominate the game. I find both of those cases appealing, and the option to choose either one is even better. Even when slumbering, the Trudge powers up your fight and bite spells, or anything that cares about power and toughness on the battlefie"},
            {"name": "Terramorphic Expanse", "setCode": "SOS", "rarity": "common", "colors": [], "type": "Land", "manaCost": "", "ratings": {"cgb": {"raw": 5, "norm": 0.192}, "ds": {"raw": 5, "norm": 0.111}, "cs": {"raw": 4.5, "norm": -0.125}, "llu_a": {"raw": 5, "norm": 0.382}, "llu_m": {"raw": 5, "norm": 0.502}, "cfb": {"raw": 3.5, "norm": 0.514}}, "avgRaw": 4.6667, "avgNorm": 0.2627, "controversy": 0.2284, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Terramorphic_Expanse", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-multicolor-colorless-and-lands"}, "cfbCommentary": null},
            {"name": "Banishing Betrayal", "setCode": "SOS", "rarity": "common", "colors": ["U"], "type": "Instant", "manaCost": "{1}{U}", "ratings": {"cgb": {"raw": 5, "norm": 0.192}, "ds": {"raw": 4, "norm": -0.284}, "cs": {"raw": 5, "norm": 0.203}, "llu_a": {"raw": 4, "norm": -0.189}, "llu_m": {"raw": 4, "norm": -0.035}, "cfb": {"raw": 3, "norm": 0.0595}}, "avgRaw": 4.1667, "avgNorm": -0.0089, "controversy": 0.182, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Banishing_Betrayal", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-blue"}, "cfbCommentary": ".0 While you may be down a card when you use this, being able to create momentum and surveil (at instant speed) is solid interaction, and you won't be cutting Banishing Betrayal often."},
            {"name": "Bogwater Lumaret", "setCode": "SOS", "rarity": "common", "colors": ["B", "G"], "type": "Creature", "manaCost": "{B}{G}", "ratings": {"cgb": {"raw": 6, "norm": 0.593}, "ds": {"raw": 4, "norm": -0.284}, "cs": {"raw": 5, "norm": 0.203}, "llu_a": {"raw": 5, "norm": 0.382}, "llu_m": {"raw": 5, "norm": 0.502}, "cfb": {"raw": 3, "norm": 0.0595}}, "avgRaw": 4.6667, "avgNorm": 0.2426, "controversy": 0.2949, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Bogwater_Lumaret", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-multicolor-colorless-and-lands"}, "cfbCommentary": ".0 Bogwater doesn't sound appealing, and yet this will be a high pick for any Witherbloom deck. It's efficient and gives you zero-mana lifegain, which is all you are really looking for."},
            {"name": "Burrog Banemaker", "setCode": "SOS", "rarity": "common", "colors": ["B"], "type": "Creature", "manaCost": "{B}", "ratings": {"cgb": {"raw": 4, "norm": -0.21}, "ds": {"raw": 4, "norm": -0.284}, "cs": {"raw": 5, "norm": 0.203}, "llu_a": {"raw": 5, "norm": 0.382}, "llu_m": {"raw": 5, "norm": 0.502}, "cfb": {"raw": 3, "norm": 0.0595}}, "avgRaw": 4.3333, "avgNorm": 0.1087, "controversy": 0.2877, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Burrog_Banemaker"}, "cfbCommentary": null},
            {"name": "Dig Site Inventory", "setCode": "SOS", "rarity": "common", "colors": ["W"], "type": "Sorcery", "manaCost": "{W}", "ratings": {"cgb": {"raw": 2, "norm": -1.013}, "ds": {"raw": 4, "norm": -0.284}, "cs": {"raw": 5, "norm": 0.203}, "llu_a": {"raw": 4, "norm": -0.189}, "llu_m": {"raw": 3, "norm": -0.572}, "cfb": {"raw": 3.5, "norm": 0.514}}, "avgRaw": 3.5833, "avgNorm": -0.2235, "controversy": 0.4959, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Dig_Site_Inventory", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-white"}, "cfbCommentary": "If you are trying to push damage through, Dig Site Inventory will do a better job than Daydream because the creature can attack right away. As I mentioned above, I believe Dig Site Inventory could be the piece that will tie the white decks together because it fits really well into both Silverquill and Lorehold. My bold prediction is that Dig Site Inventory looks very unassuming, but will be the best white common in the set."},
            {"name": "End of the Hunt", "setCode": "SOS", "rarity": "uncommon", "colors": ["B"], "type": "Sorcery", "manaCost": "{1}{B}", "ratings": {"cgb": {"raw": 6, "norm": 0.593}, "ds": {"raw": 4, "norm": -0.284}, "cs": {"raw": 5, "norm": 0.203}, "llu_a": {"raw": 5, "norm": 0.382}, "llu_m": {"raw": 4, "norm": -0.035}, "cfb": {"raw": 3.5, "norm": 0.514}}, "avgRaw": 4.5833, "avgNorm": 0.2288, "controversy": 0.3084, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#End_of_the_Hunt", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-black"}, "cfbCommentary": "Sometimes, having targeted removal is nice. But honestly, End of the Hunt is so likely to take out the opponent's best threat that I'm not going to be picky. This is similar to Blot Out , which was a constructed-quality removal spell even at three mana, so it's safe to predict that End of the Hunt will be a high pick in draft."},
            {"name": "Inkshape Demonstrator", "setCode": "SOS", "rarity": "uncommon", "colors": ["W"], "type": "Creature", "manaCost": "{3}{W}", "ratings": {"cgb": {"raw": 3, "norm": -0.611}, "ds": {"raw": 4, "norm": -0.284}, "cs": {"raw": 5, "norm": 0.203}, "llu_a": {"raw": 4, "norm": -0.189}, "llu_m": {"raw": 3, "norm": -0.572}, "cfb": {"raw": 2, "norm": -0.8495}}, "avgRaw": 3.5, "avgNorm": -0.3837, "controversy": 0.3406, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Inkshape_Demonstrator", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-white"}, "cfbCommentary": ".0 - 3.25 Inkshape Demonstrator can go from filler to quite good very quickly, depending on how hard your deck is going in on Repartee, especially with some nice ways to buff it."},
            {"name": "Rubble Rouser", "setCode": "SOS", "rarity": "common", "colors": ["R"], "type": "Creature", "manaCost": "{2}{R}", "ratings": {"cgb": {"raw": 3, "norm": -0.611}, "ds": {"raw": 4, "norm": -0.284}, "cs": {"raw": 5, "norm": 0.203}, "llu_a": {"raw": 5, "norm": 0.382}, "llu_m": {"raw": 5, "norm": 0.502}, "cfb": {"raw": 2.5, "norm": -0.395}}, "avgRaw": 4.0833, "avgNorm": -0.0338, "controversy": 0.4168, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Rubble_Rouser", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-red"}, "cfbCommentary": "Rubble Rouser has bad stats, but might actually be quite valuable because it works as a great enabler in Lorehold, and also does a great job of helping you cast the powerful, expensive Prismari cards ahead of schedule. If I had to make a guess, I would expect this card to start as a bit undervalued, but potentially solidify itself as one of the better red commons."},
            {"name": "Send in the Pest", "setCode": "SOS", "rarity": "common", "colors": ["B"], "type": "Sorcery", "manaCost": "{1}{B}", "ratings": {"cgb": {"raw": 6, "norm": 0.593}, "ds": {"raw": 4, "norm": -0.284}, "cs": {"raw": 5, "norm": 0.203}, "llu_a": {"raw": 5.5, "norm": 0.667}, "llu_m": {"raw": 5.5, "norm": 0.77}, "cfb": {"raw": 2.5, "norm": -0.395}}, "avgRaw": 4.75, "avgNorm": 0.259, "controversy": 0.4591, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Send_in_the_Pest", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-black"}, "cfbCommentary": "- 3.0 Send in the Pest looks like Ravenous Rats or any of the hundred other variants we've seen over the years. It loses a tiny bit in not being a creature, since you can't blink it or recur it from the graveyard. On the other hand, the Pest token helps you gain life and fits well into Witherbloom's synergies. I could see cutting this from a very focused, aggressive Silverquill deck with no lifegain synergies. But in most black decks, you'll find a strong reason to include Send in the Pest."},
            {"name": "Spiritcall Enthusiast // Scrollboost", "setCode": "SOS", "rarity": "uncommon", "colors": ["W"], "type": "Creature", "manaCost": "{2}{W} // {1}{W}", "ratings": {"cgb": {"raw": 5, "norm": 0.192}, "ds": {"raw": 4, "norm": -0.284}, "cs": {"raw": 5, "norm": 0.203}, "llu_a": {"raw": 4, "norm": -0.189}, "llu_m": {"raw": 3, "norm": -0.572}, "cfb": {"raw": 3, "norm": 0.0595}}, "avgRaw": 4, "avgNorm": -0.0984, "controversy": 0.279, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Spiritcall_Enthusiast", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-white"}, "cfbCommentary": ".0 White certainly doesn't seem to have a shortage of three-mana 3/3s. Looking through the set, getting Spiritcall Enthusiast Prepared seems very incidental rather than something you can really build your deck around, but with Trained Armodon as the floor of this card, it is a perfectly fine card to play regardless."},
            {"name": "Summoned Dromedary", "setCode": "SOS", "rarity": "uncommon", "colors": ["W"], "type": "Creature", "manaCost": "{3}{W}", "ratings": {"cgb": {"raw": 4, "norm": -0.21}, "ds": {"raw": 4, "norm": -0.284}, "cs": {"raw": 5, "norm": 0.203}, "llu_a": {"raw": 4, "norm": -0.189}, "llu_m": {"raw": 4.5, "norm": 0.233}, "cfb": {"raw": 3, "norm": 0.0595}}, "avgRaw": 4.0833, "avgNorm": -0.0312, "controversy": 0.2056, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Summoned_Dromedary", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-white"}, "cfbCommentary": ".0 Solid grindy value creature that will shine in long games thanks to the recursion. 4/3 stats with vigilance means it attacks and blocks well, giving you a good chance to trade it for something meaningful and getting ahead in the process. Bringing it back also means it \"leaves your graveyard\", enabling your Lorehold synergies."},
            {"name": "Elemental Mascot", "setCode": "SOS", "rarity": "common", "colors": ["R", "U"], "type": "Creature", "manaCost": "{1}{U}{R}", "ratings": {"cgb": {"raw": 4, "norm": -0.21}, "ds": {"raw": 3, "norm": -0.68}, "cs": {"raw": 5.5, "norm": 0.53}, "llu_a": {"raw": 5, "norm": 0.382}, "llu_m": {"raw": 5.5, "norm": 0.77}, "cfb": {"raw": 2, "norm": -0.8495}}, "avgRaw": 4.1667, "avgNorm": -0.0096, "controversy": 0.612, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Elemental_Mascot", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-multicolor-colorless-and-lands"}, "cfbCommentary": ".0 Elemental Mascot has been passable, but isn't really exciting. It takes a lot of effort to get a card out of this, and my Prismari decks have felt more controlling than aggressive thus far. Even in aggressive builds, this doesn't hit that hard, making it a bit out of place in either version."},
            {"name": "Great Hall of the Biblioplex", "setCode": "SOS", "rarity": "rare", "colors": [], "type": "Land", "manaCost": "", "ratings": {"cgb": {"raw": 6, "norm": 0.593}, "ds": {"raw": 7, "norm": 0.903}, "cs": {"raw": 3, "norm": -1.106}, "llu_a": {"raw": 2, "norm": -1.331}, "llu_m": {"raw": 2, "norm": -1.108}, "cfb": {"raw": 3, "norm": 0.0595}}, "avgRaw": 3.8333, "avgNorm": -0.3316, "controversy": 0.8882, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Great_Hall_of_the_Biblioplex", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-multicolor-colorless-and-lands"}, "cfbCommentary": ".0 This is a decent land/creature hybrid, and note that you only need to activate it once, and it stays a creature forever. It's better in spell decks, but reasonable in any deck."},
            {"name": "Fields of Strife", "setCode": "SOS", "rarity": "common", "colors": [], "type": "Land", "manaCost": "", "ratings": {"cgb": {"raw": 5, "norm": 0.192}, "ds": {"raw": 5, "norm": 0.111}, "cs": {"raw": 4.5, "norm": -0.125}, "llu_a": {"raw": 5, "norm": 0.382}, "llu_m": {"raw": 5, "norm": 0.502}, "cfb": {"raw": 3.5, "norm": 0.514}}, "avgRaw": 4.6667, "avgNorm": 0.2627, "controversy": 0.2284, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#The_Location_Lands", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-multicolor-colorless-and-lands"}, "cfbCommentary": null},

            {"name": "Geometer's Arthropod", "setCode": "SOS", "rarity": "rare", "colors": ["G", "U"], "type": "Creature", "manaCost": "{G}{U}", "ratings": {"cgb": {"raw": 5, "norm": 0.192}, "ds": {"raw": 3, "norm": -0.68}, "cs": {"raw": 4.5, "norm": -0.125}, "llu_a": {"raw": 4.5, "norm": 0.096}, "llu_m": {"raw": 4.5, "norm": 0.233}, "cfb": {"raw": 2, "norm": -0.8495}}, "avgRaw": 3.9167, "avgNorm": -0.1889, "controversy": 0.4254, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Geometers_Arthropod", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-multicolor-colorless-and-lands"}, "cfbCommentary": ".0 If you have two X-spells, this goes up a little in the ratings, and with three or more, it's a great addition. Most of the time, you are the only person who is interested in this, so I'd try to wheel it. It is strong when it works, and a 1/4 is a decent defensive body."},
            {"name": "Paradox Gardens", "setCode": "SOS", "rarity": "common", "colors": [], "type": "Land", "manaCost": "", "ratings": {"cgb": {"raw": 5, "norm": 0.192}, "ds": {"raw": 5, "norm": 0.111}, "cs": {"raw": 4.5, "norm": -0.125}, "llu_a": {"raw": 5, "norm": 0.382}, "llu_m": {"raw": 5, "norm": 0.502}, "cfb": {"raw": 3.5, "norm": 0.514}}, "avgRaw": 4.6667, "avgNorm": 0.2627, "controversy": 0.2284, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#The_Location_Lands", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-multicolor-colorless-and-lands"}, "cfbCommentary": null},
            {"name": "Spectacle Summit", "setCode": "SOS", "rarity": "common", "colors": [], "type": "Land", "manaCost": "", "ratings": {"cgb": {"raw": 5, "norm": 0.192}, "ds": {"raw": 5, "norm": 0.111}, "cs": {"raw": 4.5, "norm": -0.125}, "llu_a": {"raw": 5, "norm": 0.382}, "llu_m": {"raw": 5, "norm": 0.502}, "cfb": {"raw": 3.5, "norm": 0.514}}, "avgRaw": 4.6667, "avgNorm": 0.2627, "controversy": 0.2284, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#The_Location_Lands", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-multicolor-colorless-and-lands"}, "cfbCommentary": null},
            {"name": "Titan's Grave", "setCode": "SOS", "rarity": "common", "colors": [], "type": "Land", "manaCost": "", "ratings": {"cgb": {"raw": 5, "norm": 0.192}, "ds": {"raw": 5, "norm": 0.111}, "cs": {"raw": 4.5, "norm": -0.125}, "llu_a": {"raw": 5, "norm": 0.382}, "llu_m": {"raw": 5, "norm": 0.502}, "cfb": {"raw": 3.5, "norm": 0.514}}, "avgRaw": 4.6667, "avgNorm": 0.2627, "controversy": 0.2284, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#The_Location_Lands", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-multicolor-colorless-and-lands"}, "cfbCommentary": null},
            {"name": "Visionary's Dance", "setCode": "SOS", "rarity": "common", "colors": ["R", "U"], "type": "Sorcery", "manaCost": "{5}{U}{R}", "ratings": {"cgb": {"raw": 4, "norm": -0.21}, "ds": {"raw": 4, "norm": -0.284}, "cs": {"raw": 4.5, "norm": -0.125}, "llu_a": {"raw": 4.5, "norm": 0.096}, "llu_m": {"raw": 4, "norm": -0.035}, "cfb": {"raw": 3, "norm": 0.0595}}, "avgRaw": 4, "avgNorm": -0.0831, "controversy": 0.1372, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Visionarys_Dance", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-multicolor-colorless-and-lands"}, "cfbCommentary": ".0 Sleight of Hand for two mana on a seven-drop finisher is a great way to hedge your bets, and this is solid in either mode. I like it and would always play it in Prismari."},
            {"name": "Tester of the Tangential", "setCode": "SOS", "rarity": "uncommon", "colors": ["U"], "type": "Creature", "manaCost": "{1}{U}", "ratings": {"cgb": {"raw": 3, "norm": -0.611}, "ds": {"raw": 5, "norm": 0.111}, "cs": {"raw": 4, "norm": -0.452}, "llu_a": {"raw": 2, "norm": -1.331}, "llu_m": {"raw": 2, "norm": -1.108}, "cfb": {"raw": 3.5, "norm": 0.514}}, "avgRaw": 3.25, "avgNorm": -0.4795, "controversy": 0.6421, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Tester_of_the_Tangential", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-blue"}, "cfbCommentary": "I think a two-mana 1/1 with Increment is already good enough, and Tester of the Tangential kindly shares its counters if the game goes long. What you really want to look for are creatures with evasion, as buffing them goes a long way."},
            {"name": "Deluge Virtuoso", "setCode": "SOS", "rarity": "common", "colors": ["U"], "type": "Creature", "manaCost": "{2}{U}", "ratings": {"cgb": {"raw": 3, "norm": -0.611}, "ds": {"raw": 4, "norm": -0.284}, "cs": {"raw": 4.5, "norm": -0.125}, "llu_a": {"raw": 3, "norm": -0.76}, "llu_m": {"raw": 3, "norm": -0.572}, "cfb": {"raw": 3, "norm": 0.0595}}, "avgRaw": 3.4167, "avgNorm": -0.3821, "controversy": 0.2893, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Deluge_Virtuoso", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-blue"}, "cfbCommentary": ".0 I'm in for Frost Lynx -like card already, and Deluge Virtuoso even has a nice pump ability to boot. The more aggressive you are, the more this will perform, but it's good in any blue deck."},
            {"name": "Duel Tactics", "setCode": "SOS", "rarity": "uncommon", "colors": ["R"], "type": "Sorcery", "manaCost": "{R}", "ratings": {"cgb": {"raw": 4, "norm": -0.21}, "ds": {"raw": 4, "norm": -0.284}, "cs": {"raw": 4.5, "norm": -0.125}, "llu_a": {"raw": 4.5, "norm": 0.096}, "llu_m": {"raw": 4, "norm": -0.035}, "cfb": {"raw": 1, "norm": -1.7585}}, "avgRaw": 3.6667, "avgNorm": -0.3861, "controversy": 0.6257, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Duel_Tactics", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-red"}, "cfbCommentary": ".0 I don't see too many one-toughness creatures in this format, and I am not interested in paying three mana total for a sorcery-speed Shock , so I wouldn't play this card for the damage. It may find some use in a fast Lorehold deck that is playing some powerful Repartee cards, but other than that, I don't really see the appeal."},
            {"name": "Eager Glyphmage", "setCode": "SOS", "rarity": "common", "colors": ["W"], "type": "Creature", "manaCost": "{3}{W}", "ratings": {"cgb": {"raw": 6, "norm": 0.593}, "ds": {"raw": 4, "norm": -0.284}, "cs": {"raw": 4.5, "norm": -0.125}, "llu_a": {"raw": 5, "norm": 0.382}, "llu_m": {"raw": 5, "norm": 0.502}, "cfb": {"raw": 1.5, "norm": -1.304}}, "avgRaw": 4.3333, "avgNorm": -0.0393, "controversy": 0.6503, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Eager_Glyphmage", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-white"}, "cfbCommentary": "Another filler that can do the job if you really need a creature to fill your four-drop slot, but you won't be excited about it. The card increases in value if you have ways to go wide and buff your entire board with cards such as Practiced Offense ."},
            {"name": "Fractal Mascot", "setCode": "SOS", "rarity": "common", "colors": ["G", "U"], "type": "Creature", "manaCost": "{4}{G}{U}", "ratings": {"cgb": {"raw": 4, "norm": -0.21}, "ds": {"raw": 4, "norm": -0.284}, "cs": {"raw": 4.5, "norm": -0.125}, "llu_a": {"raw": 4.5, "norm": 0.096}, "llu_m": {"raw": 4.5, "norm": 0.233}, "cfb": {"raw": 2.5, "norm": -0.395}}, "avgRaw": 4, "avgNorm": -0.1142, "controversy": 0.2167, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Fractal_Mascot", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-multicolor-colorless-and-lands"}, "cfbCommentary": "There's absolutely nothing wrong with Fractal Mascot , but as a six-drop, I don't think you need to heavily prioritize it. This card does slow down their offense or tap down a blocker, and a 6/6 trample is solid, so I'm happy to play one."},
            {"name": "Goblin Glasswright // Craft with Pride", "setCode": "SOS", "rarity": "common", "colors": ["R"], "type": "Creature", "manaCost": "{1}{R} // {R}", "ratings": {"cgb": {"raw": 5, "norm": 0.192}, "ds": {"raw": 4, "norm": -0.284}, "cs": {"raw": 4.5, "norm": -0.125}, "llu_a": {"raw": 4.5, "norm": 0.096}, "llu_m": {"raw": 4.5, "norm": 0.233}, "cfb": {"raw": 4.25, "norm": 1.1957}}, "avgRaw": 4.4583, "avgNorm": 0.218, "controversy": 0.4728, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Goblin_Glasswright", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-red"}, "cfbCommentary": "Goblin Glasswright might look unassuming, but I am confident it will be one of the best commons in the format. It helps you cast all the busted spells ahead of the curve, makes it easy to splash, and helps you easily cast multiple spells in one turn if you have something like Emeritus of Conflict . That's some really good value and utility for a two-drop."},
            {"name": "Homesickness", "setCode": "SOS", "rarity": "uncommon", "colors": ["U"], "type": "Instant", "manaCost": "{4}{U}{U}", "ratings": {"cgb": {"raw": 4, "norm": -0.21}, "ds": {"raw": 4, "norm": -0.284}, "cs": {"raw": 4.5, "norm": -0.125}, "llu_a": {"raw": 4.5, "norm": 0.096}, "llu_m": {"raw": 4, "norm": -0.035}, "cfb": {"raw": 3.5, "norm": 0.514}}, "avgRaw": 4.0833, "avgNorm": -0.0073, "controversy": 0.2629, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Homesickness", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-blue"}, "cfbCommentary": "Expensive spells are looking pretty good with Opus and Increment as themes, and Homesickness is a strong card by itself. I'm always homesick for more card draw, and this keeps you alive while fueling you back up (much like a care package from home)."},
            {"name": "Pest Mascot", "setCode": "SOS", "rarity": "common", "colors": ["B", "G"], "type": "Creature", "manaCost": "{1}{B}{G}", "ratings": {"cgb": {"raw": 3, "norm": -0.611}, "ds": {"raw": 4, "norm": -0.284}, "cs": {"raw": 4.5, "norm": -0.125}, "llu_a": {"raw": 4.5, "norm": 0.096}, "llu_m": {"raw": 4, "norm": -0.035}, "cfb": {"raw": 3, "norm": 0.0595}}, "avgRaw": 3.8333, "avgNorm": -0.1499, "controversy": 0.2411, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Pest_Mascot", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-multicolor-colorless-and-lands"}, "cfbCommentary": ".0 I've seen Pest Mascot grow pretty big a few times, but it's also a great removal or tempo target once you've put the effort in. Witherbloom decks will play this happily, but won't be taking it too early."},
            {"name": "Pterafractyl", "setCode": "SOS", "rarity": "common", "colors": ["G", "U"], "type": "Creature", "manaCost": "{X}{G}{U}", "ratings": {"cgb": {"raw": 5, "norm": 0.192}, "ds": {"raw": 4, "norm": -0.284}, "cs": {"raw": 4.5, "norm": -0.125}, "llu_a": {"raw": 4.5, "norm": 0.096}, "llu_m": {"raw": 4, "norm": -0.035}, "cfb": {"raw": 3, "norm": 0.0595}}, "avgRaw": 4.1667, "avgNorm": -0.0161, "controversy": 0.1558, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Pterafractyl", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-multicolor-colorless-and-lands"}, "cfbCommentary": ".0 Card Name: 5.0 Easily the best name in the set, Pterafractyl is also a good Quandrix card. It scales nicely, gains a little life, and is an X-spell for the cards that care about that."},
            {"name": "Pursue the Past", "setCode": "SOS", "rarity": "common", "colors": ["R", "W"], "type": "Sorcery", "manaCost": "{R}{W}", "ratings": {"cgb": {"raw": 2, "norm": -1.013}, "ds": {"raw": 4, "norm": -0.284}, "cs": {"raw": 4.5, "norm": -0.125}, "llu_a": {"raw": 4, "norm": -0.189}, "llu_m": {"raw": 4, "norm": -0.035}, "cfb": {"raw": 2, "norm": -0.8495}}, "avgRaw": 3.4167, "avgNorm": -0.4159, "controversy": 0.3749, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Pursue_the_Past", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-multicolor-colorless-and-lands"}, "cfbCommentary": ".0 This is totally worth pursuing for most Lorehold decks, but it isn't a really high priority. You have a lot of ways to spend mana, and this isn't doing anything too special."},
            {"name": "Decorum Dissertation", "setCode": "SOS", "rarity": "mythic", "colors": ["B"], "type": "Sorcery", "manaCost": "{3}{B}{B}", "ratings": {"cgb": {"raw": 2, "norm": -1.013}, "ds": {"raw": 8, "norm": 1.299}, "cs": {"raw": 2, "norm": -1.761}, "llu_a": {"raw": 5, "norm": 0.382}, "llu_m": {"raw": 4, "norm": -0.035}, "cfb": {"raw": 4, "norm": 0.9685}}, "avgRaw": 4.1667, "avgNorm": -0.0266, "controversy": 1.072, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Decorum_Dissertation", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-black"}, "cfbCommentary": ".0 I just told you that drawing two cards and losing two life is an unexciting effect. Well, if you can do it every turn for the rest of the game for no additional mana investment, that certainly changes things! Something that I love about Paradigm is that you can always decline to cast the copy, so if you've drawn six extra cards and feel like that's enough (or if you start to worry about decking or bleeding out), then you can take a break. Decorum Dissertation isn't a perfect 5.0 because somet"},
            {"name": "Restoration Seminar", "setCode": "SOS", "rarity": "mythic", "colors": ["W"], "type": "Sorcery", "manaCost": "{5}{W}{W}", "ratings": {"cgb": {"raw": 11, "norm": 2.601}, "ds": {"raw": 8, "norm": 1.299}, "cs": {"raw": 2, "norm": -1.761}, "llu_a": {"raw": 4.5, "norm": 0.096}, "llu_m": {"raw": 3, "norm": -0.572}, "cfb": {"raw": 4.5, "norm": 1.423}}, "avgRaw": 5.5, "avgNorm": 0.5143, "controversy": 1.4334, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Restoration_Seminar", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-white"}, "cfbCommentary": "Restoration Seminar is quite expensive, but it should comfortably win you any late game. Get ready for Paradigm to challenge your strategic decision-making by carefully selecting the best creature to bring back from your graveyard every turn for the rest of the game. If you first pick a card like Restoration Seminar , you will want to focus on building a slower and grindy deck that will have inevitability thanks to it. With so much surveil in the format and cards like Grave Researcher and Forum "},
            {"name": "Hydro-Channeler", "setCode": "SOS", "rarity": "common", "colors": ["U"], "type": "Creature", "manaCost": "{1}{U}", "ratings": {"cgb": {"raw": 4, "norm": -0.21}, "ds": {"raw": 3, "norm": -0.68}, "cs": {"raw": 5, "norm": 0.203}, "llu_a": {"raw": 4.5, "norm": 0.096}, "llu_m": {"raw": 4, "norm": -0.035}, "cfb": {"raw": 3, "norm": 0.0595}}, "avgRaw": 3.9167, "avgNorm": -0.0944, "controversy": 0.291, "raterLinks": {"ds": "https://draftsim.com/mtg-sos-limited-set-review/#Hydro-Channeler", "cfb": "https://www.tcgplayer.com/content/magic-the-gathering/articles/secrets-of-strixhaven-limited-set-review-blue"}, "cfbCommentary": ".0 In the spell-heavy deck, Hydro-Channeler is a great way to get ahead of the curve (and it even blocks decently well). As long as you have ten or more spells, this is likely worth playing."},
