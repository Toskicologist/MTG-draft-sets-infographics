<!--
  ratings-template.html — Reusable template for MTG limited set ratings pages.
  Generated pages embed SET_CONFIG + CARD_DATA via build_page.py.

  CHANGELOG:
  v2.1.0-beta.4 (2026-04-16) — Mobile UX improvements for SOS beta (continued).
    UI: Fix header abbreviations (R/C/T/M) display using ::before pseudo-elements.
    UI: Fix card name text wrapping to properly show 2 lines on mobile.
    UI: Make column width adjustments actually resize name column and image.

  v2.1.0-beta.3 (2026-04-16) — Mobile UX improvements for SOS beta.
    UI: Reduce card name column width to 50% on phones, enable 2-line text wrapping.
    UI: Add mobile column resize dialog with range sliders (shows only on tablets/phones).
    UI: Abbreviated table headers (R/C/T/M) visible on tablets (768px) and phones.
    UI: Force email address wrapping in subtitle on mobile.

  v2.1.0 (2026-04-16) — Promoted combobox filters to default (filterStyle: "combobox" in config).
    Security: added rel="noopener noreferrer" to all target="_blank" links in sources panel.
    Security: escape card name/type values in HTML attribute context.
    Data: SPG special guest set codes corrected in SOS card data.

  v2.0.0 (2026-01-18) — Initial template-based system.
    Replaced 7000-line hardcoded ECL page with data-driven template.
    Config-driven raters, raterGroups (grouped column headers), filterStyle feature flag.
    Sources panel with rater descriptions and Patreon links.
    Standard header with background image, gradient overlay, version/project/contact meta.
    Set code badge pills (SOS, SOA, ECL, SPG).
    SOA/SPG set-pinned card image fetching via Scryfall API.
    Color filter bug fix (was using wrong cell index after Set column addition).
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title><!-- SET_TITLE --></title>
    <meta property="og:title" content="MSH - Normalized Ratings Comparison">
    <meta property="og:description" content="What makes a card a 7 or 7.5? C or C+? Different reviewers use scores differently. Some would say that we should accept that value is inherently subjective, but they're cowards, we can use the magic of mathematics!">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://toskicologist.github.io/MTG-draft-sets-infographics/msh-ratings-v2.html">
    <meta property="og:image" content="https://toskicologist.github.io/MTG-draft-sets-infographics/mtg/assets/cropped%20ChatGPT%20Image%20Jan%2018%2C%202026%2C%2010_33_59%20PM.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://toskicologist.github.io/MTG-draft-sets-infographics/mtg/assets/cropped%20ChatGPT%20Image%20Jan%2018%2C%202026%2C%2010_33_59%20PM.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #333;
            padding: 0;
            min-height: 100vh;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            /* overflow: hidden removed — it breaks position:sticky on td:first-child */
        }

        header {
            position: relative;
            color: white;
            padding: 0;
            text-align: center;
            overflow: hidden;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        header::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 1;
        }

        .header-content {
            position: relative;
            z-index: 2;
            padding: 36px 30px 28px;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 8px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        header p#pageSubtitle {
            font-size: 1.1em;
            opacity: 0.95;
            margin-bottom: 0;
            word-break: break-word;
            overflow-wrap: break-word;
        }

        .header-meta {
            margin-top: 18px;
            background: rgba(0, 0, 0, 0.25);
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 0.85em;
            line-height: 1.7;
            text-align: left;
            display: inline-block;
            min-width: 50%;
            word-break: break-word;
            overflow-wrap: break-word;
        }

        .header-meta a { color: rgba(255,255,255,0.9); text-decoration: underline; text-underline-offset: 2px; word-break: break-all; }
        .header-meta a:hover { color: #fff; }
        .header-meta .meta-row { display: block; }
        .header-meta .meta-label { font-weight: 600; opacity: 0.8; margin-right: 4px; }

        .info-banner {
            background: #f0f4ff;
            padding: 15px 30px;
            border-bottom: 2px solid #667eea;
            font-size: 0.95em;
            color: #555;
            line-height: 1.6;
        }

        .sources-panel {
            background: #fafbff;
            border-bottom: 1px solid #dde3f5;
            padding: 14px 30px;
            font-size: 0.88em;
            color: #444;
            line-height: 1.7;
        }
        .sources-panel > .sources-heading {
            font-weight: 700;
            color: #333;
            margin-bottom: 6px;
            display: block;
        }
        .sources-panel ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }
        .sources-panel li { padding-left: 12px; }
        .sources-panel a { color: #4a6cf7; text-decoration: none; }
        .sources-panel a:hover { text-decoration: underline; }
        .sources-panel .source-patreon {
            color: #e85d26;
            font-size: 0.87em;
            margin-left: 8px;
            font-weight: 600;
        }
        .sources-panel .source-sub {
            display: block;
            margin-left: 16px;
            font-size: 0.9em;
            color: #666;
        }

        .controls {
            padding: 20px 30px;
            background: #f8f9fa;
            border-bottom: 1px solid #ddd;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .image-toggle, .rarity-filter, .color-filter {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .mobile-resize-btn {
            padding: 6px 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 500;
        }
        .mobile-resize-btn:hover {
            background: #5568d3;
        }

        .rarity-filter label, .color-filter label {
            display: inline-flex;
            gap: 4px;
            align-items: center;
            font-weight: 600;
            color: #333;
        }

        .rarity-filter input[type="checkbox"],
        .color-filter input[type="checkbox"] {
            margin: 0;
        }

        .rarity-filter-action, .color-filter-action {
            padding: 4px 8px;
            border: 1px solid #bbb;
            border-radius: 4px;
            background: #fff;
            font-size: 0.85em;
            cursor: pointer;
        }

        .rarity-filter-action:hover, .color-filter-action:hover {
            border-color: #667eea;
        }

        .separator {
            width: 1px;
            height: 24px;
            background: #ccc;
            margin: 0 8px;
        }

        /* ── Combobox filters ─────────────────────────────────── */
        .combobox-filters {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }
        .combobox-group {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .combobox-group > span {
            font-size: 0.88em;
            font-weight: 600;
            color: #555;
            white-space: nowrap;
        }
        .combobox-wrap { position: relative; }
        .combobox-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 9px;
            border: 1px solid #bbb;
            border-radius: 5px;
            background: #fff;
            font-size: 0.85em;
            cursor: pointer;
            min-width: 80px;
            justify-content: space-between;
            white-space: nowrap;
        }
        .combobox-btn:hover { border-color: #667eea; }
        .combobox-btn.open { border-color: #667eea; box-shadow: 0 0 0 2px rgba(102,126,234,0.15); }
        .cb-arrow { font-size: 0.65em; opacity: 0.5; }
        .combobox-dropdown {
            display: none;
            position: absolute;
            top: calc(100% + 4px);
            left: 0;
            background: #fff;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.12);
            z-index: 300;
            min-width: 150px;
            max-height: 240px;
            overflow-y: auto;
            padding: 4px 0;
        }
        .combobox-dropdown.open { display: block; }
        .combobox-item {
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 5px 12px;
            font-size: 0.85em;
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
        }
        .combobox-item:hover { background: #f0f4ff; }
        .combobox-item input { margin: 0; cursor: pointer; }
        .combobox-select-all {
            display: block;
            width: 100%;
            padding: 4px 12px;
            font-size: 0.8em;
            color: #667eea;
            border: none;
            border-top: 1px solid #eee;
            background: none;
            text-align: left;
            cursor: pointer;
        }
        .combobox-select-all:hover { background: #f0f4ff; }

        .type-display-toggle {
            display: inline-flex;
            gap: 4px;
            align-items: center;
            font-weight: 600;
            color: #333;
        }

        .type-display-toggle input[type="checkbox"] {
            margin: 0;
        }

        .col-type, td.col-type {
            width: 5.5ch;
            max-width: 200px;
            white-space: normal;
            word-break: break-word;
            overflow: hidden;
        }

        .col-type.compact, td.col-type.compact {
            max-width: 2ch;
        }

        col.col-set { width: 4.5ch; min-width: 4.5ch; }

        .col-set, td.col-set {
            width: 4.5ch;
            max-width: 5.5ch;
            text-align: center;
            white-space: nowrap;
        }

        .set-badge {
            display: inline-block;
            font-size: 0.72em;
            font-weight: 700;
            letter-spacing: 0.02em;
            padding: 1px 5px;
            border-radius: 4px;
            background: #dde3f0;
            color: #555;
        }
        .set-badge.set-sos  { background: #f0f0f0; color: #444; border: 1px solid #ccc; }
        .set-badge.set-soa  { background: #d4eaf7; color: #1a5a8e; }
        .set-badge.set-ecl  { background: #f0f0f0; color: #444; border: 1px solid #ccc; }
        .set-badge.set-spg  { background: #fdf0cc; color: #7a5a00; }
        .set-badge.set-msh  { background: #f0f0f0; color: #444; border: 1px solid #ccc; }
        .set-badge.set-mar  { background: #fbe0e0; color: #a61016; }

        .col-rarity, td.col-rarity {
            width: 3ch;
            max-width: 3ch;
            white-space: normal;
            word-break: break-word;
            overflow: hidden;
        }

        .col-colors, td.col-colors {
            width: 5.5ch;
            max-width: 5.5ch;
            white-space: normal;
            word-break: break-word;
            overflow: hidden;
        }

        .col-mana-cost, td.col-mana-cost {
            width: 5.5ch;
            max-width: 5.5ch;
            white-space: normal;
            word-break: break-word;
            overflow: hidden;
        }

        td.col-mana-cost {
            font-size: 0.85em;
        }

        .sort-group {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .sort-group label {
            font-weight: 600;
            color: #333;
        }

        select, input {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 0.95em;
            background: white;
            cursor: pointer;
        }

        select:hover, input:hover {
            border-color: #667eea;
        }

        .table-wrapper {
            overflow-x: auto;
            padding: 20px 30px;
            position: relative;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9em;
        }

        col.col-name {
            width: 220px;
            min-width: 100px;
        }

        col.col-score {
            width: 5.5ch;
            min-width: 5.5ch;
        }

        col.col-rarity { width: 5.5ch; min-width: 5.5ch; }
        col.col-colors { width: 5.5ch; min-width: 5.5ch; }
        col.col-type { width: 5.5ch; min-width: 5.5ch; }
        col.col-mana-cost { width: 5.5ch; min-width: 5.5ch; }

        th.col-rarity, td.col-rarity {
            text-align: center;
        }

        th {
            background: #667eea;
            color: white;
            padding: 4px 5px;
            padding-right: 10px;
            text-align: left;
            font-weight: 600;
            position: sticky;
            top: 0;
            white-space: normal;
            line-height: 1.1;
            cursor: default;
            user-select: none;
            word-break: break-word;
            overflow-wrap: break-word;
        }

        th.col-rarity, th.col-colors, th.col-type, th.col-mana-cost {
            max-width: 100%;
        }

        th:hover { background: #764ba2; }

        th a {
            color: #fff;
            text-decoration: underline;
            font-weight: 700;
            display: inline-block;
        }

        th a:hover { text-decoration-thickness: 2px; }
        th.source-header { text-align: center; }

        th[data-col-index="0"] {
            left: 0;
            z-index: 4;
            background: #667eea;
            white-space: nowrap;
        }

        th.group-start, td.group-start {
            border-left: 2px solid rgba(102, 126, 234, 0.6);
        }

        th.group-end, td.group-end {
            border-right: 2px solid rgba(102, 126, 234, 0.6);
        }

        th.sortable { cursor: pointer; }

        th.sortable .sort-indicator {
            margin-left: 6px;
            font-size: 0.75em;
            opacity: 0.35;
        }

        th.sorted .sort-indicator { opacity: 1; }

        th .col-resizer {
            position: absolute;
            right: 0; top: 0;
            width: 6px;
            height: 100%;
            cursor: col-resize;
            user-select: none;
            border-right: 2px solid transparent;
            transition: border-color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        th .col-resizer::before {
            content: '';
            width: 2px;
            height: 60%;
            background: rgba(255,255,255,0.3);
            border-radius: 1px;
        }

        th:hover .col-resizer { border-right-color: rgba(255,255,255,0.5); }
        th:hover .col-resizer::before { background: rgba(255,255,255,0.7); }
        th.resizing .col-resizer { border-right-color: rgba(255,255,255,0.9); background: rgba(255,255,255,0.15); }
        th.resizing .col-resizer::before { background: white; height: 80%; }

        td {
            padding: 4px 6px;
            border-bottom: 1px solid #eee;
            text-align: center;
            line-height: 1.1;
        }

        tr:hover { background: #f8f9fa; }
        tr:nth-child(even) { background: #fafbfc; }
        tr:nth-child(even):hover { background: #f0f2f5; }

        td:first-child {
            font-weight: 600;
            color: #667eea;
            position: sticky;
            left: 0;
            background: inherit;
            min-width: 160px;
            max-width: 220px;
            text-align: left;
            z-index: 2;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        td:first-child a {
            color: #667eea;
            text-decoration: none;
            border-bottom: 2px solid transparent;
            transition: border-color 0.2s;
            display: inline-block;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        td:first-child a:hover { border-bottom-color: #667eea; }

        .score-link { color: #3b82f6; text-decoration: underline; }
        .score-link:hover { color: #1d4ed8; }

        body.rarity-color tr[data-rarity="common"] { background-color: rgba(86, 180, 233, 0.28) !important; }
        body.rarity-color tr[data-rarity="uncommon"] { background-color: rgba(0, 158, 115, 0.22) !important; }
        body.rarity-color tr[data-rarity="rare"] { background-color: rgba(230, 159, 0, 0.25) !important; }
        body.rarity-color tr[data-rarity="mythic"] { background-color: rgba(213, 94, 0, 0.25) !important; }

        .card-image { display: none; margin-top: 6px; }
        .card-image img {
            width: 100%;
            height: auto;
            border-radius: 6px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.15);
            display: block;
        }
        body.show-images .card-image { display: block; }

        th.col-avg-norm, th.col-controversy { white-space: normal; line-height: 1.1; }
        th.col-controversy { word-break: break-all; }
        th.col-avg-norm, th.col-controversy, td.col-avg-norm, td.col-controversy { font-weight: 700; }

        .score-excellent { background-color: #d4edda; color: #155724; font-weight: 600; }
        .score-good { background-color: #d1ecf1; color: #0c5460; }
        .score-neutral { background-color: #fff3cd; color: #856404; }
        .score-poor { background-color: #f8d7da; color: #721c24; }
        .score-very-poor { background-color: #e74c3c; color: white; font-weight: 600; }
        .controversy-low { background-color: #e8f5e9; }
        .controversy-medium { background-color: #fff9c4; }
        .controversy-high { background-color: #ffccbc; }

        .card-tooltip {
            position: fixed;
            display: none;
            background: white;
            border: 2px solid #667eea;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            z-index: 10000;
            padding: 8px;
            max-width: 300px;
            pointer-events: none;
        }

        .card-tooltip img {
            max-width: 100%;
            height: auto;
            border-radius: 5px;
            max-height: 400px;
        }

        /* ============================================================
           Mobile column resize dialog
           ============================================================ */
        .resize-dialog { position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 9999; }
        .resize-dialog-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); }
        .resize-dialog-content {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            width: 90%; max-width: 400px; z-index: 10000;
            display: flex; flex-direction: column;
        }
        .resize-dialog-header { padding: 16px; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; }
        .resize-dialog-header h3 { margin: 0; font-size: 1.1em; }
        .resize-dialog-close {
            background: none; border: none; font-size: 1.8em; cursor: pointer; color: #666;
            padding: 0; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
        }
        .resize-dialog-close:hover { color: #000; }
        .resize-dialog-body { padding: 16px; overflow-y: auto; max-height: 60vh; }
        .resize-dialog-footer { padding: 12px 16px; border-top: 1px solid #ddd; display: flex; justify-content: flex-end; }
        .resize-dialog-reset { padding: 8px 12px; background: #f0f0f0; border: 1px solid #ddd; border-radius: 4px; cursor: pointer; font-size: 0.9em; }
        .resize-dialog-reset:hover { background: #e0e0e0; }

        .resize-col-control { margin-bottom: 14px; }
        .resize-col-control label { display: block; margin-bottom: 4px; font-weight: 600; color: #333; font-size: 0.9em; }
        .resize-col-control input[type="range"] { width: 100%; }
        .resize-col-control .resize-col-value { display: inline-block; margin-left: 8px; color: #666; font-size: 0.85em; min-width: 40px; text-align: right; }

        footer {
            padding: 20px 30px;
            background: #f8f9fa;
            border-top: 1px solid #ddd;
            text-align: center;
            color: #666;
            font-size: 0.9em;
            line-height: 1.6;
        }

        /* ============================================================
           MOBILE RESPONSIVE OVERRIDES — Tablet/Mobile (max-width: 768px)
           All rules are additive; desktop layout unchanged.
           ============================================================ */

        @media (max-width: 768px) {

            .container { border-radius: 0; box-shadow: none; }
            .header-content { padding: 20px 16px 16px; }
            header h1 { font-size: 1.6em; }
            header p#pageSubtitle { font-size: 0.95em; }

            /* Fix header-meta overflow: remove min-width: 50%, switch to full-width block */
            .header-meta { display: block; min-width: 0; max-width: 100%; box-sizing: border-box; width: 100%; }

            /* Reduce 30px side padding everywhere to reclaim horizontal space */
            .info-banner    { padding-left: 12px; padding-right: 12px; }
            .sources-panel  { padding-left: 12px; padding-right: 12px; }
            .controls       { padding-left: 12px; padding-right: 12px; gap: 10px; }
            .table-wrapper  { padding-left: 8px; padding-right: 8px; }
            footer          { padding-left: 12px; padding-right: 12px; }

            table           { font-size: 0.82em; }
            col.col-name    { width: 160px; min-width: 80px; }
            col.col-score   { width: 4.5ch; min-width: 4.5ch; }

            /* Sticky column fix: replace background:inherit with explicit colors.
               'inherit' fails on mobile WebKit — the sticky cell composites on its own GPU
               layer and the inherited TR background doesn't reliably paint over scrolled columns. */
            td:first-child                           { min-width: 130px; max-width: 160px; background: #ffffff; }
            tr:nth-child(even) td:first-child        { background: #fafbfc; }
            tr:hover td:first-child                  { background: #f8f9fa; }
            tr:nth-child(even):hover td:first-child  { background: #f0f2f5; }

            /* Rarity-color mode — match rgba values from lines 540–543 */
            body.rarity-color tr[data-rarity="common"]   td:first-child { background-color: rgba(86, 180, 233, 0.28) !important; }
            body.rarity-color tr[data-rarity="uncommon"] td:first-child { background-color: rgba(0, 158, 115, 0.22) !important; }
            body.rarity-color tr[data-rarity="rare"]     td:first-child { background-color: rgba(230, 159, 0, 0.25) !important; }
            body.rarity-color tr[data-rarity="mythic"]   td:first-child { background-color: rgba(213, 94, 0, 0.25) !important; }

            th .col-resizer { display: none; }
            .combobox-filters { gap: 8px; }

        ];

        // ============================================================
        // Constants
        // ============================================================
        const IMAGE_COLUMN_SCALE = 1.5;
        const RARITY_ORDER = { common: 1, uncommon: 2, rare: 3, mythic: 4 };
        const RARITY_LABELS = { common: 'C', uncommon: 'U', rare: 'R', mythic: 'M' };

        let activeCardLink = null;
        const cardImageCache = new Map();
        const columnWidthState = { baseWidths: null, imagesScaled: false };
        const sortState = { key: 'avg_norm', direction: 'desc' };

        // ============================================================
        // Generated from SET_CONFIG — sortKeyMap
        // ============================================================
        const sortKeyMap = {
            name: 'name',
            set_code: 'setCode',
            rarity: 'rarityRank',
            color_identity: 'colorIdentity',
            type: 'type',
            mana_cost: 'manaCost',
            avg_norm: 'avgNorm',
            avg_raw: 'avgRaw',
            controversy: 'controversy'
        };
        for (const rater of SET_CONFIG.raters) {
            sortKeyMap[rater.id + '_raw'] = rater.id + 'Raw';
            sortKeyMap[rater.id + '_norm'] = rater.id + 'Norm';
        }

        // ============================================================
        // Utility functions
        // ============================================================
        function getRarityRank(rarity) {
            if (!rarity) return null;
            const key = String(rarity).toLowerCase();
            return RARITY_ORDER[key] ?? null;
        }

        function formatRarity(rarity) {
            if (!rarity) return '-';
            const key = String(rarity).toLowerCase();
            return RARITY_LABELS[key] ?? rarity;
        }

        function getTypeCode(fullType) {
            if (!fullType) return '-';
            const t = String(fullType).toLowerCase();
            if (t.includes('creature')) return 'C';
            if (t.includes('instant')) return 'I';
            if (t.includes('sorcery')) return 'S';
            if (t.includes('artifact')) return 'A';
            if (t.includes('enchantment')) return 'E';
            if (t.includes('land')) return 'L';
            if (t.includes('planeswalker')) return 'P';
            return '?';
        }

        function getScoreClass(value) {
            if (!Number.isFinite(value)) return '';
            if (value >= 1.5) return 'score-excellent';
            if (value >= 0.5) return 'score-good';
            if (value > -0.5) return 'score-neutral';
            if (value >= -1.5) return 'score-poor';
            return 'score-very-poor';
        }

        function getControversyClass(value) {
            if (!Number.isFinite(value)) return '';
            if (value < 0.5) return 'controversy-low';
            if (value < 1.0) return 'controversy-medium';
            return 'controversy-high';
        }

        function buildRaterLink(rater, cardName, card) {
            // Per-card override takes priority (e.g. land cycles reviewed as a group)
            if (card && card.raterLinks && card.raterLinks[rater.id]) {
                return card.raterLinks[rater.id];
            }
            if (!rater.linkPattern) return null;
            if (typeof rater.linkPattern === 'function') {
                return rater.linkPattern(cardName);
            }
            return rater.linkPattern;
        }

        // ============================================================
        // Scryfall image fetching
        // ============================================================
        function fetchCardImageUrl(cardName, setCode) {
            // For bonus/special printings, pin to the specific set so we get the right art.
            // Fall back to name-only if the set-specific request fails.
            const SET_CODES_PINNED = new Set(['soa', 'spg', 'mar']);
            const setLower = (setCode || '').toLowerCase();
            const cacheKey = setLower && SET_CODES_PINNED.has(setLower)
                ? cardName + '::' + setLower
                : cardName;

            if (cardImageCache.has(cacheKey)) {
                return Promise.resolve(cardImageCache.get(cacheKey));
            }

            const buildUrl = (name, set) =>
                'https://api.scryfall.com/cards/named?fuzzy=' + encodeURIComponent(name) +
                (set ? '&set=' + encodeURIComponent(set) : '');

            const primaryUrl = buildUrl(cardName, SET_CODES_PINNED.has(setLower) ? setLower : null);

            return fetch(primaryUrl)
                .then(r => r.json())
                .then(card => {
                    if (card.object === 'error' && SET_CODES_PINNED.has(setLower)) {
                        // Set-pinned request failed; fall back to name-only
                        return fetch(buildUrl(cardName, null)).then(r => r.json());
                    }
                    return card;
                })
                .then(card => {
                    const url = (card.image_uris && card.image_uris.normal)
                        || (card.card_faces && card.card_faces[0].image_uris && card.card_faces[0].image_uris.normal)
                        || null;
                    cardImageCache.set(cacheKey, url);
                    return url;
                })
                .catch(() => { cardImageCache.set(cacheKey, null); return null; });
        }

            // Thead

            thead.innerHTML = '';

            // Row 1: fixed headers + rater/group headers + avg raw

        // ============================================================
        // createTableRow — dynamic, iterates SET_CONFIG.raters
        // ============================================================
        function createTableRow(card) {
            const raters = SET_CONFIG.raters;
            const row = document.createElement('tr');

            // Dataset attributes for sorting
            row.dataset.name = card.name;
            row.dataset.setCode = card.setCode || '';
            row.dataset.rarity = card.rarity || '';
            row.dataset.colorIdentity = card.colors.join('') || 'C';
            row.dataset.type = card.type || '';
            row.dataset.manaCost = card.manaCost || '';
            row.dataset.rarityRank = getRarityRank(card.rarity) ?? '';
            row.dataset.avgNorm = Number.isFinite(card.avgNorm) ? card.avgNorm : '';
            row.dataset.avgRaw = Number.isFinite(card.avgRaw) ? card.avgRaw : '';
            row.dataset.controversy = Number.isFinite(card.controversy) ? card.controversy : '';

            // Per-rater dataset attrs
            for (const rater of raters) {
                const r = card.ratings[rater.id] || {};
                row.dataset[rater.id + 'Raw'] = Number.isFinite(r.raw) ? r.raw : '';
                row.dataset[rater.id + 'Norm'] = Number.isFinite(r.norm) ? r.norm : '';
            }

            // Build cell HTML
            // Scryfall URL: use card.scryfallUrl or construct a search URL
            const scryfallUrl = card.scryfallUrl || ('https://scryfall.com/search?q=' + encodeURIComponent('"' + card.name + '"'));
            // Escape for HTML attribute context
            const escapedName = card.name.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            const escapedType = (card.type || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            let html = '<td><a href="' + scryfallUrl + '" target="_blank" rel="noopener noreferrer" title="View on Scryfall">' + escapedName + '</a></td>';

            const setCode = card.setCode || '';
            const setBadgeClass = 'set-badge set-' + setCode.toLowerCase();
            html += '<td class="col-set">' + (setCode ? '<span class="' + setBadgeClass + '">' + setCode + '</span>' : '') + '</td>';

            html += '<td class="col-rarity">' + formatRarity(card.rarity) + '</td>';

            const colorText = card.colors.join('') || 'C';
            html += '<td class="col-colors" data-colors="' + card.colors.join('') + '">' + colorText + '</td>';

            const typeCode = getTypeCode(card.type);
            html += '<td class="col-type compact" data-full-type="' + escapedType + '" title="' + escapedType + '">' + typeCode + '</td>';
            html += '<td class="col-mana-cost">' + (card.manaCost || '-') + '</td>';

            const avgNormClass = getScoreClass(card.avgNorm);
            const contClass = getControversyClass(card.controversy);
            const avgNormText = Number.isFinite(card.avgNorm)
                ? (card.avgNorm >= 0 ? '+' : '') + card.avgNorm.toFixed(2) : '-';
            const contText = Number.isFinite(card.controversy) ? card.controversy.toFixed(2) : '-';
            html += '<td class="' + avgNormClass + ' col-avg-norm">' + avgNormText + '</td>';
            html += '<td class="' + contClass + ' col-controversy">' + contText + '</td>';

            // Per-rater raw/norm pairs
            for (const rater of raters) {
                const r = card.ratings[rater.id] || {};
                const rawVal = r.raw;
                const normVal = r.norm;
                const rawClass = getScoreClass(normVal);  // Color by norm score
                const normClass = getScoreClass(normVal);
                const rawText = Number.isFinite(rawVal) ? rawVal.toFixed(2) : '-';
                const normText = Number.isFinite(normVal) ? (normVal >= 0 ? '+' : '') + normVal.toFixed(2) : '-';

                let rawCell = rawText;
                let normCell = normText;

                // If rater has a linkPattern (or card has a per-card link override), wrap in link
                const raterLink = buildRaterLink(rater, card.name, card);
                if (raterLink) {
                    if (Number.isFinite(rawVal)) {
                        rawCell = '<a class="score-link" href="' + raterLink + '" target="_blank" rel="noopener noreferrer" title="Open ' + rater.name + ' review">' + rawText + '</a>';
                    }
                    if (Number.isFinite(normVal)) {
                        normCell = '<a class="score-link" href="' + raterLink + '" target="_blank" rel="noopener noreferrer" title="Open ' + rater.name + ' review">' + normText + '</a>';
                    }
                }

                html += '<td class="' + rawClass + ' group-start">' + rawCell + '</td>';
                html += '<td class="' + normClass + ' group-end">' + normCell + '</td>';
            }

            // Avg Raw
            const avgRawClass = getScoreClass(card.avgRaw);
            const avgRawText = Number.isFinite(card.avgRaw) ? card.avgRaw.toFixed(2) : '-';
            html += '<td class="' + avgRawClass + '">' + avgRawText + '</td>';

            row.innerHTML = html;
            return row;
        }

        // ============================================================
        // Sort, filter, display functions
        // ============================================================
        function sortTable() {
            const tbody = document.getElementById('tableBody');
            const rows = Array.from(tbody.querySelectorAll('tr'));

            rows.sort((a, b) => {
                const sortKey = sortState.key;
                if (sortKey === 'name') {
                    const aVal = a.dataset.name.toLowerCase();
                    const bVal = b.dataset.name.toLowerCase();
                    if (aVal < bVal) return sortState.direction === 'asc' ? -1 : 1;
                    if (aVal > bVal) return sortState.direction === 'asc' ? 1 : -1;
                    return 0;
                }

                if (sortKey === 'color_identity' || sortKey === 'type' || sortKey === 'mana_cost' || sortKey === 'set_code') {
                    const datasetKey = sortKeyMap[sortKey];
                    const aVal = (a.dataset[datasetKey] || '').toLowerCase();
                    const bVal = (b.dataset[datasetKey] || '').toLowerCase();
                    if (aVal < bVal) return sortState.direction === 'asc' ? -1 : 1;
                    if (aVal > bVal) return sortState.direction === 'asc' ? 1 : -1;
                    return 0;
                }

                const datasetKey = sortKeyMap[sortKey];
                const aRaw = parseFloat(a.dataset[datasetKey]);
                const bRaw = parseFloat(b.dataset[datasetKey]);
                const aVal = Number.isFinite(aRaw) ? aRaw : (sortState.direction === 'asc' ? Infinity : -Infinity);
                const bVal = Number.isFinite(bRaw) ? bRaw : (sortState.direction === 'asc' ? Infinity : -Infinity);
                if (aVal < bVal) return sortState.direction === 'asc' ? -1 : 1;
                if (aVal > bVal) return sortState.direction === 'asc' ? 1 : -1;
                return 0;
            });

            rows.forEach(row => tbody.appendChild(row));
            updateInlineImages();
            updateSortIndicators();
        }

        // ============================================================
        // Combobox filters (used when SET_CONFIG.filterStyle === 'combobox')
        // ============================================================
        const cbFilterState = { set: null, rarity: null, type: null, colors: null };

        function buildCombobox(filterId, labelText, options) {
            // options: [{value, label}]
            const group = document.createElement('div');
            group.className = 'combobox-group';

            const lbl = document.createElement('span');
            lbl.textContent = labelText + ':';
            group.appendChild(lbl);

            const wrap = document.createElement('div');
            wrap.className = 'combobox-wrap';

            const btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'combobox-btn';
            btn.innerHTML = '<span class="cb-text">All</span><span class="cb-arrow">\u25BE</span>';

            const dropdown = document.createElement('div');
            dropdown.className = 'combobox-dropdown';

            options.forEach(opt => {
                const item = document.createElement('label');
                item.className = 'combobox-item';
                const cb = document.createElement('input');
                cb.type = 'checkbox';
                cb.value = opt.value;
                cb.checked = true;
                cb.addEventListener('change', () => syncCbState(filterId, dropdown, btn));
                item.appendChild(cb);
                item.appendChild(document.createTextNode('\u00a0' + opt.label));
                dropdown.appendChild(item);
            });

            const selectAll = document.createElement('button');
            selectAll.type = 'button';
            selectAll.className = 'combobox-select-all';
            selectAll.textContent = 'Unselect all';
            selectAll.addEventListener('click', e => {
                e.stopPropagation();
                const allCbs = dropdown.querySelectorAll('input[type="checkbox"]');
                const allChecked = [...allCbs].every(cb => cb.checked);
                allCbs.forEach(cb => { cb.checked = !allChecked; });
                syncCbState(filterId, dropdown, btn);
            });
            dropdown.appendChild(selectAll);

            btn.addEventListener('click', e => {
                e.stopPropagation();
                const wasOpen = dropdown.classList.contains('open');
                document.querySelectorAll('.combobox-dropdown.open').forEach(d => d.classList.remove('open'));
                document.querySelectorAll('.combobox-btn.open').forEach(b => b.classList.remove('open'));
                if (!wasOpen) { dropdown.classList.add('open'); btn.classList.add('open'); }
            });

            wrap.appendChild(btn);
            wrap.appendChild(dropdown);
            group.appendChild(wrap);
            return group;
        }

        function syncCbState(filterId, dropdown, btn) {
            const all = [...dropdown.querySelectorAll('input[type="checkbox"]')];
            const checked = all.filter(cb => cb.checked).map(cb => cb.value);
            const allSelected = checked.length === all.length;
            cbFilterState[filterId] = allSelected ? null : new Set(checked);
            const textEl = btn.querySelector('.cb-text');
            if (allSelected) textEl.textContent = 'All';
            else if (checked.length === 0) textEl.textContent = 'None';
            else if (checked.length <= 3) textEl.textContent = checked.join(', ');
            else textEl.textContent = checked.length + ' selected';
            // Keep the select/unselect toggle label in sync
            const toggleBtn = dropdown.querySelector('.combobox-select-all');
            if (toggleBtn) toggleBtn.textContent = allSelected ? 'Unselect all' : 'Select all';
            applyFilters();
        }

        function initComboboxFilters(cardData) {
            if (SET_CONFIG.filterStyle !== 'combobox') return;
            document.getElementById('checkboxFilters').style.display = 'none';
            const container = document.getElementById('comboboxFilters');
            container.style.display = 'flex';

            // Set options (dynamic from data)
            const sets = [...new Set(cardData.map(c => c.setCode).filter(Boolean))].sort();

            // Rarity in logical order
            const rarityOrder = ['common', 'uncommon', 'rare', 'mythic'];
            const rarities = rarityOrder.filter(r => cardData.some(c => c.rarity === r));

            // Type: match against known type words to keep order clean
            const knownTypes = ['Creature', 'Instant', 'Sorcery', 'Enchantment', 'Artifact', 'Land', 'Planeswalker', 'Battle'];
            const types = knownTypes.filter(t => cardData.some(c => (c.type || '').includes(t)));

            // Colors: fixed order, only include those present
            const colorDefs = [
                { value: 'W', label: 'White' }, { value: 'U', label: 'Blue' },
                { value: 'B', label: 'Black' }, { value: 'R', label: 'Red' },
                { value: 'G', label: 'Green' }, { value: 'C', label: 'Colorless' }
            ];
            const colorPresent = new Set(cardData.flatMap(c => c.colors.length ? c.colors : ['C']));
            const colors = colorDefs.filter(c => colorPresent.has(c.value));

            container.appendChild(buildCombobox('set',    'Set',    sets.map(s => ({ value: s, label: s }))));
            container.appendChild(buildCombobox('rarity', 'Rarity', rarities.map(r => ({ value: r, label: r.charAt(0).toUpperCase() + r.slice(1) }))));
            container.appendChild(buildCombobox('type',   'Type',   types.map(t => ({ value: t, label: t }))));
            container.appendChild(buildCombobox('colors', 'Colors', colors));

            document.addEventListener('click', () => {
                document.querySelectorAll('.combobox-dropdown.open').forEach(d => d.classList.remove('open'));
                document.querySelectorAll('.combobox-btn.open').forEach(b => b.classList.remove('open'));
            });
        }

        function getSelectedRarities() {
            const selected = new Set();
            document.querySelectorAll('.rarity-filter-toggle').forEach(toggle => {
                if (toggle.checked) selected.add(toggle.dataset.rarity);
            });
            return selected;
        }

        function setRarityFilters(enabled) {
            document.querySelectorAll('.rarity-filter-toggle').forEach(toggle => {
                toggle.checked = enabled;
            });
            applyFilters();
        }

        function getSelectedColors() {
            const selected = new Set();
            document.querySelectorAll('.color-filter-toggle').forEach(toggle => {
                if (toggle.checked) selected.add(toggle.dataset.color);
            });
            return selected;
        }

        function setColorFilters(enabled) {
            document.querySelectorAll('.color-filter-toggle').forEach(toggle => {
                toggle.checked = enabled;
            });
            applyFilters();
        }

        function applyFilters() {
            const searchTerm = document.getElementById('searchBox').value.toLowerCase();
            const useCombobox = SET_CONFIG.filterStyle === 'combobox';
            let selectedRarities, selectedColors;
            if (!useCombobox) {
                selectedRarities = getSelectedRarities();
                selectedColors = getSelectedColors();
            }

            const rows = document.getElementById('tableBody').querySelectorAll('tr');
            rows.forEach(row => {
                const cardName = row.dataset.name.toLowerCase();
                const rarity = row.dataset.rarity || '';
                const colorIdentity = row.dataset.colorIdentity || 'C';
                const cardType = row.dataset.type || '';
                const setCode = row.dataset.setCode || '';

                const matchesName = cardName.includes(searchTerm);
                let matchesRarity, matchesColor, matchesSet, matchesType;

                if (useCombobox) {
                    matchesSet    = !cbFilterState.set    || cbFilterState.set.has(setCode);
                    matchesRarity = !cbFilterState.rarity || cbFilterState.rarity.has(rarity);
                    matchesType   = !cbFilterState.type   || [...cbFilterState.type].some(t => cardType.includes(t));
                    if (!cbFilterState.colors) {
                        matchesColor = true;
                    } else if (colorIdentity === 'C' || colorIdentity === '') {
                        matchesColor = cbFilterState.colors.has('C');
                    } else {
                        matchesColor = Array.from(colorIdentity).some(c => cbFilterState.colors.has(c));
                    }
                } else {
                    matchesSet  = true;
                    matchesType = true;
                    matchesRarity = selectedRarities.size > 0 && selectedRarities.has(rarity);
                    if (selectedColors.size === 0) {
                        matchesColor = true;
                    } else if (colorIdentity === 'C' || colorIdentity === '') {
                        matchesColor = selectedColors.has('C');
                    } else {
                        matchesColor = Array.from(colorIdentity).some(c => selectedColors.has(c));
                    }
                }

                row.style.display = (matchesName && matchesRarity && matchesColor && matchesSet && matchesType) ? '' : 'none';
            });
            updateInlineImages();
        }

        // ============================================================
        // Card image tooltip
        // ============================================================
        function showCardImage(e) {
            const link = e.currentTarget;
            const cardName = link.textContent;
            const row = link.closest('tr');
            const setCode = row ? row.dataset.setCode : '';
            const tooltip = document.getElementById('cardTooltip');
            activeCardLink = link;

            fetchCardImageUrl(cardName, setCode).then(url => {
                if (!url || activeCardLink !== link) return;
                tooltip.innerHTML = '';
                const img = document.createElement('img');
                img.src = url;
                img.alt = cardName;
                tooltip.appendChild(img);
                tooltip.style.display = 'block';
                img.addEventListener('load', updateTooltipPosition);
                updateTooltipPosition();
            });
        }

        function hideCardImage() {
            activeCardLink = null;
            document.getElementById('cardTooltip').style.display = 'none';
        }

        function updateTooltipPosition() {
            const tooltip = document.getElementById('cardTooltip');
            if (!activeCardLink || tooltip.style.display !== 'block') return;

            const margin = 8;
            const rect = activeCardLink.getBoundingClientRect();
            const tooltipWidth = tooltip.offsetWidth;
            const tooltipHeight = tooltip.offsetHeight;

            let left = rect.left;
            if (left + tooltipWidth > window.innerWidth - margin) left = window.innerWidth - margin - tooltipWidth;
            if (left < margin) left = margin;

            let top = rect.top - tooltipHeight - margin;
            if (top < margin) top = rect.bottom + margin;

            tooltip.style.left = left + 'px';
            tooltip.style.top = top + 'px';
        }

        // ============================================================
        // Inline card images
        // ============================================================
        function ensureRowImage(row) {
            const cardName = row.dataset.name;
            const setCode = row.dataset.setCode || '';
            if (!cardName) return;
            const cell = row.querySelector('td:first-child');
            if (!cell) return;

            let container = cell.querySelector('.card-image');
            if (!container) {
                container = document.createElement('div');
                container.className = 'card-image';
                cell.appendChild(container);
            }
            if (container.dataset.loaded === 'true') return;
            container.dataset.loaded = 'pending';

            fetchCardImageUrl(cardName, setCode).then(url => {
                if (!url) return;
                if (!container.querySelector('img')) {
                    const img = document.createElement('img');
                    img.src = url;
                    img.alt = cardName;
                    container.appendChild(img);
                }
                container.dataset.loaded = 'true';
            });
        }

        function updateInlineImages() {
            const toggle = document.getElementById('toggleImages');
            const enabled = toggle && toggle.checked;
            document.body.classList.toggle('show-images', enabled);

            if (enabled && !columnWidthState.imagesScaled) {
                applyImageColumnScale(true);
                columnWidthState.imagesScaled = true;
            }
            if (!enabled && columnWidthState.imagesScaled) {
                applyImageColumnScale(false);
                columnWidthState.imagesScaled = false;
            }
            if (!enabled) return;

            document.querySelectorAll('#tableBody tr').forEach(row => {
                if (row.style.display === 'none') return;
                ensureRowImage(row);
            });
        }

        function updateSortIndicators() {
            document.querySelectorAll('th[data-sort-key]').forEach(th => {
                const indicator = th.querySelector('.sort-indicator');
                if (!indicator) return;
                if (th.dataset.sortKey === sortState.key) {
                    th.classList.add('sorted');
                    indicator.textContent = sortState.direction === 'asc' ? '\u25B2' : '\u25BC';
                } else {
                    th.classList.remove('sorted');
                    indicator.textContent = '\u25B2';
                }
            });
        }

        function updateRarityHighlight() {
            const toggle = document.getElementById('toggleRarity');
            document.body.classList.toggle('rarity-color', toggle && toggle.checked);
        }

        function updateTypeDisplay() {
            const toggle = document.getElementById('toggleTypeDisplay');
            const isExpanded = toggle && toggle.checked;
            document.querySelectorAll('td.col-type').forEach(cell => {
                if (isExpanded) {
                    cell.classList.remove('compact');
                    cell.textContent = cell.dataset.fullType || '-';
                } else {
                    cell.classList.add('compact');
                    cell.textContent = getTypeCode(cell.dataset.fullType);
                }
            });
        }

        // ============================================================
        // Column resizing
        // ============================================================
        function setColumnWidth(index, width) {
            const cols = document.getElementById('ratingsTable').querySelectorAll('col');
            const col = cols[index];
            if (col) {
                col.style.setProperty('width', width + 'px', 'important');
                col.style.setProperty('min-width', width + 'px', 'important');
            }
            // Also set on td cells for name column (affects wrapping)
            if (index === 0) {
                const cells = document.querySelectorAll('td:first-child');
                cells.forEach(cell => {
                    cell.style.setProperty('min-width', width + 'px', 'important');
                    cell.style.setProperty('max-width', width + 'px', 'important');
                });
            }
        }

        function captureBaseWidths() {
            const table = document.getElementById('ratingsTable');
            const cols = table.querySelectorAll('col');
            columnWidthState.baseWidths = Array.from(cols).map((col, index) => {
                const header = table.querySelector('th[data-col-index="' + index + '"]');
                return header ? header.offsetWidth : 0;
            });
        }

        function applyImageColumnScale(enabled) {
            if (window.matchMedia('(max-width: 768px)').matches) return;  // Skip on mobile—CSS media queries handle sizing
            if (!columnWidthState.baseWidths) captureBaseWidths();
            const scale = enabled ? IMAGE_COLUMN_SCALE : 1;
            columnWidthState.baseWidths.forEach((width, index) => {
                const targetWidth = index === 0 ? Math.round(width * scale) : width;
                setColumnWidth(index, targetWidth);
            });
        }

        function setupColumnResizers() {
            if (window.matchMedia('(max-width: 768px)').matches) return;  // Skip on mobile—touch drag-resize not functional
            const table = document.getElementById('ratingsTable');
            const headers = table.querySelectorAll('th[data-resizable="true"]');

            headers.forEach(th => {
                if (th.querySelector('.col-resizer')) return;
                const colIndex = parseInt(th.dataset.colIndex, 10);
                if (Number.isNaN(colIndex)) return;

                const resizer = document.createElement('div');
                resizer.className = 'col-resizer';
                th.appendChild(resizer);

                let startX = 0, startWidth = 0;

                const onMouseMove = event => {
                    const delta = event.pageX - startX;
                    const minWidth = colIndex === 0 ? 160 : 35;
                    const newWidth = Math.max(minWidth, startWidth + delta);
                    setColumnWidth(colIndex, newWidth);
                    if (!columnWidthState.baseWidths) captureBaseWidths();
                    if (document.body.classList.contains('show-images') && colIndex === 0) {
                        columnWidthState.baseWidths[colIndex] = newWidth / IMAGE_COLUMN_SCALE;
                    } else {
                        columnWidthState.baseWidths[colIndex] = newWidth;
                    }
                };

                const onMouseUp = () => {
                    document.removeEventListener('mousemove', onMouseMove);
                    document.removeEventListener('mouseup', onMouseUp);
                    th.classList.remove('resizing');
                };

                resizer.addEventListener('mousedown', event => {
                    event.preventDefault();
                    startX = event.pageX;
                    startWidth = th.offsetWidth;
                    th.classList.add('resizing');
                    document.addEventListener('mousemove', onMouseMove);
                    document.addEventListener('mouseup', onMouseUp);
                });
            });
        }

        function setVersionInfo() {
            const el = document.getElementById('versionInfo');
            if (el) el.textContent = 'Viewer version ' + SET_CONFIG.version;
        }

        // ============================================================
        // Mobile column resize dialog (only on tablets/phones)
        // ============================================================
        function setupMobileResizeDialog() {
            if (!window.matchMedia('(max-width: 768px)').matches) return;

            const resizeBtn = document.getElementById('openResizeDialog');
            const resizeDialog = document.getElementById('resizeDialog');
            const closeBtn = document.querySelector('.resize-dialog-close');
            const resetBtn = document.querySelector('.resize-dialog-reset');
            const overlay = document.querySelector('.resize-dialog-overlay');
            const body = document.querySelector('.resize-dialog-body');

            // Show button on mobile
            resizeBtn.style.display = 'block';

            // Store default widths (in CSS pixels)
            const defaultWidths = {
                0: 160,   // Name column tablet, 130 on phone
                2: 40,    // Rarity
                3: 40,    // Colors
                4: 40,    // Type
                5: 40,    // Mana
                6: 50,    // Avg Norm
                7: 60     // Controversy
            };

            // Column names for dialog
            const colNames = {
                0: 'Card Name',
                2: 'Rarity (R)',
                3: 'Colors (C)',
                4: 'Type (T)',
                5: 'Mana (M)',
                6: 'Avg Norm',
                7: 'Controversy'
            };

            function populateDialog() {
                body.innerHTML = '';
                [0, 2, 3, 4, 5, 6, 7].forEach(colIndex => {
                    const table = document.getElementById('ratingsTable');
                    const col = table.querySelector('col:nth-child(' + (colIndex + 1) + ')');
                    const currentWidth = col ? parseInt(window.getComputedStyle(col).width, 10) : defaultWidths[colIndex];

                    const div = document.createElement('div');
                    div.className = 'resize-col-control';

                    const label = document.createElement('label');
                    label.textContent = colNames[colIndex];

                    const input = document.createElement('input');
                    input.type = 'range';
                    input.min = colIndex === 0 ? 100 : 25;
                    input.max = colIndex === 0 ? 250 : 100;
                    input.value = currentWidth;
                    input.dataset.colIndex = colIndex;

                    const valueSpan = document.createElement('span');
                    valueSpan.className = 'resize-col-value';
                    valueSpan.textContent = currentWidth + 'px';

                    input.addEventListener('input', event => {
                        const newWidth = parseInt(event.target.value, 10);
                        valueSpan.textContent = newWidth + 'px';
                        setColumnWidth(colIndex, newWidth);
                        if (!columnWidthState.baseWidths) captureBaseWidths();
                        columnWidthState.baseWidths[colIndex] = newWidth;
                    });

                    label.appendChild(valueSpan);
                    div.appendChild(label);
                    div.appendChild(input);
                    body.appendChild(div);
                });
            }

            function openDialog() {
                populateDialog();
                resizeDialog.style.display = 'block';
            }

            function closeDialog() {
                resizeDialog.style.display = 'none';
            }

            function resetWidths() {
                [0, 2, 3, 4, 5, 6, 7].forEach(colIndex => {
                    const width = window.matchMedia('(max-width: 480px)').matches
                        ? (colIndex === 0 ? 130 : 40)
                        : defaultWidths[colIndex];
                    setColumnWidth(colIndex, width);
                    if (!columnWidthState.baseWidths) captureBaseWidths();
                    columnWidthState.baseWidths[colIndex] = width;
                });
                populateDialog();
            }

            resizeBtn.addEventListener('click', openDialog);
            closeBtn.addEventListener('click', closeDialog);
            overlay.addEventListener('click', closeDialog);
            resetBtn.addEventListener('click', resetWidths);

            // Close on Escape key
            document.addEventListener('keydown', event => {
                if (event.key === 'Escape' && resizeDialog.style.display === 'block') {
                    closeDialog();
                }
            });
        }

        // ============================================================
        // Initialize table with pre-computed data
        // ============================================================
        function initializeTable(data) {
            const tbody = document.getElementById('tableBody');
            data.forEach(card => {
                tbody.appendChild(createTableRow(card));
            });

            // Tooltip event listeners
            document.querySelectorAll('td:first-child a').forEach(link => {
                link.addEventListener('mouseenter', showCardImage);
                link.addEventListener('mouseleave', hideCardImage);
                link.parentElement.parentElement.addEventListener('mousemove', updateTooltipPosition);
            });

            // Set initial sort
            const sortBySelect = document.getElementById('sortBy');
            const directionSelect = document.getElementById('direction');
            if (sortBySelect && sortBySelect.querySelector('option[value="' + sortState.key + '"]')) {
                sortBySelect.value = sortState.key;
            }
            if (directionSelect) directionSelect.value = sortState.direction;

            sortTable();
            applyFilters();
            updateRarityHighlight();
        }

        // ============================================================
        // Event listeners
        // ============================================================
        const sortBySelect = document.getElementById('sortBy');
        const directionSelect = document.getElementById('direction');
        if (sortBySelect) {
            sortBySelect.addEventListener('change', () => {
                sortState.key = sortBySelect.value;
                sortTable();
            });
        }
        if (directionSelect) {
            directionSelect.addEventListener('change', () => {
                sortState.direction = directionSelect.value;
                sortTable();
            });
        }
        document.getElementById('searchBox').addEventListener('input', applyFilters);
        document.getElementById('toggleImages').addEventListener('change', updateInlineImages);

        const rarityToggle = document.getElementById('toggleRarity');
        if (rarityToggle) rarityToggle.addEventListener('change', updateRarityHighlight);

        const typeToggle = document.getElementById('toggleTypeDisplay');
        if (typeToggle) typeToggle.addEventListener('change', updateTypeDisplay);

        document.querySelectorAll('.rarity-filter-toggle').forEach(toggle => {
            toggle.addEventListener('change', applyFilters);
        });
        document.querySelectorAll('.rarity-filter-action').forEach(button => {
            button.addEventListener('click', () => setRarityFilters(button.dataset.action === 'all'));
        });
        document.querySelectorAll('.color-filter-toggle').forEach(toggle => {
            toggle.addEventListener('change', applyFilters);
        });
        document.querySelectorAll('.color-filter-action').forEach(button => {
            button.addEventListener('click', () => setColorFilters(button.dataset.action === 'all'));
        });

        // ============================================================
        // Main: initialize page and load data
        // ============================================================
        initializePage();
        setVersionInfo();
        setupColumnResizers();
        setupMobileResizeDialog();

        // Header click sorting
        document.querySelectorAll('th[data-sort-key]').forEach(th => {
            th.addEventListener('click', event => {
                if (event.target.classList.contains('col-resizer')) return;
                const key = th.dataset.sortKey;
                if (sortState.key === key) {
                    sortState.direction = sortState.direction === 'asc' ? 'desc' : 'asc';
                } else {
                    sortState.key = key;
                    sortState.direction = 'desc';
                }
                if (sortBySelect && sortBySelect.querySelector('option[value="' + key + '"]')) {
                    sortBySelect.value = key;
                }
                if (directionSelect) directionSelect.value = sortState.direction;
                sortTable();
            });
        });

        // Load data: CARD_DATA is pre-computed, just map and render
        const cardData = CARD_DATA.map(card => ({
            ...card,
            colorIdentity: card.colors.join('') || 'C',
            rarityRank: RARITY_ORDER[card.rarity] || 0
        }));
        initializeTable(cardData);
        initComboboxFilters(cardData);
    </script>
</body>
